<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portaria - Control Door</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 400px; margin: 20px auto; }
        .btn { background: white; border: none; padding: 20px 5px; border-radius: 12px; font-weight: bold; color: #007bff; text-decoration: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn:active { background: #007bff; color: white; }
    </style>
</head>
<body>
    <h1>🏢 Portaria Digital</h1>
    <p>Selecione a casa:</p>
    <div class="grid">
        <script>
            for(let i=1; i<=25; i++) document.write(`<a href="index.html?casa=${i}" class="btn">CASA ${i}</a>`);
        </script>
    </div>
</body>
</html>
