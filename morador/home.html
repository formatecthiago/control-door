<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virty Access - Morador</title>
    <style>
        :root { --neon-green: #39FF14; --bg-black: #000; }
        * { box-sizing: border-box; }
        body { background: var(--bg-black); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .screen { display: none; width: 100%; max-width: 400px; flex-direction: column; padding: 20px; }
        .active { display: flex; }
        h2 { color: var(--neon-green); text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #111; color: white; }
        .btn { width: 100%; padding: 15px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; margin: 10px 0; }
        .btn-green { background: var(--neon-green); color: black; }
        .btn-gray { background: #333; color: white; }
        .avatar-box { width: 120px; height: 120px; border-radius: 50%; border: 2px solid white; margin: 20px auto; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #222; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="screen-cadastro" class="screen">
        <h2>VIRTY ACCESS</h2>
        <div class="avatar-box" onclick="document.getElementById('selfie').click()">
            <img id="img-preview" style="display:none">
            <span id="txt-foto">📷 FOTO</span>
            <input type="file" id="selfie" accept="image/*" capture="user" style="display:none" onchange="processarFoto(this)">
        </div>
        <input type="text" id="nome" placeholder="Nome">
        <input type="number" id="unidade" placeholder="Nº Unidade">
        <button class="btn btn-green" onclick="enviarCadastro()">SOLICITAR ACESSO</button>
    </div>

    <div id="screen-wait" class="screen">
        <h2>Aguardando...</h2>
        <p style="text-align:center">O síndico está analisando seu cadastro.</p>
        <button class="btn btn-gray" onclick="resetApp()">CANCELAR</button>
    </div>

    <div id="screen-home" class="screen">
        <h2>Olá, Unidade <span id="view-unidade"></span></h2>
        <p style="text-align:center; color: #666;">Sistema Ativo</p>
        <button class="btn btn-gray" onclick="resetApp()">SAIR</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", 
        databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", 
        projectId: "virty-access-door"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let unidadeLocal = localStorage.getItem('virty_unidade');
    let fotoBase64 = "";

    function tela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    window.processarFoto = (input) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            fotoBase64 = e.target.result;
            document.getElementById('img-preview').src = fotoBase64;
            document.getElementById('img-preview').style.display = "block";
            document.getElementById('txt-foto').style.display = "none";
        };
        reader.readAsDataURL(input.files[0]);
    };

    window.resetApp = () => { localStorage.clear(); location.reload(); };

    // ESCUTA EM TEMPO REAL
    if (!unidadeLocal) {
        tela('screen-cadastro');
    } else {
        onValue(ref(db, `moradores/${unidadeLocal}`), (snap) => {
            if (snap.exists()) {
                document.getElementById('view-unidade').innerText = unidadeLocal;
                tela('screen-home');
            } else {
                onValue(ref(db, `moradores_pendentes/${unidadeLocal}`), (snapP) => {
                    snapP.exists() ? tela('screen-wait') : resetApp();
                });
            }
        });
    }

    window.enviarCadastro = () => {
        const u = document.getElementById('unidade').value;
        const n = document.getElementById('nome').value;
        if(!u || !n || !fotoBase64) return alert("Faltam dados!");
        
        set(ref(db, `moradores_pendentes/${u}`), { nome: n, unidade: u, foto: fotoBase64 })
        .then(() => { 
            localStorage.setItem('virty_unidade', u);
            unidadeLocal = u;
        });
    };
</script>
</body>
</html>
