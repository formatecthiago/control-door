<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virty Access - Morador</title>
    <style>
        :root { --neon-green: #39FF14; --bg-black: #000; --card-dark: #111; --gray-btn: #333; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .screen { display: none; width: 100%; max-width: 480px; flex-direction: column; align-items: center; padding: 25px; }
        .active { display: flex; }

        /* Estética Global */
        h2 { color: var(--neon-green); font-size: 1.8rem; text-align: center; margin-top: 10px; }
        input { 
            width: 100%; padding: 18px; margin: 12px 0; border-radius: 12px; border: 1px solid #333;
            background: #0a0a0a; color: white; font-size: 1.2rem;
        }

        /* Botões Estilo Painel */
        .btn { 
            width: 100%; padding: 20px; border-radius: 35px; border: none; font-weight: bold; 
            font-size: 1.2rem; cursor: pointer; margin: 10px 0; text-transform: uppercase;
        }
        .btn-green { background: var(--neon-green); color: black; }
        .btn-white { background: white; color: black; }
        .btn-gray { background: var(--gray-btn); color: white; }

        /* TELA DE CHAMADA (CONFORME A FOTO) */
        .call-header { font-size: 1.4rem; font-weight: bold; margin-bottom: 30px; letter-spacing: 1px; }
        .call-panel {
            background: rgba(255,255,255,0.05); width: 100%; border-radius: 30px; padding: 30px;
            border: 1px solid #222; backdrop-filter: blur(10px);
        }
        .avatar-main {
            width: 130px; height: 130px; border-radius: 50%; border: 3px solid #fff;
            margin: 0 auto 20px; background: #333; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .avatar-main img { width: 100%; height: 100%; object-fit: cover; }
        
        .msg-box { 
            background: #1a1a1a; padding: 20px; border-radius: 15px; margin-top: 20px; 
            text-align: left; border: 1px solid #333;
        }
        .msg-box label { color: #888; font-size: 0.8rem; font-weight: bold; }
