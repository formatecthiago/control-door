<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>VIRTY MORADOR v1.5</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; --gray: #666; --yellow: #FFD700; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; box-sizing: border-box; }
        .active { display: flex; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; }
        .btn { width: 100%; padding: 15px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 10px 0; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        .hist-card { background: #0d0d0d; border-radius: 12px; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid #1a1a1a; }
        .foto-box { position: relative; width: 65px; height: 65px; }
        .foto-hist { width: 65px; height: 65px; border-radius: 10px; object-fit: cover; border: 1px solid var(--neon); }
        .dots-row { position: absolute; top: -10px; left: 0; width: 100%; display: flex; justify-content: center; gap: 3px; z-index: 10; }
        .dot { width: 16px; height: 16px; border-radius: 50%; font-size: 9px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; }
        
        #painel-chamada { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:2000; flex-direction:column; align-items:center; justify-content:center; }
        .foto-v { width: 220px; height: 220px; border-radius: 50%; border: 4px solid var(--neon); object-fit: cover; }
        
        .controles-alerta { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .btn-mini { background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 10px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; min-width: 50px; }
        #timer-regressivo { font-size: 2.5rem; color: var(--red); font-weight: bold; margin: 10px 0; }

        /* Novos Controles de Mensagem e Áudio */
        .area-comunicacao { width: 90%; display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn-audio { background: var(--yellow); color: #000; font-size: 1.5rem; padding: 15px; border-radius: 50%; width: 60px; height: 60px; margin: 0 auto; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }
        .btn-audio.gravando { background: var(--red); animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <!-- CADASTRO E TELAS INICIAIS (MANTIDAS) -->
    <div id="s-cadastro" class="screen">
        <h2 style="color:var(--neon)">CADASTRO MORADOR</h2>
        <video id="v-cad" autoplay playsinline muted style="width:120px; height:120px; border-radius:50%; object-fit:cover; margin:0 auto 20px; border:2px solid #fff;"></video>
        <button class="btn" style="background:#fff" onclick="fotoCad()">CAPTURAR SELFIE</button>
        <input type="text" id="c-nome" placeholder="Nome Completo">
        <input type="number" id="c-cpf" placeholder="CPF">
        <input type="number" id="c-tel" placeholder="Telefone">
        <input type="number" id="c-un" placeholder="Número da Casa">
        <button class="btn" style="background:var(--neon); color:#000;" onclick="enviarCadastro()">SOLICITAR ACESSO</button>
    </div>

    <div id="s-wait" class="screen">
        <h2 style="color:var(--neon); margin-top:100px;">AGUARDANDO APROVAÇÃO</h2>
        <p style="color:#888; text-align:center;">Seu cadastro foi enviado à administração.</p>
    </div>

    <div id="s-home" class="screen">
        <div class="header">
            <b style="color:var(--neon)">VIRTY CORE v1.5</b>
            <span id="txt-un" style="background:var(--neon); color:#000; padding:2px 8px; border-radius:4px; font-weight:bold;"></span>
        </div>
        <div class="controles-alerta">
            <button class="btn-mini" onclick="proximoSom()">🎼</button>
            <button class="btn-mini" id="btn-alerta" onclick="alternarAlerta()">🔊</button>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span style="font-size:0.8rem; color:#666;">HISTÓRICO</span>
            <button onclick="limparHist()" style="color:var(--red); background:none; border:none; font-size:0.7rem;">LIMPAR</button>
        </div>
        <div id="lista-hist"></div>
    </div>

    <!-- PAINEL DE CHAMADA ATUALIZADO (90s + ÁUDIO + MENSAGEM) -->
    <div id="painel-chamada">
        <div id="timer-regressivo">90</div>
        <img id="foto-v" class="foto-v">
        
        <div class="area-comunicacao">
            <button class="btn" style="background:var(--neon); color:#000" onclick="responder('liberado')">ABRIR PORTÃO</button>
            
            <div style="display: flex; gap: 10px;">
                <button class="btn" style="background:var(--blue); color:#fff; flex: 1;" onclick="abrirMsg()">TEXTO</button>
                <button id="btn-mic" class="btn-audio" ontouchstart="iniciarGravacao()" ontouchend="pararGravacao()" onmousedown="iniciarGravacao()" onmouseup="pararGravacao()">🎤</button>
            </div>
            
            <button class="btn" style="background:var(--red); color:#fff" onclick="responder('recusado')">CANCELAR</button>
        </div>
    </div>

    <canvas id="c-cad" style="display:none;"></canvas>
    <audio id="toque" loop></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    firebase.initializeApp(config);
    const db = firebase.database();

    let my_un = localStorage.getItem('my_un');
    let timerPerdida, tempoRestante = 90;
    let mediaRecorder, audioChunks = [];
    let my_foto = "";

    // MANTENDO SUA BIBLIOTECA DE SONS
    const sons = ["https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3", "https://assets.mixkit.co/active_storage/sfx/1358/1358-preview.mp3", "https://assets.mixkit.co/active_storage/sfx/1353/1353-preview.mp3", "https://assets.mixkit.co/active_storage/sfx/1344/1344-preview.mp3"];
    let somAtual = parseInt(localStorage.getItem('virty_som')) || 0;
    let modoAlerta = parseInt(localStorage.getItem('virty_alerta')) || 1;

    window.onload = () => {
        if(!my_un) mudarTela('s-cadastro');
        else verificarStatus();
        atualizarInterfaceAlerta();
    };

    // LOGICA DE SONS E ALERTA (IGUAL AO SEU)
    function proximoSom() { somAtual = (somAtual + 1) % sons.length; localStorage.setItem('virty_som', somAtual); const t = document.getElementById('toque'); t.src = sons[somAtual]; t.play(); setTimeout(()=>t.pause(),3000); }
    function alternarAlerta() { modoAlerta = modoAlerta >= 3 ? 1 : modoAlerta + 1; localStorage.setItem('virty_alerta', modoAlerta); atualizarInterfaceAlerta(); }
    function atualizarInterfaceAlerta() { const btn = document.getElementById('btn-alerta'); const icons = ["","🔊","📳🔊","📳"]; btn.innerText = icons[modoAlerta]; }

    function gerenciarAlerta(acao) {
        const t = document.getElementById('toque');
        t.src = sons[somAtual];
        if(acao === 'start') {
            if(modoAlerta < 3) t.play().catch(()=>{});
            if(modoAlerta > 1) navigator.vibrate([500, 300, 500]);
        } else { t.pause(); navigator.vibrate(0); }
    }

    function verificarStatus() {
        db.ref('moradores_validados/' + my_un).on('value', s => {
            if(s.exists()) {
                mudarTela('s-home');
                document.getElementById('txt-un').innerText = "CASA " + my_un;
                escutarChamadas();
                renderizarHist();
            } else {
                db.ref('solicitacoes_cadastro/' + my_un).once('value', sp => {
                    sp.exists() ? mudarTela('s-wait') : mudarTela('s-cadastro');
                });
            }
        });
    }

    // ESCUTAR CHAMADAS COM TIMER DE 90S
    function escutarChamadas() {
        db.ref('chamadas_ativas/' + my_un).on('value', s => {
            const d = s.val();
            if(d && d.status === 'chamando') {
                document.getElementById('foto-v').src = d.foto;
                document.getElementById('painel-chamada').style.display = 'flex';
                gerenciarAlerta('start');
                
                tempoRestante = 90;
                clearInterval(timerPerdida);
                timerPerdida = setInterval(() => {
                    tempoRestante--;
                    document.getElementById('timer-regressivo').innerText = tempoRestante;
                    if(tempoRestante <= 0) responder('não atendida');
                }, 1000);
            } else if (!d || d.status !== 'gravando' && d.status !== 'digitando') {
                document.getElementById('painel-chamada').style.display = 'none';
                gerenciarAlerta('stop');
                clearInterval(timerPerdida);
            }
        });
    }

    // GRAVAÇÃO DE ÁUDIO
    async function iniciarGravacao() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        document.getElementById('btn-mic').classList.add('gravando');
        db.ref('chamadas_ativas/' + my_un).update({ status: 'gravando' });
        
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            enviarRespostaFinal("", audioBlob);
        };
        audioChunks = [];
        mediaRecorder.start();
    }

    function pararGravacao() {
        if(mediaRecorder) {
            mediaRecorder.stop();
            document.getElementById('btn-mic').classList.remove('gravando');
        }
    }

    function abrirMsg() {
        const m = prompt("Digite sua mensagem para o visitante:");
        if(m) {
            db.ref('chamadas_ativas/' + my_un).update({ status: 'digitando' });
            setTimeout(() => enviarRespostaFinal(m, null), 500);
        }
    }

    async function enviarRespostaFinal(texto, audioBlob) {
        // Aqui você faria o upload para o Storage se quiser o áudio real. 
        // Por enquanto, enviamos o status de sucesso para o Visitante desconectar.
        db.ref('chamadas_ativas/' + my_un).update({
            status: 'finalizada_com_sucesso',
            mensagem_texto: texto || "",
            link_audio: "" // Link do Storage aqui
        }).then(() => {
            alert("Enviado!");
            location.reload(); 
        });
    }

    async function responder(st) {
        const ref = db.ref('chamadas_ativas/' + my_un);
        const snap = await ref.once('value');
        const d = snap.val();
        if(d) {
            ref.update({ status: st });
            // Grava no seu histórico original
            const hRef = db.ref(`historico/${my_un}/${d.v_id}`);
            hRef.once('value', s => {
                let h = s.val() || { foto: d.foto, v_id: d.v_id, verde:0, vermelho:0, azul:0, cinza:0 };
                if(st==='liberado') h.verde++;
                if(st==='recusado') h.vermelho++;
                h.ultima = st; h.ts = Date.now();
                hRef.set(h);
            });
            setTimeout(() => ref.remove(), 1000);
        }
    }

    // HISTÓRICO E OUTRAS FUNÇÕES (MANTIDAS EXATAMENTE IGUAIS)
    function renderizarHist() {
        db.ref(`historico/${my_un}`).on('value', snap => {
            const list = document.getElementById('lista-hist'); list.innerHTML = "";
            snap.forEach(item => {
                const d = item.val();
                list.innerHTML += `<div class="hist-card">
                    <div class="foto-box"><img src="${d.foto}" class="foto-hist"></div>
                    <div style="flex:1"><b>ID: ${d.v_id}</b><br><small>STATUS: ${d.ultima}</small></div>
                </div>`;
            });
        });
    }

    function mudarTela(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function fotoCad() { const v = document.getElementById('v-cad'), c = document.getElementById('c-cad'); c.width = v.videoWidth; c.height = v.videoHeight; c.getContext('2d').drawImage(v, 0, 0); my_foto = c.toDataURL('image/jpeg', 0.5); alert("Foto salva!"); }
    function enviarCadastro() { const un = document.getElementById('c-un').value; my_un = un; localStorage.setItem('my_un', un); db.ref('solicitacoes_cadastro/' + un).set({ nome: document.getElementById('c-nome').value, unidade: un, foto: my_foto, ts: Date.now() }).then(() => verificarStatus()); }
    function limparHist() { if(confirm("Limpar histórico?")) db.ref(`historico/${my_un}`).remove(); }
</script>
</body>
</html>
