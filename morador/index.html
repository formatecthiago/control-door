<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>VIRTY ACCESS DOOR v1.0</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --blue: #007BFF; --red: #FF3131; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; box-sizing: border-box; }
        .active { display: flex; }
        
        /* Topo */
        .header-main { text-align: center; border-bottom: 2px solid #222; padding-bottom: 15px; margin-bottom: 20px; }
        .virty-title { color: var(--neon); font-size: 1.2rem; font-weight: 900; letter-spacing: 1px; margin: 0; }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 0.8rem; }
        .unidade-box { background: var(--neon); color: #000; padding: 3px 10px; border-radius: 5px; font-weight: bold; }

        /* Botões */
        .btn { border: none; border-radius: 15px; padding: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 1rem; }
        .btn-v { background: var(--neon); color: #000; }
        .btn-a { background: var(--blue); color: #fff; }
        .btn-r { background: var(--red); color: #fff; }

        /* Histórico */
        .hist-card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 12px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; }
        .hist-img { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--neon); object-fit: cover; margin-right: 12px; }
        
        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; border: 1px solid var(--neon); padding: 20px; border-radius: 20px; width: 100%; text-align: center; position: relative; }
    </style>
</head>
<body>

    <div id="s-cadastro" class="screen active">
        <div class="header-main"><h1 class="virty-title">VIRTY ACCESS DOOR</h1></div>
        <div style="width:150px; height:150px; margin:0 auto 15px; border:2px solid var(--neon); border-radius:50%; overflow:hidden;">
            <video id="v" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>
            <canvas id="c" style="display:none"></canvas>
        </div>
        <button class="btn btn-v" onclick="clickSom(); capturar()">📷 TIRAR SELFIE</button>
        <input type="text" id="cad-nome" placeholder="Nome Completo" style="width:100%; padding:15px; margin:10px 0; background:#111; border:1px solid #333; color:#fff; border-radius:10px; box-sizing:border-box;">
        <input type="number" id="cad-un" placeholder="Nº Unidade" style="width:100%; padding:15px; margin:10px 0; background:#111; border:1px solid #333; color:#fff; border-radius:10px; box-sizing:border-box;">
        <button class="btn btn-v" onclick="clickSom(); enviarCadastro()">CADASTRAR</button>
    </div>

    <div id="s-home" class="screen">
        <div class="header-main">
            <h1 class="virty-title">VIRTY ACCESS DOOR <span style="font-size:0.6rem">v1.0</span></h1>
            <div class="user-info">
                <span id="txt-morador">---</span>
                <span class="unidade-box">CASA <span id="txt-unidade">--</span></span>
            </div>
            <button class="btn" id="btn-mute" onclick="toggleMute()" style="padding:8px; font-size:0.7rem; background:#111; color:#fff; border:1px solid #333;">🔔 SOM ATIVO</button>
        </div>
        <h3>Histórico</h3>
        <div id="lista-hist" style="flex:1; overflow-y:auto;"></div>
    </div>

    <div id="s-call" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span onclick="irHome()" style="font-size:1.5rem;">🏠</span>
            <b style="color:var(--neon)">AO VIVO</b>
            <span onclick="toggleMute()">🔔</span>
        </div>
        <img id="img-vis" src="" style="width:100%; height:300px; border-radius:20px; object-fit:cover; margin:15px 0; border:2px solid var(--neon);">
        <button class="btn btn-v" onclick="clickSom(); responder('liberado')">✔️ ABRIR</button>
        <button class="btn btn-a" onclick="clickSom(); abrirMsg()">💬 MENSAGEM</button>
        <button class="btn btn-r" onclick="clickSom(); responder('recusado')">✖️ RECUSAR</button>
    </div>

    <div id="modal-msg" class="modal">
        <div class="modal-content">
            <span onclick="fecharMsg()" style="position:absolute; right:15px; top:10px; color:#666;">✖️</span>
            <h3 style="color:var(--blue)">MENSAGEM</h3>
            <input type="text" id="txt-input" placeholder="Digite aqui..." style="width:100%; padding:15px; background:#000; border:1px solid var(--blue); color:#fff; border-radius:10px; margin-bottom:10px;">
            <button class="btn btn-a" onclick="enviarTxt()">ENVIAR AGORA</button>
            <div id="aviso-click" style="display:none; margin-top:10px; color:var(--neon); font-size:0.7rem;">⚠️ Clique em ABRIR no botão verde para liberar.</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const config = { 
            apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", 
            databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" 
        };
        if (!firebase.apps.length) firebase.initializeApp(config);
        const db = firebase.database();
        let modoVibrar = false;
        let meuId = localStorage.getItem('virty_id');

        // Audio Click
        function clickSom() {
            if(modoVibrar) { if(navigator.vibrate) navigator.vibrate(50); return; }
            let ctx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = ctx.createOscillator();
            let g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value = 600; g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        }

        const v = document.getElementById('v'), c = document.getElementById('c');
        navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}}).then(s => v.srcObject = s).catch(e => console.log(e));

        function capturar() {
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v,0,0);
            window.fotoBase64 = c.toDataURL('image/jpeg', 0.5);
            v.style.display="none"; c.style.display="block";
        }

        function enviarCadastro() {
            const nome = document.getElementById('cad-nome').value;
            const un = document.getElementById('cad-un').value;
            if(!nome || !un || !window.fotoBase64) return alert("Preencha tudo!");
            const id = "M" + Date.now();
            db.ref('moradores_pendentes/'+id).set({id, nome, unidade: un, foto: window.fotoBase64, status:'pendente'});
            localStorage.setItem('virty_id', id);
            location.reload();
        }

        if(meuId) {
            db.ref('moradores_validados/'+meuId).on('value', snap => {
                if(snap.exists()) {
                    const m = snap.val();
                    document.getElementById('txt-morador').innerText = m.nome;
                    document.getElementById('txt-unidade').innerText = m.unidade;
                    mudarTela('s-home');
                    escutar(m.unidade);
                }
            });
        }

        function escutar(un) {
            db.ref('chamadas_ativas/'+un).on('value', s => {
                const d = s.val();
                if(d && d.status === 'chamando') {
                    document.getElementById('img-vis').src = d.foto;
                    mudarTela('s-call');
                }
            });
            db.ref('historico/'+un).on('value', snap => {
                const lista = document.getElementById('lista-hist');
                lista.innerHTML = "";
                let itens = []; snap.forEach(i => { itens.unshift(i.val()); });
                let agrupado = [];
                itens.forEach(it => {
                    let last = agrupado[agrupado.length-1];
                    if(last && (it.ts - last.ts < 600000)) last.qtd = (last.qtd || 1) + 1;
                    else agrupado.push(it);
                });
                agrupado.forEach(h => {
                    lista.innerHTML += `<div class="hist-card"><img src="${h.foto}" class="hist-img"><div><b>VISITANTE ${h.qtd > 1 ? h.qtd+'x' : ''}</b><br><small>${h.hora} - ${h.tipo}</small></div></div>`;
                });
            });
        }

        function responder(tipo) {
            const un = document.getElementById('txt-unidade').innerText;
            const ref = db.ref('chamadas_ativas/'+un);
            ref.once('value', s => {
                const d = s.val();
                if(d) {
                    db.ref('historico/'+un).push({ foto: d.foto, ts: Date.now(), hora: new Date().toLocaleTimeString(), tipo: tipo.toUpperCase() });
                    ref.update({ status: tipo });
                    setTimeout(() => { ref.remove(); irHome(); }, 500);
                }
            });
        }

        function toggleMute() {
            if(confirm("Ativar modo vibrar?")) { modoVibrar = true; document.getElementById('btn-mute').innerText = "📳 MODO VIBRAR"; }
            else { modoVibrar = false; document.getElementById('btn-mute').innerText = "🔔 SOM ATIVO"; }
        }

        function mudarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function abrirMsg() { document.getElementById('modal-msg').style.display='flex'; }
        function fecharMsg() { document.getElementById('modal-msg').style.display='none'; }
        function irHome() { mudarTela('s-home'); }
        function enviarTxt() {
            const txt = document.getElementById('txt-input').value;
            const un = document.getElementById('txt-unidade').innerText;
            db.ref('chamadas_ativas/'+un).update({ status: 'mensagem', msg_morador: txt });
            document.getElementById('aviso-click').style.display = 'block';
            responder('mensagem');
        }
    </script>
</body>
</html>
