<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM",
        authDomain: "virty-access-door.firebaseapp.com",
        databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com",
        projectId: "virty-access-door",
        storageBucket: "virty-access-door.firebasestorage.app",
        messagingSenderId: "694822891117",
        appId: "1:694822891117:web:b95a71c1eb273071fa9964"
    };

    // Inicializa o Firebase e o Banco
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Elementos da tela
    const video = document.querySelector("#video-preview");
    const canvas = document.querySelector("#canvas-foto");
    const fotoImg = document.querySelector("#foto-capturada");
    let fotoBase64 = null;

    // Liga a câmera do jeito que você já sabia que funcionava
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { console.log("Erro câmera: ", err); });

    // Função de tirar foto
    window.tirarFoto = function() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        fotoBase64 = canvas.toDataURL('image/jpeg');
        fotoImg.src = fotoBase64;
        fotoImg.style.display = 'block';
        video.style.display = 'none';
    };

    // Função de enviar - AQUI ESTAVA O PROBLEMA
    window.enviarParaFirebase = function() {
        const nome = document.getElementById('cad-nome').value;
        const cpf = document.getElementById('cad-cpf').value;
        
        if(!fotoBase64 || !nome) {
            alert("Tire a foto e preencha seu nome!");
            return;
        }

        const idGeral = "ID-" + Math.floor(Math.random() * 9999);
        localStorage.setItem('meu_id_virty', idGeral);

        // Envia para a pasta de pendentes
        set(ref(db, 'solicitacoes_pendentes/' + idGeral), {
            nome: nome,
            cpf: cpf,
            foto: fotoBase64,
            status: "pendente"
        }).then(() => {
            // MUDANÇA DE TELA SEM PRECISAR ATUALIZAR
            document.getElementById('tela-cadastro').style.display = 'none';
            document.getElementById('tela-aguarde').style.display = 'flex';
            checarSeFuiLiberado(idGeral);
        }).catch(erro => {
            alert("Erro ao enviar: " + erro);
        });
    };

    function checarSeFuiLiberado(id) {
        onValue(ref(db, 'moradores_autorizados/' + id), (snapshot) => {
            if(snapshot.exists()) {
                document.getElementById('tela-aguarde').style.display = 'none';
                document.getElementById('tela-home').style.display = 'flex';
            }
        });
    }
</script>
