<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY MORADOR v2.1.4 - Miniatura de Foto</title>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; --gray: #666; --yellow: #FFD700; }
        *, *::before, *::after { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; overflow: hidden; -webkit-user-select: none; user-select: none; }
        
        /* 📐 Divisão Proporcional Estrita (Vertical e Horizontal) */
        .screen { 
            display: none; 
            height: 100vh; 
            width: 100vw;
            grid-template-rows: 15vh 70vh 15vh;
            grid-template-columns: 5vw 90vw 5vw;
            box-sizing: border-box; 
        }
        .active { display: grid; }
        
        /* Gaps Invisíveis de Isolamento */
        .screen-top-gap, .screen-bottom-gap { grid-column: 1 / span 3; height: 15vh; pointer-events: none; }
        .screen-left-gap, .screen-right-gap { height: 70vh; pointer-events: none; }
        
        /* 📦 Área Útil Central Restrita */
        .screen-main-content { 
            grid-column: 2; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            align-items: center; 
            height: 100%; 
            width: 100%; 
            box-sizing: border-box;
        }

        /* Zonas de Distribuição Interna (15% | 70% | 15%) */
        .header-zona { height: 15vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; width: 100%; }
        .center-zona { height: 55vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; width: 100%; gap: 12px; }
        .footer-zona { height: 15vh; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }

        .btn { width: 100%; max-width: 320px; padding: 16px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        
        .btn-group-horizontal { display: flex; gap: 12px; width: 100%; max-width: 320px; justify-content: center; }
        .btn-half { width: 50%; padding: 16px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; }

        .foto-v { width: 220px; height: 220px; border-radius: 50%; border: 4px solid var(--neon); object-fit: cover; box-shadow: 0 0 25px rgba(57,255,20,0.4); background: #111; }
        .virty-input { width: 100%; max-width: 280px; padding: 12px; background: #111; border: 2px solid var(--neon); color: #fff; text-align: center; font-size: 2rem; font-weight: bold; border-radius: 15px; outline: none; }
        
        /* Miniatua de foto do Perfil do Morador */
        .avatar-upload { position: relative; width: 110px; height: 110px; border-radius: 50%; border: 3px dashed var(--neon); display: flex; align-items: center; justify-content: center; cursor: pointer; background: #0d0d0d; overflow: hidden; }
        .avatar-upload img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; display: none; }
        .avatar-upload span { font-size: 0.75rem; color: var(--neon); text-align: center; font-weight: bold; padding: 5px; z-index: 2; }

        .texto-neon-verde { color: var(--neon); text-shadow: 0 0 15px var(--neon); font-weight: bold; }
        .texto-neon-vermelho { color: var(--red); text-shadow: 0 0 15px var(--red); font-weight: bold; }

        .pulsar { animation: pulseBlink 1.5s infinite; }
        @keyframes pulseBlink { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        .virty-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; border: 2px solid var(--neon); color: #fff; padding: 30px; border-radius: 16px; z-index: 5000; box-shadow: 0 0 35px rgba(57,255,20,0.4); text-align: center; width: 85%; max-width: 340px; }
    </style>
</head>
<body>

    <div id="custom-alert" class="virty-popup">
        <div style="color:var(--neon); font-size:0.8rem; letter-spacing:2px; margin-bottom:12px;">VIRTY SYSTEM</div>
        <div id="custom-alert-msg" style="color:#fff; font-size:1.1rem; font-weight:normal; line-height:1.4;"></div>
        <button class="btn" style="background:#fff; color:#000; padding:10px; margin-top:20px; font-size:0.85rem; border-radius:10px;" onclick="fecharAlertCustomizado()">OK</button>
    </div>

    <div id="s-config" class="screen active">
        <div class="screen-top-gap"></div>
        <div class="screen-left-gap"></div>
        <div class="screen-main-content">
            <div class="header-zona">
                <h1 class="texto-neon-verde" style="font-size:2.2rem; margin:0;">CONFIGURAÇÃO</h1>
                <div style="color:var(--gray); font-size:0.85rem; font-weight:bold; letter-spacing:1px;">VINCULAR SMARTPHONE E FOTO</div>
            </div>
            <div class="center-zona">
                <div class="avatar-upload" onclick="document.getElementById('file-avatar').click()">
                    <span id="txt-avatar-placeholder">📸 ADICIONAR<br>MINIATURA</span>
                    <img id="img-avatar-preview" src="">
                </div>
                <input type="file" id="file-avatar" accept="image/*" style="display: none;" onchange="processarMiniaturaFoto(this)">

                <p style="color:#aaa; font-size:0.9rem; margin:5px 0 0 0;">Número da sua casa ou apartamento:</p>
                <input type="number" id="cfg-unidade" class="virty-input" placeholder="000" inputmode="numeric">
            </div>
            <div class="footer-zona">
                <button class="btn" style="background:var(--neon); color:#000;" onclick="salvarConfiguracaoUnidade()">CONECTAR INTERFONE</button>
            </div>
        </div>
        <div class="screen-right-gap"></div>
        <div class="screen-bottom-gap"></div>
    </div>

    <div id="s-espera" class="screen">
        <div class="screen-top-gap"></div>
        <div class="screen-left-gap"></div>
        <div class="screen-main-content">
            <div class="header-zona">
                <h1 id="txt-titulo-espera" class="texto-neon-verde" style="font-size:2rem; margin:0;">INTERFONE ONLINE</h1>
            </div>
            <div class="center-zona">
                <div style="width:130px; height:130px; border-radius:50%; border:3px dashed var(--neon); display:flex; align-items:center; justify-content:center;" class="pulsar">
                    <span style="color:var(--neon); font-size:3rem;">📱</span>
                </div>
                <p style="color:var(--gray); font-size:0.95rem; margin:0 20px; line-height:1.4;">Aguardando chamadas do totem de visitantes. Você pode bloquear a tela ou sair do app normalmente.</p>
            </div>
            <div class="footer-zona">
                <button class="btn" style="background:transparent; border:2px solid var(--red); color:var(--red);" onclick="desconectarUnidade()">DESCONECTAR INTERFONE</button>
            </div>
        </div>
        <div class="screen-right-gap"></div>
        <div class="screen-bottom-gap"></div>
    </div>

    <div id="s-chamada-recebida" class="screen">
        <div class="screen-top-gap"></div>
        <div class="screen-left-gap"></div>
        <div class="screen-main-content">
            <div class="header-zona">
                <h2 class="texto-neon-vermelho pulsar" style="font-size:2rem; margin:0;">VISITANTE NA PORTA</h2>
                <div id="timer-box-m" style="color:var(--gray); font-weight:bold; margin-top:5px;">TEMPO RESTANTE: <span id="virty-timer-m">90</span>s</div>
            </div>
            
            <div class="center-zona">
                <img id="foto-visitante-m" class="foto-v" src="">
                <p id="recado-visitante-m" style="color:#aaa; font-style:italic; font-size:1.1rem; padding:0 10px; margin:0;"></p>
            </div>
            
            <div class="footer-zona">
                <div class="btn-group-horizontal">
                    <button class="btn-half" style="background:var(--neon); color:#000;" onclick="responderChamada('liberado')">LIBERAR</button>
                    <button class="btn-half" style="background:var(--red); color:#fff;" onclick="responderChamada('recusado')">RECUSAR</button>
                </div>
            </div>
        </div>
        <div class="screen-right-gap"></div>
        <div class="screen-bottom-gap"></div>
    </div>

    <audio id="audio-ringtone" src="https://assets.mixkit.co/active_storage/sfx/1357/1357-84.wav" loop playsinline></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let minhaUnidade = localStorage.getItem('virty_morador_unidade') || "";
    let moradorFotoB64 = localStorage.getItem('virty_morador_foto') || "";
    let escutadorChamadas = null;
    let intervaloVibracao = null;
    let wakeLockAtivo = null;
    let timerMoradorInterval = null;

    function virtyAlert(msg) {
        document.getElementById('custom-alert-msg').innerText = msg;
        document.getElementById('custom-alert').style.display = 'block';
    }
    function fecharAlertCustomizado() { document.getElementById('custom-alert').style.display = 'none'; }

    function mudarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    window.onload = () => {
        // Se já tiver foto salva localmente, exibe o preview dela
        if(moradorFotoB64) {
            const imgPrev = document.getElementById('img-avatar-preview');
            imgPrev.src = moradorFotoB64;
            imgPrev.style.display = "block";
            document.getElementById('txt-avatar-placeholder').style.display = "none";
        }
        
        if(minhaUnidade) {
            ativarInterfoneMorador();
        }
    };

    // Processa a imagem inserida pelo morador para transformar em miniatura leve (Base64)
    function processarMiniaturaFoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                // Cria uma imagem temporária para redimensionar via Canvas e não sobrecarregar o Firebase
                const imgTemp = new Image();
                imgTemp.src = e.target.result;
                imgTemp.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    // Define tamanho da miniatura (ex: 150x150 pixels)
                    canvas.width = 150;
                    canvas.height = 150;
                    ctx.drawImage(imgTemp, 0, 0, 150, 150);
                    
                    moradorFotoB64 = canvas.toDataURL('image/jpeg', 0.6);
                    localStorage.setItem('virty_morador_foto', moradorFotoB64);
                    
                    // Atualiza interface do avatar
                    const imgPrev = document.getElementById('img-avatar-preview');
                    imgPrev.src = moradorFotoB64;
                    imgPrev.style.display = "block";
                    document.getElementById('txt-avatar-placeholder').style.display = "none";
                };
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function salvarConfiguracaoUnidade() {
        const input = document.getElementById('cfg-unidade').value.trim();
        if(!input) return virtyAlert("Por favor, informe o número da unidade!");
        if(!moradorFotoB64) return virtyAlert("Por favor, adicione uma miniatura de foto antes de conectar!");
        
        minhaUnidade = input;
        localStorage.setItem('virty_morador_unidade', minhaUnidade);
        
        // 📸 GRAVAÇÃO DA FOTO ATUALIZADA: Registra no nó lido pelo Totem do Visitante
        db.ref(`moradores_validados/${minhaUnidade}`).set({
            ativo: true,
            foto: moradorFotoB64,
            ts_cadastro: Date.now()
        }).then(() => {
            ativarInterfoneMorador();
        }).catch(err => {
            virtyAlert("Erro ao salvar cadastro: " + err.message);
        });
    }

    function ativarInterfoneMorador() {
        document.getElementById('txt-titulo-espera').innerText = `UNIDADE ${minhaUnidade} ONLINE`;
        mudarTela('s-espera');
        escutarChamadasBanco();
    }

    function desconectarUnidade() {
        if(confirm("Deseja realmente desconectar este interfone? Você não receberá mais alertas.")) {
            if(escutadorChamadas) db.ref(`chamadas_ativas/${minhaUnidade}`).off();
            pararAlertasChamada();
            localStorage.removeItem('virty_morador_unidade');
            minhaUnidade = "";
            document.getElementById('cfg-unidade').value = "";
            
            // Reseta UI do seletor de fotos
            localStorage.removeItem('virty_morador_foto');
            moradorFotoB64 = "";
            document.getElementById('img-avatar-preview').style.display = "none";
            document.getElementById('txt-avatar-placeholder').style.display = "block";
            
            mudarTela('s-config');
        }
    }

    function unsubscribeChamadas() {
        if(escutadorChamadas) {
            escutadorChamadas.off();
            escutadorChamadas = null;
        }
    }

    function escutarChamadasBanco() {
        unsubscribeChamadas();
        
        escutadorChamadas = db.ref(`chamadas_ativas/${minhaUnidade}`);
        escutadorChamadas.on('value', snap => {
            const dados = snap.val();
            
            if(!dados) {
                pararAlertasChamada();
                if(document.getElementById('s-chamada-recebida').classList.contains('active')) {
                    mudarTela('s-espera');
                }
                return;
            }

            if(dados.status === 'chamando') {
                abrirPainelChamadaRecebida(dados);
            }
        });
    }

    async function abrirPainelChamadaRecebida(dados) {
        document.getElementById('foto-visitante-m').src = dados.foto || "https://placehold.co/200x200/0a0a0a/39FF14?text=VIRTY";
        document.getElementById('recado-visitante-m').innerText = dados.texto ? `"${dados.texto}"` : "Sem recado escrito.";
        
        mudarTela('s-chamada-recebida');
        dispararAlertasChamada();
        solicitarWakeLock();
        iniciarTimerLocalMorador(dados.ts);
    }

    function iniciarTimerLocalMorador(timestampCriacao) {
        clearInterval(timerMoradorInterval);
        timerMoradorInterval = setInterval(() => {
            const decorrido = Math.floor((Date.now() - timestampCriacao) / 1000);
            const restante = 90 - decorrido;
            
            if(restante <= 0) {
                clearInterval(timerMoradorInterval);
                document.getElementById('virty-timer-m').innerText = "0";
                responderChamada('timeout');
            } else {
                document.getElementById('virty-timer-m').innerText = restante;
            }
        }, 1000);
    }

    function responderChamada(novoStatus) {
        pararAlertasChamada();
        clearInterval(timerMoradorInterval);

        if(novoStatus === 'timeout') {
            mudarTela('s-espera');
            return;
        }

        db.ref(`chamadas_ativas/${minhaUnidade}/status`).set(novoStatus).then(() => {
            mudarTela('s-espera');
        }).catch(err => {
            virtyAlert("Erro ao enviar resposta: " + err.message);
            mudarTela('s-espera');
        });
    }

    function dispararAlertasChamada() {
        const ringtone = document.getElementById('audio-ringtone');
        ringtone.currentTime = 0;
        ringtone.play().catch(e => console.log("Aguardando toque na tela para áudio nativo."));

        if ("vibrate" in navigator) {
            clearInterval(intervaloVibracao);
            navigator.vibrate([1000, 500, 1000, 500]);
            intervaloVibracao = setInterval(() => {
                navigator.vibrate([1000, 500, 1000, 500]);
            }, 3000);
        }
    }

    function pararAlertasChamada() {
        const ringtone = document.getElementById('audio-ringtone');
        ringtone.pause();
        ringtone.currentTime = 0;

        if ("vibrate" in navigator) {
            clearInterval(intervaloVibracao);
            navigator.vibrate(0);
        }

        liberarWakeLock();
    }

    async function solicitarWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                wakeLockAtivo = await navigator.wakeLock.request('screen');
            } catch (err) {
                console.log(`Erro ao reter Wake Lock: ${err.message}`);
            }
        }
    }

    function liberarWakeLock() {
        if (wakeLockAtivo !== null) {
            wakeLockAtivo.release().then(() => {
                wakeLockAtivo = null;
            });
        }
    }
</script>
</body>
</html>
