<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY MORADOR v1.7.0</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; --gray: #666; --dark-card: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; box-sizing: border-box; }
        .active { display: flex; }
        
        /* Cabeçalho */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        
        /* Cards de Histórico */
        #lista-hist { flex: 1; overflow-y: auto; }
        .hist-card { background: var(--dark-card); border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid #1a1a1a; position: relative; }
        .foto-hist { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; border: 1px solid var(--neon); }
        
        /* Botão de Bloqueio Estilo Switch */
        .btn-block { padding: 6px 12px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; font-size: 0.7rem; transition: 0.3s; }
        .is-blocked { background: var(--red); color: #fff; }
        .is-unblocked { background: var(--neon); color: #000; }

        /* UI de Chamada */
        #painel-chamada { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:2000; flex-direction:column; align-items:center; justify-content:center; }
        .foto-v { width: 200px; height: 200px; border-radius: 50%; border: 4px solid var(--neon); object-fit: cover; }
        .btn { width: 100%; padding: 15px; border-radius: 25px; border: none; font-weight: bold; margin: 8px 0; cursor: pointer; }
    </style>
</head>
<body>

    <div id="s-cadastro" class="screen">
        <h2 style="color:var(--neon); text-align:center;">CADASTRO VIRTY</h2>
        <video id="v-cad" autoplay playsinline muted style="width:150px; height:150px; border-radius:50%; margin:0 auto 20px; border:2px solid var(--neon);"></video>
        <button class="btn" onclick="fotoCad()">📸 CAPTURAR FACE</button>
        <input type="text" id="c-nome" placeholder="Nome Completo" style="width:100%; padding:12px; margin:5px 0;">
        <input type="number" id="c-cpf" placeholder="CPF (Apenas números)" style="width:100%; padding:12px; margin:5px 0;">
        <input type="number" id="c-un" placeholder="Número da Unidade" style="width:100%; padding:12px; margin:5px 0;">
        <button class="btn" style="background:var(--neon); color:#000" onclick="enviarCadastro()">SOLICITAR ACESSO</button>
    </div>

    <div id="s-home" class="screen">
        <div class="header">
            <b style="color:var(--neon)">VIRTY v1.7.0</b>
            <span id="txt-un" style="background:var(--neon); color:#000; padding:2px 8px; border-radius:4px; font-weight:bold;"></span>
        </div>
        <div id="lista-hist"></div>
    </div>

    <div id="painel-chamada">
        <div id="timer-regressivo" style="color:var(--red); font-size:2rem;">90</div>
        <img id="foto-v" class="foto-v" src="">
        <p id="msg-v" style="margin:15px 0; color:#aaa;"></p>
        <div style="width: 80%;">
            <button class="btn" style="background:var(--neon)" onclick="responder('liberado')">ABRIR</button>
            <button class="btn" style="background:var(--blue); color:#fff" onclick="responder('mensagem')">ENVIAR MENSAGEM</button>
            <button class="btn" style="background:var(--red); color:#fff" onclick="responder('recusado')">RECUSAR</button>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let my_un = localStorage.getItem('my_un');
    let my_foto = "";

    window.onload = () => { if(my_un) verificarStatus(); else mudarTela('s-cadastro'); };

    function verificarStatus() {
        db.ref('moradores_validados/' + my_un).on('value', s => {
            if(s.exists()) {
                mudarTela('s-home');
                document.getElementById('txt-un').innerText = "CASA " + my_un;
                escutarChamadas();
                renderizarHist();
            }
        });
    }

    function renderizarHist() {
        // Pega histórico e lista de bloqueados simultaneamente
        db.ref(`historico/${my_un}`).on('value', snap => {
            db.ref(`bloqueados/${my_un}`).on('value', blockSnap => {
                const blocks = blockSnap.val() || {};
                const list = document.getElementById('lista-hist');
                list.innerHTML = "";
                snap.forEach(item => {
                    const d = item.val();
                    const isBlocked = !!blocks[d.v_id];
                    list.innerHTML += `
                        <div class="hist-card">
                            <img src="${d.foto}" class="foto-hist">
                            <div style="flex:1">
                                <small>ID: ${d.v_id}</small><br>
                                <button class="btn-block ${isBlocked ? 'is-blocked' : 'is-unblocked'}" 
                                        onclick="alternarBloqueio('${d.v_id}')">
                                    ${isBlocked ? 'BLOQUEADO' : 'LIBERADO'}
                                </button>
                            </div>
                        </div>`;
                });
            });
        });
    }

    function alternarBloqueio(vid) {
        const ref = db.ref(`bloqueados/${my_un}/${vid}`);
        ref.once('value', s => {
            if(s.exists()) ref.remove();
            else ref.set(true);
        });
    }

    function responder(st) {
        const ref = db.ref('chamadas_ativas/' + my_un);
        ref.once('value', snap => {
            const d = snap.val();
            if(d) {
                ref.update({ status: st });
                // Regra prioritária: Qualquer ação leva de volta para a Home
                document.getElementById('painel-chamada').style.display = 'none';
                setTimeout(() => ref.remove(), 2000);
            }
        });
    }

    function mudarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 's-cadastro') navigator.mediaDevices.getUserMedia({video:true}).then(s => document.getElementById('v-cad').srcObject = s);
    }

    function fotoCad() {
        const v = document.getElementById('v-cad');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        my_foto = c.toDataURL('image/jpeg', 0.5);
        alert("Face Capturada!");
    }

    function enviarCadastro() {
        const un = document.getElementById('c-un').value;
        const cpf = document.getElementById('c-cpf').value;
        if(!my_foto || !un || !cpf) return alert("Preencha todos os campos e capture a foto!");
        my_un = un; localStorage.setItem('my_un', un);
        db.ref('solicitacoes_cadastro/' + un).set({
            nome: document.getElementById('c-nome').value, cpf: cpf, unidade: un, foto: my_foto, ts: Date.now()
        }).then(() => { alert("Solicitação enviada!"); location.reload(); });
    }

    function escutarChamadas() {
        db.ref('chamadas_ativas/' + my_un).on('value', s => {
            const d = s.val();
            const painel = document.getElementById('painel-chamada');
            if(d && (d.status === 'chamando' || d.status === 'gravando')) {
                document.getElementById('foto-v').src = d.foto;
                document.getElementById('msg-v').innerText = d.texto || "";
                painel.style.display = 'flex';
            } else { painel.style.display = 'none'; }
        });
    }
</script>
</body>
</html>
