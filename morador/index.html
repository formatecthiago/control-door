<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY ACCESS DOOR v10.1</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --blue: #007BFF; --red: #FF3131; --gray: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; box-sizing: border-box; }
        .active { display: flex; }
        .header-main { text-align: center; border-bottom: 2px solid var(--gray); padding-bottom: 15px; margin-bottom: 15px; }
        .virty-title { color: var(--neon); font-size: 1.1rem; font-weight: 900; letter-spacing: 2px; margin: 0; }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 0.85rem; }
        .unidade-box { background: var(--neon); color: #000; padding: 3px 10px; border-radius: 5px; font-weight: bold; }

        /* Histórico New 10.1 */
        .hist-card { background: #0a0a0a; border: 1px solid #222; padding: 12px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; position: relative; }
        .hist-img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--neon); object-fit: cover; margin-right: 12px; }
        .hist-info { flex: 1; }
        .btn-bloquear { font-size: 1.2rem; cursor: pointer; padding: 10px; filter: grayscale(1); transition: 0.3s; }
        .bloqueado { filter: grayscale(0) !important; color: var(--red); }
        
        .btn { border: none; border-radius: 15px; padding: 18px; font-weight: bold; cursor: pointer; font-size: 1rem; width: 100%; transition: 0.2s; }
        .btn-v { background: var(--neon); color: #000; }
        .btn-a { background: var(--blue); color: #fff; }
        .btn-r { background: var(--red); color: #fff; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; border: 1px solid var(--neon); padding: 25px; border-radius: 20px; width: 100%; text-align: center; position: relative; }
        #bloqueio-inicio { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="bloqueio-inicio">
        <h1 style="color:var(--neon)">VIRTY NEW 10.1</h1>
        <button class="btn btn-v" onclick="conectarSistema()" style="width:250px;">CONECTAR E ATIVAR SOM</button>
    </div>

    <div id="s-home" class="screen">
        <div class="header-main">
            <h1 class="virty-title">VIRTY ACCESS DOOR <span style="font-size:0.6rem; color:#666">v10.1</span></h1>
            <div class="user-info">
                <span id="nome-exibir">Thiago Vieira</span>
                <span class="unidade-box">CASA <span id="un-exibir">10</span></span>
            </div>
            <button class="btn" id="btn-silenciar" onclick="setSilenciar()" style="background:#111; color:#fff; border:1px solid #333; padding:10px; font-size:0.75rem; margin-top:10px;">🔔 SOM ATIVO</button>
        </div>
        <div id="lista-hist"></div>
    </div>

    <div id="s-call" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span onclick="mudarTela('s-home')" style="font-size:1.8rem;">🏠</span>
            <b style="color:var(--neon)">VISITANTE AO VIVO</b>
            <span></span>
        </div>
        <img id="img-vis" src="" style="width:100%; height:320px; border-radius:25px; object-fit:cover; margin:20px 0; border:2px solid var(--neon);">
        <div style="display:flex; flex-direction:column; gap:12px;">
            <button class="btn btn-v" onclick="responder('liberado')">✔️ ABRIR PORTÃO</button>
            <button class="btn btn-r" onclick="responder('recusado')">✖️ RECUSAR</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const config = { 
            apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", 
            databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        
        let audioCtx;
        let somAtivo = true;
        let meuId = "1778000704147";
        let blacklist = JSON.parse(localStorage.getItem('virty_blacklist') || '[]');

        function conectarSistema() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('bloqueio-inicio').style.display = 'none';
            inicializar();
        }

        function setSilenciar() {
            somAtivo = !somAtivo;
            document.getElementById('btn-silenciar').innerHTML = somAtivo ? "🔔 SOM ATIVO" : "🔕 SILENCIADO";
            document.getElementById('btn-silenciar').style.color = somAtivo ? "#fff" : "#ff3131";
        }

        function tocarCampainha() {
            if(!somAtivo || !audioCtx) return;
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, t);
            osc.frequency.exponentialRampToValueAtTime(880, t + 0.5);
            g.gain.setValueAtTime(0.2, t);
            g.gain.exponentialRampToValueAtTime(0.00001, t + 1.5);
            osc.start(t); osc.stop(t + 1.5);
        }

        function inicializar() {
            db.ref('moradores_validados/'+meuId).on('value', s => {
                if(s.exists()){
                    const m = s.val();
                    document.getElementById('nome-exibir').innerText = m.nome;
                    document.getElementById('un-exibir').innerText = m.unidade;
                    mudarTela('s-home');
                    escutar(m.unidade);
                }
            });
        }

        function escutar(un) {
            db.ref('chamadas_ativas/'+un).on('value', s => {
                const d = s.val();
                if(d && d.status === 'chamando') {
                    // VERIFICA BLOQUEIO
                    if(blacklist.includes(d.v_id)) {
                        console.log("Chamada bloqueada de: " + d.v_id);
                        return;
                    }
                    document.getElementById('img-vis').src = d.foto;
                    mudarTela('s-call');
                    tocarCampainha();
                }
            });

            db.ref('historico/'+un).limitToLast(10).on('value', snap => {
                let histLocal = [];
                snap.forEach(i => { histLocal.unshift(i.val()); });
                renderHist(histLocal);
            });
        }

        function renderHist(lista) {
            const container = document.getElementById('lista-hist');
            container.innerHTML = "";
            lista.forEach(h => {
                const isBloqueado = blacklist.includes(h.v_id);
                container.innerHTML += `
                    <div class="hist-card">
                        <img src="${h.foto}" class="hist-img">
                        <div class="hist-info">
                            <b>VISITANTE</b>
                            <small>${h.hora}</small>
                        </div>
                        <div class="btn-bloquear ${isBloqueado ? 'bloqueado' : ''}" 
                             onclick="toggleBloqueio('${h.v_id}')">🚫</div>
                    </div>`;
            });
        }

        function toggleBloqueio(id) {
            if(!id || id === 'anonimo') return;
            if(blacklist.includes(id)) {
                blacklist = blacklist.filter(item => item !== id);
            } else {
                blacklist.push(id);
            }
            localStorage.setItem('virty_blacklist', JSON.stringify(blacklist));
            alert("Status de bloqueio atualizado para este visitante.");
            location.reload(); 
        }

        function responder(tipo) {
            const un = document.getElementById('un-exibir').innerText;
            db.ref('chamadas_ativas/'+un).update({ status: tipo });
            setTimeout(() => { db.ref('chamadas_ativas/'+un).remove(); irHome(); }, 500);
        }

        function mudarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function irHome() { mudarTela('s-home'); }
    </script>
</body>
</html>
