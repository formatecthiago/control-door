<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virty Access - Morador</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; }
        body { background: var(--bg); color: white; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .screen { display: none; width: 100%; max-width: 450px; flex-direction: column; padding: 25px; margin: 0 auto; box-sizing: border-box; }
        .active { display: flex; }
        h2 { color: var(--neon); text-transform: uppercase; }
        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: white; text-align: center; }
        .btn { width: 100%; padding: 18px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 8px 0; }
        .btn-green { background: var(--neon); color: black; }
        .btn-red { background: #ff3333; color: white; }
        
        /* Câmera Cadastro */
        .cam-box { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--neon); margin: 10px auto; overflow: hidden; position: relative; background: #111; }
        video, canvas { width: 100%; height: 100%; object-fit: cover; }

        /* Histórico */
        .history-item { background: #0a0a0a; border: 1px solid #222; padding: 10px; border-radius: 12px; display: flex; align-items: center; margin-bottom: 8px; }
        .hist-thumb { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; margin-right: 12px; }
        .hidden-hist { display: none; }
    </style>
</head>
<body>

    <div id="s-cad" class="screen">
        <h2>CADASTRO</h2>
        <div class="cam-box" onclick="document.getElementById('in-foto').click()">
            <video id="v-cad" autoplay playsinline muted></video>
            <canvas id="c-cad" style="display:none"></canvas>
        </div>
        <button class="btn" style="background:#222; color:#fff" onclick="tirarFotoCad()">FOTOGRAFAR</button>
        <input type="text" id="cad-nome" placeholder="Nome Completo">
        <input type="number" id="cad-un" placeholder="Número da Unidade">
        <input type="number" id="cad-cpf" placeholder="CPF">
        <input type="number" id="cad-tel" placeholder="Telefone/WhatsApp">
        <button class="btn btn-green" onclick="solicitarAcesso()">ENVIAR PARA ANÁLISE</button>
    </div>

    <div id="s-wait" class="screen">
        <h2 style="color:orange">AGUARDANDO LIBERAÇÃO</h2>
        <p>Seu cadastro foi enviado. O administrador precisa autorizar seu acesso.</p>
    </div>

    <div id="s-home" class="screen">
        <h2 id="view-u">HOME</h2>
        <div id="lista-historico"></div>
        <button id="btn-ver-mais" class="btn" style="background:#111; color:var(--neon); display:none" onclick="mostrarTudo()">VER MAIS</button>
    </div>

    <div id="s-call" class="screen">
        <h2 style="color:var(--neon)">VISITANTE!</h2>
        <img id="v-foto" style="width:200px; height:200px; border-radius:20px; margin:20px auto; border:3px solid var(--neon);">
        <p id="v-msg"></p>
        <button class="btn btn-green" onclick="responder('liberado')">ABRIR PORTÃO</button>
        <button class="btn btn-red" onclick="responder('recusado')">RECUSAR</button>
    </div>

    <audio id="som-campainha" loop src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", projectId: "virty-access-door" };
    const app = initializeApp(config);
    const db = getDatabase(app);
    
    let fotoCad = "", streamCad;
    const lId = localStorage.getItem('virty_id'); // ID Único do Aparelho

    // Inicia Câmera de Cadastro
    async function initCam() {
        try {
            streamCad = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('v-cad').srcObject = streamCad;
        } catch(e) { console.log("Cam bloqueada"); }
    }

    // Trava de Entrada
    if(!lId) {
        show('s-cad');
        initCam();
    } else {
        verificarStatus();
    }

    function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function verificarStatus() {
        onValue(ref(db, `moradores_validados/${lId}`), (snap) => {
            if(snap.exists()) {
                window.minhaUnidade = snap.val().unidade;
                document.getElementById('view-u').innerText = "UNIDADE " + window.minhaUnidade;
                show('s-home');
                vigiar();
                carregarHistorico();
            } else {
                onValue(ref(db, `moradores_pendentes/${lId}`), (s) => {
                    s.exists() ? show('s-wait') : show('s-cad');
                });
            }
        });
    }

    window.tirarFotoCad = () => {
        const v = document.getElementById('v-cad'), c = document.getElementById('c-cad');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        fotoCad = c.toDataURL('image/jpeg', 0.5);
        alert("Foto capturada!");
    };

    window.solicitarAcesso = async () => {
        const un = document.getElementById('cad-un').value;
        const nome = document.getElementById('cad-nome').value;
        if(!fotoCad || !un || !nome) return alert("Preencha tudo e tire a foto!");

        // Verificar limite de 5 pessoas por unidade
        const snap = await get(ref(db, `unidades_contagem/${un}`));
        const total = snap.val() || 0;
        if(total >= 5) return alert("Limite de 5 moradores atingido para esta unidade!");

        const newId = Date.now();
        set(ref(db, `moradores_pendentes/${newId}`), {
            id: newId, nome, unidade: un, 
            cpf: document.getElementById('cad-cpf').value,
            tel: document.getElementById('cad-tel').value,
            foto: fotoCad
        }).then(() => {
            localStorage.setItem('virty_id', newId);
            location.reload();
        });
    };

    // ... (vigiar e responder permanecem o mesmo fluxo usando window.minhaUnidade) ...

    function carregarHistorico() {
        onValue(ref(db, `historico/${window.minhaUnidade}`), (snap) => {
            const div = document.getElementById('lista-historico'); div.innerHTML = '';
            let itens = [];
            snap.forEach(i => { itens.unshift(i.val()); });
            itens = itens.slice(0, 10);
            
            itens.forEach((m, index) => {
                const classe = index >= 5 ? 'hidden-hist' : '';
                div.innerHTML += `<div class="history-item ${classe}">
                    <img src="${m.foto}" class="hist-thumb">
                    <div class="hist-info"><b>Visitante</b><p>${m.hora}</p></div>
                </div>`;
            });
            if(itens.length > 5) document.getElementById('btn-ver-mais').style.display = 'block';
        });
    }
    window.mostrarTudo = () => { 
        document.querySelectorAll('.hidden-hist').forEach(i => i.style.display = 'flex');
        document.getElementById('btn-ver-mais').style.display = 'none';
    };
</script>
</body>
</html>
