<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY MORADOR v10.9</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; --gray: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; box-sizing: border-box; }
        .active { display: flex; }
        
        /* Cabeçalho */
        .header-main { text-align: center; border-bottom: 2px solid var(--gray); padding-bottom: 15px; margin-bottom: 15px; }
        .virty-title { color: var(--neon); font-size: 1rem; font-weight: 900; letter-spacing: 2px; margin: 0; }
        
        /* Cards de Histórico */
        .hist-card { background: #0a0a0a; border: 1px solid #222; padding: 12px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .hist-info { display: flex; align-items: center; }
        .hist-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--neon); object-fit: cover; margin-right: 12px; }
        .count-badge { background: var(--neon); color: #000; padding: 2px 6px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; margin-left: 5px; }

        /* Botões */
        .btn { border: none; border-radius: 15px; padding: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; font-size: 1rem; }
        .btn-v { background: var(--neon); color: #000; }
        .btn-blk { background: transparent; border: 1px solid #444; color: #fff; padding: 8px; width: auto; font-size: 0.8rem; }
        .blocked { border-color: var(--red); color: var(--red); }

        /* Inputs de Cadastro */
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; background: #111; border: 1px solid #333; color: #fff; text-align: center; }
        
        /* Modal Mensagem */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; border: 1px solid var(--neon); padding: 25px; border-radius: 20px; width: 100%; text-align: center; position: relative; }
        .close-x { position: absolute; top: 10px; right: 15px; font-size: 1.5rem; color: var(--red); cursor: pointer; }
    </style>
</head>
<body>

    <div id="s-cadastro" class="screen">
        <h1 style="color:var(--neon)">BOAS-VINDAS</h1>
        <p>Cadastre-se para acessar sua unidade.</p>
        <div id="cam-area" style="width:150px; height:150px; border-radius:50%; border:2px solid var(--neon); margin:20px auto; overflow:hidden;">
            <video id="v-cad" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
        </div>
        <button class="btn btn-v" onclick="tirarFotoCad()" style="margin-bottom:10px;">📸 TIRAR SELFIE</button>
        <input type="text" id="cad-nome" placeholder="Nome Completo">
        <input type="number" id="cad-cpf" placeholder="CPF (Somente números)">
        <input type="number" id="cad-un" placeholder="Número da Unidade">
        <button class="btn btn-v" onclick="solicitarCadastro()">CADASTRAR</button>
    </div>

    <div id="s-espera" class="screen" style="justify-content:center; text-align:center;">
        <h2 style="color:var(--neon)">AGUARDANDO...</h2>
        <p>Seu cadastro foi enviado ao Administrador.<br>Aguarde a liberação.</p>
        <div class="loader"></div>
    </div>

    <div id="s-home" class="screen">
        <div class="header-main">
            <h1 class="virty-title">VIRTY ACCESS DOOR v1</h1>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                <span>Thiago Vieira</span>
                <span style="background:var(--neon); color:#000; padding:2px 8px; border-radius:5px; font-weight:bold;">UNIDADE <span id="u-txt">10</span></span>
            </div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button id="btn-silenciar" onclick="toggleMute()" style="flex:1; background:#111; color:#fff; border:1px solid #333; padding:10px; font-size:0.7rem;">🔔 SOM ATIVO</button>
                <button onclick="limparHistorico()" style="flex:1; background:#111; color:var(--red); border:1px solid var(--red); padding:10px; font-size:0.7rem;">🗑️ LIMPAR TUDO</button>
            </div>
        </div>
        
        <div id="lista-hist">
            </div>
        <button id="ver-mais" onclick="mostrarTodos()" style="display:none; background:none; border:none; color:var(--neon); margin:10px auto; cursor:pointer;">Ver mais...</button>
    </div>

    <div id="s-call" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span onclick="mudarTela('s-home')" style="font-size:1rem; color:#888;">🏠 VOLTAR</span>
            <b style="color:var(--neon)">AO VIVO</b>
            <span id="timer" style="color:var(--red); font-weight:bold; font-size:1.5rem;">60s</span>
        </div>
        <img id="img-vis" src="" style="width:100%; height:300px; border-radius:20px; object-fit:cover; margin:20px 0; border:2px solid var(--neon);">
        <p id="msg-vis-box" style="background:#111; padding:10px; border-radius:10px; color:#aaa; font-style:italic;"></p>
        <div style="display:grid; gap:10px;">
            <button class="btn btn-v" onclick="responder('liberado')">✔️ ABRIR</button>
            <button class="btn btn-a" style="background:var(--blue); color:#fff;" onclick="abrirMsg()">💬 ACEITAR / MENSAGEM</button>
            <button class="btn btn-r" style="background:var(--red); color:#fff;" onclick="responder('recusado')">✖️ RECUSAR</button>
        </div>
    </div>

    <div id="modal-msg" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="fecharMsg()">✖</span>
            <h3 style="color:var(--blue)">ENVIAR RESPOSTA</h3>
            <input type="text" id="input-msg" maxlength="50" placeholder="Escreva aqui (máx 50 caracteres)">
            <button class="btn btn-v" onclick="enviarM()">ENVIAR E ENCERRAR</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    const app = initializeApp(config);
    const db = getDatabase(app);

    let b64_cad = "", somOn = true, unidade = "10", limiteHist = 3;
    const v_cad = document.getElementById('v-cad');

    // Inicialização e Câmera
    navigator.mediaDevices.getUserMedia({video:true}).then(s => v_cad.srcObject = s);

    window.tirarFotoCad = () => {
        const c = document.createElement('canvas');
        c.width = v_cad.videoWidth; c.height = v_cad.videoHeight;
        c.getContext('2d').drawImage(v_cad, 0, 0);
        b64_cad = c.toDataURL('image/jpeg', 0.5);
        document.getElementById('cam-area').innerHTML = `<img src="${b64_cad}" style="width:100%; height:100%; object-fit:cover;">`;
    };

    // Lógica de Cadastro e Permissão
    window.solicitarCadastro = () => {
        const nome = document.getElementById('cad-nome').value;
        const cpf = document.getElementById('cad-cpf').value;
        const un = document.getElementById('cad-un').value;
        if(!b64_cad || !nome || !cpf || !un) return alert("Preencha tudo!");

        set(ref(db, 'solicitacoes_cadastro/' + cpf), {
            nome, cpf, unidade: un, foto: b64_cad, status: 'pendente'
        });
        mudarTela('s-espera');
        verificarAprovacao(cpf, un);
    };

    function verificarAprovacao(cpf, un) {
        onValue(ref(db, 'moradores_validados'), snap => {
            snap.forEach(m => {
                if(m.val().cpf === cpf) {
                    unidade = un;
                    iniciarPainel();
                }
            });
        });
    }

    // Painel Principal e Histórico Agrupado
    function iniciarPainel() {
        mudarTela('s-home');
        document.getElementById('u-txt').innerText = unidade;

        // Escuta Chamadas Ativas
        onValue(ref(db, `chamadas_ativas/${unidade}`), snap => {
            const d = snap.val();
            if(d && d.status === 'chamando') {
                document.getElementById('img-vis').src = d.foto;
                document.getElementById('msg-vis-box').innerText = d.texto || "Sem mensagem.";
                mudarTela('s-call');
                playCampainha();
            }
        });

        // Escuta Histórico com Regra de 1 Hora (Super Agrupamento)
        onValue(ref(db, `historico/${unidade}`), snap => {
            const lista = document.getElementById('lista-hist');
            lista.innerHTML = "";
            let historicoRaw = [];
            snap.forEach(child => { historicoRaw.push({id: child.key, ...child.val()}); });
            
            // Lógica de Agrupamento
            let agrupado = [];
            historicoRaw.reverse().forEach(visita => {
                let ultimo = agrupado[agrupado.length - 1];
                let diff = ultimo ? (ultimo.ts - visita.ts) / 1000 / 60 : 999;

                if(ultimo && ultimo.v_id === visita.v_id && diff < 60) {
                    ultimo.count = (ultimo.count || 1) + 1;
                } else {
                    agrupado.push({...visita, count: 1});
                }
            });

            agrupado.slice(0, limiteHist).forEach(h => {
                const isBlk = localStorage.getItem('blk_'+h.v_id);
                lista.innerHTML += `
                    <div class="hist-card">
                        <div class="hist-info">
                            <img src="${h.foto}" class="hist-img">
                            <div>
                                <b>VISITANTE ${h.count > 1 ? `<span class="count-badge">${h.count}x</span>` : ''}</b><br>
                                <small>${h.hora}</small>
                            </div>
                        </div>
                        <button class="btn-blk ${isBlk ? 'blocked' : ''}" onclick="toggleBlock('${h.v_id}')">
                            ${isBlk ? '🚫 BLOQUEADO' : '🟢 BLOQUEAR'}
                        </button>
                    </div>`;
            });
            if(agrupado.length > 3) document.getElementById('ver-mais').style.display = "block";
        });
    }

    // Ações de Chamada
    window.responder = (status) => {
        update(ref(db, `chamadas_ativas/${unidade}`), { status });
        if(status === 'liberado') alert("AUTORIZE A ENTRADA NO BOTÃO ABRIR");
        setTimeout(() => { remove(ref(db, `chamadas_ativas/${unidade}`)); mudarTela('s-home'); }, 1000);
    };

    window.enviarM = () => {
        const msg = document.getElementById('input-msg').value;
        update(ref(db, `chamadas_ativas/${unidade}`), { status: 'mensagem', msg_morador: msg });
        fecharMsg();
        alert("AUTORIZE A ENTRADA NO BOTÃO ABRIR");
        setTimeout(() => { remove(ref(db, `chamadas_ativas/${unidade}`)); mudarTela('s-home'); }, 1000);
    };

    window.limparHistorico = () => {
        if(confirm("Deseja ZERAR todo o histórico?")) remove(ref(db, `historico/${unidade}`));
    };

    window.toggleBlock = (vid) => {
        const key = 'blk_'+vid;
        localStorage.getItem(key) ? localStorage.removeItem(key) : localStorage.setItem(key, 'true');
        location.reload();
    };

    // Utilitários
    window.toggleMute = () => {
        somOn = !somOn;
        document.getElementById('btn-silenciar').innerText = somOn ? "🔔 SOM ATIVO" : "🔕 MODO VIBRAR";
        if(!somOn) { alert("Modo Vibrar Ativo. Som no nível zero."); if(navigator.vibrate) navigator.vibrate(500); }
    };

    function mudarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function fecharMsg() { document.getElementById('modal-msg').style.display='none'; }
    function abrirMsg() { document.getElementById('modal-msg').style.display='flex'; }
</script>
</body>
</html>
