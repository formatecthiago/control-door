<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY MORADOR v1.9.9</title>
    
    <!-- Configurações PWA nativas direcionadas para a subpasta do Morador -->
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; --gray: #444; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 450px; margin: 0 auto; padding-bottom: 40px; }
        h2 { color: var(--neon); letter-spacing: 1px; font-size: 1.4rem; margin-top: 10px; }
        .card { background: #0a0a0a; border: 1px solid #111; border-radius: 16px; padding: 20px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .foto-box { width: 100%; max-width: 240px; height: 240px; border-radius: 50%; object-fit: cover; border: 4px solid var(--neon); margin: 15px auto; display: block; background: #111; box-shadow: 0 0 20px rgba(57,255,20,0.2); }
        .recado-texto { background: #111; padding: 15px; border-radius: 12px; font-style: italic; color: #ccc; font-size: 1.1rem; border-left: 4px solid var(--neon); margin: 15px 0; text-align: left; line-height: 1.4; }
        .btn-g { width: 100%; padding: 18px; border-radius: 30px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .btn-green { background: var(--neon); color: #000; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-blue { background: var(--blue); color: #fff; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #222; background: #111; color: #fff; font-size: 1rem; box-sizing: border-box; text-align: center; }
        .tag-status { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; margin-top: 5px; }
        .status-offline { background: var(--red); color: #fff; }
        .status-online { background: var(--neon); color: #000; }
        .controle-audio { background: #111; padding: 15px; border-radius: 12px; margin-top: 15px; display: none; border: 1px dashed var(--blue); }
        .status-gravando { color: var(--red); font-weight: bold; animation: piscar 1s infinite; }
        @keyframes piscar { 0% { opacity:0.3; } 50% { opacity:1; } 100% { opacity:0.3; } }
    </style>
</head>
<body>

    <div class="container">
        <h2>VIRTY MORADOR</h2>
        <div id="status-conexao" class="tag-status status-offline">Desconectado</div>

        <!-- LOGIN / CONFIGURAÇÃO INICIAL -->
        <div id="painel-login" class="card">
            <h3 style="margin-top:0;">Configurar Unidade</h3>
            <input type="number" id="m-unidade" placeholder="Nº do seu Apartamento / Casa">
            <button class="btn-g btn-green" onclick="salvarConfiguracaoUnidade()">Ativar Meu Interfone</button>
        </div>

        <!-- PAINEL MONITOR DE ATENDIMENTO -->
        <div id="painel-atendimento" class="card" style="display:none;">
            <div style="font-size: 0.9rem; color:#888; letter-spacing:1px;">MONITORANDO UNIDADE <span id="label-unidade" style="color:var(--neon); font-weight:bold;">-</span></div>
            
            <div id="area-alerta-chamada" style="display:none; margin-top:20px;">
                <div style="color:var(--red); font-weight:bold; font-size:1.3rem; margin-bottom:10px; letter-spacing:1px; animation: piscar 1.5s infinite;">🔔 INTERFONE TOCANDO...</div>
                <img id="foto-visitante" class="foto-box" src="" alt="Foto do Visitante">
                <div id="texto-visitante" class="recado-texto">"Aguardando recado..."</div>

                <button class="btn-g btn-green" onclick="responderChamada('liberado')">🔓 LIBERAR ENTRADA</button>
                <button class="btn-g btn-red" onclick="responderChamada('recusado')">❌ RECUSAR ACESSO</button>
                
                <button id="btn-alternar-audio" class="btn-g btn-blue" onclick="mostrarPainelAudio()">🎙️ ENVIAR ÁUDIO / MENSAGEM</button>

                <!-- ENTRADA DE ÁUDIO / RESPOSTA PERSONALIZADA -->
                <div id="box-audio" class="controle-audio">
                    <input type="text" id="msg-texto-morador" placeholder="Escreva uma mensagem rápida...">
                    <button class="btn-g btn-blue" style="padding:10px; font-size:0.9rem;" onclick="enviarMensagemTextoPura()">Enviar Texto</button>
                    <hr style="border:0; border-top:1px solid #222; margin:15px 0;">
                    <div id="gravacao-status" style="margin-bottom:10px; font-size:0.9rem;">Pronto para gravar</div>
                    <button id="btn-gravar-v" class="btn-g" style="background:#fff; color:#000; padding:12px; font-size:0.9rem;" onclick="alternarGravacaoAudio()">Iniciar Gravação</button>
                </div>
            </div>

            <div id="area-standby" style="margin-top:40px; padding:20px 0; color:#555;">
                <svg style="width:48px; height:48px; fill:#222; margin-bottom:10px;" viewBox="0 0 24 24"><path d="M12 22c5.52 0 10-4.48 10-10S17.52 2 12 2 2 6.48 2 12s4.48 10 10 10zm1-15h-2v6h2V7zm0 8h-2v2h2v-2z"/></svg>
                <div>Nenhum visitante chamando no momento.</div>
                <button class="btn-g" style="background:transparent; border:1px solid #222; color:#444; margin-top:30px; font-size:0.85rem; padding:8px;" onclick="limparLoginMorador()">Alterar Unidade</button>
            </div>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    // AJUSTE DE ESCOPO LIMITADO À SUBPASTA (/morador/)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js', { scope: '/morador/' })
                .then(reg => console.log('SW Morador Registrado com Sucesso no Escopo:', reg.scope))
                .catch(err => console.log('Falha no SW do Morador:', err));
        });
    }

    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let minhaUnidadeGlobal = "";
    let escutadorChamadaFirebase = null;
    let gravadorDeAudioMedia = null;
    let pedacosAudioGravados = [];
    let estaGravandoAudio = false;
    let toqueDeChamadaInterfone = null;

    function inicializarToque() {
        if (!toqueDeChamadaInterfone) {
            toqueDeChamadaInterfone = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-84.wav');
            toqueDeChamadaInterfone.loop = true;
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        const unSalva = localStorage.getItem('virty_morador_unidade');
        if (unSalva) {
            minhaUnidadeGlobal = unSalva;
            configurarTelaPainelAtivo();
        }
    });

    function salvarConfiguracaoUnidade() {
        const un = document.getElementById('m-unidade').value.trim();
        if (!un) return alert("Digite o número do apartamento ou casa!");
        localStorage.setItem('virty_morador_unidade', un);
        minhaUnidadeGlobal = un;
        configurarTelaPainelAtivo();
    }

    function limparLoginMorador() {
        if (escutadorChamadaFirebase) escutadorChamadaFirebase.off();
        if (minhaUnidadeGlobal) db.ref(`moradores_validados/${minhaUnidadeGlobal}`).remove();
        localStorage.removeItem('virty_morador_unidade');
        document.getElementById('painel-login').style.display = "block";
        document.getElementById('painel-atendimento').style.display = "none";
        document.getElementById('status-conexao').className = "tag-status status-offline";
        document.getElementById('status-conexao').innerText = "Desconectado";
    }

    function configurarTelaPainelAtivo() {
        document.getElementById('painel-login').style.display = "none";
        document.getElementById('painel-atendimento').style.display = "block";
        document.getElementById('label-unidade').innerText = minhaUnidadeGlobal;
        
        const statusCon = document.getElementById('status-conexao');
        statusCon.className = "tag-status status-online";
        statusCon.innerText = "Interfone Ativo";

        db.ref(`moradores_validados/${minhaUnidadeGlobal}`).set({ online: true, ts: Date.now() });
        conectarEscutadorDeChamadas();
    }

    function conectarEscutadorDeChamadas() {
        if (escutadorChamadaFirebase) escutadorChamadaFirebase.off();
        escutadorChamadaFirebase = db.ref(`chamadas_ativas/${minhaUnidadeGlobal}`);
        
        escutadorChamadaFirebase.on('value', snap => {
            const d = snap.val();
            if (d && d.status === 'chamando') {
                document.getElementById('area-standby').style.display = "none";
                document.getElementById('area-alerta-chamada').style.display = "block";
                document.getElementById('foto-visitante').src = d.foto;
                document.getElementById('texto-visitante').innerText = `"${d.texto}"`;
                
                inicializarToque();
                toqueDeChamadaInterfone.play().catch(e => console.log("Aguardando gesto:", e));
            } else {
                fecharPainelAlertaChamada();
            }
        });
    }

    function responderChamada(novoStatus) {
        pararToqueChamada();
        if (minhaUnidadeGlobal) {
            db.ref(`chamadas_ativas/${minhaUnidadeGlobal}/status`).set(novoStatus).then(() => {
                fecharPainelAlertaChamada();
            });
        }
    }

    function mostrarPainelAudio() {
        const box = document.getElementById('box-audio');
        box.style.display = box.style.display === "block" ? "none" : "block";
    }

    function enviarMensagemTextoPura() {
        const txt = document.getElementById('msg-texto-morador').value.trim();
        if (!txt) return alert("Digite alguma mensagem.");
        pararToqueChamada();
        
        db.ref(`chamadas_ativas/${minhaUnidadeGlobal}`).update({
            status: "mensagem",
            msg_morador: txt
        }).then(() => {
            document.getElementById('msg-texto-morador').value = "";
            fecharPainelAlertaChamada();
        });
    }

    function alternarGravacaoAudio() {
        if (!estaGravandoAudio) {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                gravadorDeAudioMedia = new MediaRecorder(stream);
                pedacosAudioGravados = [];
                
                gravadorDeAudioMedia.ondataavailable = e => { if (e.data.size > 0) pedacosAudioGravados.push(e.data); };
                
                gravadorDeAudioMedia.onstop = () => {
                    const audioBlob = new Blob(pedacosAudioGravados, { type: 'audio/webm' });
                    const leitorBase64 = new FileReader();
                    leitorBase64.readAsDataURL(audioBlob);
                    leitorBase64.onloadend = () => {
                        const base64Audio = leitorBase64.result;
                        db.ref(`chamadas_ativas/${minhaUnidadeGlobal}`).update({
                            status: "mensagem",
                            audio_b64: base64Audio
                        }).then(() => {
                            fecharPainelAlertaChamada();
                        });
                    };
                };

                gravadorDeAudioMedia.start();
                estaGravandoAudio = true;
                document.getElementById('btn-gravar-v').innerText = "⏹️ PARAR E ENVIAR";
                document.getElementById('gravacao-status').className = "status-gravando";
                document.getElementById('gravacao-status').innerText = "GRAVANDO ÁUDIO AO VIVO...";
            }).catch(err => alert("Erro ao acessar microfone: " + err));
        } else {
            gravadorDeAudioMedia.stop();
            estaGravandoAudio = false;
            document.getElementById('btn-gravar-v').innerText = "🎙️ Iniciar Gravação";
            document.getElementById('gravacao-status').className = "";
            document.getElementById('gravacao-status').innerText = "Enviando áudio...";
        }
    }

    function fecharPainelAlertaChamada() {
        pararToqueChamada();
        document.getElementById('area-alerta-chamada').style.display = "none";
        document.getElementById('box-audio').style.display = "none";
        document.getElementById('area-standby').style.display = "block";
    }

    function pararToqueChamada() {
        if (toqueDeChamadaInterfone) {
            toqueDeChamadaInterfone.pause();
            toqueDeChamadaInterfone.currentTime = 0;
        }
    }
</script>
</body>
</html>
