<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRTY MORADOR v2.0</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; }
        .header { border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 20px; }
        .setup-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:999; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:20px; box-sizing:border-box; }
        .chamada-card { background: #0a0a0a; border: 1px solid #222; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .info-vis { font-size: 1.1rem; font-weight: bold; }
        .fingerprint-label { font-size: 0.65rem; color: #555; font-family: monospace; }
        .botoes-row { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; }
        .btn-atender { background: var(--neon); color: #000; }
        .btn-recusar { background: var(--red); color: #fff; }
        .btn-bloquear { background: #222; color: var(--red); border: 1px solid var(--red); font-size: 0.7rem; width:100%; margin-top:5px;}
    </style>
</head>
<body>

    <div id="setup-screen" class="setup-screen">
        <h2>Painel Interfone Virty</h2>
        <p style="color:#888; text-align:center;">Para iniciar o monitoramento em tempo real e liberar o canal de áudio, clique no botão abaixo.</p>
        <input type="text" id="input-minha-casa" placeholder="Número da sua Casa/Apto" style="padding:12px; text-align:center; margin-bottom:15px; font-size:1.1rem; border-radius:6px; border:1px solid #333; background:#111; color:#fff;">
        <button class="btn btn-atender" onclick="inicializarPainelComAudio()" style="flex:none; width:200px;">Ativar Painel</button>
    </div>

    <div class="header">
        <h2 style="margin:0;">Painel do Morador</h2>
        <p id="casa-config" style="margin:5px 0 0 0; color:var(--neon); font-weight:bold;">UNIDADE: ---</p>
    </div>

    <h3 style="font-size:0.9rem; color:#888; text-transform:uppercase;">Chamadas em tempo real</h3>
    <div id="painel-chamadas">
        <p id="sem-chamada" style="color:#444; text-align:center; font-style:italic;">Nenhum visitante interfonando no momento.</p>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let MINHA_CASA = ""; 
    let localStream = null;

    function inicializarPainelComAudio() {
        const casaDigitada = document.getElementById('input-minha-casa').value.trim();
        if(!casaDigitada) { alert("Digite sua unidade para logar."); return; }
        
        MINHA_CASA = casaDigitada;
        document.getElementById('casa-config').innerText = `CASA ATIVA: ${MINHA_CASA}`;

        // Captura o áudio atrelado ao clique (Aceito pelas regras Anti-Autoplay)
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                localStream = stream;
                document.getElementById('setup-screen').style.display = 'none';
                escutarChamadasCondominio();
            })
            .catch(err => {
                alert("O microfone é obrigatório para o funcionamento do painel.");
            });
        } else {
            alert("Navegador incompatível com chamadas de áudio.");
        }
    }

    function escutarChamadasCondominio() {
        const painel = document.getElementById('painel-chamadas');
        const semChamada = document.getElementById('sem-chamada');

        db.ref(`chamadas_ativas/${MINHA_CASA}`).on('value', snap => {
            painel.innerHTML = "";
            if (!snap.exists()) { painel.appendChild(semChamada); return; }

            snap.forEach(childSnap => {
                const fId = childSnap.key;
                const dados = childSnap.val();

                const card = document.createElement('div');
                card.className = 'chamada-card';
                card.innerHTML = `
                    <div>
                        <div class="info-vis">👤 ${dados.nome}</div>
                        <div class="fingerprint-label">ID DISPOSITIVO: ${fId}</div>
                    </div>
                    <div class="botoes-row">
                        <button class="btn btn-atender" onclick="atender('${fId}')">Atender</button>
                        <button class="btn btn-recusar" onclick="desligar('${fId}')">Desligar</button>
                    </div>
                    <button class="btn btn-bloquear" onclick="bloquearAparelhoLocal('${fId}', '${dados.nome}')">Bloquear nesta Unidade</button>
                `;
                painel.appendChild(card);
            });
        });
    }

    function atender(fingerprint) {
        alert(`Canal WebRTC pronto usando fluxo estável existente para: ${fingerprint}`);
    }

    function desligar(fingerprint) {
        db.ref(`chamadas_ativas/${MINHA_CASA}/${fingerprint}`).remove();
    }

    // 🔒 CORREÇÃO CIRÚRGICA: Bloqueio localizado apenas para a unidade do morador
    function bloquearAparelhoLocal(fingerprint, nome) {
        if (confirm(`Bloquear ${nome} para sua unidade? Ele não poderá mais te ligar.`)) {
            db.ref(`bloqueios_por_unidade/${MINHA_CASA}/${fingerprint}`).set({
                timestamp: Date.now(),
                nomeOriginal: nome
            }).then(() => {
                desligar(fingerprint);
                alert("Aparelho bloqueado localmente.");
            });
        }
    }
</script>
</body>
</html>
