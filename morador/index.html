<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY MORADOR v2.0.1 - Nativo APK</title>
    
    <meta name="theme-color" content="#39FF14">

    <style>
        :root {
            --neon: #39FF14;
            --bg: #000;
            --red: #FF3131;
            --blue: #007BFF;
            --gray: #666;
            --yellow: #FFD700;
            --dark-card: #0d0d0d;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
 
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; box-sizing: border-box; }
        .active { display: flex; }
        
        input {
            width: 100%;
            padding: 16px;
            margin: 8px 0;
            border-radius: 12px;
            border: 2px solid #222;
            background: #111;
            color: #fff;
            font-size: 1.1rem;
        }
        input:focus { border-color: var(--neon); outline: none; }
        
        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin: 8px 0;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; padding-bottom: 15px; margin-bottom: 20px; }
        .controles-alerta { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .btn-mini { background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 12px 20px; border-radius: 12px; cursor: pointer; font-size: 1.3rem; min-width: 65px; }
        
        #lista-hist, #lista-bloqueados { flex: 1; }
        .hist-card { background: var(--dark-card); border-radius: 16px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid #161616; position: relative; }
        .foto-box { position: relative; width: 70px; height: 70px; flex-shrink: 0; }
        .foto-hist { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; border: 1px solid var(--neon); }
        .dots-row { position: absolute; top: -10px; left: 0; width: 100%; display: flex; justify-content: center; gap: 4px; z-index: 10; }
        .dot { width: 18px; height: 18px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; box-shadow: 0 2px 4px #000; }
        
        .switch-bloqueio { padding: 8px 14px; border-radius: 20px; border: none; font-weight: bold; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; }
        .status-bloqueado { background: var(--red); color: #fff; box-shadow: 0 0 10px var(--red); }
        .status-desbloqueado { background: var(--neon); color: #000; }
        
        .btn-expansor { background: #111; border: 1px solid #333; color: #aaa; padding: 10px; border-radius: 10px; cursor: pointer; width: 100%; margin-bottom: 10px; font-weight: bold; font-size: 0.85rem; }
        .btn-secundario { background: #111; border: 1px solid var(--red); color: var(--red); padding: 10px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; }
        #painel-chamada { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:2000; flex-direction:column; align-items:center; justify-content:center; }
        .foto-v { width: 220px; height: 220px; border-radius: 50%; border: 4px solid var(--neon); object-fit: cover; margin-bottom: 15px; box-shadow: 0 0 25px rgba(57,255,20,0.3); }
        #timer-regressivo { font-size: 3rem; color: var(--red); font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 10px var(--red); }
        
        #container-digitar-texto { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; background: rgba(0,0,0,0.98); z-index: 2500; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #timer-flutuante-texto { font-size: 3.5rem; color: #fff; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px var(--blue); }
        #popup-voz { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
        .canvas-circular { transform: rotate(-90deg); width: 200px; height: 200px; }
        .circle-bg { fill: none; stroke: #222; stroke-width: 12; }
        .circle-progress { fill: none; stroke-width: 12; stroke-linecap: round; stroke-dasharray: 565.48; stroke-dashoffset: 0; transition: stroke 0.3s, stroke-dashoffset 0.1s linear; }
        #texto-timer-voz { position: absolute; font-size: 2.2rem; font-weight: bold; color: #fff; }
        
        .btn-voz { background: var(--yellow); width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; flex-shrink: 0; }
        .btn-voz svg { width: 32px; height: 32px; fill: #000; }
        
        .area-camera-virty { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0 25px; width: 100%; }
        .video-box { width: 180px; height: 180px; border-radius: 50%; overflow: hidden; border: 3px solid var(--neon); box-shadow: 0 0 15px rgba(57,255,20,0.3); background:#111; position:relative; }
        .video-box video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .video-box canvas { width: 100%; height: 100%; object-fit: cover; display:none; transform: scaleX(-1); }
        .btn-inverter { background: #111; border: 2px solid var(--neon); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 10px rgba(57,255,20,0.2); }
        .btn-inverter svg { width: 24px; height: 24px; fill: var(--neon); }
        .painel-controles-chamada { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 12px; padding: 0 15px; }
        .leaving-interacao-meio { display: flex; width: 100%; align-items: center; justify-content: space-between; gap: 12px; }
    </style>
</head>

        <div style="border: 2px solid var(--neon); box-shadow: 0 0 20px var(--neon); padding: 40px 20px; border-radius: 15px; background: #0a0a0a; max-width: 400px; width: 100%;">
            <span style="font-size: 50px;">⚠️</span>

            <p style="color: #ffffff; font-family: sans-serif; font-size: 18px; line-height: 1.6; margin: 25px 0;">O interfone <b>NÃO VAI FUNCIONAR</b> se você usar permissões temporárias.</p>

                Configurar Agora
            </button>
        </div>
    </div>

        <div class="area-camera-virty">
