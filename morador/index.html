<script>
    // ... (Início do código permanece igual ao v14.0)

    async function entrarApp() {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
        const salvo = localStorage.getItem('virty_user');
        
        if(salvo) {
            const user = JSON.parse(salvo);
            // VERIFICAÇÃO RIGOROSA: Só entra se estiver na lista de VALIDADOS
            db.ref('moradores_validados').orderByChild('cpf').equalTo(user.cpf).on('value', s => {
                if(s.exists()) {
                    un = user.unidade;
                    document.getElementById('u-txt').innerText = un;
                    document.getElementById('nome-exibir').innerText = user.nome;
                    document.getElementById('bloqueio-inicio').style.display = 'none';
                    mudarTela('s-home'); 
                    iniciarMonitor();
                } else { 
                    // Se o cadastro existe mas não foi validado ainda
                    document.getElementById('area-login').innerHTML = "<p style='color:orange'>CADASTRO EM ANÁLISE PELO MASTER...</p>";
                }
            });
        } else {
            document.getElementById('area-login').style.display = 'none';
            document.getElementById('area-cadastro').style.display = 'flex';
            navigator.mediaDevices.getUserMedia({ video: true }).then(st => { document.getElementById('v-selfie').srcObject = st; });
        }
    }

    // Função Limpar com atualização imediata
    function limparHistorico() {
        if(confirm("Deseja limpar o histórico?")) {
            db.ref('historico/' + un).remove().then(() => {
                document.getElementById('lista-hist').innerHTML = ""; // Limpa visualmente na hora
            });
        }
    }
</script>
