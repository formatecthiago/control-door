<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY ACCESS - DIAGNÓSTICO</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --blue: #007BFF; --red: #FF3131; --gray: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; box-sizing: border-box; }
        .active { display: flex; }
        .header-main { text-align: center; border-bottom: 2px solid var(--gray); padding-bottom: 15px; margin-bottom: 15px; }
        .virty-title { color: var(--neon); font-size: 1.1rem; font-weight: 900; letter-spacing: 2px; margin: 0; }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 0.85rem; }
        .unidade-box { background: var(--neon); color: #000; padding: 3px 10px; border-radius: 5px; font-weight: bold; }
        .hist-card { background: #0a0a0a; border: 1px solid #222; padding: 12px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; position: relative; }
        .hist-img { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--neon); object-fit: cover; margin-right: 12px; }
        .btn { border: none; border-radius: 15px; padding: 18px; font-weight: bold; cursor: pointer; font-size: 1rem; width: 100%; transition: 0.2s; }
        .btn-v { background: var(--neon); color: #000; }
        .btn-a { background: var(--blue); color: #fff; }
        .btn-r { background: var(--red); color: #fff; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; border: 1px solid var(--neon); padding: 25px; border-radius: 20px; width: 100%; text-align: center; position: relative; }
        #bloqueio-inicio { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="bloqueio-inicio">
        <div style="text-align:center;">
            <h1 style="color:var(--neon); font-size:2rem;">VIRTY ACCESS</h1>
            <p style="color:#666; margin-bottom:30px;">Clique para conectar o sistema</p>
            <button class="btn btn-v" onclick="ativarSistema()" style="width:250px;">ENTRAR NO PAINEL</button>
        </div>
    </div>

    <div id="s-home" class="screen">
        <div class="header-main">
            <h1 class="virty-title">VIRTY ACCESS DOOR <span style="font-size:0.6rem; color:#666">v1.6-DX</span></h1>
            <div class="user-info">
                <span id="txt-morador">Carregando...</span>
                <span class="unidade-box">CASA <span id="txt-unidade">--</span></span>
            </div>
            <button class="btn" id="btn-silenciar" onclick="popSilenciar()" style="background:#111; color:#fff; border:1px solid #333; padding:10px; font-size:0.75rem; margin-top:10px;">🔔 SOM ATIVO</button>
        </div>
        <div id="lista-hist"></div>
    </div>

    <div id="s-call" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span onclick="mudarTela('s-home')" style="font-size:1.8rem;">🏠</span>
            <b style="color:var(--neon)">AO VIVO</b>
            <span onclick="popSilenciar()">🔔</span>
        </div>
        <img id="img-vis" src="" style="width:100%; height:320px; border-radius:20px; object-fit:cover; margin:20px 0; border:2px solid var(--neon);">
        <button class="btn btn-v" onclick="responder('liberado')">✔️ ABRIR PORTÃO</button>
        <button class="btn btn-r" onclick="responder('recusado')">✖️ RECUSAR</button>
    </div>

    <div style="position:fixed; bottom:15px; left:15px; z-index:10000;">
        <button onclick="gerarRaioX()" style="background:orange; color:black; padding:12px; border-radius:50px; font-weight:bold; border:none;">🛠️ RELATÓRIO</button>
    </div>

    <div id="modal-raio-x" class="modal">
        <div class="modal-content" style="background:white; color:black;">
            <span onclick="this.parentElement.parentElement.style.display='none'" style="float:right; cursor:pointer;">✖️</span>
            <h3>DADOS DE CONEXÃO</h3>
            <textarea id="output-raio-x" style="width:100%; height:300px; font-family:monospace; margin-bottom:10px;"></textarea>
            <p style="font-size:0.7rem;">Copie o texto acima e cole no chat.</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const config = { 
            apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", 
            databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        
        let audioCtx;
        let meuId = localStorage.getItem('virty_id');
        let modoVibrar = localStorage.getItem('virty_vibrar') === 'true';

        function ativarSistema() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('bloqueio-inicio').style.display = 'none';
            if(meuId) inicializar(); else mudarTela('s-home');
        }

        function inicializar() {
            db.ref('moradores_validados/'+meuId).on('value', s => {
                if(s.exists()){
                    const m = s.val();
                    document.getElementById('txt-morador').innerText = m.nome;
                    document.getElementById('txt-unidade').innerText = m.unidade;
                    mudarTela('s-home');
                    escutar(m.unidade);
                }
            });
        }

        function escutar(un) {
            db.ref('chamadas_ativas/'+un).on('value', s => {
                const d = s.val();
                if(d && d.status === 'chamando') {
                    document.getElementById('img-vis').src = d.foto;
                    mudarTela('s-call');
                    tocarAlerta();
                }
            });
        }

        function tocarAlerta() {
            if(modoVibrar) { navigator.vibrate(200); return; }
            if(!audioCtx) return;
            let o = audioCtx.createOscillator();
            let g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = 440;
            g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 1);
            o.start(); o.stop(audioCtx.currentTime + 1);
        }

        function mudarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function gerarRaioX() {
            let dados = {
                id_armazenado: meuId,
                unidade_tela: document.getElementById('txt-unidade').innerText,
                status_audio: audioCtx ? audioCtx.state : "off",
                localTime: new Date().toISOString()
            };
            document.getElementById('output-raio-x').value = JSON.stringify(dados, null, 2);
            document.getElementById('modal-raio-x').style.display = 'flex';
        }
    </script>
</body>
</html>
