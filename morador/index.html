<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virty Morador</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .screen { display: none; width: 100%; padding: 20px; box-sizing: border-box; }
        .active { display: block; }
        .cam-box { width: 250px; height: 250px; border-radius: 50%; border: 3px solid var(--neon); margin: 20px auto; overflow: hidden; }
        .btn { width: 100%; padding: 20px; border-radius: 40px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 10px 0; font-size: 1.1rem; }
        .btn-green { background: var(--neon); color: black; }
        .btn-red { background: #ff3333; color: white; }
        input { width: 100%; padding: 20px; margin: 10px 0; border-radius: 15px; background: #111; color: #fff; border: 1px solid #333; font-size: 1.2rem; text-align: center; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="s-cad" class="screen active">
        <h2 style="color:var(--neon)">CADASTRO VIRTY</h2>
        <input type="text" id="c-nome" placeholder="Nome Completo">
        <input type="number" id="c-un" placeholder="Nº da Casa">
        <button class="btn btn-green" onclick="cadastrar()">SOLICITAR ACESSO</button>
    </div>

    <div id="s-home" class="screen">
        <h1 id="txt-un" style="font-size: 3rem; margin-top: 50px;">CASA --</h1>
        <p style="color: var(--neon)">● SISTEMA CONECTADO</p>
    </div>

    <div id="s-call" class="screen">
        <h2 style="color:var(--neon)">VISITANTE NA PORTA!</h2>
        <div class="cam-box"><img id="img-v" style="width:100%; height:100%; object-fit:cover;"></div>
        <p id="msg-v" style="font-style: italic; color: #aaa;"></p>
        <button class="btn btn-green" onclick="responder('liberado')">ABRIR PORTÃO</button>
        <button class="btn btn-red" onclick="responder('recusado')">RECUSAR</button>
    </div>

    <audio id="som-ring" loop src="https://assets.mixkit.co/active_storage/sfx/1360/1360-preview.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", projectId: "virty-access-door" };
    const app = initializeApp(config);
    const db = getDatabase(app);

    let lId = localStorage.getItem('virty_id');
    let unLogada = "";

    function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    // VERIFICAR STATUS
    if(lId) {
        onValue(ref(db, `moradores_validados/${lId}`), snap => {
            if(snap.exists()) {
                unLogada = snap.val().unidade;
                document.getElementById('txt-un').innerText = "CASA " + unLogada;
                show('s-home');
                vigiarChamadas();
            }
        });
    }

    window.cadastrar = () => {
        const n = document.getElementById('c-nome').value, u = document.getElementById('c-un').value;
        const id = Date.now();
        set(ref(db, `moradores_pendentes/${id}`), { id, nome: n, unidade: u }).then(() => {
            localStorage.setItem('virty_id', id);
            alert("Aguarde o Admin aprovar.");
        });
    };

    function vigiarChamadas() {
        onValue(ref(db, `chamadas_ativas/${unLogada}`), snap => {
            const d = snap.val();
            if(d && d.status === "chamando") {
                document.getElementById('img-v').src = d.foto;
                document.getElementById('msg-v').innerText = d.texto;
                show('s-call');
                document.getElementById('som-ring').play().catch(()=>{});
            } else {
                show('s-home');
                document.getElementById('som-ring').pause();
            }
        });
    }

    window.responder = (status) => {
        update(ref(db, `chamadas_ativas/${unLogada}`), { status: status }).then(() => {
            setTimeout(() => remove(ref(db, `chamadas_ativas/${unLogada}`)), 1000);
        });
    };
</script>
</body>
</html>
