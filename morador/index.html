<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY ACCESS DOOR v1.6</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --blue: #007BFF; --red: #FF3131; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; box-sizing: border-box; }
        .active { display: flex; }
        .btn { border: none; border-radius: 15px; padding: 18px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; font-size: 1.1rem; }
        .btn-v { background: var(--neon); color: #000; }
        .btn-a { background: var(--blue); color: #fff; }
        .btn-r { background: var(--red); color: #fff; }
        
        /* Bloqueador de Início */
        #bloqueio-inicial { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="bloqueio-inicial">
        <div>
            <h1 style="color:var(--neon)">SISTEMA PRONTO</h1>
            <p>Clique no botão abaixo para ativar os alertas sonoros e entrar no painel.</p>
            <button class="btn btn-v" onclick="ativarAudio()">CONECTAR E ATIVAR SOM</button>
        </div>
    </div>

    <div id="s-home" class="screen">
        <header style="text-align:center; border-bottom:1px solid #222; padding-bottom:10px;">
            <h2 style="color:var(--neon); margin:0;">VIRTY ACCESS DOOR</h2>
            <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:0.8rem;">
                <span id="nome-m">---</span>
                <span style="background:var(--neon); color:#000; padding:2px 8px; border-radius:4px;">CASA <span id="un-m">--</span></span>
            </div>
            <button id="btn-silenciar" onclick="popSilenciar()" style="background:#111; color:#fff; border:1px solid #333; padding:8px; margin-top:10px; border-radius:8px;">🔔 SOM ATIVO</button>
        </header>
        <h3>Histórico</h3>
        <div id="lista-hist" style="flex:1; overflow-y:auto;"></div>
    </div>

    <div id="s-call" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span onclick="mudarTela('s-home')" style="font-size:2rem;">🏠</span>
            <b style="color:var(--neon)">VISITANTE AO VIVO</b>
            <span></span>
        </div>
        <img id="img-vis" src="" style="width:100%; height:320px; border-radius:20px; object-fit:cover; margin:20px 0; border:2px solid var(--neon);">
        <button class="btn btn-v" onclick="responder('liberado')">✔️ ABRIR PORTÃO</button>
        <button class="btn btn-a" onclick="abrirMsg()">💬 MENSAGEM</button>
        <button class="btn btn-r" onclick="responder('recusado')">✖️ RECUSAR</button>
    </div>

    <div id="pop-silenciar" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; padding:20px;">
        <div style="background:#111; border:1px solid var(--neon); padding:25px; border-radius:20px; text-align:center;">
            <h3>MODO DE ALERTA</h3>
            <p>Deseja desativar os sons e manter apenas a vibração?</p>
            <button class="btn btn-r" onclick="confirmarSilenciar(true)">SIM - VIBRAR</button>
            <button class="btn btn-v" onclick="confirmarSilenciar(false)">NÃO - COM SOM</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const config = { 
            apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", 
            databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        
        let audioCtx;
        let modoVibrar = localStorage.getItem('virty_vibrar') === 'true';
        let meuId = localStorage.getItem('virty_id');

        // FUNÇÃO CRUCIAL: Ativa o áudio no Chrome
        function ativarAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('bloqueio-inicial').style.display = 'none';
            mudarTela('s-home');
            alertas('click');
        }

        function alertas(tipo) {
            if(modoVibrar) { if(navigator.vibrate) navigator.vibrate([100, 50, 100]); return; }
            if(!audioCtx) return;
            
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if(tipo === 'click') {
                osc.frequency.value = 800;
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if(tipo === 'chamada') {
                // Som de campainha eletrônica
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 1);
                osc.start(); osc.stop(audioCtx.currentTime + 1);
            }
        }

        function popSilenciar() { document.getElementById('pop-silenciar').style.display = 'flex'; }
        function confirmarSilenciar(val) {
            modoVibrar = val;
            localStorage.setItem('virty_vibrar', val);
            document.getElementById('btn-silenciar').innerText = val ? "📳 MODO VIBRAR" : "🔔 SOM ATIVO";
            document.getElementById('pop-silenciar').style.display = 'none';
            alertas('click');
        }

        if(meuId) {
            db.ref('moradores_validados/'+meuId).on('value', s => {
                if(s.exists()){
                    const d = s.val();
                    document.getElementById('nome-m').innerText = d.nome;
                    document.getElementById('un-m').innerText = d.unidade;
                    escutar(d.unidade);
                }
            });
        }

        function escutar(un) {
            db.ref('chamadas_ativas/'+un).on('value', s => {
                const d = s.val();
                if(d && d.status === 'chamando') {
                    document.getElementById('img-vis').src = d.foto;
                    mudarTela('s-call');
                    // Toca o som de chamada 3 vezes
                    alertas('chamada');
                    setTimeout(() => alertas('chamada'), 1200);
                    setTimeout(() => alertas('chamada'), 2400);
                }
            });
            // Histórico simples para teste
            db.ref('historico/'+un).limitToLast(10).on('value', snap => {
                const lista = document.getElementById('lista-hist');
                lista.innerHTML = "";
                snap.forEach(i => {
                    const h = i.val();
                    lista.innerHTML = `<div style="background:#111; margin-bottom:5px; padding:10px; border-radius:10px; display:flex; align-items:center;">
                        <img src="${h.foto}" style="width:40px; height:40px; border-radius:50%; margin-right:10px;">
                        <span>${h.tipo} - ${h.hora}</span>
                    </div>` + lista.innerHTML;
                });
            });
        }

        function responder(tipo) {
            alertas('click');
            const un = document.getElementById('un-m').innerText;
            const ref = db.ref('chamadas_ativas/'+un);
            ref.once('value', s => {
                const d = s.val();
                if(d) {
                    db.ref('historico/'+un).push({ foto: d.foto, ts: Date.now(), hora: new Date().toLocaleTimeString(), tipo: tipo.toUpperCase() });
                    ref.update({ status: tipo });
                    setTimeout(() => { ref.remove(); mudarTela('s-home'); }, 500);
                }
            });
        }

        function mudarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
