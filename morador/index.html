<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY ACCESS v10.6.1</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; }
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        
        .screen { display: none; padding: 20px; flex-direction: column; }
        .active { display: flex; }

        /* Cabeçalho */
        .header-main { text-align: center; border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 15px; }
        .virty-title { color: var(--neon); font-size: 1.2rem; font-weight: bold; margin: 0; }
        .unidade-box { background: var(--neon); color: #000; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }

        /* Histórico */
        .hist-card { background: #0a0a0a; border: 1px solid #222; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; }
        .hist-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--neon); margin-right: 12px; object-fit: cover; }
        
        .btn { border: none; border-radius: 12px; padding: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-v { background: var(--neon); color: #000; }
        .btn-a { background: var(--blue); color: #fff; }
        .btn-r { background: var(--red); color: #fff; }

        #bloqueio-inicio { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; border: 1px solid var(--neon); padding: 20px; border-radius: 15px; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div id="bloqueio-inicio">
        <h1 style="color:var(--neon)">VIRTY ACCESS</h1>
        <p style="color:#666">Versão 10.6.1</p><br>
        <button class="btn btn-v" onclick="entrarSeguro()" style="width:200px;">ENTRAR</button>
    </div>

    <div id="s-home" class="screen">
        <div class="header-main">
            <p class="virty-title">VIRTY ACCESS DOOR</p>
            <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:0.9rem;">
                <span id="nome-exibir">Thiago Vieira</span>
                <span class="unidade-box">CASA <span id="un-exibir">10</span></span>
            </div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Chamadas</h3>
            <button onclick="db.ref('historico/10').remove()" style="background:none; border:none; color:var(--red); font-size:0.8rem;">Limpar</button>
        </div>
        <div id="lista-hist"></div>
    </div>

    <div id="s-call" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span onclick="mudarTela('s-home')" style="font-size:1.5rem;">🏠</span>
            <b id="timer" style="color:var(--red)">60s</b>
        </div>
        <img id="img-vis" src="" style="width:100%; height:300px; border-radius:15px; object-fit:cover; margin:15px 0; border:2px solid var(--neon);">
        <button class="btn btn-v" onclick="responder('liberado')">ABRIR PORTÃO</button>
        <button class="btn btn-a" onclick="document.getElementById('m-msg').style.display='flex'">MENSAGEM</button>
        <button class="btn btn-r" onclick="responder('recusado')">RECUSAR</button>
    </div>

    <div id="m-msg" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--blue)">MENSAGEM</h3>
            <input type="text" id="msg-txt" maxlength="60" style="width:90%; padding:10px; margin-bottom:15px;">
            <button class="btn btn-a" onclick="enviarM()">ENVIAR E SAIR</button>
            <p onclick="document.getElementById('m-msg').style.display='none'" style="margin-top:10px; color:var(--red)">Cancelar</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let audioCtx, loopSom, crono, un = "10";

        function entrarSeguro() {
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
            document.getElementById('bloqueio-inicio').style.display = 'none';
            mudarTela('s-home');
            setTimeout(iniciarApp, 500);
        }

        function somLoop(play) {
            clearInterval(loopSom);
            if(!play) return;
            loopSom = setInterval(() => {
                const t = audioCtx.currentTime;
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.setValueAtTime(1000, t);
                g.gain.setValueAtTime(0.1, t); g.gain.linearRampToValueAtTime(0, t+0.2);
                o.start(t); o.stop(t+0.2);
            }, 2500);
        }

        function iniciarApp() {
            db.ref('chamadas_ativas/'+un).on('value', s => {
                const d = s.val();
                if(d && d.status === 'chamando') {
                    document.getElementById('img-vis').src = d.foto;
                    mudarTela('s-call');
                    somLoop(true);
                    clearInterval(crono);
                    crono = setInterval(() => {
                        let r = 60 - Math.floor((Date.now() - d.ts)/1000);
                        document.getElementById('timer').innerText = r + "s";
                        if(r <= 0) responder('expirado');
                    }, 1000);
                } else {
                    if(document.getElementById('s-call').classList.contains('active')) mudarTela('s-home');
                    somLoop(false); clearInterval(crono);
                }
            });

            db.ref('historico/'+un).on('value', s => {
                const cont = document.getElementById('lista-hist');
                cont.innerHTML = "";
                let lista = []; s.forEach(i => { lista.unshift(i.val()); });
                lista.slice(0,10).forEach(h => {
                    cont.innerHTML += `<div class="hist-card">
                        <img src="${h.foto}" class="hist-img">
                        <div><b>Visitante</b><br><small>${h.hora}</small></div>
                    </div>`;
                });
            });
        }

        function responder(t) {
            db.ref('chamadas_ativas/'+un).update({ status: t });
            setTimeout(() => db.ref('chamadas_ativas/'+un).remove(), 500);
        }

        function enviarM() {
            const m = document.getElementById('msg-txt').value;
            db.ref('chamadas_ativas/'+un).update({ status: 'mensagem', msg_morador: m });
            document.getElementById('m-msg').style.display='none';
            setTimeout(() => { db.ref('chamadas_ativas/'+un).remove(); mudarTela('s-home'); }, 800);
        }

        function mudarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
