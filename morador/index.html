<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virty Cadastro</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .tela { display: none; width: 100%; max-width: 350px; }
        .ativa { display: flex; flex-direction: column; align-items: center; }
        video, img { width: 180px; height: 180px; border-radius: 50%; border: 3px solid #39FF14; object-fit: cover; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="tela-cadastro" class="tela ativa">
        <h2>Cadastro Virty</h2>
        <video id="v" autoplay playsinline muted></video>
        <img id="f" style="display:none;">
        <button onclick="tirarFoto()" style="background:#2980b9; color:#fff; margin-bottom:10px;">TIRAR FOTO</button>
        <input type="text" id="n" placeholder="Nome Completo">
        <input type="number" id="c" placeholder="Nº da Casa">
        <button onclick="enviar()" style="background:#39FF14;">SOLICITAR ACESSO</button>
    </div>
    <div id="tela-aguarde" class="tela"><h2>Analisando...</h2><p>Aguarde a liberação do administrador.</p></div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    const firebaseConfig = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", authDomain: "virty-access-door.firebaseapp.com", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", projectId: "virty-access-door", storageBucket: "virty-access-door.firebasestorage.app", messagingSenderId: "694822891117", appId: "1:694822891117:web:b95a71c1eb273071fa9964" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);
    const v = document.getElementById('v'); const f = document.getElementById('f'); let base64 = null;
    navigator.mediaDevices.getUserMedia({video:true}).then(s => v.srcObject = s);
    window.tirarFoto = () => { const canvas = document.createElement('canvas'); canvas.width=v.videoWidth; canvas.height=v.videoHeight; canvas.getContext('2d').drawImage(v,0,0); base64=canvas.toDataURL('image/jpeg',0.7); f.src=base64; f.style.display='block'; v.style.display='none'; }
    window.enviar = async () => {
        const id = "ID-" + Date.now(); const casa = document.getElementById('c').value;
        localStorage.setItem('virty_id', id); localStorage.setItem('virty_casa', casa);
        await set(ref(db, `solicitacoes_pendentes/${id}`), { nome: document.getElementById('n').value, casa: casa, foto: base64 });
        verificar();
    }
    function verificar() {
        const id = localStorage.getItem('virty_id'); if(!id) return;
        onValue(ref(db, `moradores_autorizados/${id}`), (snap) => { if(snap.exists()) window.location.href="home.html"; else switchTela('tela-aguarde'); });
    }
    function switchTela(id){ document.querySelectorAll('.tela').forEach(t=>t.classList.remove('ativa')); document.getElementById(id).classList.add('ativa'); }
    verificar();
</script>
</body>
</html>
