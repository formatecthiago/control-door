<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY MORADOR v14.1</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; --gray: #666; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        .screen { display: none; padding: 15px; min-height: 100vh; flex-direction: column; box-sizing: border-box; }
        .active { display: flex; }
        
        .header-main { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 1px solid #222; margin-bottom: 15px; }
        .section-title { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .btn-limpar { background: var(--red); color: #fff; border: none; padding: 5px 12px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        .hist-card { background: #0d0d0d; border-radius: 12px; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid #1a1a1a; }
        
        .foto-box { position: relative; width: 60px; height: 60px; flex-shrink: 0; }
        .foto-hist { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; border: 1px solid var(--neon); }
        
        .dots-row { position: absolute; top: -8px; left: 0; width: 100%; display: flex; justify-content: center; gap: 2px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; font-size: 8px; font-weight: bold; display: flex; align-items: center; justify-content: center; border: 1px solid #000; color: #fff; }
        .dot-green { background: var(--neon); color: #000; }
        .dot-red { background: var(--red); }
        .dot-blue { background: var(--blue); }
        .dot-gray { background: var(--gray); }

        .info-box { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .info-row-top { font-size: 0.75rem; color: #eee; }
        .info-row-mid { font-size: 0.65rem; color: #888; margin: 2px 0; }
        .status-badge { font-weight: bold; text-transform: uppercase; font-size: 0.7rem; }

        .btn-toggle-block { padding: 8px; border-radius: 6px; font-size: 0.6rem; cursor: pointer; font-weight: bold; border: 1px solid transparent; min-width: 85px; text-transform: uppercase; }
        .is-blocked { border-color: var(--neon); color: var(--neon); background: transparent; }
        .not-blocked { border-color: var(--red); color: var(--red); background: transparent; }

        #painel-chamada { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; flex-direction:column; align-items:center; justify-content:center; }
        .foto-chamada { width:220px; height:220px; border-radius:50%; border:4px solid var(--neon); object-fit:cover; margin-bottom: 15px; }
        .btn-acao { width: 80%; padding: 18px; margin: 8px; border-radius: 30px; border: none; font-weight: bold; font-size: 1rem; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

    <div id="s-home" class="screen active">
        <div class="header-main">
            <span style="color:var(--neon); font-weight:bold;">VIRTY v14.1</span>
            <span style="background:var(--neon); color:#000; padding:3px 8px; border-radius:5px; font-weight:bold; font-size:0.8rem;">CASA <span id="u-txt">--</span></span>
        </div>

        <div class="section-title">
            <b style="font-size: 0.9rem; color:#aaa;">REGISTRO DE CHAMADAS</b>
            <button class="btn-limpar" onclick="limparHistoricoLocal()">Limpar</button>
        </div>

        <div id="lista-hist"></div>
    </div>

    <div id="painel-chamada">
        <h2 style="color:var(--neon)">VISITANTE NA PORTA</h2>
        <img id="foto-v" class="foto-chamada" src="">
        <p id="msg-v" style="color:#888; font-style:italic;"></p>
        <button class="btn-acao" style="background:var(--neon); color:#000;" onclick="responder('liberado')">ABRIR PORTÃO</button>
        <button class="btn-acao" style="background:var(--blue); color:#fff;" onclick="abrirMsg()">ENVIAR MENSAGEM</button>
        <button class="btn-acao" style="background:var(--red); color:#fff;" onclick="responder('recusado')">RECUSAR</button>
    </div>

    <audio id="toque" loop src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();
    
    const dadosS = JSON.parse(localStorage.getItem('virty_user'));
    const un = dadosS ? dadosS.unidade : null;

    window.onload = () => { 
        if(!un) return alert("Erro de cadastro.");
        document.getElementById('u-txt').innerText = un;
        iniciarMonitoramento(); 
        carregarHistórico();
    };

    function iniciarMonitoramento() {
        db.ref('chamadas_ativas/' + un).on('value', s => {
            const d = s.val();
            if(d && d.status === "chamando") {
                document.getElementById('foto-v').src = d.foto;
                document.getElementById('msg-v').innerText = d.texto || "";
                document.getElementById('painel-chamada').style.display = "flex";
                document.getElementById('toque').play().catch(e => {});
            } else {
                document.getElementById('painel-chamada').style.display = "none";
                document.getElementById('toque').pause();
            }
        });
    }

    async function responder(st) {
        const snap = await db.ref('chamadas_ativas/' + un).once('value');
        const d = snap.val();
        if(d) {
            db.ref('chamadas_ativas/' + un).update({ status: st });
            salvarHist(d.v_id, d.foto, st);
            setTimeout(() => db.ref('chamadas_ativas/' + un).remove(), 2000);
        }
    }

    function salvarHist(vid, foto, st) {
        const ref = db.ref('historico_agrupado/' + un + '/' + vid);
        ref.once('value', s => {
            let o = s.val() || { foto, v_id: vid, verde:0, vermelho:0, azul:0, cinza:0 };
            if(st === 'liberado') o.verde++;
            if(st === 'recusado') o.vermelho++;
            if(st === 'mensagem') o.azul++;
            o.ultima = st;
            o.ts = Date.now(); o.foto = foto;
            ref.set(o);
        });
    }

    function carregarHistórico() {
        const cont = document.getElementById('lista-hist');
        const tempoLimpeza = localStorage.getItem('virty_clean_ts') || 0;

        db.ref('historico_agrupado/' + un).on('value', snapHist => {
            db.ref('bloqueios/' + un).on('value', snapBlock => {
                const bloqueados = snapBlock.val() || {};
                cont.innerHTML = "";
                let temVisivel = false;

                snapHist.forEach(c => {
                    const d = c.val();
                    if (d.ts < tempoLimpeza) return;
                    
                    temVisivel = true;
                    const corStatus = d.ultima === 'liberado' ? 'var(--neon)' : (d.ultima === 'recusado' ? 'var(--red)' : 'var(--blue)');
                    const estaBloqueado = bloqueados[d.v_id] === true;
                    
                    const card = document.createElement('div');
                    card.className = 'hist-card';
                    card.innerHTML = `
                        <div class="foto-box">
                            <div class="dots-row">
                                <div class="dot dot-green">${d.verde||0}</div>
                                <div class="dot dot-red">${d.vermelho||0}</div>
                                <div class="dot dot-blue">${d.azul||0}</div>
                                <div class="dot dot-gray">${d.cinza||0}</div>
                            </div>
                            <img src="${d.foto}" class="foto-hist">
                        </div>
                        <div class="info-box">
                            <div class="info-row-top"><b>Visitante ${d.v_id}</b></div>
                            <div class="info-row-mid">${new Date(d.ts).toLocaleString('pt-BR')}</div>
                            <div class="status-badge" style="color:${corStatus}">ÚLTIMA: ${d.ultima || 'CHAMADA'}</div>
                        </div>
                        <button class="btn-toggle-block ${estaBloqueado ? 'is-blocked' : 'not-blocked'}" 
                                onclick="alternarBloqueio('${d.v_id}', ${estaBloqueado})">
                            ${estaBloqueado ? 'DESBLOQUEADO' : 'BLOQUEADO'}
                        </button>
                    `;
                    cont.appendChild(card);
                });
                if(!temVisivel) cont.innerHTML = "<p style='color:#444; text-align:center; margin-top:30px;'>Sem registros recentes.</p>";
            });
        });
    }

    function alternarBloqueio(vid, estaBloqueado) {
        const msg = estaBloqueado ? "Deseja desbloquear este dispositivo?" : "Deseja bloquear este dispositivo?";
        if(confirm(msg)) {
            if(estaBloqueado) {
                db.ref('bloqueios/' + un + '/' + vid).remove();
            } else {
                db.ref('bloqueios/' + un + '/' + vid).set(true);
            }
        }
    }

    function limparHistoricoLocal() {
        if(confirm("Limpar visualmente o histórico?")) {
            localStorage.setItem('virty_clean_ts', Date.now());
            carregarHistórico();
        }
    }
    
    function abrirMsg() {
        let m = prompt("Digite a mensagem:");
        if(m) {
            db.ref('chamadas_ativas/' + un).update({ status: "mensagem", msg_morador: m });
            responder('mensagem');
        }
    }
</script>
</body>
</html>
