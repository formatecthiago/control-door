<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>VIRTY ACCESS DOOR v1.5</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --blue: #007BFF; --red: #FF3131; --gray: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; box-sizing: border-box; }
        .active { display: flex; }

        /* Cabeçalho v1.5 */
        .header-main { text-align: center; border-bottom: 2px solid var(--gray); padding-bottom: 15px; margin-bottom: 15px; }
        .virty-title { color: var(--neon); font-size: 1.1rem; font-weight: 900; letter-spacing: 2px; margin: 0; }
        .virty-version { font-size: 0.6rem; color: #666; font-weight: normal; }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 0.85rem; }
        .unidade-box { background: var(--neon); color: #000; padding: 3px 10px; border-radius: 5px; font-weight: bold; }

        /* Histórico Inteligente */
        .hist-card { background: #0a0a0a; border: 1px solid #222; padding: 12px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; position: relative; }
        .hist-img { width: 55px; height: 55px; border-radius: 50%; border: 1px solid var(--neon); object-fit: cover; margin-right: 12px; }
        .hist-info b { font-size: 0.85rem; display: block; }
        .hist-info small { color: #777; font-size: 0.7rem; }
        .badge-counter { position: absolute; right: 12px; top: 12px; background: var(--red); color: #fff; font-size: 0.7rem; padding: 2px 7px; border-radius: 10px; }
        
        /* Botões & Interface */
        .btn { border: none; border-radius: 15px; padding: 18px; font-weight: bold; cursor: pointer; font-size: 1rem; width: 100%; transition: 0.2s; }
        .btn-v { background: var(--neon); color: #000; }
        .btn-a { background: var(--blue); color: #fff; }
        .btn-r { background: var(--red); color: #fff; }
        .btn-ver-mais { background: transparent; color: var(--neon); border: 1px solid var(--neon); margin-top: 10px; padding: 10px; font-size: 0.8rem; }

        /* Modais */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; border: 1px solid var(--neon); padding: 25px; border-radius: 20px; width: 100%; position: relative; text-align: center; }
        .close-x { position: absolute; top: 15px; right: 15px; font-size: 1.5rem; color: #555; }
    </style>
</head>
<body>

    <div id="s-home" class="screen active">
        <div class="header-main">
            <h1 class="virty-title">VIRTY ACCESS DOOR <span class="virty-version">v1.5</span></h1>
            <div class="user-info">
                <span id="txt-nome-morador">Thiago Vieira</span>
                <span class="unidade-box">CASA <span id="txt-un-morador">--</span></span>
            </div>
            <button class="btn" id="btn-silenciar" onclick="abrirPopSilenciar()" style="background:#111; color:#fff; border:1px solid #333; padding:10px; font-size:0.75rem; margin-top:10px;">🔔 SOM ATIVO</button>
        </div>

        <h3>Histórico Recente</h3>
        <div id="lista-hist"></div>
        <button id="btn-ver-mais" class="btn btn-ver-mais" onclick="toggleHist(true)">VER MAIS CHAMADAS</button>
    </div>

    <div id="s-call" class="screen" style="background:#000;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span onclick="acaoSair()" style="font-size:1.8rem;">🏠</span>
            <b style="color:var(--neon); letter-spacing:1px;">AO VIVO</b>
            <span onclick="abrirPopSilenciar()" id="icon-som-call">🔔</span>
        </div>
        <img id="img-vis" src="" style="width:100%; height:320px; border-radius:20px; object-fit:cover; margin:20px 0; border:2px solid var(--neon);">
        <div style="display:flex; flex-direction:column; gap:12px;">
            <button class="btn btn-v" onclick="responder('liberado')">✔️ ABRIR PORTÃO</button>
            <button class="btn btn-a" onclick="abrirModalMsg()">💬 ENVIAR MENSAGEM</button>
            <button class="btn btn-r" onclick="responder('recusado')">✖️ RECUSAR</button>
        </div>
    </div>

    <div id="pop-silenciar" class="modal">
        <div class="modal-content">
            <h3>MODO DE ALERTA</h3>
            <p style="font-size:0.9rem; color:#aaa;">Por segurança, o sistema não pode ser totalmente desligado. Deseja ativar o modo vibrar?</p>
            <button class="btn btn-r" onclick="setSilenciar(true)" style="margin-bottom:10px;">SIM - MODO VIBRAR</button>
            <button class="btn btn-v" onclick="setSilenciar(false)">NÃO - MANTER SONS</button>
        </div>
    </div>

    <div id="modal-msg" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="fecharModalMsg()">✕</span>
            <h3 style="color:var(--blue)">ENVIAR TEXTO</h3>
            <input type="text" id="input-txt" placeholder="Ex: Deixe na portaria..." style="width:100%; padding:15px; background:#000; border:1px solid var(--blue); color:#fff; border-radius:10px; margin-bottom:15px; box-sizing:border-box;">
            <button class="btn btn-a" onclick="enviarMensagem()">ENVIAR AGORA</button>
            <div id="aviso-msg" style="display:none; color:var(--neon); font-size:0.8rem; margin-top:15px; border-top:1px solid #333; padding-top:10px;">
                ⚠️ Para liberar o portão, clique no botão verde ABRIR.
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const config = { 
            apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", 
            databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        
        let meuId = localStorage.getItem('virty_id');
        let modoVibrar = localStorage.getItem('virty_vibrar') === 'true';
        let histCompleto = [];
        let showingAll = false;

        // --- SISTEMA DE ÁUDIO & CLICK ---
        function clickSom() {
            if(modoVibrar) { if(navigator.vibrate) navigator.vibrate(60); return; }
            let ctx = new (window.AudioContext || window.webkitAudioContext)();
            let o = ctx.createOscillator(); let g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.value = 750; g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1);
            o.start(); o.stop(ctx.currentTime + 0.1);
        }

        function abrirPopSilenciar() { clickSom(); document.getElementById('pop-silenciar').style.display='flex'; }
        function setSilenciar(val) {
            modoVibrar = val;
            localStorage.setItem('virty_vibrar', val);
            document.getElementById('btn-silenciar').innerText = val ? "📳 MODO VIBRAR" : "🔔 SOM ATIVO";
            document.getElementById('pop-silenciar').style.display='none';
            clickSom();
        }

        // --- LÓGICA DE CHAMADA ---
        if(meuId) {
            db.ref('moradores_validados/'+meuId).on('value', s => {
                if(s.exists()){
                    const m = s.val();
                    document.getElementById('txt-nome-morador').innerText = m.nome;
                    document.getElementById('txt-un-morador').innerText = m.unidade;
                    escutar(m.unidade);
                }
            });
        }

        function escutar(un) {
            // Chamadas Ativas
            db.ref('chamadas_ativas/'+un).on('value', s => {
                const d = s.val();
                if(d && d.status === 'chamando') {
                    document.getElementById('img-vis').src = d.foto;
                    mudarTela('s-call');
                    if(!modoVibrar) { /* Aqui tocaria o toque de chamada loop */ }
                }
            });

            // Histórico Inteligente (Separação por ID de Aparelho)
            db.ref('historico/'+un).on('value', snap => {
                let brutos = []; snap.forEach(i => { brutos.unshift(i.val()); });
                
                histCompleto = [];
                brutos.forEach(it => {
                    // REGRA DE OURO: Só agrupa se for o MESMO APARELHO (v_id) e menos de 10 min
                    let last = histCompleto[histCompleto.length-1];
                    if(last && last.v_id === it.v_id && (it.ts - last.ts < 600000)) {
                        last.qtd = (last.qtd || 1) + 1;
                    } else {
                        histCompleto.push({...it, qtd: 1});
                    }
                });
                renderHist();
            });
        }

        function renderHist() {
            const lista = document.getElementById('lista-hist');
            lista.innerHTML = "";
            let paraExibir = showingAll ? histCompleto.slice(0, 10) : histCompleto.slice(0, 5);
            
            paraExibir.forEach(h => {
                const cor = h.tipo === 'LIBERADO' ? '#39FF14' : (h.tipo === 'RECUSADO' ? '#f00' : '#007BFF');
                lista.innerHTML += `
                    <div class="hist-card">
                        <img src="${h.foto}" class="hist-img">
                        <div class="hist-info">
                            <b>VISITANTE ${h.qtd > 1 ? h.qtd+'x' : ''}</b>
                            <small>${h.data} - ${h.hora}</small>
                            <div style="color:${cor}; font-size:0.7rem; font-weight:bold; margin-top:3px;">● ${h.tipo}</div>
                        </div>
                        ${h.v_id ? `<small style="position:absolute; bottom:5px; right:10px; color:#333; font-size:0.5rem;">ID:${h.v_id}</small>` : ''}
                    </div>`;
            });
            document.getElementById('btn-ver-mais').style.display = histCompleto.length > 5 && !showingAll ? 'block' : 'none';
        }

        function toggleHist(val) { clickSom(); showingAll = val; renderHist(); }

        function responder(tipo) {
            clickSom();
            const un = document.getElementById('txt-un-morador').innerText;
            const ref = db.ref('chamadas_ativas/'+un);
            ref.once('value', s => {
                const d = s.val();
                if(d) {
                    const log = { 
                        foto: d.foto, 
                        v_id: d.v_id || 'desconhecido', // Aqui está a chave de separação
                        ts: Date.now(), 
                        hora: new Date().toLocaleTimeString(), 
                        data: new Date().toLocaleDateString(), 
                        tipo: tipo.toUpperCase() 
                    };
                    db.ref('historico/'+un).push(log);
                    ref.update({ status: tipo });
                    setTimeout(() => { ref.remove(); irHome(); }, 500);
                }
            });
        }

        // Funções de Modal e Navegação
        function mudarTela(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function acaoSair() { clickSom(); irHome(); }
        function irHome() { mudarTela('s-home'); }
        function abrirModalMsg() { clickSom(); document.getElementById('modal-msg').style.display='flex'; }
        function fecharModalMsg() { clickSom(); document.getElementById('modal-msg').style.display='none'; document.getElementById('aviso-msg').style.display='none'; }
        
        function enviarMensagem() {
            clickSom();
            const txt = document.getElementById('input-txt').value;
            const un = document.getElementById('txt-un-morador').innerText;
            if(!txt) return;
            db.ref('chamadas_ativas/'+un).update({ status: 'mensagem', msg_morador: txt });
            document.getElementById('aviso-msg').style.display = 'block';
            responder('MENSAGEM');
        }

        // Inicializa UI de Silenciar
        document.getElementById('btn-silenciar').innerText = modoVibrar ? "📳 MODO VIBRAR" : "🔔 SOM ATIVO";
    </script>
</body>
</html>
