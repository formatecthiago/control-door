<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virty Access - Morador</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; }
        body { background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-family: sans-serif; }
        .screen { display: none; width: 100%; max-width: 450px; flex-direction: column; padding: 30px; text-align: center; }
        .active { display: flex; }
        h2 { color: var(--neon); text-transform: uppercase; }
        .btn { width: 100%; padding: 20px; border-radius: 35px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 10px 0; }
        .btn-green { background: var(--neon); color: black; }
        .btn-red { background: #ff3333; color: white; }
        .btn-gray { background: #222; color: #888; }
        .caller-img { width: 180px; height: 180px; border-radius: 20px; object-fit: cover; border: 3px solid var(--neon); margin: 20px auto; }
    </style>
</head>
<body>

    <div id="s-cad" class="screen">
        <h2>REGISTRO</h2>
        <input type="text" id="n" style="width:100%; padding:15px; margin:10px 0; background:#111; color:#fff; border:1px solid #333;" placeholder="Nome">
        <input type="number" id="u" style="width:100%; padding:15px; margin:10px 0; background:#111; color:#fff; border:1px solid #333;" placeholder="Unidade">
        <button class="btn btn-green" onclick="reg()">SOLICITAR</button>
    </div>

    <div id="s-wait" class="screen">
        <h2 style="color:orange">ANÁLISE</h2>
        <p>Aguarde o síndico autorizar seu celular.</p>
    </div>

    <div id="s-home" class="screen">
        <h2>SISTEMA ONLINE</h2>
        <p>Unidade <b id="view-u"></b></p>
        <div style="padding:40px; border:1px dashed #333; border-radius:20px; color:#444">Aguardando visitantes...</div>
        <button class="btn btn-gray" onclick="sair()">SAIR</button>
    </div>

    <div id="s-call" class="screen">
        <h2 style="color:var(--neon)">CHAMADA ATIVA!</h2>
        <img id="visitante-foto" class="caller-img">
        <p id="visitante-msg"></p>
        <button class="btn btn-green" onclick="responder('liberado')">ABRIR PORTÃO</button>
        <button class="btn btn-red" onclick="responder('recusado')">RECUSAR</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", projectId: "virty-access-door" };
    const app = initializeApp(config);
    const db = getDatabase(app);
    let lUn = localStorage.getItem('virty_un');

    function show(id){ document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    window.sair = () => { localStorage.clear(); location.reload(); };

    if(!lUn) { show('s-cad'); } else {
        // Vigia status do morador
        onValue(ref(db, `moradores/${lUn}`), (s) => {
            if(s.exists()){ 
                document.getElementById('view-u').innerText = lUn; 
                show('s-home');
                vigiarChamadas(); 
            } else { 
                onValue(ref(db, `moradores_pendentes/${lUn}`), (sp) => { sp.exists() ? show('s-wait') : sair(); }); 
            }
        });
    }

    function vigiarChamadas() {
        onValue(ref(db, `chamadas_ativas/${lUn}`), (snap) => {
            if(snap.exists() && snap.val().status === "chamando") {
                const dados = snap.val();
                document.getElementById('visitante-foto').src = dados.foto;
                document.getElementById('visitante-msg').innerText = dados.texto_visitante;
                show('s-call');
            } else {
                if(document.getElementById('s-call').classList.contains('active')) show('s-home');
            }
        });
    }

    window.responder = (status) => {
        update(ref(db, `chamadas_ativas/${lUn}`), { status: status });
        setTimeout(() => remove(ref(db, `chamadas_ativas/${lUn}`)), 2000);
    };

    window.reg = () => {
        const un = document.getElementById('u').value, nom = document.getElementById('n').value;
        if(!un || !nom) return alert("Faltam dados!");
        set(ref(db, `moradores_pendentes/${un}`), { nome: nom, unidade: un, foto: "" }).then(() => { localStorage.setItem('virty_un', un); location.reload(); });
    };
</script>
</body>
</html>
