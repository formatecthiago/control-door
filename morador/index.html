<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY MORADOR v11.5</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; --gray: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; box-sizing: border-box; }
        .active { display: flex; }
        
        .header-main { text-align: center; border-bottom: 2px solid var(--gray); padding-bottom: 15px; margin-bottom: 15px; }
        .virty-title { color: var(--neon); font-size: 1.1rem; font-weight: 900; letter-spacing: 2px; margin: 0; }
        .unidade-box { background: var(--neon); color: #000; padding: 3px 10px; border-radius: 5px; font-weight: bold; }
        
        .hist-card { background: #0a0a0a; border: 1px solid #222; padding: 12px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; position: relative; transition: 0.3s; }
        .hist-img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--neon); object-fit: cover; margin-right: 12px; }
        .badge-count { position: absolute; top: 5px; left: 45px; background: var(--red); color: white; font-size: 0.75rem; padding: 2px 8px; border-radius: 12px; font-weight: 900; border: 2px solid #000; z-index: 10; }
        
        .btn { border: none; border-radius: 15px; padding: 18px; font-weight: bold; cursor: pointer; font-size: 1rem; width: 100%; transition: 0.2s; text-transform: uppercase; }
        .btn-v { background: var(--neon); color: #000; }
        .btn-r { background: var(--red); color: #fff; }
        .btn-a { background: var(--blue); color: #fff; }

        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; background: #111; border: 1px solid #333; color: #fff; text-align: center; box-sizing: border-box; }
        #bloqueio-inicio { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 20px; }
        #modal-msg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index: 10000; align-items:center; justify-content:center; padding:20px; }
        .modal-content { background:#111; border:1px solid var(--blue); padding:25px; border-radius:20px; width:100%; max-width:400px; text-align:center; position:relative; }
        #btn-ver-mais { background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin: 10px 0; display: none; }
    </style>
</head>
<body>

    <div id="bloqueio-inicio">
        <h1 style="color:var(--neon); margin:0; letter-spacing:3px;">VIRTY ACCESS</h1>
        <p style="color:#666; margin-top:10px;">Clique para iniciar o painel de controle</p><br>
        <button class="btn btn-v" onclick="entrarApp()" style="width:260px;">ENTRAR</button>
    </div>

    <div id="s-home" class="screen">
        <div class="header-main">
            <h1 class="virty-title">VIRTY ACCESS DOOR v1</h1>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
                <span id="nome-exibir" style="font-weight:bold; color:#bbb;">---</span>
                <span class="unidade-box">CASA <span id="u-txt">--</span></span>
            </div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn" id="btn-silenciar" onclick="toggleMute()" style="background:#111; color:#fff; border:1px solid #333; padding:10px; font-size:0.75rem; flex:1;">🔔 SOM ATIVO</button>
                <button class="btn" onclick="limparHistorico()" style="background:#111; color:var(--red); border:1px solid var(--red); padding:10px; font-size:0.75rem; flex:1;">🗑️ LIMPAR</button>
            </div>
        </div>
        <div id="lista-hist" style="flex:1; overflow-y:auto; padding-bottom: 10px;"></div>
        <button id="btn-ver-mais" onclick="mostrarMais()">EXIBIR MAIS CHAMADAS</button>
    </div>

    <div id="s-call" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span onclick="responder('recusado')" style="cursor:pointer; color:#888;">✖ VOLTAR</span>
            <b style="color:var(--neon)">CHAMADA EM CURSO</b>
            <span id="timer" style="color:var(--red); font-weight:bold; font-size:1.3rem;">60s</span>
        </div>
        <img id="img-vis" src="" style="width:100%; height:320px; border-radius:25px; object-fit:cover; margin:20px 0; border:2px solid var(--neon);">
        <div id="box-msg-vis" style="background:rgba(57,255,20,0.1); padding:12px; border-radius:12px; margin-bottom:15px; color:var(--neon); text-align:center;"></div>
        <div style="display:grid; gap:12px;">
            <button class="btn btn-v" onclick="responder('liberado')">✔️ LIBERAR ACESSO</button>
            <button class="btn btn-a" onclick="abrirMsg()">💬 ENVIAR MSG</button>
            <button class="btn btn-r" onclick="responder('recusado')">✖️ RECUSAR</button>
        </div>
    </div>

    <div id="modal-msg">
        <div class="modal-content">
            <span onclick="fecharMsg()" style="position:absolute; top:10px; right:15px; color:var(--red); font-size:1.8rem; cursor:pointer;">×</span>
            <h3>RESPOSTA RÁPIDA</h3>
            <input type="text" id="input-msg" maxlength="50" placeholder="Ex: Já estou chegando!">
            <button class="btn btn-a" onclick="enviarM()">ENVIAR RESPOSTA</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();
        
        let audioCtx, un = "", somOn = true, crono, loopAlerta, mostrarDez = false;

        async function entrarApp() {
            try { 
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();
            } catch(e) {}
            document.getElementById('bloqueio-inicio').style.display = 'none';
            const salvo = localStorage.getItem('virty_user');
            if(salvo) {
                const user = JSON.parse(salvo); un = user.unidade;
                document.getElementById('u-txt').innerText = un;
                document.getElementById('nome-exibir').innerText = user.nome;
                mudarTela('s-home'); 
                iniciarMonitor();
            }
        }

        // --- DING DONG AJUSTADO (-3dB em relação ao anterior, Ganho 0.5) ---
        function startAlert() {
            if(!audioCtx) return;
            const playCycle = () => {
                const t = audioCtx.currentTime;
                if(somOn) {
                    const g = audioCtx.createGain();
                    g.gain.setValueAtTime(0.5, t); // Volume moderado e nítido
                    g.connect(audioCtx.destination);

                    const osc1 = audioCtx.createOscillator();
                    osc1.frequency.setValueAtTime(660, t);
                    osc1.connect(g);
                    osc1.start(t); osc1.stop(t + 1.2);

                    const osc2 = audioCtx.createOscillator();
                    osc2.frequency.setValueAtTime(523, t + 0.4);
                    osc2.connect(g);
                    osc2.start(t + 0.4); osc2.stop(t + 2);
                }
                if(navigator.vibrate) navigator.vibrate([600, 400, 600, 400]);
            };
            playCycle();
            loopAlerta = setInterval(playCycle, 3000);
        }

        function stopAlert() { clearInterval(loopAlerta); if(navigator.vibrate) navigator.vibrate(0); }

        function iniciarMonitor() {
            // MONITOR DE CHAMADAS
            db.ref('chamadas_ativas/' + un).on('value', s => {
                const d = s.val();
                if(d && d.status === 'chamando') {
                    // SE O V_ID EXISTIR E ESTIVER BLOQUEADO
                    if(d.v_id && localStorage.getItem('blk_' + d.v_id)) {
                        db.ref('chamadas_ativas/' + un).update({ status: 'bloqueado_pelo_morador' });
                        setTimeout(() => db.ref('chamadas_ativas/' + un).remove(), 200);
                        return;
                    }
                    
                    document.getElementById('img-vis').src = d.foto;
                    document.getElementById('box-msg-vis').innerText = d.texto || "Visitante aguardando...";
                    mudarTela('s-call');
                    startAlert();
                    iniciarTimer(d.ts);
                } else if(document.getElementById('s-call').classList.contains('active')) {
                    mudarTela('s-home'); stopAlert(); clearInterval(crono);
                }
            });

            // HISTÓRICO COM ACÚMULO E BLOQUEIO
            db.ref('historico/' + un).limitToLast(40).on('value', s => {
                const cont = document.getElementById('lista-hist');
                cont.innerHTML = "";
                let raw = [];
                s.forEach(c => { raw.push(c.val()); });
                raw.reverse();

                let agrupado = [];
                raw.forEach(item => {
                    let ultimo = agrupado[agrupado.length - 1];
                    let diffMin = ultimo ? (ultimo.ts - item.ts) / 1000 / 60 : 999;
                    
                    // Só agrupa se tiver o mesmo v_id E tempo menor que 60 min
                    if(ultimo && item.v_id && ultimo.v_id === item.v_id && diffMin < 60) {
                        ultimo.count = (ultimo.count || 1) + 1;
                    } else {
                        item.count = 1;
                        agrupado.push(item);
                    }
                });

                const limite = mostrarDez ? 10 : 5;
                if(agrupado.length > 5 && !mostrarDez) document.getElementById('btn-ver-mais').style.display = 'block';
                else document.getElementById('btn-ver-mais').style.display = 'none';

                agrupado.slice(0, limite).forEach(h => {
                    const isBlk = h.v_id ? localStorage.getItem('blk_' + h.v_id) : false;
                    cont.innerHTML += `
                        <div class="hist-card" style="border-left: 5px solid ${isBlk ? 'var(--red)' : 'var(--neon)'}">
                            ${h.count > 1 ? `<div class="badge-count">${h.count}x</div>` : ''}
                            <div style="display:flex; align-items:center;">
                                <img src="${h.foto}" class="hist-img">
                                <div><b style="font-size:0.8rem">VISITANTE</b><br><small style="color:#777">${h.hora} - ${h.data}</small></div>
                            </div>
                            <button onclick="toggleBlock('${h.v_id}')" 
                                style="background:${isBlk ? 'var(--red)' : '#111'}; color:${isBlk ? '#fff' : '#666'}; border:1px solid #333; padding:10px; border-radius:12px; font-size:0.65rem; font-weight:bold;">
                                ${isBlk ? 'DESBLOQUEAR' : 'BLOQUEAR'}
                            </button>
                        </div>`;
                });
            });
        }

        function toggleBlock(vid) {
            if(!vid || vid === 'undefined' || vid === 'null') {
                alert("Erro: Este visitante não gerou um ID válido para bloqueio.");
                return;
            }
            const k = 'blk_' + vid;
            if(localStorage.getItem(k)) localStorage.removeItem(k);
            else localStorage.setItem(k, 'true');
            // O monitor do histórico já vai atualizar a cor do botão sozinho
        }

        function iniciarTimer(ts) {
            clearInterval(crono);
            crono = setInterval(() => {
                const seg = 60 - Math.floor((Date.now() - (ts || Date.now())) / 1000);
                document.getElementById('timer').innerText = seg + "s";
                if(seg <= 0) responder('expirado');
            }, 1000);
        }

        function responder(status) {
            db.ref('chamadas_ativas/' + un).once('value', s => {
                const d = s.val();
                if(d && status !== 'expirado' && status !== 'recusado') {
                    const agora = new Date();
                    db.ref('historico/' + un).push({
                        foto: d.foto, v_id: d.v_id || 'anonimo', ts: Date.now(),
                        hora: agora.getHours().toString().padStart(2, '0') + ":" + agora.getMinutes().toString().padStart(2, '0'),
                        data: agora.toLocaleDateString('pt-BR')
                    });
                }
                db.ref('chamadas_ativas/' + un).update({ status: status });
                setTimeout(() => { db.ref('chamadas_ativas/' + un).remove(); mudarTela('s-home'); stopAlert(); }, 400);
            });
        }

        function toggleMute() {
            if(somOn) {
                alert("PONTO DE ATENÇÃO: O som foi desligado. O modo VIBRAR PULSANTE continuará ativo durante as chamadas.");
                somOn = false;
                document.getElementById('btn-silenciar').innerText = "🔕 MODO VIBRAR";
            } else {
                somOn = true;
                document.getElementById('btn-silenciar').innerText = "🔔 SOM ATIVO";
            }
        }

        function mostrarMais() { mostrarDez = true; }
        function limparHistorico() { if(confirm("Deseja apagar o histórico de chamadas?")) db.ref('historico/' + un).remove(); }
        function abrirMsg() { document.getElementById('modal-msg').style.display = 'flex'; }
        function fecharMsg() { document.getElementById('modal-msg').style.display = 'none'; }
        function enviarM() {
            const m = document.getElementById('input-msg').value;
            if(!m) return;
            db.ref('chamadas_ativas/' + un).update({ status: 'mensagem', msg_morador: m });
            fecharMsg(); responder('mensagem-enviada');
        }
        function mudarTela(id) { 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        }
    </script>
</body>
</html>
