<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY MORADOR v15.2</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 20px; box-sizing: border-box; }
        .virty-header { text-align: center; border-bottom: 2px solid #1a1a1a; padding-bottom: 15px; margin-bottom: 20px; }
        #cam-box { width: 100%; height: 200px; background: #050505; border: 2px dashed #333; border-radius: 15px; margin: 10px 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; display: none; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; box-sizing: border-box; }
        .btn { border: none; border-radius: 12px; padding: 16px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 10px; }
        .btn-v { background: var(--neon); color: #000; }
        .btn-b { background: var(--blue); color: #fff; }
        .hist-card { background: #0a0a0a; border: 1px solid #222; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; }
        .hist-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="setup-login">
        <h2 style="color:var(--neon); text-align:center;">VIRTY ACCESS</h2>
        <div id="form-cadastro" style="display:none;">
            <div id="cam-box"><video id="v-selfie" autoplay playsinline></video></div>
            <button class="btn btn-b" onclick="ativarCamera()">ATIVAR CÂMERA</button>
            <input type="text" id="nome" placeholder="Nome Completo">
            <input type="text" id="casa" placeholder="Número da Casa">
            <input type="text" id="cpf" placeholder="CPF">
            <button class="btn btn-v" onclick="registrar()">CONCLUIR CADASTRO</button>
        </div>
        <div id="area-entrada">
            <button class="btn btn-v" onclick="verificarAcesso()">ACESSAR MEU PAINEL</button>
            <p id="msg-espera" style="display:none; color:orange; text-align:center; margin-top:20px;">Aguardando liberação do administrador...</p>
        </div>
    </div>

    <div id="painel-morador" style="display:none;">
        <div class="virty-header">
            <b id="user-nome" style="color:var(--neon)">---</b> | CASA <b id="user-casa">--</b>
        </div>
        <button class="btn" style="background:#111; color:var(--neon); border:1px solid var(--neon);" onclick="tocarAlerta()">TESTAR SOM DE ALERTA</button>
        <h4 style="margin-top:25px; color:#444;">HISTÓRICO DE CHAMADAS</h4>
        <div id="lista-chamadas"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config); const db = firebase.database();
        let meuPerfil = JSON.parse(localStorage.getItem('virty_perfil'));

        function ativarCamera() {
            navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
                const v = document.getElementById('v-selfie'); v.srcObject = s; v.style.display = 'block';
            });
        }

        function registrar() {
            const v = document.getElementById('v-selfie'); const canvas = document.createElement('canvas');
            canvas.width = v.videoWidth; canvas.height = v.videoHeight; canvas.getContext('2d').drawImage(v, 0, 0);
            const dados = { nome: document.getElementById('nome').value, casa: document.getElementById('casa').value, cpf: document.getElementById('cpf').value, foto: canvas.toDataURL('image/jpeg', 0.5) };
            db.ref('solicitacoes').push(dados).then(() => { localStorage.setItem('virty_perfil', JSON.stringify(dados)); location.reload(); });
        }

        function verificarAcesso() {
            if(!meuPerfil) { document.getElementById('area-entrada').style.display='none'; document.getElementById('form-cadastro').style.display='block'; return; }
            db.ref('moradores').orderByChild('cpf').equalTo(meuPerfil.cpf).once('value', s => {
                if(s.exists()) {
                    document.getElementById('setup-login').style.display='none';
                    document.getElementById('painel-morador').style.display='block';
                    const data = Object.values(s.val())[0];
                    document.getElementById('user-nome').innerText = data.nome;
                    document.getElementById('user-casa').innerText = data.casa;
                    monitorarChamadas(data.casa);
                } else { document.getElementById('msg-espera').style.display='block'; }
            });
        }

        function monitorarChamadas(numCasa) {
            db.ref('historico/' + numCasa).on('value', s => {
                const cont = document.getElementById('lista-chamadas'); cont.innerHTML = "";
                s.forEach(item => {
                    const d = item.val();
                    cont.innerHTML += `<div class="hist-card"><img src="${d.foto}" class="hist-img"><div><b>VISITANTE</b><br><small>Chamando...</small></div></div>`;
                });
                if(s.exists()) tocarAlerta();
            });
        }

        function tocarAlerta() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            g.gain.setValueAtTime(0, ctx.currentTime);
            g.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.1);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
            osc.start(); osc.stop(ctx.currentTime + 1);
        }
    </script>
</body>
</html>
