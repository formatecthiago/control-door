<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY MORADOR v11.9</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; --gray: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; box-sizing: border-box; }
        .active { display: flex; }
        .header-main { text-align: center; border-bottom: 2px solid var(--gray); padding-bottom: 15px; margin-bottom: 15px; }
        .unidade-box { background: var(--neon); color: #000; padding: 3px 10px; border-radius: 5px; font-weight: bold; }
        .btn { border: none; border-radius: 15px; padding: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; }
        .btn-v { background: var(--neon); color: #000; }
        .btn-r { background: var(--red); color: #fff; }
        .btn-a { background: var(--blue); color: #fff; }
    </style>
</head>
<body>
    <div id="bloqueio-inicio" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; padding:20px;">
        <h1 style="color:var(--neon);">VIRTY ACCESS</h1>
        <button class="btn btn-v" onclick="entrarApp()">ENTRAR NO PAINEL</button>
    </div>

    <div id="s-home" class="screen">
        <div class="header-main">
            <h1 style="color:var(--neon); font-size:1.1rem;">VIRTY DOOR v1.9</h1>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                <span id="nome-exibir">---</span>
                <span class="unidade-box">CASA <span id="u-txt">--</span></span>
            </div>
        </div>
        <div id="lista-hist" style="flex:1; overflow-y:auto;"></div>
    </div>

    <div id="s-call" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <b style="color:var(--neon)">CHAMADA AO VIVO</b>
            <span id="timer" style="color:var(--red); font-weight:bold;">60s</span>
        </div>
        <img id="img-vis" src="" style="width:100%; height:320px; border-radius:25px; object-fit:cover; margin:20px 0; border:2px solid var(--neon);">
        <button class="btn btn-v" onclick="responder('liberado')">✔️ LIBERAR PORTÃO</button>
        <button class="btn btn-r" onclick="responder('recusado')">✖️ RECUSAR</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config); const db = firebase.database();
        let un = "", loopAlerta;

        async function entrarApp() {
            const salvo = localStorage.getItem('virty_user');
            if(salvo) {
                const user = JSON.parse(salvo); un = user.unidade;
                document.getElementById('u-txt').innerText = un;
                document.getElementById('nome-exibir').innerText = user.nome;
                document.getElementById('bloqueio-inicio').style.display = 'none';
                mudarTela('s-home'); iniciarMonitor();
            } else alert("Aguardando validação do administrador.");
        }

        function iniciarMonitor() {
            db.ref('chamadas_ativas/' + un).on('value', s => {
                const d = s.val();
                if(d && d.status === 'chamando') {
                    document.getElementById('img-vis').src = d.foto;
                    mudarTela('s-call');
                    if(navigator.vibrate) navigator.vibrate([500, 200, 500]);
                } else { mudarTela('s-home'); }
            });
        }

        function responder(status) {
            db.ref('chamadas_ativas/' + un).update({ status: status });
            setTimeout(() => { db.ref('chamadas_ativas/' + un).remove(); mudarTela('s-home'); }, 300);
        }

        function mudarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
