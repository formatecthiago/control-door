<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virty Access - Morador</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #141417;
            --surface-input: #1d1d22;
            --neon: #00ff66;
            --neon-dim: rgba(0, 255, 102, 0.15);
            --red: #ff3333;
            --blue: #007aff;
            --text: #ffffff;
            --gray: #8e8e93;
            --border: #2c2c35;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Estrutura de Telas e Navegação */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 65px);
            display: none;
            flex-direction: column;
            padding: 20px;
        }

        .screen.active {
            display: flex;
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        /* Topbar Global */
        .topbar {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .topbar-titulo {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            background: #1a1a1a;
            color: var(--gray);
            border: 1px solid #333;
        }

        .status-badge.online {
            color: var(--neon);
            border-color: var(--neon);
            background: var(--neon-dim);
        }

        /* Navbar Inferior */
        .navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 999;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--gray);
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 600;
            width: 25%;
            height: 100%;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: var(--neon);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            margin-bottom: 4px;
            fill: currentColor;
        }

        /* Seções e Componentes do Panel */
        .secao-titulo {
            font-size: 0.75rem;
            color: var(--gray);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .btn-config {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 15px;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .btn-acao {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.1s;
        }

        .btn-acao:active {
            transform: scale(0.98);
        }

        .btn-aceitar { background: var(--neon); color: #000; }
        .btn-recusar { background: var(--red); color: #fff; }

        /* Lista de Histórico */
        .card-historico {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Telas Modais e Bloqueios Críticos */
        #tela-bloqueio-instalar, #tela-chamada {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 10000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
        }

        .btn-instalar-pwa {
            background: var(--neon);
            color: #000;
            border: none;
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 14px;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            display: none; /* Só aparece quando disparado pelo beforeinstallprompt */
        }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="topbar-titulo">VIRT-Y ACCESS</div>
        <div id="badge-conexao" class="status-badge online">CONECTADO</div>
    </div>

    <div id="s-home" class="screen active">
        <div class="content-scroll" style="padding-top:5px;">
            
            <div class="secao-titulo">⚙️ PREFERÊNCIAS DE ALERTA</div>
            <div class="config-grid">
                <button class="btn-config" onclick="proximoSom()">
                    <span id="label-som" style="font-size:1.2rem;">🎼 1</span>
                    <span style="color:var(--gray); font-size:0.7rem;">Mudar Toque</span>
                </button>
                <button class="btn-config" onclick="alternarAlerta()">
                    <span id="btn-alerta" style="font-size:1.2rem;">📳🔊</span>
                    <span style="color:var(--gray); font-size:0.7rem;">Modo de Alerta</span>
                </button>
            </div>

            <div id="bloco-instalacao-home" style="display: none; margin-bottom: 25px;">
                <div class="secao-titulo">📲 APLICATIVO WEB</div>
                <button id="btn-instalar-home" class="btn-acao btn-aceitar" style="height: 52px; font-size: 0.9rem; border-radius: 12px;">
                    📥 INSTALAR APP NO CELULAR
                </
