<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virty Morador</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2555/2555572.png">
    <style>
        :root { --neon: #39FF14; --bg: #000; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        .screen { display: none; width: 100%; max-width: 450px; flex-direction: column; padding: 25px; margin: 0 auto; box-sizing: border-box; }
        .active { display: flex; }
        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: white; text-align: center; }
        .btn { width: 100%; padding: 18px; border-radius: 35px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 8px 0; }
        .btn-green { background: var(--neon); color: black; }
        .btn-red { background: #ff4444; color: white; }
        .cam-circle { width: 150px; height: 150px; border-radius: 50%; border: 2px solid var(--neon); margin: 10px auto; overflow: hidden; background: #111; }
        .hist-item { background: #0a0a0a; border: 1px solid #222; padding: 10px; border-radius: 12px; display: flex; align-items: center; margin-bottom: 8px; }
        .hist-thumb { width: 50px; height: 50px; border-radius: 10px; margin-right: 12px; }
    </style>
</head>
<body>

    <div id="s-cad" class="screen">
        <h2 style="color:var(--neon)">CADASTRO MORADOR</h2>
        <div class="cam-circle">
            <video id="v-cad" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>
            <canvas id="c-cad" style="display:none"></canvas>
        </div>
        <button class="btn" style="background:#222; color:#fff" onclick="capturar()">CAPTURAR IMAGEM</button>
        <input type="text" id="cad-nome" placeholder="Nome Completo">
        <input type="number" id="cad-un" placeholder="Número da Unidade">
        <input type="number" id="cad-cpf" placeholder="CPF">
        <input type="number" id="cad-tel" placeholder="WhatsApp">
        <button class="btn btn-green" onclick="enviarCadastro()">SOLICITAR ACESSO</button>
    </div>

    <div id="s-home" class="screen">
        <h2 style="color:var(--neon)">UNIDADE <span id="view-u"></span></h2>
        <div id="hist" style="text-align:left"></div>
        <button id="btn-mais" class="btn" style="background:#111; color:var(--neon); display:none" onclick="verMais()">VER MAIS</button>
    </div>

    <div id="s-call" class="screen">
        <h2 style="color:var(--neon)">VISITANTE!</h2>
        <img id="call-img" style="width:200px; height:200px; border-radius:20px; border:3px solid var(--neon); margin:10px auto;">
        <button class="btn btn-green" onclick="resp('liberado')">ABRIR PORTÃO</button>
        <button class="btn btn-red" onclick="resp('recusado')">RECUSAR</button>
    </div>

    <audio id="som" loop src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", projectId: "virty-access-door" };
    const app = initializeApp(config);
    const db = getDatabase(app);
    
    let fBase64 = "", lId = localStorage.getItem('virty_id');

    function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    if(!lId) {
        show('s-cad');
        navigator.mediaDevices.getUserMedia({video:true}).then(s=>document.getElementById('v-cad').srcObject=s);
    } else {
        onValue(ref(db, `moradores_validados/${lId}`), (snap) => {
            if(snap.exists()) {
                window.un = snap.val().unidade;
                document.getElementById('view-u').innerText = window.un;
                show('s-home');
                vigiar();
            } else { show('s-cad'); }
        });
    }

    window.capturar = () => {
        const v = document.getElementById('v-cad'), c = document.getElementById('c-cad');
        c.width=v.videoWidth; c.height=v.videoHeight;
        c.getContext('2d').drawImage(v,0,0);
        fBase64 = c.toDataURL('image/jpeg', 0.5);
        alert("Imagem Capturada!");
    };

    window.enviarCadastro = async () => {
        const un = document.getElementById('cad-un').value;
        const nome = document.getElementById('cad-nome').value;
        if(!fBase64 || !un || !nome) return alert("Preencha tudo!");

        const id = Date.now();
        set(ref(db, `moradores_pendentes/${id}`), {
            id, nome, unidade: un, foto: fBase64,
            cpf: document.getElementById('cad-cpf').value,
            tel: document.getElementById('cad-tel').value
        }).then(() => {
            localStorage.setItem('virty_id', id);
            alert("Aguarde aprovação do Admin!");
            location.reload();
        });
    };

    function vigiar() {
        onValue(ref(db, `chamadas_ativas/${window.un}`), (snap) => {
            if(snap.exists() && snap.val().status === "chamando") {
                document.getElementById('call-img').src = snap.val().foto;
                show('s-call');
                document.getElementById('som').play();
            } else {
                document.getElementById('som').pause();
                show('s-home');
            }
        });
    }
    window.resp = (st) => update(ref(db, `chamadas_ativas/${window.un}`), {status: st});
</script>
</body>
</html>
