<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY MORADOR v11.8</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; --gray: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; box-sizing: border-box; }
        .active { display: flex; }
        
        .header-main { text-align: center; border-bottom: 2px solid var(--gray); padding-bottom: 15px; margin-bottom: 15px; }
        .virty-title { color: var(--neon); font-size: 1.1rem; font-weight: 900; letter-spacing: 2px; margin: 0; }
        .unidade-box { background: var(--neon); color: #000; padding: 3px 10px; border-radius: 5px; font-weight: bold; }
        
        .hist-card { background: #0a0a0a; border: 1px solid #222; padding: 12px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; position: relative; }
        .hist-img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--neon); object-fit: cover; margin-right: 12px; }
        .badge-count { position: absolute; top: 5px; left: 45px; background: var(--red); color: white; font-size: 0.75rem; padding: 2px 8px; border-radius: 12px; font-weight: 900; border: 2px solid #000; z-index: 10; }
        
        .btn { border: none; border-radius: 15px; padding: 18px; font-weight: bold; cursor: pointer; font-size: 1rem; width: 100%; transition: 0.1s; text-transform: uppercase; }
        .btn:active { transform: scale(0.96); opacity: 0.8; } /* Feedback de toque */
        
        .btn-v { background: var(--neon); color: #000; }
        .btn-r { background: var(--red); color: #fff; }
        .btn-a { background: var(--blue); color: #fff; }

        .status-tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; margin-top: 3px; display: inline-block; }
        .tag-liberado { background: rgba(57, 255, 20, 0.2); color: var(--neon); }
        .tag-recusado { background: rgba(255, 49, 49, 0.2); color: var(--red); }
        .tag-expirado { background: rgba(255, 255, 255, 0.1); color: #777; }
    </style>
</head>
<body>

    <div id="bloqueio-inicio" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:20px;">
        <h1 style="color:var(--neon); letter-spacing:3px;">VIRTY ACCESS</h1>
        <button class="btn btn-v" onclick="entrarApp()" style="width:260px;">ENTRAR NO PAINEL</button>
    </div>

    <div id="s-home" class="screen">
        <div class="header-main">
            <h1 class="virty-title">VIRTY DOOR v1.8</h1>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
                <span id="nome-exibir" style="font-weight:bold; color:#bbb;">---</span>
                <span class="unidade-box">CASA <span id="u-txt">--</span></span>
            </div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn" id="btn-silenciar" onclick="toggleMute()" style="background:#111; color:#fff; border:1px solid #333; padding:10px; font-size:0.75rem; flex:1;">🔔 SOM ATIVO</button>
                <button class="btn" onclick="limparHistorico()" style="background:#111; color:var(--red); border:1px solid var(--red); padding:10px; font-size:0.75rem; flex:1;">🗑️ LIMPAR</button>
            </div>
        </div>
        <div id="lista-hist" style="flex:1; overflow-y:auto; padding-bottom:10px;"></div>
    </div>

    <div id="s-call" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <b style="color:var(--neon)">CHAMADA AO VIVO</b>
            <span id="timer" style="color:var(--red); font-weight:bold; font-size:1.3rem;">60s</span>
        </div>
        <img id="img-vis" src="" style="width:100%; height:320px; border-radius:25px; object-fit:cover; margin:20px 0; border:2px solid var(--neon);">
        
        <div style="display:grid; gap:12px;">
            <button class="btn btn-r" onclick="responder('recusado')">✖️ RECUSAR CHAMADA</button>
            <button class="btn btn-v" onclick="responder('liberado')">✔️ LIBERAR PORTÃO</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();
        
        let audioCtx, un = "", somOn = true, crono, loopAlerta;

        async function entrarApp() {
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
            document.getElementById('bloqueio-inicio').style.display = 'none';
            const salvo = localStorage.getItem('virty_user');
            if(salvo) {
                const user = JSON.parse(salvo); un = user.unidade;
                document.getElementById('u-txt').innerText = un;
                document.getElementById('nome-exibir').innerText = user.nome;
                mudarTela('s-home'); 
                iniciarMonitor();
            }
        }

        // --- DOORBELL ORIGINAL QUE VOCÊ GOSTOU ---
        function startAlert() {
            if(!audioCtx) return;
            const playCycle = () => {
                const t = audioCtx.currentTime;
                if(somOn) {
                    const g = audioCtx.createGain();
                    g.gain.setValueAtTime(0.5, t); 
                    g.connect(audioCtx.destination);
                    const osc1 = audioCtx.createOscillator();
                    osc1.frequency.setValueAtTime(660, t);
                    osc1.connect(g); osc1.start(t); osc1.stop(t + 1.2);
                    const osc2 = audioCtx.createOscillator();
                    osc2.frequency.setValueAtTime(523, t + 0.4);
                    osc2.connect(g); osc2.start(t + 0.4); osc2.stop(t + 2.0);
                }
                if(navigator.vibrate) navigator.vibrate([600, 400, 600, 400]);
            };
            playCycle();
            loopAlerta = setInterval(playCycle, 3000);
        }

        function stopAlert() { clearInterval(loopAlerta); if(navigator.vibrate) navigator.vibrate(0); }

        function iniciarMonitor() {
            db.ref('chamadas_ativas/' + un).on('value', s => {
                const d = s.val();
                if(d && d.status === 'chamando') {
                    if(d.v_id && localStorage.getItem('blk_' + d.v_id)) {
                        db.ref('chamadas_ativas/' + un).update({ status: 'bloqueado' });
                        setTimeout(() => db.ref('chamadas_ativas/' + un).remove(), 100);
                        return;
                    }
                    document.getElementById('img-vis').src = d.foto;
                    mudarTela('s-call');
                    startAlert();
                    iniciarTimer(d.ts);
                } else {
                    mudarTela('s-home'); stopAlert(); clearInterval(crono);
                }
            });

            // HISTÓRICO COM REGISTRO DE AÇÃO
            db.ref('historico/' + un).limitToLast(20).on('value', s => {
                const cont = document.getElementById('lista-hist');
                cont.innerHTML = "";
                let raw = [];
                s.forEach(c => { raw.push(c.val()); });
                raw.reverse();

                let agrupado = [];
                raw.forEach(item => {
                    let ultimo = agrupado[agrupado.length - 1];
                    let diffMin = ultimo ? (ultimo.ts - item.ts) / 1000 / 60 : 999;
                    if(ultimo && item.v_id && ultimo.v_id === item.v_id && diffMin < 60 && ultimo.acao === item.acao) {
                        ultimo.count = (ultimo.count || 1) + 1;
                    } else {
                        item.count = 1;
                        agrupado.push(item);
                    }
                });

                agrupado.slice(0, 8).forEach(h => {
                    const isBlk = h.v_id ? localStorage.getItem('blk_' + h.v_id) : false;
                    const acaoLabel = h.acao || 'expirado';
                    cont.innerHTML += `
                        <div class="hist-card" style="border-left: 5px solid ${isBlk ? 'var(--red)' : 'var(--neon)'}">
                            ${h.count > 1 ? `<div class="badge-count">${h.count}x</div>` : ''}
                            <div style="display:flex; align-items:center;">
                                <img src="${h.foto}" class="hist-img">
                                <div>
                                    <b style="font-size:0.8rem">VISITANTE</b><br>
                                    <small style="color:#777">${h.hora}</small><br>
                                    <span class="status-tag tag-${acaoLabel}">${acaoLabel}</span>
                                </div>
                            </div>
                            <button id="btn-blk-${h.v_id}" onclick="uiToggleBlock('${h.v_id}')" 
                                style="background:${isBlk ? 'var(--red)' : '#111'}; color:#fff; border:1px solid #333; padding:10px; border-radius:12px; font-size:0.65rem; font-weight:bold; min-width:90px;">
                                ${isBlk ? 'DESBLOQUEAR' : 'BLOQUEAR'}
                            </button>
                        </div>`;
                });
            });
        }

        // FEEDBACK VISUAL IMEDIATO NO BOTÃO DE BLOQUEIO
        window.uiToggleBlock = function(vid) {
            if(!vid || vid === 'undefined') return;
            const k = 'blk_' + vid;
            const btn = document.getElementById('btn-blk-' + vid);
            
            if(localStorage.getItem(k)) {
                localStorage.removeItem(k);
                btn.style.background = "#111";
                btn.innerText = "BLOQUEAR";
            } else {
                localStorage.setItem(k, 'true');
                btn.style.background = "var(--red)";
                btn.innerText = "DESBLOQUEAR";
            }
        };

        function responder(status) {
            db.ref('chamadas_ativas/' + un).once('value', s => {
                const d = s.val();
                if(d) {
                    const agora = new Date();
                    const horaFormatada = agora.getHours().toString().padStart(2, '0') + ":" + agora.getMinutes().toString().padStart(2, '0');
                    
                    // Salva no histórico com a AÇÃO realizada
                    db.ref('historico/' + un).push({
                        foto: d.foto, 
                        v_id: d.v_id || 'anonimo', 
                        ts: Date.now(),
                        hora: horaFormatada,
                        acao: status // 'liberado', 'recusado' ou 'expirado'
                    });

                    let updateData = { status: status };
                    if(status === 'recusado') updateData.msg_morador = "O morador não pode atender no momento.";

                    db.ref('chamadas_ativas/' + un).update(updateData);
                    setTimeout(() => { 
                        db.ref('chamadas_ativas/' + un).remove(); 
                        mudarTela('s-home'); 
                        stopAlert(); 
                    }, 300);
                }
            });
        }

        function iniciarTimer(ts) {
            clearInterval(crono);
            crono = setInterval(() => {
                const seg = 60 - Math.floor((Date.now() - (ts || Date.now())) / 1000);
                document.getElementById('timer').innerText = seg + "s";
                if(seg <= 0) responder('expirado');
            }, 1000);
        }

        function toggleMute() {
            somOn = !somOn;
            document.getElementById('btn-silenciar').innerText = somOn ? "🔔 SOM ATIVO" : "🔕 MODO VIBRAR";
        }

        function limparHistorico() { if(confirm("Apagar histórico?")) db.ref('historico/' + un).remove(); }
        
        function mudarTela(id) { 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        }
    </script>
</body>
</html>
