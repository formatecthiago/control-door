<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY MORADOR v1.5</title>
    <style>
        /* MANTIDO EXATAMENTE SEU CSS ORIGINAL */
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; --gray: #666; --yellow: #FFD700; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; box-sizing: border-box; }
        .active { display: flex; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; }
        .btn { width: 100%; padding: 15px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 10px 0; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        .hist-card { background: #0d0d0d; border-radius: 12px; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid #1a1a1a; }
        .foto-box { position: relative; width: 65px; height: 65px; }
        .foto-hist { width: 65px; height: 65px; border-radius: 10px; object-fit: cover; border: 1px solid var(--neon); }
        .dots-row { position: absolute; top: -10px; left: 0; width: 100%; display: flex; justify-content: center; gap: 3px; z-index: 10; }
        .dot { width: 16px; height: 16px; border-radius: 50%; font-size: 9px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; }
        
        #painel-chamada { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:2000; flex-direction:column; align-items:center; justify-content:center; }
        .foto-v { width: 220px; height: 220px; border-radius: 50%; border: 4px solid var(--neon); object-fit: cover; }
        
        .controles-alerta { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .btn-mini { background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 10px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; min-width: 50px; }
        #timer-regressivo { font-size: 2rem; color: var(--red); font-weight: bold; margin: 10px 0; }

        /* ADICIONADO APENAS O BOTÃO DE MIC SEM QUEBRAR O RESTO */
        .btn-mic { background: var(--yellow); color: #000; border-radius: 50%; width: 60px; height: 60px; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; margin: 0 10px; }
        .recording { background: var(--red); animation: pulse 1s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.1);} 100% {transform: scale(1);} }
    </style>
</head>
<body>

    <div id="s-cadastro" class="screen">
        <h2 style="color:var(--neon)">CADASTRO MORADOR</h2>
        <video id="v-cad" autoplay playsinline muted style="width:120px; height:120px; border-radius:50%; object-fit:cover; margin:0 auto 20px; border:2px solid #fff;"></video>
        <button class="btn" style="background:#fff" onclick="fotoCad()">CAPTURAR SELFIE</button>
        <input type="text" id="c-nome" placeholder="Nome Completo">
        <input type="number" id="c-cpf" placeholder="CPF">
        <input type="number" id="c-tel" placeholder="Telefone">
        <input type="number" id="c-un" placeholder="Número da Casa">
        <button class="btn" style="background:var(--neon); color:#000;" onclick="enviarCadastro()">SOLICITAR ACESSO</button>
    </div>

    <div id="s-wait" class="screen">
        <h2 style="color:var(--neon); margin-top:100px;">AGUARDANDO APROVAÇÃO</h2>
        <p style="color:#888; text-align:center;">Seu cadastro foi enviado à administração.</p>
    </div>

    <div id="s-home" class="screen">
        <div class="header">
            <b style="color:var(--neon)">VIRTY ACCESS DOOR v1.5</b>
            <span id="txt-un" style="background:var(--neon); color:#000; padding:2px 8px; border-radius:4px; font-weight:bold;"></span>
        </div>

        <div class="controles-alerta">
            <button class="btn-mini" onclick="proximoSom()">🎼</button>
            <button class="btn-mini" id="btn-alerta" onclick="alternarAlerta()">🔊</button>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span style="font-size:0.8rem; color:#666;">CHAMADAS RECEBIDAS</span>
            <button onclick="limparHist()" style="background:none; border:none; color:var(--red); font-size:0.7rem; font-weight:bold;">LIMPAR</button>
        </div>
        <div id="lista-hist"></div>
    </div>

    <div id="painel-chamada">
        <div id="timer-regressivo">90</div>
        <h2 style="color:var(--neon)">VISITANTE NA PORTA</h2>
        <img id="foto-v" class="foto-v">
        <p id="msg-v" style="font-style:italic; color:#aaa; margin: 15px 0;"></p>
        
        <div style="width: 100%; display: flex; flex-direction: column; align-items: center; padding: 0 20px; box-sizing: border-box;">
            <button class="btn" style="background:var(--neon); color:#000" onclick="responder('liberado')">ABRIR PORTÃO</button>
            
            <div style="display: flex; width: 100%; align-items: center; justify-content: center; gap: 10px;">
                <button class="btn" style="background:var(--blue); color:#fff; flex: 1;" onclick="abrirMsg()">MENSAGEM</button>
                <button id="btn-mic" class="btn-mic" ontouchstart="startRec()" ontouchend="stopRec()" onmousedown="startRec()" onmouseup="stopRec()">🎤</button>
            </div>
            
            <button class="btn" style="background:var(--red); color:#fff" onclick="responder('recusado')">RECUSAR</button>
        </div>
    </div>

    <canvas id="c-cad" style="display:none;"></canvas>
    <audio id="toque" loop></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let my_un = localStorage.getItem('my_un');
    let my_foto = "";
    let timerPerdida;
    let tempoRestante = 90;
    let mediaRecorder, chunks = [];

    const sons = [
        "https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3",
        "https://assets.mixkit.co/active_storage/sfx/1358/1358-preview.mp3",
        "https://assets.mixkit.co/active_storage/sfx/1353/1353-preview.mp3",
        "https://assets.mixkit.co/active_storage/sfx/1360/1360-preview.mp3"
    ];
    let somAtual = parseInt(localStorage.getItem('virty_som')) || 0;
    let modoAlerta = parseInt(localStorage.getItem('virty_alerta')) || 1;

    window.onload = () => {
        atualizarInterfaceAlerta();
        if(!my_un) mudarTela('s-cadastro');
        else verificarStatus();
    };

    function verificarStatus() {
        db.ref('moradores_validados/' + my_un).on('value', s => {
            if(s.exists()) {
                mudarTela('s-home');
                document.getElementById('txt-un').innerText = "CASA " + my_un;
                escutarChamadas();
                renderizarHist();
            } else {
                db.ref('solicitacoes_cadastro/' + my_un).once('value', sp => {
                    sp.exists() ? mudarTela('s-wait') : mudarTela('s-cadastro');
                });
            }
        });
    }

    function escutarChamadas() {
        db.ref('chamadas_ativas/' + my_un).on('value', s => {
            const d = s.val();
            if(d && (d.status === 'chamando' || d.status === 'escrevendo' || d.status === 'gravando')) {
                document.getElementById('foto-v').src = d.foto;
                document.getElementById('msg-v').innerText = d.texto || "Sem recado";
                document.getElementById('painel-chamada').style.display = 'flex';
                
                if(d.status === 'chamando') {
                    gerenciarAlerta('start');
                    tempoRestante = 90;
                    document.getElementById('timer-regressivo').innerText = tempoRestante;
                    clearInterval(timerPerdida);
                    timerPerdida = setInterval(() => {
                        tempoRestante--;
                        document.getElementById('timer-regressivo').innerText = tempoRestante;
                        if(tempoRestante <= 0) {
                            clearInterval(timerPerdida);
                            responder('cinza');
                        }
                    }, 1000);
                }
            } else {
                document.getElementById('painel-chamada').style.display = 'none';
                gerenciarAlerta('stop');
                clearInterval(timerPerdida);
            }
        });
    }

    // AUDIO LOGIC
    async function startRec() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            chunks = [];
            document.getElementById('btn-mic').classList.add('recording');
            db.ref('chamadas_ativas/' + my_un).update({ status: 'gravando' });
            
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    const base64 = reader.result;
                    db.ref('chamadas_ativas/' + my_un).update({ 
                        status: 'mensagem', 
                        msg_morador: "Recado de voz enviado", 
                        audio_b64: base64 
                    });
                    responder('mensagem');
                };
            };
            mediaRecorder.start();
        } catch(e) { alert("Microfone não autorizado."); }
    }

    function stopRec() {
        if(mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
            document.getElementById('btn-mic').classList.remove('recording');
        }
    }

    function abrirMsg() {
        db.ref('chamadas_ativas/' + my_un).update({ status: 'escrevendo' });
        const m = prompt("Mensagem para o visitante:");
        if(m) {
            db.ref('chamadas_ativas/' + my_un).update({ status: 'mensagem', msg_morador: m });
            responder('mensagem');
        } else {
            db.ref('chamadas_ativas/' + my_un).update({ status: 'chamando' });
        }
    }

    async function responder(st) {
        const ref = db.ref('chamadas_ativas/' + my_un);
        const snap = await ref.once('value');
        const d = snap.val();
        if(d) {
            if(st !== 'cinza') ref.update({ status: st });
            gravarHist(d.v_id, d.foto, st);
            setTimeout(() => ref.remove(), 1500);
        }
    }

    /* RESTANTE DAS FUNÇÕES ORIGINAIS v1.3 PRESERVADAS */
    function gravarHist(vid, foto, st) {
        const ref = db.ref(`historico/${my_un}/${vid}`);
        ref.once('value', s => {
            let d = s.val() || { foto: foto, v_id: vid, verde:0, vermelho:0, azul:0, cinza:0 };
            if(st==='liberado') d.verde++;
            if(st==='recusado') d.vermelho++;
            if(st==='mensagem') d.azul++;
            if(st==='cinza') d.cinza++;
            d.ultima = st; d.ts = Date.now();
            ref.set(d);
        });
    }

    function renderizarHist() {
        db.ref(`historico/${my_un}`).on('value', snap => {
            db.ref(`bloqueios/${my_un}`).on('value', snapB => {
                const list = document.getElementById('lista-hist'); list.innerHTML = "";
                const blocks = snapB.val() || {};
                snap.forEach(item => {
                    const d = item.val();
                    const isBlocked = blocks[d.v_id] === true;
                    list.innerHTML += `
                        <div class="hist-card">
                            <div class="foto-box">
                                <div class="dots-row">
                                    <div class="dot" style="background:var(--neon); color:#000">${d.verde}</div>
                                    <div class="dot" style="background:var(--red)">${d.vermelho}</div>
                                    <div class="dot" style="background:var(--blue)">${d.azul}</div>
                                    <div class="dot" style="background:var(--gray)">${d.cinza}</div>
                                </div>
                                <img src="${d.foto}" class="foto-hist">
                            </div>
                            <div style="flex:1">
                                <b style="font-size:0.75rem">ID: ${d.v_id}</b><br>
                                <small style="color:var(--neon)">STATUS: ${d.ultima.toUpperCase()}</small>
                            </div>
                            <button onclick="toggleBlock('${d.v_id}', ${isBlocked})" style="background:none; border:1px solid ${isBlocked? 'var(--neon)':'var(--red)'}; color:${isBlocked?'var(--neon)':'var(--red)'}; font-size:0.6rem; padding:6px; border-radius:5px;">
                                ${isBlocked ? 'DESBLOQUEAR' : 'BLOQUEAR'}
                            </button>
                        </div>`;
                });
            });
        });
    }

    function toggleBlock(vid, current) {
        const ref = db.ref(`bloqueios/${my_un}/${vid}`);
        current ? ref.remove() : ref.set(true);
    }

    function mudarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 's-cadastro') navigator.mediaDevices.getUserMedia({video:true}).then(s => document.getElementById('v-cad').srcObject = s);
    }

    function fotoCad() {
        const v = document.getElementById('v-cad'), c = document.getElementById('c-cad');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        my_foto = c.toDataURL('image/jpeg', 0.5);
        alert("Selfie capturada!");
    }

    function enviarCadastro() {
        const un = document.getElementById('c-un').value;
        if(!my_foto || !un) return alert("Foto e Unidade obrigatórios!");
        my_un = un; localStorage.setItem('my_un', un);
        db.ref('solicitacoes_cadastro/' + un).set({
            nome: document.getElementById('c-nome').value,
            cpf: document.getElementById('c-cpf').value,
            telefone: document.getElementById('c-tel').value,
            unidade: un, foto: my_foto, ts: Date.now()
        }).then(() => verificarStatus());
    }

    function proximoSom() {
        somAtual = (somAtual + 1) % sons.length;
        localStorage.setItem('virty_som', somAtual);
        const t = document.getElementById('toque');
        t.src = sons[somAtual];
        t.play(); setTimeout(() => t.pause(), 2000);
    }

    function alternarAlerta() {
        modoAlerta = modoAlerta >= 3 ? 1 : modoAlerta + 1;
        localStorage.setItem('virty_alerta', modoAlerta);
        atualizarInterfaceAlerta();
    }

    function atualizarInterfaceAlerta() {
        const btn = document.getElementById('btn-alerta');
        if(modoAlerta === 1) btn.innerText = "🔊";
        if(modoAlerta === 2) btn.innerText = "📳🔊";
        if(modoAlerta === 3) btn.innerText = "📳";
    }

    function gerenciarAlerta(acao) {
        const t = document.getElementById('toque');
        t.src = sons[somAtual];
        if(acao === 'start') {
            if(modoAlerta === 1 || modoAlerta === 2) t.play().catch(()=>{});
            if(modoAlerta === 2 || modoAlerta === 3) navigator.vibrate([500, 500, 500]);
        } else {
            t.pause();
            navigator.vibrate(0);
        }
    }

    function limparHist() { if(confirm("Limpar todo histórico?")) db.ref(`historico/${my_un}`).remove(); }
</script>
</body>
</html>
