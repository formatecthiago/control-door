
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Virty Access">
    <title>Virty Access Door</title>
    <style>
        :root { 
            --led-green: #39FF14; --pure-white: #FFFFFF; --true-black: #000000;
            --grafite-metal: #2c2f33; --danger-red: #ff4d4d; --info-blue: #2980b9;
            --standard-gap: 25px; 
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: var(--true-black); font-family: sans-serif; color: var(--pure-white);
            overflow-x: hidden;
        }

        .moldura-global {
            width: 100%; min-height: 100vh; border: 10px solid var(--grafite-metal);
            box-sizing: border-box; display: flex; flex-direction: column;
            padding: var(--standard-gap); position: relative;
        }

        /* --- ESTADOS DE TELA --- */
        .tela { display: none; flex-direction: column; align-items: center; width: 100%; }
        .ativa { display: flex; }

        /* --- TELA 1: PRÉ-CADASTRO --- */
        .titulo-cad { color: var(--led-green); text-transform: uppercase; margin-bottom: 5px; font-size: 1.2rem; }
        .sub-cad { color: #888; font-size: 0.8rem; margin-bottom: 20px; text-align: center; }

        /* Estilo dos Campos (Respiro) */
        .campo-grupo { width: 100%; margin-bottom: 15px; }
        .campo-grupo label { display: block; font-size: 0.7rem; color: var(--led-green); margin-bottom: 5px; text-transform: uppercase; }
        .campo-grupo input { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; 
            background: #1a1a1a; color: white; box-sizing: border-box; font-size: 1rem;
        }

        /* Área da Selfie */
        #area-camera {
            width: 180px; height: 180px; border-radius: 50%; border: 3px solid var(--led-green);
            margin: 10px 0; overflow: hidden; background: #111; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        #video-preview { width: 100%; height: 100%; object-fit: cover; }
        #foto-capturada { display: none; width: 100%; height: 100%; object-fit: cover; }

        .btn-acao {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            font-weight: bold; font-size: 1.1rem; text-transform: uppercase; cursor: pointer; margin-top: 10px;
        }

        /* --- TELA 2: AGUARDANDO --- */
        .msg-espera { text-align: center; padding: 40px 20px; }
        .loader { border: 4px solid #333; border-top: 4px solid var(--led-green); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- TELA 3: HOME (DASHBOARD) --- */
        .topo-home { text-align: center; width: 100%; margin-bottom: 20px; }
        .topo-home h1 { color: var(--led-green); font-size: 1.4rem; margin: 0; }
        .lista-hist { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .card-chamada { background: #1a1a1a; padding: 12px; border-radius: 12px; display: flex; align-items: center; border: 1px solid #333; }
        .mini-foto { width: 45px; height: 55px; border-radius: 10px; border: 1px solid var(--led-green); overflow: hidden; margin-right: 15px; }
        .mini-foto img { width: 100%; height: 100%; object-fit: cover; }

    </style>
</head>
<body>

    <div class="moldura-global">
        
        <div id="tela-cadastro" class="tela ativa">
            <div class="titulo-cad">Virty Access Door</div>
            <div class="sub-cad">Complete seu cadastro de morador</div>

            <div id="area-camera">
                <video id="video-preview" autoplay playsinline></video>
                <canvas id="canvas-foto" style="display:none;"></canvas>
                <img id="foto-capturada">
            </div>
            <button class="btn-acao" style="background: var(--info-blue); font-size: 0.8rem; padding: 10px;" onclick="tirarFoto()">Capturar Selfie</button>

            <div class="campo-grupo" style="margin-top: 20px;">
                <label>Nome Completo</label>
                <input type="text" id="cad-nome" placeholder="Ex: Thiago Rodrigo...">
            </div>
            <div class="campo-grupo">
                <label>CPF</label>
                <input type="tel" id="cad-cpf" placeholder="000.000.000-00">
            </div>
            <div class="campo-grupo">
                <label>WhatsApp / Contato</label>
                <input type="tel" id="cad-tel" placeholder="(84) 9 9999-9999">
            </div>

            <button class="btn-acao" style="background: var(--led-green); color: black;" onclick="enviarCadastro()">Finalizar e Solicitar Acesso</button>
        </div>

        <div id="tela-aguarde" class="tela">
            <div class="msg-espera">
                <h2 style="color: var(--led-green);">Cadastro Enviado!</h2>
                <p>O administrador do <b>Virty Access</b> recebeu sua selfie e dados.</p>
                <div class="loader"></div>
                <p style="font-size: 0.8rem; color: #888;">Seu dispositivo será liberado em instantes.</p>
                <p id="display-id" style="font-family: monospace; color: var(--info-blue);"></p>
            </div>
        </div>

        <div id="tela-home" class="tela">
            <div class="topo-home">
                <h1>Virty Access Door</h1>
                <div style="color: #666; font-size: 0.8rem;">CASA 03 | DISPOSITIVO ATIVO</div>
            </div>
            <div class="lista-hist">
                <p style="font-size: 0.7rem; color: var(--led-green);">HISTÓRICO RECENTE</p>
                <div class="card-chamada">
                    <div class="mini-foto"><img src="https://via.placeholder.com/45x55"></div>
                    <div style="flex-grow:1;"><small>Hoje - 14:20</small><br><b>Acesso Autorizado</b></div>
                    <div style="color: var(--led-green);">✓</div>
                </div>
            </div>
            <div style="margin-top: auto; text-align: center;">
                <span style="font-size: 2rem; color: var(--led-green);">🏠</span>
            </div>
        </div>

    </div>

    <script>
        const video = document.getElementById('video-preview');
        const canvas = document.getElementById('canvas-foto');
        const fotoCapturada = document.getElementById('foto-capturada');
        let fotoBase64 = null;

        // Inicia Câmera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => alert("Erro ao acessar câmera: " + err));

        function tirarFoto() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            fotoBase64 = canvas.toDataURL('image/jpeg');
            fotoCapturada.src = fotoBase64;
            fotoCapturada.style.display = 'block';
            video.style.display = 'none';
        }

        function enviarCadastro() {
            const nome = document.getElementById('cad-nome').value;
            const cpf = document.getElementById('cad-cpf').value;
            if(!nome || !cpf || !fotoBase64) return alert("Por favor, preencha tudo e tire a selfie.");

            // Gerar o ID do dispositivo (Fingerprint Simples)
            const deviceID = "V-" + Math.floor(1000 + Math.random() * 9000) + "-RN";
            localStorage.setItem('virty_device_id', deviceID);
            document.getElementById('display-id').innerText = "ID do Aparelho: " + deviceID;

            // Mudar para tela de espera
            document.getElementById('tela-cadastro').classList.remove('ativa');
            document.getElementById('tela-aguarde').classList.add('ativa');

            // Aqui enviaremos para o Firebase: {nome, cpf, fotoBase64, deviceID, geo}
            console.log("Enviando cadastro de: " + nome + " ID: " + deviceID);
        }

        // Lógica de Inicialização
        window.onload = () => {
            const salvo = localStorage.getItem('virty_device_id');
            const autorizado = false; // Isso virá do Firebase depois

            if(salvo && !autorizado) {
                document.getElementById('tela-cadastro').classList.remove('ativa');
                document.getElementById('tela-aguarde').classList.add('ativa');
                document.getElementById('display-id').innerText = "ID do Aparelho: " + salvo;
            } else if (salvo && autorizado) {
                document.getElementById('tela-cadastro').classList.remove('ativa');
                document.getElementById('tela-home').classList.add('ativa');
            }
        }
    </script>
</body>
</html>
