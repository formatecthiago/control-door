<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virty Access - Morador</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .screen { display: none; width: 100%; max-width: 450px; flex-direction: column; padding: 30px; }
        .active { display: flex; }
        h2 { color: var(--neon); text-align: center; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: white; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--neon); }
        .btn { width: 100%; padding: 20px; border-radius: 35px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 10px 0; transition: 0.3s; }
        .btn-green { background: var(--neon); color: black; box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); }
        .btn-gray { background: #222; color: #888; }
        .photo-box { width: 150px; height: 150px; border-radius: 50%; border: 3px solid white; margin: 20px auto; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #111; cursor: pointer; position: relative; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        .photo-box span { font-size: 0.8rem; color: #666; text-align: center; }
    </style>
</head>
<body>

    <div id="screen-cadastro" class="screen">
        <h2>VIRTY ACCESS</h2>
        <div class="photo-box" onclick="document.getElementById('f-input').click()">
            <img id="preview" style="display:none">
            <span id="l-photo">📷 TOQUE PARA SELFIE</span>
            <input type="file" id="f-input" accept="image/*" capture="user" style="display:none" onchange="loadImg(this)">
        </div>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="number" id="unidade" placeholder="Número da Unidade">
        <button class="btn btn-green" onclick="enviar()">SOLICITAR ACESSO</button>
    </div>

    <div id="screen-wait" class="screen">
        <h2 style="color: #FFA500;">EM ANÁLISE</h2>
        <div style="margin: 40px auto; font-size: 4rem;">⏳</div>
        <p style="text-align:center; line-height: 1.6;">Dados enviados para a unidade <b id="un-wait"></b>.<br>Aguarde a liberação do administrador.</p>
        <button class="btn btn-gray" onclick="limpar()">CANCELAR E VOLTAR</button>
    </div>

    <div id="screen-home" class="screen">
        <h2>SISTEMA ATIVO</h2>
        <p style="text-align:center; color: #888;">Bem-vindo, Unidade <b id="un-home" style="color:var(--neon)"></b></p>
        <div style="height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; border: 1px dashed #333; border-radius: 20px; margin: 30px 0;">
            <div style="font-size: 2rem; margin-bottom: 10px;">🔔</div>
            Aguardando Visitantes...
        </div>
        <button class="btn btn-gray" onclick="limpar()" style="font-size: 0.7rem;">DESCONECTAR UNIDADE</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = { 
        apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", 
        databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", 
        projectId: "virty-access-door"
    };
    const app = initializeApp(config);
    const db = getDatabase(app);
    
    let uLocal = localStorage.getItem('virty_un');
    let b64 = "";

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    window.loadImg = (i) => {
        const r = new FileReader();
        r.onload = (e) => {
            b64 = e.target.result;
            document.getElementById('preview').src = b64;
            document.getElementById('preview').style.display = "block";
            document.getElementById('l-photo').style.display = "none";
        };
        r.readAsDataURL(i.files[0]);
    };

    window.limpar = () => { localStorage.clear(); location.reload(); };

    // --- ESCUTA INTELIGENTE ---
    if (!uLocal) {
        show('screen-cadastro');
    } else {
        // Primeiro checa se já está na lista de autorizados
        onValue(ref(db, `moradores/${uLocal}`), (s) => {
            if (s.exists()) {
                document.getElementById('un-home').innerText = uLocal;
                show('screen-home');
            } else {
                // Se não está, checa se está pendente
                onValue(ref(db, `moradores_pendentes/${uLocal}`), (sp) => {
                    if (sp.exists()) {
                        document.getElementById('un-wait').innerText = uLocal;
                        show('screen-wait');
                    } else {
                        // Se não existe em nenhum lugar, o registro foi limpo no Admin
                        limpar();
                    }
                }, { onlyOnce: true });
            }
        });
    }

    window.enviar = () => {
        const u = document.getElementById('unidade').value;
        const n = document.getElementById('nome').value;
        if(!u || !n || !b64) return alert("Preencha todos os dados e tire a foto!");
        
        set(ref(db, `moradores_pendentes/${u}`), { 
            nome: n, unidade: u, foto: b64, autorizado: false 
        }).then(() => { 
            localStorage.setItem('virty_un', u);
            location.reload(); 
        });
    };
</script>
</body>
</html>
