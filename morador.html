<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morador - Control Door</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #2c3e50; color: white; }
        .box { background: #34495e; padding: 20px; border-radius: 15px; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn { padding: 15px; width: 100%; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; background: #3498db; color: white; }
        #fotoVis { width: 100%; max-width: 280px; border-radius: 10px; display: none; margin: 15px auto; border: 4px solid #2ecc71; }
        select { padding: 12px; width: 80%; border-radius: 5px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="blocoRegistro" class="box">
        <h3>Ativar Este Celular</h3>
        <p>Selecione sua casa:</p>
        <select id="selCasa">
            <script>for(let i=1;i<=25;i++) document.write(`<option value="${i}">CASA ${i}</option>`);</script>
        </select>
        <button id="btnAtivar" class="btn">ATIVAR AGORA</button>
    </div>

    <div id="painel" class="box" style="display:none">
        <h2 id="casaTxt">Painel</h2>
        <div id="alerta" style="background:#e67e22; padding:15px; border-radius:10px; display:none; margin-bottom:10px;">🔔 VISITANTE CHAMANDO!</div>
        <img id="fotoVis">
        <button class="btn" style="background:#f1c40f; color:black" onclick="atender('estou_indo')">🏃 ESTOU INDO</button>
        <button class="btn" style="background:#2ecc71; color:white; font-size:20px" onclick="atender('aberto')">🔓 ABRIR PORTÃO</button>
    </div>

    <!-- CARREGAMENTO DO FIREBASE -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        // CONFIGURAÇÃO DIRETA (Evita erro de arquivo externo)
        const firebaseConfig = {
            apiKey: "AIzaSyDnHzXTN8YgHsJYivJv9yTkc_pnU5E2fME",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "control-door-f501d",
            storageBucket: "control-door-f501d.firebasestorage.app",
            messagingSenderId: "590100166898",
            appId: "1:590100166898:web:b234ee092ec3be2fb2786b"
        };

        // Inicializa
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Lógica de Registro
        document.getElementById('btnAtivar').onclick = function() {
            const casa = document.getElementById('selCasa').value;
            let id = localStorage.getItem('control_door_token') || 'tk-' + Math.random().toString(36).substr(2, 5);
            localStorage.setItem('control_door_token', id);

            console.log("Tentando registrar...");
            
            database.ref('moradores/casa_' + casa + '/' + id).set({
                registradoEm: firebase.database.ServerValue.TIMESTAMP,
                ativo: true
            }).then(() => {
                localStorage.setItem('minha_casa', casa);
                alert("SUCESSO! Celular vinculado à Casa " + casa);
                location.reload();
            }).catch(err => alert("Erro: " + err.message));
        };

        // Lógica do Painel
        const minhaCasa = localStorage.getItem('minha_casa');
        if(minhaCasa) {
            document.getElementById('blocoRegistro').style.display = 'none';
            document.getElementById('painel').style.display = 'block';
            document.getElementById('casaTxt').innerText = "Painel Casa " + minhaCasa;

            database.ref('chamadas/casa_' + minhaCasa).on('value', snap => {
                const d = snap.val();
                if(d && (d.status === "chamando" || d.status === "estou_indo")) {
                    document.getElementById('alerta').style.display = 'block';
                    if(d.foto) {
                        document.getElementById('fotoVis').src = d.foto;
                        document.getElementById('fotoVis').style.display = 'block';
                    }
                } else {
                    document.getElementById('alerta').style.display = 'none';
                    document.getElementById('fotoVis').style.display = 'none';
                }
            });
        }

        function atender(status) {
            database.ref('chamadas/casa_' + minhaCasa).update({ status: status });
        }
    </script>
</body>
</html>
