<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel do Morador v1.0</title>
    <style>
        :root { 
            --led-green: #39FF14; 
            --pure-white: #FFFFFF; 
            --true-black: #000000;
            --grafite-metal: #2c2f33; 
            --danger-red: #c0392b;
            --info-blue: #2980b9;
        }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--true-black); font-family: sans-serif; color: white; overflow: hidden; }

        .painel-morador {
            width: 100vw; height: 100vh;
            border: 10px solid var(--grafite-metal);
            box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }

        /* MINIATURA DA SELFIE */
        .foto-visitante {
            width: 150px; height: 180px;
            border-radius: 50% 50% 45% 45%;
            border: 3px solid var(--led-green);
            background: #111; margin-bottom: 15px;
            overflow: hidden; box-shadow: 0 0 15px var(--led-green);
        }
        .foto-visitante img { width: 100%; height: 100%; object-fit: cover; }

        .info-chamada { text-align: center; margin-bottom: 20px; }
        .info-chamada h2 { font-size: 1.2rem; margin: 0; color: var(--led-green); text-transform: uppercase; }
        
        /* BLOCO DE MENSAGEM DO VISITANTE */
        .msg-recebida {
            background: #1a1a1a; padding: 12px; border-radius: 8px;
            width: 85%; border-left: 4px solid var(--led-green);
            margin-bottom: 20px; font-size: 0.9rem; font-style: italic;
        }

        .area-comandos { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; }

        .btn-comando {
            width: 85%; padding: 18px; border-radius: 12px; border: none;
            color: white; font-weight: bold; font-size: 1.2rem;
            text-transform: uppercase; cursor: pointer;
        }

        /* CAIXA DE TEXTO (OCULTA POR PADRÃO) */
        #caixa-mensagem {
            display: none; width: 85%; background: var(--grafite-metal);
            padding: 15px; border-radius: 12px; margin-bottom: 10px;
            border: 2px solid var(--info-blue);
        }
        #texto-retorno {
            width: 100%; height: 60px; border-radius: 6px; padding: 10px;
            box-sizing: border-box; font-size: 1rem; resize: none;
        }

        /* POP-UP / BALÃO DE INFORMAÇÃO */
        #popup-confirmacao {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; background: var(--grafite-metal);
            border: 3px solid var(--led-green); border-radius: 15px;
            padding: 20px; z-index: 100; text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .fechar-popup {
            position: absolute; top: 10px; right: 15px;
            font-size: 1.5rem; color: white; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="painel-morador">
        <div class="info-chamada">
            <h2>Chamada: Unidade 101</h2>
        </div>

        <div class="foto-visitante">
            <img src="https://via.placeholder.com/150x180?text=Selfie" alt="Visitante">
        </div>

        <div class="msg-recebida">
            <strong>Visitante diz:</strong><br>
            <span id="txt-visitante">"Deixando uma encomenda rápida."</span>
        </div>

        <div class="area-comandos">
            <button class="btn-comando" style="background: var(--danger-red);" onclick="recusar()">RECUSAR</button>
            
            <button class="btn-comando" style="background: var(--info-blue);" onclick="abrirTeclado()">ACEITAR / MENSAGEM</button>
            
            <div id="caixa-mensagem">
                <textarea id="texto-retorno" maxlength="60" placeholder="Digite até 60 caracteres..."></textarea>
                <button class="btn-comando" style="background: var(--info-blue); margin-top: 10px;" onclick="enviarMensagem()">ENVIAR AGORA</button>
            </div>

            <button class="btn-comando" style="background: var(--led-green); color: black;" onclick="abrirPortao()">ABRIR PORTÃO</button>
        </div>
    </div>

    <div id="popup-confirmacao">
        <span class="fechar-popup" onclick="fecharPopup()">X</span>
        <p style="font-weight: bold; margin-bottom: 20px;">Mensagem enviada com sucesso!</p>
        <p>Deseja aproveitar e liberar a entrada agora?</p>
        <button class="btn-comando" style="background: var(--led-green); color: black; margin-top: 10px;" onclick="abrirPortao()">SIM, ABRIR PORTÃO</button>
    </div>

    <script>
        function abrirTeclado() {
            document.getElementById('caixa-mensagem').style.display = 'block';
            document.getElementById('texto-retorno').focus();
        }

        function enviarMensagem() {
            const msg = document.getElementById('texto-retorno').value;
            if(!msg) return alert("Digite uma mensagem.");
            
            // Aqui futuramente enviaremos ao Firebase
            console.log("Mensagem enviada: " + msg);
            
            document.getElementById('caixa-mensagem').style.display = 'none';
            document.getElementById('popup-confirmacao').style.display = 'block';
        }

        function fecharPopup() {
            document.getElementById('popup-confirmacao').style.display = 'none';
        }

        function abrirPortao() {
            alert("Comando enviado ao portão!");
            fecharPopup();
            // Aqui futuramente enviaremos o comando pro ESP32
        }

        function recusar() {
            if(confirm("Deseja recusar esta visita?")) {
                location.reload();
            }
        }
    </script>
</body>
</html>
