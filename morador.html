<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Morador</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f4f7f9; padding: 20px; color: #333; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        h2 { font-size: 20px; margin-bottom: 15px; color: #2c5364; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 20px; font-size: 16px; }
        .btn-reg { background: #3498db; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; }
        .btn-abrir { background: #2ecc71; color: white; border: none; padding: 25px; font-size: 22px; width: 100%; border-radius: 15px; font-weight: bold; display: none; box-shadow: 0 8px 20px rgba(46,204,113,0.3); }
        .alerta { background: #f1c40f; color: #000; padding: 20px; border-radius: 12px; margin-bottom: 15px; font-weight: bold; display: none; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="regSec" class="box">
        <h2>Ativação de Morador</h2>
        <select id="casaNum"><script>for(let i=1;i<=25;i++) document.write(`<option value="${i}">Casa ${i}</option>`);</script></select>
        <button class="btn-reg" onclick="registrarNoSistema(document.getElementById('casaNum').value)">ATIVAR ESTE CELULAR</button>
    </div>

    <div class="box">
        <h2 id="tituloPainel">Painel de Controle</h2>
        <div id="alerta" class="alerta">🔔 VISITANTE NO PORTÃO!</div>
        <button id="btnAbrir" class="btn-abrir" onclick="abrir()">🔓 ABRIR PORTÃO</button>
    </div>

    <script>
        const casaAtiva = localStorage.getItem('minha_casa');
        if(casaAtiva) {
            document.getElementById('regSec').style.display = 'none';
            document.getElementById('tituloPainel').innerText = "Controle - Casa " + casaAtiva;
            document.getElementById('btnAbrir').style.display = 'block';
            
            db.ref('chamadas/casa_' + casaAtiva).on('value', (s) => {
                if(s.val()?.status === "chamando") document.getElementById('alerta').style.display = 'block';
            });
        }

        function abrir() {
            const id = obterIdentidadeAparelho();
            db.ref('comando_portao').set({ acao: "abrir", timestamp: firebase.database.ServerValue.TIMESTAMP });
            db.ref('logs_abertura').push({ casa: casaAtiva, dispositivo: id, data: firebase.database.ServerValue.TIMESTAMP });
            db.ref('chamadas/casa_' + casaAtiva).remove();
            alert("Portão acionado com sucesso!");
            document.getElementById('alerta').style.display = 'none';
        }
    </script>
</body>
</html>
