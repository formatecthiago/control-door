<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Morador - Control Door</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #2c3e50; color: white; }
        .box { background: #34495e; padding: 20px; border-radius: 15px; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn { padding: 15px; width: 100%; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; display: block; width: 100%; }
        #fotoVis { width: 100%; max-width: 280px; border-radius: 10px; display: none; margin: 15px auto; border: 4px solid #2ecc71; }
        select { padding: 12px; width: 90%; border-radius: 5px; font-size: 16px; margin-bottom: 10px; }
        h2, h3 { margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- BLOCO DE REGISTRO (Aparece se não houver casa salva) -->
    <div id="blocoRegistro" class="box">
        <h3>Ativar Este Celular</h3>
        <p>Selecione sua casa para começar:</p>
        <select id="selCasa">
            <script>for(let i=1;i<=25;i++) document.write(`<option value="${i}">CASA ${i}</option>`);</script>
        </select>
        <button class="btn" style="background:#3498db; color:white" onclick="registrar()">ATIVAR AGORA</button>
    </div>

    <!-- PAINEL DE CONTROLE (Aparece após o registro) -->
    <div id="painel" class="box" style="display:none">
        <h2 id="casaTxt">Painel</h2>
        <div id="alerta" style="background:#e67e22; padding:15px; border-radius:10px; display:none; margin-bottom:10px;">🔔 VISITANTE CHAMANDO!</div>
        <img id="fotoVis">
        <button class="btn" style="background:#f1c40f; color:black" onclick="atender('estou_indo')">🏃 ESTOU INDO</button>
        <button class="btn" style="background:#2ecc71; color:white; font-size:20px" onclick="atender('aberto')">🔓 ABRIR PORTÃO</button>
        <button class="btn" style="background:#95a5a6; color:white; margin-top:20px; font-size:12px" onclick="localStorage.clear(); location.reload();">Sair / Trocar Casa</button>
    </div>

    <!-- SCRIPTS DO FIREBASE (Versão Compat) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        // 1. Configuração Direta
        const firebaseConfig = {
            apiKey: "AIzaSyDnHzXTN8YgHsJYivJv9yTkc_pnU5E2fME",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://control-door-f501d-default-rtdb.firebaseio.com",
            projectId: "control-door-f501d",
            storageBucket: "control-door-f501d.firebasestorage.app",
            messagingSenderId: "590100166898",
            appId: "1:590100166898:web:b234ee092ec3be2fb2786b"
        };

        // 2. Inicialização
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        // 3. Função de Registro
        function registrar() {
            const casa = document.getElementById('selCasa').value;
            // Gera um ID simples para o celular
            const idCelular = 'id-' + Math.floor(Math.random() * 10000);
            
            console.log("Tentando registrar casa " + casa);

            database.ref('moradores/casa_' + casa + '/' + idCelular).set({
                ativo: true,
                timestamp: Date.now()
            })
            .then(function() {
                localStorage.setItem('minha_casa', casa);
                alert("SUCESSO! Conectado à Casa " + casa);
                location.reload();
            })
            .catch(function(error) {
                alert("Erro ao conectar: " + error.message);
                console.error(error);
            });
        }

        // 4. Verificação de Login e Escuta de Chamadas
        const minhaCasa = localStorage.getItem('minha_casa');
        if (minhaCasa) {
            document.getElementById('blocoRegistro').style.display = 'none';
            document.getElementById('painel').style.display = 'block';
            document.getElementById('casaTxt').innerText = "Painel da Casa " + minhaCasa;

            // Fica "ouvindo" se alguém chama esta casa
            database.ref('chamadas/casa_' + minhaCasa).on('value', function(snap) {
                const d = snap.val();
                const alertaDiv = document.getElementById('alerta');
                const fotoImg = document.getElementById('fotoVis');

                if (d && (d.status === "chamando" || d.status === "estou_indo")) {
                    alertaDiv.style.display = 'block';
                    if (d.foto) {
                        fotoImg.src = d.foto;
                        fotoImg.style.display = 'block';
                    }
                } else {
                    alertaDiv.style.display = 'none';
                    fotoImg.style.display = 'none';
                }
            });
        }

        // 5. Função para o Morador responder
        function atender(novoStatus) {
            if (!minhaCasa) return;
            database.ref('chamadas/casa_' + minhaCasa).update({
                status: novoStatus
            }).then(function() {
                if(novoStatus === 'aberto') alert("Comando enviado: Abrir Portão");
            });
        }
    </script>
</body>
</html>
