<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ping Ultra Rápido</title>
    <!-- Script direto e leve -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>
    <h2 style="text-align:center">TESTE DE RESPOSTA</h2>
    <button id="btnPing" style="width:100%; height:200px; font-size:30px; background:green; color:white; border-radius:20px">
        CLIQUE PARA PING
    </button>
    <div id="status" style="font-size:25px; margin-top:20px; text-align:center">Aguardando...</div>

    <script>
        // Configuração direta
        var config = {
            apiKey: "AIzaSyDnHzXTN8YgHsJYivJv9yTkc_pnU5E2fME",
            databaseURL: "https://firebaseio.com",
            projectId: "control-door-f501d"
        };
        
        // Inicializa
        firebase.initializeApp(config);
        var db = firebase.database();

        document.getElementById('btnPing').onclick = function() {
            var msg = document.getElementById('status');
            msg.innerText = "TENTANDO ENVIAR...";
            msg.style.color = "orange";

            // Envia um dado muito pequeno
            db.ref('PING_FINAL').set({
                ok: true,
                hora: new Date().getTime()
            })
            .then(function() {
                alert("CONECTOU! O Banco recebeu!");
                msg.innerText = "FOI! SUCESSO!";
                msg.style.color = "green";
            })
            .catch(function(error) {
                alert("ERRO: " + error.message);
                msg.innerText = "ERRO: " + error.message;
                msg.style.color = "red";
            });
        };
    </script>
</body>
</html>
