<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body style="text-align:center; padding:50px;">
    <h2>DIAGNÓSTICO DE URL</h2>
    <button id="btn1" style="padding:20px; width:100%; background:blue; color:white; margin-bottom:10px;">TESTAR URL 1</button>
    <button id="btn2" style="padding:20px; width:100%; background:green; color:white;">TESTAR URL 2</button>
    <p id="msg" style="margin-top:20px; font-weight:bold;">Aguardando teste...</p>

    <script>
        const baseConfig = {
            apiKey: "AIzaSyDnHzXTN8YgHsJYivJv9yTkc_pnU5E2fME",
            projectId: "control-door-f501d"
        };

        function testar(url, num) {
            document.getElementById('msg').innerText = "Testando URL " + num + "...";
            // Reinicializa o app para trocar a URL
            if (firebase.apps.length) { firebase.app().delete(); }
            firebase.initializeApp({...baseConfig, databaseURL: url});
            
            const db = firebase.database();
            const timeout = setTimeout(() => {
                alert("URL " + num + " FALHOU (Timeout)");
                document.getElementById('msg').innerText = "URL " + num + " falhou.";
            }, 5000);

            db.ref('TESTE_FINAL').set({ ok: true, data: new Date().toLocaleTimeString() })
            .then(() => {
                clearTimeout(timeout);
                alert("✅ SUCESSO NA URL " + num + "! USE ESTA!");
                document.getElementById('msg').innerText = "URL " + num + " É A CORRETA!";
                console.log("A URL correta é: " + url);
            })
            .catch(e => alert("ERRO: " + e.message));
        }

        document.getElementById('btn1').onclick = () => testar("https://firebaseio.com", 1);
        document.getElementById('btn2').onclick = () => testar("https://firebaseio.com", 2);
    </script>
</body>
</html>
