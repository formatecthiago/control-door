<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ping Direto</title>
    <!-- Links simplificados -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>
    <div style="text-align:center; padding:20px;">
        <h2>TESTE DE CONEXÃO DIRETA</h2>
        <button id="btn" style="width:100%; padding:50px; font-size:25px; background:blue; color:white;">ENVIAR SINAL AGORA</button>
        <p id="msg" style="font-size:20px; margin-top:20px;">Status: Aguardando...</p>
    </div>

    <script>
        // Suas chaves que já sabemos que estão certas
        var config = {
            apiKey: "AIzaSyDnHzXTN8YgHsJYivJv9yTkc_pnU5E2fME",
            databaseURL: "https://control-door-f501d-default-rtdb.firebaseio.com",
            projectId: "control-door-f501d"
        };

        // Tenta inicializar e captura erro se falhar
        try {
            firebase.initializeApp(config);
            var db = firebase.database();
            document.getElementById('msg').innerText = "Sistema pronto!";
        } catch (e) {
            document.getElementById('msg').innerText = "Erro ao iniciar: " + e.message;
        }

        document.getElementById('btn').onclick = function() {
            var display = document.getElementById('msg');
            display.innerText = "Tentando...";
            
            db.ref('TESTE_FINAL').set({
                timestamp: Date.now(),
                origem: "Celular"
            })
            .then(function() {
                alert("SUCESSO! O Firebase respondeu!");
                display.innerText = "ENVIADO COM SUCESSO!";
            })
            .catch(function(err) {
                alert("FALHA: " + err.message);
                display.innerText = "Erro: " + err.message;
            });
        };
    </script>
</body>
</html>
