<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ping Final Control Door</title>
    <!-- Versão estável 8.10.1 -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 20px;">

    <h2>TESTE DE PING DEFINITIVO</h2>
    
    <button id="btnPing" style="width: 100%; padding: 50px; font-size: 22px; background: #2980b9; color: white; border: none; border-radius: 15px; font-weight: bold;">
        ENVIAR SINAL AGORA
    </button>

    <div id="caixaStatus" style="margin-top: 30px; padding: 20px; border: 2px solid #ccc; border-radius: 10px;">
        <p id="txtStatus" style="font-size: 20px; color: #7f8c8d;">Status: Aguardando clique...</p>
    </div>

    <script>
        // Configuração exata extraída do seu console
        var firebaseConfig = {
            apiKey: "AIzaSyDnHzXTN8YgHsJYivJv9yTkc_pnU5E2fME",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "control-door-f501d",
            storageBucket: "://appspot.com",
            messagingSenderId: "590100166898",
            appId: "1:590100166898:web:b234ee092ec3be2fb2786b"
        };

        // Inicializa o Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            var db = firebase.database();
            document.getElementById('txtStatus').innerText = "Sistema pronto para enviar!";
        } catch (e) {
            document.getElementById('txtStatus').innerText = "Erro na inicialização: " + e.message;
        }

        // Função do Botão
        document.getElementById('btnPing').onclick = function() {
            var statusLabel = document.getElementById('txtStatus');
            statusLabel.innerText = "🚀 TENTANDO ENVIAR...";
            statusLabel.style.color = "#d35400";

            // Envia um registro de teste para o banco
            db.ref('TESTE_CELULAR').set({
                conexao: "OK",
                horario: new Date().toLocaleTimeString(),
                timestamp: firebase.database.ServerValue.TIMESTAMP
            })
            .then(function() {
                // Se chegar aqui, o banco recebeu!
                alert("✅ SUCESSO! O FIREBASE RECEBEU O SINAL!");
                statusLabel.innerText = "SINAL RECEBIDO COM SUCESSO!";
                statusLabel.style.color = "#27ae60";
            })
            .catch(function(error) {
                // Se der erro (permissão, rede, etc)
                alert("❌ FALHA NO ENVIO: " + error.message);
                statusLabel.innerText = "Erro: " + error.message;
                statusLabel.style.color = "#c0392b";
            });
        };
    </script>

</body>
</html>
