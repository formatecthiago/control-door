<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ping Final</title>
    <!-- Scripts universais estáveis -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body style="text-align:center; padding:50px; font-family:sans-serif;">
    <h2>TESTE DE CONEXÃO DIRETA</h2>
    <button id="btn" style="padding:40px; width:100%; background:#2980b9; color:white; font-size:22px; border:none; border-radius:15px;">
        ENVIAR SINAL AGORA
    </button>
    <p id="msg" style="font-size:20px; margin-top:20px; color:#7f8c8d;">Status: Aguardando...</p>

    <script>
        // Configuração baseada no seu print oficial
        var config = {
            apiKey: "AIzaSyDnHzXTN8YgHsJYivJv9yTkc_pnU5E2fME",
            authDomain: "://firebaseapp.com",
            // Forçamos a URL padrão do Firebase para projetos criados nos EUA
            databaseURL: "https://firebaseio.com",
            projectId: "control-door-f501d"
        };

        // Inicializa
        try {
            firebase.initializeApp(config);
            var db = firebase.database();
            document.getElementById('msg').innerText = "Firebase Pronto!";
        } catch (e) {
            document.getElementById('msg').innerText = "Erro ao iniciar: " + e.message;
        }

        document.getElementById('btn').onclick = function() {
            var label = document.getElementById('msg');
            label.innerText = "🚀 ENVIANDO...";
            label.style.color = "orange";

            // Tentativa de escrita com timeout de 8 segundos
            var timeout = setTimeout(function() {
                alert("TIMEOUT: O sinal não chegou ao banco. Verifique a URL no seu Console do Firebase.");
                label.innerText = "Falha por tempo esgotado.";
            }, 8000);

            db.ref('TESTE_FINAL').set({
                status: "Conectado com Sucesso!",
                data: new Date().toLocaleString()
            })
            .then(function() {
                clearTimeout(timeout);
                alert("✅ SUCESSO! O BANCO RECEBEU O SINAL!");
                label.innerText = "SINAL RECEBIDO!";
                label.style.color = "green";
            })
            .catch(function(err) {
                clearTimeout(timeout);
                alert("❌ ERRO: " + err.message);
                label.innerText = "Erro: " + err.message;
            });
        };
    </script>
</body>
</html>
