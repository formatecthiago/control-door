<!DOCTYPE html>
<html>
<head>
    <title>Teste de Ping Firebase</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>
    <h2>TESTE DE PING</h2>
    <button id="btn" style="padding: 50px; font-size: 20px;">DAR PING NO BANCO</button>
    <p id="log">Aguardando clique...</p>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDnHzXTN8YgHsJYivJv9yTkc_pnU5E2fME",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://control-door-f501d-default-rtdb.firebaseio.com",
            projectId: "control-door-f501d"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        document.getElementById('btn').onclick = function() {
            document.getElementById('log').innerText = "Enviando...";
            
            database.ref('PING_TESTE').set({
                mensagem: "Opa, o celular conectou!",
                hora: new Date().toLocaleTimeString()
            })
            .then(() => {
                alert("PING RECEBIDO PELO FIREBASE!");
                document.getElementById('log').innerText = "Sucesso!";
            })
            .catch((err) => {
                alert("ERRO NO PING: " + err.message);
                document.getElementById('log').innerText = "Erro: " + err.message;
            });
        };
    </script>
</body>
</html>
