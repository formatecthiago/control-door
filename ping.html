<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teste de Ping Final</title>
    <!-- Usando links alternativos mais estáveis para celular -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
</head>
<body>
    <h2>TESTE DE PING (RESPOSTA RÁPIDA)</h2>
    <button id="btn" style="padding: 60px; font-size: 22px; width: 100%; background: #27ae60; color: white; border: none; border-radius: 15px;">
        CLIQUE PARA ENVIAR SINAL
    </button>
    <p id="log" style="font-size: 20px; font-weight: bold; margin-top: 20px;">Aguardando clique...</p>

    <script>
        const config = {
            apiKey: "AIzaSyDnHzXTN8YgHsJYivJv9yTkc_pnU5E2fME",
            databaseURL: "https://firebaseio.com",
            projectId: "control-door-f501d"
        };

        // Inicializa
        firebase.initializeApp(config);
        const db = firebase.database();

        document.getElementById('btn').onclick = function() {
            document.getElementById('log').innerText = "Processando...";
            document.getElementById('log').style.color = "blue";
            
            console.log("Tentando enviar...");

            db.ref('TESTE_FINAL').set({
                conexao: "OK",
                aparelho: navigator.userAgent,
                hora: new Date().toLocaleTimeString()
            })
            .then(() => {
                alert("✅ SUCESSO! O FIREBASE RECEBEU!");
                document.getElementById('log').innerText = "SINAL RECEBIDO!";
                document.getElementById('log').style.color = "green";
            })
            .catch((err) => {
                alert("❌ ERRO: " + err.message);
                document.getElementById('log').innerText = "Erro: " + err.message;
                document.getElementById('log').style.color = "red";
            });
        };
    </script>
</body>
</html>
