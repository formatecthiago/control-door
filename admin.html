<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRTY ADMIN - MASTER</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; }
        body { background: #000; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        
        /* Estilo dos Balõezinhos de Contagem */
        .contador-container { display: flex; justify-content: space-around; margin-bottom: 20px; gap: 10px; }
        .balao { flex: 1; padding: 10px; border-radius: 15px; text-align: center; font-weight: bold; font-size: 0.8rem; display: flex; flex-direction: column; align-items: center; }
        .balao-red { background: rgba(255, 49, 49, 0.2); border: 2px solid var(--red); color: var(--red); }
        .balao-green { background: rgba(57, 255, 20, 0.2); border: 2px solid var(--neon); color: var(--neon); }
        .balao-blue { background: rgba(0, 123, 255, 0.2); border: 2px solid var(--blue); color: var(--blue); }
        .num { font-size: 1.5rem; display: block; }

        .card { background: #0a0a0a; border: 1px solid #222; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .thumb { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-right: 12px; border: 1px solid #333; }
        .btn-ok { background: var(--neon); color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-del { background: var(--red); color: #fff; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        h3 { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-top: 20px; }
    </style>
</head>
<body>

    <h2 style="color:var(--neon); text-align:center; margin-bottom:20px;">VIRTY CONTROL</h2>

    <div class="contador-container">
        <div class="balao balao-red">
            <span class="num" id="count-pendentes">0</span>
            PENDENTES
        </div>
        <div class="balao balao-green">
            <span class="num" id="count-ativos">0</span>
            ATIVOS
        </div>
        <div class="balao balao-blue">
            <span class="num" id="count-total">0</span>
            TOTAL
        </div>
    </div>

    <h3>Solicitações de Acesso</h3>
    <div id="lista-pendentes"></div>

    <h3>Moradores no Prédio</h3>
    <div id="lista-ativos"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config); const db = firebase.database();

        // Escuta em tempo real as solicitações
        db.ref('solicitacoes_cadastro').on('value', s => {
            const cont = document.getElementById('lista-pendentes');
            const countLabel = document.getElementById('count-pendentes');
            cont.innerHTML = "";
            let qtd = 0;
            s.forEach(item => {
                qtd++;
                const d = item.val();
                cont.innerHTML += `
                    <div class="card">
                        <div style="display:flex; align-items:center;">
                            <img src="${d.foto}" class="thumb">
                            <div><b>${d.nome}</b><br><small>Casa: ${d.unidade}</small></div>
                        </div>
                        <button class="btn-ok" onclick="aprovar('${item.key}')">ACEITAR</button>
                    </div>`;
            });
            countLabel.innerText = qtd;
            atualizarTotal();
        });

        // Escuta em tempo real os moradores ativos
        db.ref('moradores_validados').on('value', s => {
            const cont = document.getElementById('lista-ativos');
            const countLabel = document.getElementById('count-ativos');
            cont.innerHTML = "";
            let qtd = 0;
            s.forEach(item => {
                qtd++;
                const d = item.val();
                cont.innerHTML += `
                    <div class="card" style="border-left: 3px solid var(--blue)">
                        <div style="display:flex; align-items:center;">
                            <img src="${d.foto}" class="thumb">
                            <div><b>${d.nome}</b><br><small>Casa: ${d.unidade}</small></div>
                        </div>
                        <button class="btn-del" onclick="remover('${item.key}')">EXCLUIR</button>
                    </div>`;
            });
            countLabel.innerText = qtd;
            atualizarTotal();
        });

        function aprovar(key) {
            db.ref('solicitacoes_cadastro/' + key).once('value', s => {
                const dados = s.val();
                db.ref('moradores_validados').push(dados).then(() => {
                    db.ref('solicitacoes_cadastro/' + key).remove();
                });
            });
        }

        function remover(key) {
            if(confirm("Deseja realmente excluir este morador?")) {
                db.ref('moradores_validados/' + key).remove();
            }
        }

        function atualizarTotal() {
            setTimeout(() => {
                const p = parseInt(document.getElementById('count-pendentes').innerText);
                const a = parseInt(document.getElementById('count-ativos').innerText);
                document.getElementById('count-total').innerText = p + a;
            }, 100);
        }
    </script>
</body>
</html>
