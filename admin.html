    <title>Admin Page | Virty Access Door</title>
    <style>
        :root { --neon-green: #39FF14; --bg-black: #000; --card-bg: #111; --red-del: #ff4d4d; --gray-edit: #555; }
        body { background: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }

        header h1 { margin: 0; font-size: 1.6rem; letter-spacing: 3px; font-weight: 800; }
        #data-atual { color: var(--neon-green); font-size: 1rem; margin-top: 8px; text-transform: capitalize; }

        /* Busca Inteligente */
        .search-container { position: sticky; top: 10px; z-index: 100; padding-bottom: 20px; background: var(--bg-black); }
        .search-box { 
            width: 100%; max-width: 800px; margin: 0 auto; display: block; padding: 18px; 
            border-radius: 15px; border: 2px solid var(--neon-green); background: #000; 
            color: #fff; font-size: 1.1rem; outline: none; box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }

        /* Seções e Agrupamento */
        section { width: 100%; max-width: 900px; margin: 0 auto 50px; }
        h2 { border-left: 5px solid var(--neon-green); padding-left: 15px; font-size: 1.3rem; margin-bottom: 25px; color: #eee; }

        .unit-group { background: #080808; border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 25px; }
        .unit-title { color: var(--neon-green); font-weight: 800; font-size: 1.1rem; margin-bottom: 15px; display: block; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        /* Cards de Usuário */
        .user-card { display: flex; align-items: center; background: var(--card-bg); padding: 18px; border-radius: 15px; margin-bottom: 12px; gap: 20px; border: 1px solid #222; transition: 0.2s; }
        .user-card:hover { border-color: #444; background: #161616; }
        
        .thumb-admin { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--neon-green); cursor: pointer; background: #222; }
