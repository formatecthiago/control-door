<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY MASTER ADMIN - ACESSO DIRETO</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --gray: #1a1a1a; --blue: #007BFF; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* Dashboard Style */
        .header { padding: 20px; border-bottom: 2px solid var(--gray); text-align: center; background: #050505; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .card { background: #0d0d0d; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        
        .btn { border: none; border-radius: 12px; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-v { background: var(--neon); color: #000; }
        .btn-r { background: var(--red); color: #fff; padding: 8px 15px; width: auto; font-size: 0.8rem; }
        
        .status-wait { color: #ffcc00; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .status-ok { color: var(--neon); font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        h3 { color: #666; font-size: 0.9rem; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="panel">
        <div class="header">
            <h1 style="color:var(--neon); margin:0; font-size:1.3rem;">GESTOR DE UNIDADES</h1>
            <p style="color:#444; font-size:0.7rem; margin-top:5px;">PAINEL ADMINISTRATIVO VIRTY</p>
        </div>

        <div class="container">
            <h3>Pendentes de Ativação</h3>
            <div id="lista-p">
                <p style="color:#222">Carregando dados...</p>
            </div>

            <h3>Unidades Validadas</h3>
            <div id="lista-v">
                <p style="color:#222">Carregando dados...</p>
            </div>
            
            <button class="btn" onclick="location.reload()" style="background:#111; color:#444; margin-top:40px; font-size:0.8rem;">ATUALIZAR LISTAS</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Configuração do Firebase
        const config = { 
            apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", 
            databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        // Inicia o carregamento automático das listas
        window.onload = carregarListas;

        function carregarListas() {
            // Escuta Solicitações de Cadastro (Pendentes)
            db.ref('solicitacoes_cadastro').on('value', snap => {
                const div = document.getElementById('lista-p');
                div.innerHTML = snap.exists() ? "" : "<p style='color:#333'>Nenhuma solicitação no momento.</p>";
                snap.forEach(item => {
                    const d = item.val();
                    div.innerHTML += `
                        <div class="card">
                            <div>
                                <b>CASA ${d.unidade}</b><br>
                                <span class="status-wait">Aguardando...</span>
                            </div>
                            <div style="display:flex; gap:8px;">
                                <button class="btn-v" style="padding:8px 15px; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="aprovar('${item.key}', '${d.unidade}')">ATIVAR</button>
                                <button class="btn-r" onclick="apagar('solicitacoes_cadastro', '${item.key}')">✖</button>
                            </div>
                        </div>`;
                });
            });

            // Escuta Unidades Validadas (Moradores Ativos)
            db.ref('moradores_validados').on('value', snap => {
                const div = document.getElementById('lista-v');
                div.innerHTML = snap.exists() ? "" : "<p style='color:#333'>Nenhum morador ativado.</p>";
                snap.forEach(item => {
                    const d = item.val();
                    div.innerHTML += `
                        <div class="card">
                            <div>
                                <b>CASA ${d.unidade}</b><br>
                                <span class="status-ok">Sistema Ativo</span>
                            </div>
                            <button class="btn-r" onclick="apagar('moradores_validados', '${item.key}')">REMOVER</button>
                        </div>`;
                });
            });
        }

        function aprovar(key, unidade) {
            // Move do nó de solicitações para o nó de validados
            db.ref('moradores_validados').push({ 
                unidade: unidade, 
                ativo_desde: Date.now() 
            });
            db.ref('solicitacoes_cadastro/' + key).remove();
            console.log("Unidade " + unidade + " aprovada.");
        }

        function apagar(path, key) {
            if(confirm("Confirmar exclusão definitiva deste registro?")) {
                db.ref(path + '/' + key).remove();
            }
        }
    </script>
</body>
</html>
