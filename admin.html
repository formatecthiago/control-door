<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Virty Access</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Pré-Tela de Login */
        .login-box { background: #0a0a0a; border: 1px solid var(--neon); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 30px rgba(57, 255, 20, 0.1); }
        .login-box h1 { font-size: 1.5rem; color: var(--neon); margin-bottom: 25px; text-transform: uppercase; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 15px; background: var(--neon); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        
        /* Conteúdo do Admin (Escondido por padrão) */
        #admin-content { display: none; width: 100%; padding: 20px; }
    </style>
</head>
<body>

    <div id="login-screen" class="login-box">
        <p id="data-login" style="font-size: 0.8rem; color: #555;"></p>
        <h1>Admin to Virty Access Door</h1>
        <input type="text" id="adm-nome" placeholder="Nome Completo">
        <input type="number" id="adm-cpf" placeholder="CPF">
        <input type="password" id="adm-chave" placeholder="Chave Mestra">
        <p style="font-size: 0.7rem; color: #444; margin-top: 15px;">Ao entrar, este dispositivo será vinculado como administrador oficial.</p>
        <button class="btn-login" onclick="tentarLogin()">ACESSAR SISTEMA</button>
    </div>

    <div id="admin-content">
        </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = { /* Sua Config do Firebase */ };
    const app = initializeApp(config);
    const db = getDatabase(app);

    // Chave única do navegador/aparelho
    const adminToken = localStorage.getItem('virty_admin_token');

    // Mostra data na pré-tela
    document.getElementById('data-login').innerText = new Date().toLocaleDateString();

    // 1. VERIFICAÇÃO AUTOMÁTICA DE LOGADO
    if(adminToken) {
        get(ref(db, `admins_autorizados/${adminToken}`)).then(snap => {
            if(snap.exists()) {
                liberarPainel(snap.val());
            } else {
                localStorage.removeItem('virty_admin_token');
            }
        });
    }

    // 2. LÓGICA DE LOGIN COM CHAVE MESTRE
    window.tentarLogin = async () => {
        const nome = document.getElementById('adm-nome').value;
        const cpf = document.getElementById('adm-cpf').value;
        const chaveDigitada = document.getElementById('adm-chave').value;

        if(!nome || !cpf || !chaveDigitada) return alert("Preencha todos os campos.");

        // Busca a Chave Mestra oficial no Firebase (você deve criar o nó 'config/chave_mestra' no seu banco)
        const snapChave = await get(ref(db, 'config/chave_mestra'));
        const chaveOficial = snapChave.val() || "VIRTY123"; // "VIRTY123" como padrão se não houver no banco

        if(chaveDigitada === chaveOficial) {
            const novoToken = "ADM-" + Date.now();
            const dadosAdmin = {
                nome: nome,
                cpf: cpf,
                idDispositivo: novoToken,
                dataAcesso: new Date().toISOString()
            };

            // Salva o vínculo no Firebase e no navegador
            set(ref(db, `admins_autorizados/${novoToken}`), dadosAdmin).then(() => {
                localStorage.setItem('virty_admin_token', novoToken);
                liberarPainel(dadosAdmin);
            });
        } else {
            alert("Chave Mestra incorreta!");
        }
    };

    function liberarPainel(dados) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        
        // Atualiza os dados do header com o que veio do Firebase
        // Aqui você chamaria as funções de listar pendências e cadastrados que já fizemos
        iniciarSistemaAdmin(dados); 
    }

    function iniciarSistemaAdmin(dados) {
        console.log("Sistema liberado para:", dados.nome);
        // Coloque aqui o restante da lógica de onValue que busca moradores
    }
</script>
