<div id="painel-admin" style="max-width: 800px; margin: 20px auto; font-family: sans-serif;">
    
    <h2>🔔 Solicitações Pendentes</h2>
    <div id="lista-pendentes" style="background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
        </div>

    <hr style="margin: 40px 0;">

    <h2>🏠 Banco de Dados: Moradores Autorizados</h2>
    <div style="margin-bottom: 10px;">
        <input type="text" id="filtro-casa" placeholder="Filtrar por número da casa..." oninput="filtrarMoradores()" style="padding: 8px; width: 250px;">
    </div>
    
    <table style="width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <thead>
            <tr style="background: #2c3e50; color: white; text-align: left;">
                <th style="padding: 12px;">Casa</th>
                <th style="padding: 12px;">Nome</th>
                <th style="padding: 12px;">Ações</th>
            </tr>
        </thead>
        <tbody id="tabela-moradores">
            </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // ... (sua configuração do Firebase continua aqui)
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 1. MONITORAR MORADORES JÁ ACEITOS (O SEU BANCO DE DADOS)
    onValue(ref(db, 'moradores_autorizados'), (snapshot) => {
        const tabela = document.getElementById('tabela-moradores');
        tabela.innerHTML = "";
        
        if (snapshot.exists()) {
            const dados = snapshot.val();
            // Transforma em array para organizar por número de casa
            const listaOrdenada = Object.keys(dados).map(id => ({ id, ...dados[id] }));
            listaOrdenada.sort((a, b) => a.casa.localeCompare(b.casa, undefined, {numeric: true}));

            listaOrdenada.forEach(m => {
                tabela.innerHTML += `
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 12px; font-weight: bold;">${m.casa}</td>
                        <td style="padding: 12px;">${m.nome}</td>
                        <td style="padding: 12px;">
                            <button onclick="editarMorador('${m.id}', '${m.nome}', '${m.casa}')" style="background: #f1c40f; border:none; padding: 5px 10px; border-radius:4px; cursor:pointer;">Editar</button>
                            <button onclick="deletarMorador('${m.id}')" style="background: #e74c3c; color:white; border:none; padding: 5px 10px; border-radius:4px; cursor:pointer; margin-left:5px;">Deletar</button>
                        </td>
                    </tr>
                `;
            });
        } else {
            tabela.innerHTML = "<tr><td colspan='3' style='padding:20px; text-align:center;'>Nenhum morador cadastrado.</td></tr>";
        }
    });

    // 2. FUNÇÃO PARA DELETAR
    window.deletarMorador = (id) => {
        if(confirm("Tem certeza que deseja remover este morador? Ele perderá o acesso imediatamente.")) {
            remove(ref(db, 'moradores_autorizados/' + id));
        }
    };

    // 3. FUNÇÃO PARA EDITAR
    window.editarMorador = (id, nomeAntigo, casaAntiga) => {
        const novoNome = prompt("Novo nome:", nomeAntigo);
        const novaCasa = prompt("Novo número da casa:", casaAntiga);
        
        if(novoNome && novaCasa) {
            update(ref(db, 'moradores_autorizados/' + id), {
                nome: novoNome,
                casa: novaCasa
            });
        }
    };

    // FUNÇÃO DE FILTRO (BUSCA RÁPIDA)
    window.filtrarMoradores = () => {
        const input = document.getElementById('filtro-casa').value.toUpperCase();
        const trs = document.getElementById('tabela-moradores').getElementsByTagName('tr');
        for (let i = 0; i < trs.length; i++) {
            let td = trs[i].getElementsByTagName('td')[0];
            if (td) {
                let txtValue = td.textContent || td.innerText;
                trs[i].style.display = txtValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }
    };
</script>
