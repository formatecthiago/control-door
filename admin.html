<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virty Admin | Gestão</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #ff3333; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .screen { display: none; padding: 20px; text-align: center; }
        .active { display: block; }
        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; font-size: 1rem; }
        .btn { width: 90%; padding: 15px; border-radius: 30px; border: none; font-weight: bold; margin: 10px 0; cursor: pointer; }
        .btn-green { background: var(--neon); color: #000; }
        .item-card { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 15px; display: flex; align-items: center; margin-bottom: 10px; text-align: left; }
        .img-user { width: 60px; height: 60px; border-radius: 50%; margin-right: 15px; border: 2px solid var(--neon); object-fit: cover; }
        .info { flex: 1; }
    </style>
</head>
<body>

    <div id="s-login" class="screen active">
        <h1 style="color:var(--neon)">ADMIN LOGIN</h1>
        <input type="text" id="adm-nome" placeholder="Seu Nome">
        <input type="password" id="adm-chave" placeholder="Chave Mestra">
        <button class="btn btn-green" onclick="logarAdmin()">ENTRAR</button>
    </div>

    <div id="s-dash" class="screen">
        <h2 id="boas-vindas">Painel</h2>
        <div id="lista-p">Carregando pendentes...</div>
        <hr style="border:0; border-top:1px solid #222; margin:20px 0;">
        <div id="lista-m">Carregando moradores...</div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = { 
        apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", 
        databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", 
        projectId: "virty-access-door" 
    };
    const app = initializeApp(config);
    const db = getDatabase(app);

    const CHAVE_MASTER = "Virty_123quatro@#";

    window.logarAdmin = () => {
        const n = document.getElementById('adm-nome').value;
        const c = document.getElementById('adm-chave').value;
        
        if(c === CHAVE_MASTER && n !== "") {
            document.getElementById('boas-vindas').innerText = "Olá, " + n;
            document.getElementById('s-login').classList.remove('active');
            document.getElementById('s-dash').classList.add('active');
            carregarListas();
        } else {
            alert("Senha Incorreta ou Nome vazio!");
        }
    };

    function carregarListas() {
        // Pendentes
        onValue(ref(db, 'moradores_pendentes'), snap => {
            const div = document.getElementById('lista-p');
            div.innerHTML = "<h3>PENDENTES</h3>";
            if(!snap.exists()) div.innerHTML += "Ninguém na fila.";
            snap.forEach(item => {
                const m = item.val();
                div.innerHTML += `
                    <div class="item-card">
                        <img src="${m.foto}" class="img-user">
                        <div class="info"><b>UN: ${m.unidade}</b><br>${m.nome}<br>CPF: ${m.cpf}</div>
                        <button onclick="aprovar('${m.id}')" style="background:var(--neon); border:none; padding:10px; border-radius:5px;">OK</button>
                    </div>`;
            });
        });

        // Validados
        onValue(ref(db, 'moradores_validados'), snap => {
            const div = document.getElementById('lista-m');
            div.innerHTML = "<h3>ATIVOS</h3>";
            snap.forEach(item => {
                const m = item.val();
                div.innerHTML += `
                    <div class="item-card">
                        <img src="${m.foto}" class="img-user">
                        <div class="info"><b>UN: ${m.unidade}</b><br>${m.nome}</div>
                        <button onclick="deletar('${m.id}')" style="background:red; color:white; border:none; padding:10px; border-radius:5px;">DEL</button>
                    </div>`;
            });
        });
    }

    window.aprovar = async (id) => {
        const snap = await get(ref(db, `moradores_pendentes/${id}`));
        if(snap.exists()) {
            await set(ref(db, `moradores_validados/${id}`), snap.val());
            await remove(ref(db, `moradores_pendentes/${id}`));
        }
    };

    window.deletar = (id) => {
        if(confirm("Remover morador?")) remove(ref(db, `moradores_validados/${id}`));
    };
</script>
</body>
</html>
