<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRTY ADMIN</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        .card { background: #0d0d0d; border: 1px solid #222; border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; }
        .foto-perfil { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--neon); object-fit: cover; }
        .info { flex: 1; font-size: 0.85rem; }
        .btn-box { display: flex; flex-direction: column; gap: 5px; }
        .btn { border: none; padding: 8px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        .btn-ok { background: var(--neon); color: #000; }
        .btn-del { background: transparent; border: 1px solid var(--red); color: var(--red); }
        h2 { border-left: 4px solid var(--neon); padding-left: 10px; font-size: 1rem; color: var(--neon); }
    </style>
</head>
<body>

    <h1 style="text-align:center; color:var(--neon)">VIRTY MASTER</h1>

    <h2>PENDENTES</h2>
    <div id="lista-p"></div>

    <h2 style="margin-top:30px;">HABILITADOS</h2>
    <div id="lista-h"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    db.ref('solicitacoes_cadastro').on('value', s => {
        const cont = document.getElementById('lista-p'); cont.innerHTML = "";
        s.forEach(c => cont.innerHTML += renderCard(c.val(), true));
    });

    db.ref('moradores_validados').on('value', s => {
        const cont = document.getElementById('lista-h'); cont.innerHTML = "";
        s.forEach(c => cont.innerHTML += renderCard(c.val(), false));
    });

    function renderCard(d, isP) {
        return `
            <div class="card">
                <img src="${d.foto}" class="foto-perfil">
                <div class="info">
                    <b style="font-size:1rem; color:var(--neon)">CASA ${d.unidade}</b><br>
                    ${d.nome}<br>
                    CPF: ${d.cpf}<br>
                    Tel: ${d.telefone}
                </div>
                <div class="btn-box">
                    ${isP ? `<button class="btn btn-ok" onclick="aprovar('${d.unidade}')">ACEITAR</button>` : ''}
                    <button class="btn" style="background:#333; color:#fff" onclick="editar('${d.unidade}')">EDITAR</button>
                    <button class="btn btn-del" onclick="excluir('${d.unidade}')">EXCLUIR</button>
                </div>
            </div>
        `;
    }

    function aprovar(un) {
        db.ref('solicitacoes_cadastro/' + un).once('value', s => {
            db.ref('moradores_validados/' + un).set(s.val());
            db.ref('solicitacoes_cadastro/' + un).remove();
        });
    }

    function excluir(un) {
        if(confirm("Excluir morador?")) {
            db.ref('moradores_validados/' + un).remove();
            db.ref('solicitacoes_cadastro/' + un).remove();
        }
    }

    function editar(un) {
        const n = prompt("Novo Nome:");
        if(n) db.ref('moradores_validados/' + un).update({ nome: n });
    }
</script>
</body>
</html>
