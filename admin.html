<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRTY ADMIN v15.3</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; --orange: #FF8C00; }
        body { background: #000; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .card-mini { background: #0a0a0a; border: 1px solid #222; border-left: 4px solid var(--neon); padding: 10px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        .thumb { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-right: 12px; border: 1px solid #333; }
        .info { flex: 1; min-width: 0; }
        .info b { color: var(--neon); font-size: 0.8rem; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .info span { font-size: 0.65rem; color: #777; display: block; }
        .btn-group { display: flex; gap: 4px; }
        .btn-s { border: none; padding: 8px 10px; border-radius: 6px; font-weight: bold; font-size: 0.65rem; cursor: pointer; }
        .ok { background: var(--neon); color: #000; }
        .edit { background: var(--orange); color: #fff; }
        .sair { background: var(--red); color: #fff; }
    </style>
</head>
<body>

    <h3 style="color:var(--neon); text-align:center; margin-bottom:20px;">VIRTY CONTROL MASTER</h3>

    <div id="secao-pendentes">
        <p style="font-size:0.7rem; color:#444;">SOLICITAÇÕES (PENDENTES)</p>
        <div id="lista-pendentes"></div>
    </div>

    <div id="secao-ativos" style="margin-top:25px;">
        <p style="font-size:0.7rem; color:#444;">MORADORES (ATIVOS)</p>
        <div id="lista-ativos"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // MASTER CHECK: Se não for você, esconde funções Master
        const masterID = "SEU_HARDWARE_ID_AQUI"; // Coloque seu ID aqui para ser o Master
        const hardwareID = navigator.userAgent.replace(/\D/g, "").slice(-8);

        // LISTA DE ESPERA
        db.ref('solicitacoes_cadastro').on('value', s => {
            const cont = document.getElementById('lista-pendentes');
            cont.innerHTML = "";
            s.forEach(item => {
                const d = item.val();
                cont.innerHTML += `
                    <div class="card-mini">
                        <img src="${d.foto}" class="thumb">
                        <div class="info">
                            <b>${d.nome}</b>
                            <span>Casa: ${d.unidade} | CPF: ${d.cpf}</span>
                        </div>
                        <div class="btn-group">
                            <button class="btn-s ok" onclick="aprovar('${item.key}')">OK</button>
                            <button class="btn-s sair" onclick="recusar('${item.key}')">SAIR</button>
                        </div>
                    </div>`;
            });
        });

        // LISTA DE MORADORES ATIVOS
        db.ref('moradores_validados').on('value', s => {
            const cont = document.getElementById('lista-ativos');
            cont.innerHTML = "";
            s.forEach(item => {
                const d = item.val();
                cont.innerHTML += `
                    <div class="card-mini" style="border-left-color:var(--blue)">
                        <img src="${d.foto}" class="thumb">
                        <div class="info">
                            <b>${d.nome}</b>
                            <span>Casa: ${d.unidade} | Tel: ${d.telefone || '--'}</span>
                        </div>
                        <div class="btn-group">
                            <button class="btn-s edit" onclick="editar('${item.key}')">EDIT</button>
                            <button class="btn-s sair" onclick="remover('${item.key}')">SAIR</button>
                        </div>
                    </div>`;
            });
        });

        function aprovar(key) {
            db.ref('solicitacoes_cadastro/' + key).once('value', s => {
                db.ref('moradores_validados').push(s.val()).then(() => {
                    db.ref('solicitacoes_cadastro/' + key).remove();
                });
            });
        }

        function recusar(key) { if(confirm("Recusar cadastro?")) db.ref('solicitacoes_cadastro/' + key).remove(); }
        function remover(key) { if(confirm("Remover este morador?")) db.ref('moradores_validados/' + key).remove(); }
        function editar(key) { 
            const novoNome = prompt("Novo Nome:");
            if(novoNome) db.ref('moradores_validados/' + key).update({ nome: novoNome });
        }
    </script>
</body>
</html>
