<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY - MASTER ADMIN</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --gray: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* Tela de Login */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
        .login-box { background: #0a0a0a; border: 1px solid var(--neon); padding: 30px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 1rem; box-sizing: border-box; }
        
        /* Painel Admin */
        .header { padding: 20px; border-bottom: 2px solid var(--gray); text-align: center; }
        .container { padding: 20px; }
        .card { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        
        .btn { border: none; border-radius: 12px; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-v { background: var(--neon); color: #000; }
        .btn-r { background: var(--red); color: #fff; padding: 8px 15px; width: auto; font-size: 0.8rem; }
        
        .badge-pendente { color: #ffcc00; font-size: 0.8rem; font-weight: bold; }
        .badge-ok { color: var(--neon); font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--neon); margin:0;">VIRTY MASTER</h2>
            <p style="color:#666; font-size:0.8rem;">Acesso Administrativo</p>
            <input type="password" id="master-pass" placeholder="Digite a Senha Mestra">
            <button class="btn btn-v" onclick="verificarSenha()">ACESSAR SISTEMA</button>
            <p id="erro" style="color:var(--red); font-size:0.8rem; margin-top:10px; display:none;">Senha Incorreta!</p>
        </div>
    </div>

    <div id="admin-panel" style="display:none;">
        <div class="header">
            <h1 style="color:var(--neon); margin:0; font-size:1.2rem;">GERENCIAMENTO DE ACESSO</h1>
            <p style="color:#666; font-size:0.7rem;">Controle de Moradores e Validações</p>
        </div>

        <div class="container">
            <h3 style="border-left: 3px solid var(--neon); padding-left: 10px;">Solicitações Pendentes</h3>
            <div id="lista-pendentes">
                </div>

            <h3 style="border-left: 3px solid #666; padding-left: 10px; margin-top:30px; color:#666;">Unidades Ativas</h3>
            <div id="lista-validados">
                </div>
            
            <button class="btn" onclick="logout()" style="background:#111; color:#fff; margin-top:30px;">SAIR DO SISTEMA</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // A SENHA MESTRE QUE VOCÊ DEFINIU
        const MASTER_KEY = "Virty_123quatro@#";

        function verificarSenha() {
            const pass = document.getElementById('master-pass').value;
            if(pass === MASTER_KEY) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                carregarDados();
            } else {
                document.getElementById('erro').style.display = 'block';
                document.getElementById('master-pass').value = "";
            }
        }

        function carregarDados() {
            // Monitora Moradores Pendentes
            db.ref('solicitacoes_cadastro').on('value', s => {
                const cont = document.getElementById('lista-pendentes');
                cont.innerHTML = "";
                s.forEach(item => {
                    const d = item.val();
                    cont.innerHTML += `
                        <div class="card">
                            <div>
                                <b>Unidade ${d.unidade}</b><br>
                                <span class="badge-pendente">AGUARDANDO APROVAÇÃO</span>
                            </div>
                            <div style="display:flex; gap:5px;">
                                <button class="btn btn-v" style="padding:8px 12px;" onclick="aprovar('${item.key}', '${d.unidade}')">Aprovar</button>
                                <button class="btn btn-r" onclick="excluir('solicitacoes_cadastro', '${item.key}')">✖</button>
                            </div>
                        </div>`;
                });
            });

            // Monitora Moradores Ativos
            db.ref('moradores_validados').on('value', s => {
                const cont = document.getElementById('lista-validados');
                cont.innerHTML = "";
                s.forEach(item => {
                    const d = item.val();
                    cont.innerHTML += `
                        <div class="card">
                            <div>
                                <b>Unidade ${d.unidade}</b><br>
                                <span class="badge-ok">VALIDADO</span>
                            </div>
                            <button class="btn btn-r" onclick="excluir('moradores_validados', '${item.key}')">Remover</button>
                        </div>`;
                });
            });
        }

        function aprovar(id, unidade) {
            db.ref('moradores_validados').push({ unidade: unidade, ts: Date.now() });
            db.ref('solicitacoes_cadastro/' + id).remove();
            alert("Unidade " + unidade + " ativada com sucesso!");
        }

        function excluir(path, id) {
            if(confirm("Tem certeza que deseja excluir este registro?")) {
                db.ref(path + '/' + id).remove();
            }
        }

        function logout() {
            location.reload();
        }
    </script>
</body>
</html>
