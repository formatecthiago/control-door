<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virty Admin - Emergência</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #39FF14; padding: 20px; border-radius: 15px; background: #111; margin-top: 50px; }
        button { width: 100%; padding: 20px; background: #39FF14; color: #000; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; }
        .item { border: 1px solid #333; margin: 10px 0; padding: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; background: #0a0a0a; }
        .img-u { width: 50px; height: 50px; border-radius: 50%; border: 1px solid #39FF14; object-fit: cover; }
    </style>
</head>
<body>

    <div id="login-sec">
        <div class="box">
            <h2 style="color:#39FF14">MODO DE EMERGÊNCIA</h2>
            <p>Clique no botão abaixo para forçar a entrada sem senha e liberar o sistema.</p>
            <button onclick="forcarEntrada()">FORÇAR ENTRADA (SEM SENHA)</button>
        </div>
    </div>

    <div id="dash-sec" style="display:none;">
        <h2 style="color:#39FF14">PAINEL DE CONTROLE</h2>
        <div id="lista">Buscando...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Usei a URL exata do seu banco que você confirmou que funciona
        const config = { 
            apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", 
            databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(config);

        function forcarEntrada() {
            // PULA A SENHA COMPLETAMENTE
            document.getElementById('login-sec').style.display = "none";
            document.getElementById('dash-sec').style.display = "block";
            
            firebase.database().ref('moradores_pendentes').on('value', snap => {
                const lista = document.getElementById('lista');
                lista.innerHTML = "<h4>PENDENTES</h4>";
                if(!snap.exists()) lista.innerHTML += "<p>Ninguém aguardando.</p>";
                
                snap.forEach(item => {
                    const m = item.val();
                    lista.innerHTML += `
                        <div class="item">
                            <img src="${m.foto}" class="img-u">
                            <div style="text-align:left; flex:1; margin-left:10px;">
                                <b>UN: ${m.unidade}</b><br><small>${m.nome}</small>
                            </div>
                            <button onclick="liberar('${m.id}')" style="width:80px; padding:10px; font-size:10px;">LIBERAR</button>
                        </div>`;
                });
            });
        }

        window.liberar = (id) => {
            const pRef = firebase.database().ref('moradores_pendentes/' + id);
            pRef.once('value', s => {
                if(s.exists()){
                    firebase.database().ref('moradores_validados/' + id).set(s.val());
                    pRef.remove();
                    alert("Morador Aprovado!");
                }
            });
        }
    </script>
</body>
</html>
