<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - Virty Access</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; }
        .card img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #2c3e50; color: white; }
        .btn-aceitar { background: #27ae60; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔔 Pendentes</h1>
        <div id="lista-pendentes"></div>

        <hr>

        <h1>🏠 Moradores Autorizados</h1>
        <table id="tabela-moradores">
            <thead>
                <tr>
                    <th>Casa</th>
                    <th>Nome</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM",
            authDomain: "virty-access-door.firebaseapp.com",
            databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com",
            projectId: "virty-access-door",
            storageBucket: "virty-access-door.firebasestorage.app",
            messagingSenderId: "694822891117",
            appId: "1:694822891117:web:b95a71c1eb273071fa9964"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Monitorar Pendentes
        onValue(ref(db, 'solicitacoes_pendentes'), (snapshot) => {
            const div = document.getElementById('lista-pendentes');
            div.innerHTML = "";
            snapshot.forEach(item => {
                const p = item.val();
                div.innerHTML += `
                    <div class="card">
                        <img src="${p.foto}">
                        <div><b>${p.nome}</b> (Casa: ${p.casa})</div>
                        <button class="btn-aceitar" onclick="aceitar('${item.key}')">Autorizar</button>
                    </div>`;
            });
        });

        // Monitorar Autorizados
        onValue(ref(db, 'moradores_autorizados'), (snapshot) => {
            const corpo = document.getElementById('corpo-tabela');
            corpo.innerHTML = "";
            snapshot.forEach(item => {
                const m = item.val();
                corpo.innerHTML += `
                    <tr>
                        <td>${m.casa}</td>
                        <td>${m.nome}</td>
                        <td><button class="btn-delete" onclick="deletar('${item.key}')">Excluir</button></td>
                    </tr>`;
            });
        });

        window.aceitar = (id) => {
            onValue(ref(db, 'solicitacoes_pendentes/' + id), (snap) => {
                const dados = snap.val();
                set(ref(db, 'moradores_autorizados/' + id), dados);
                remove(ref(db, 'solicitacoes_pendentes/' + id));
            }, { onlyOnce: true });
        };

        window.deletar = (id) => { if(confirm("Remover?")) remove(ref(db, 'moradores_autorizados/' + id)); };
    </script>
</body>
</html>
