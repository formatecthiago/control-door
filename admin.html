<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRTY ADMIN v15.2</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; --gray: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .card-mini { background: #0a0a0a; border: 1px solid #222; border-left: 4px solid var(--neon); padding: 8px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        .thumb-mini { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 1px solid #333; margin-right: 10px; }
        .info { flex: 1; }
        .info b { font-size: 0.85rem; color: var(--neon); display: block; }
        .info span { font-size: 0.7rem; color: #888; }
        .btn-group { display: flex; gap: 5px; }
        .btn-s { border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 0.7rem; cursor: pointer; }
        .ok { background: var(--neon); color: #000; }
        .sair { background: var(--red); color: #fff; }
        input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2 style="color:var(--neon); text-align:center;">VIRTY MASTER</h2>

    <p style="font-size:0.7rem; color:#555;">SOLICITAÇÕES PENDENTES</p>
    <div id="lista-pendentes"></div>

    <p style="font-size:0.7rem; color:#555; margin-top:20px;">MORADORES ATIVOS</p>
    <input type="text" id="busca" oninput="filtrar()" placeholder="Buscar nome ou casa...">
    <div id="lista-autorizados"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // LISTA PENDENTE EM TEMPO REAL
        db.ref('solicitacoes_cadastro').on('value', s => {
            const cont = document.getElementById('lista-pendentes');
            cont.innerHTML = "";
            s.forEach(item => {
                const d = item.val();
                cont.innerHTML += `
                    <div class="card-mini">
                        <img src="${d.foto}" class="thumb-mini">
                        <div class="info"><b>${d.nome}</b><span>Unidade: ${d.unidade}</span></div>
                        <div class="btn-group">
                            <button class="btn-s ok" onclick="aprovar('${item.key}')">OK</button>
                            <button class="btn-s sair" onclick="rejeitar('${item.key}')">SAIR</button>
                        </div>
                    </div>`;
            });
        });

        // LISTA AUTORIZADA EM TEMPO REAL
        db.ref('moradores_validados').on('value', s => {
            const cont = document.getElementById('lista-autorizados');
            cont.innerHTML = "";
            s.forEach(item => {
                const d = item.val();
                cont.innerHTML += `
                    <div class="card-mini" style="border-left-color:var(--blue)">
                        <img src="${d.foto}" class="thumb-mini">
                        <div class="info"><b>${d.nome}</b><span>Casa: ${d.unidade} | Tel: ${d.telefone || '--'}</span></div>
                        <button class="btn-s sair" onclick="remover('${item.key}')">SAIR</button>
                    </div>`;
            });
        });

        function aprovar(key) {
            db.ref('solicitacoes_cadastro/' + key).once('value', s => {
                db.ref('moradores_validados').push(s.val()).then(() => {
                    db.ref('solicitacoes_cadastro/' + key).remove();
                });
            });
        }

        function rejeitar(key) { if(confirm("Recusar?")) db.ref('solicitacoes_cadastro/' + key).remove(); }
        function remover(key) { if(confirm("Remover morador?")) db.ref('moradores_validados/' + key).remove(); }

        function filtrar() {
            const b = document.getElementById('busca').value.toLowerCase();
            document.querySelectorAll('#lista-autorizados .card-mini').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(b) ? "flex" : "none";
            });
        }
    </script>
</body>
</html>
