<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Virty Access</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        h1 { color: #39FF14; border-bottom: 2px solid #39FF14; padding-bottom: 10px; }
        .card { background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; border-radius: 10px; }
        .thumb { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 2px solid #39FF14; }
        .info { flex: 1; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        .btn-ok { background: #39FF14; color: #000; }
        .btn-del { background: #ff4d4d; color: #fff; }
    </style>
</head>
<body>
    <h1>PEDIDOS DE ACESSO</h1>
    <div id="lista-pendentes"></div>

    <h1 style="margin-top:40px">MORADORES ATIVOS</h1>
    <div id="lista-ativos"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", 
        databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", 
        projectId: "virty-access-door"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ESCUTAR PENDENTES
    onValue(ref(db, 'moradores_pendentes'), (snap) => {
        const div = document.getElementById('lista-pendentes');
        div.innerHTML = '';
        if(!snap.exists()) div.innerHTML = '<p>Nenhum pedido novo.</p>';
        snap.forEach(item => {
            const m = item.val();
            div.innerHTML += `
                <div class="card">
                    <img src="${m.foto}" class="thumb">
                    <div class="info"><b>Apt: ${m.unidade}</b><br>${m.nome}</div>
                    <button class="btn btn-ok" onclick="aprovar('${m.unidade}')">ACEITAR</button>
                    <button class="btn btn-del" onclick="remover('${m.unidade}', true)">RECUSAR</button>
                </div>`;
        });
    });

    // ESCUTAR ATIVOS
    onValue(ref(db, 'moradores'), (snap) => {
        const div = document.getElementById('lista-ativos');
        div.innerHTML = '';
        snap.forEach(item => {
            const m = item.val();
            div.innerHTML += `
                <div class="card">
                    <img src="${m.foto}" class="thumb">
                    <div class="info"><b>Apt: ${m.unidade}</b><br>${m.nome}</div>
                    <button class="btn btn-del" onclick="remover('${m.unidade}', false)">EXCLUIR</button>
                </div>`;
        });
    });

    window.aprovar = (u) => {
        onValue(ref(db, `moradores_pendentes/${u}`), (snap) => {
            if(snap.exists()){
                set(ref(db, `moradores/${u}`), snap.val())
                .then(() => remove(ref(db, `moradores_pendentes/${u}`)));
            }
        }, { onlyOnce: true });
    };

    window.remover = (u, pendente) => {
        const path = pendente ? 'moradores_pendentes' : 'moradores';
        remove(ref(db, `${path}/${u}`));
    };
</script>
</body>
</html>
