<script type="module">
    // ... (configurações do firebase) ...

    // Listar Pendentes com todos os campos
    onValue(ref(db, 'moradores_pendentes'), (snap) => {
        const div = document.getElementById('lista-pendentes'); div.innerHTML = '';
        snap.forEach(item => {
            const m = item.val();
            div.innerHTML += `<div class="card" style="flex-direction:column; align-items:flex-start">
                <div style="display:flex; align-items:center; width:100%">
                    <img src="${m.foto}" class="thumb">
                    <div class="info">
                        <b>Apto ${m.unidade}</b> - ${m.nome}<br>
                        <small>CPF: ${m.cpf} | Tel: ${m.tel}</small>
                    </div>
                </div>
                <button class="btn btn-ok" style="width:100%; margin-top:10px" onclick="aprovar('${m.id}', '${m.unidade}')">APROVAR MORADOR</button>
            </div>`;
        });
    });

    window.aprovar = async (id, un) => {
        // Incrementa contagem da unidade e move para validados
        const snap = await get(ref(db, `moradores_pendentes/${id}`));
        const dados = snap.val();
        
        // Move para lista de validados usando o ID do aparelho
        set(ref(db, `moradores_validados/${id}`), dados);
        
        // Atualiza contador da unidade
        const countSnap = await get(ref(db, `unidades_contagem/${un}`));
        const novoTotal = (countSnap.val() || 0) + 1;
        set(ref(db, `unidades_contagem/${un}`), novoTotal);

        // Remove dos pendentes
        remove(ref(db, `moradores_pendentes/${id}`));
    };
</script>
