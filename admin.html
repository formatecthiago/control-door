<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Virty Access</title>
    <style>
        :root { --led-green: #39FF14; --grafite: #2c2f33; }
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; }
        h1 { color: var(--led-green); border-bottom: 2px solid var(--grafite); padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        .tabela-pedidos { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1a1a1a; border-radius: 10px; overflow: hidden; }
        .tabela-pedidos th { text-align: left; color: var(--led-green); padding: 15px; border-bottom: 2px solid #333; font-size: 0.8rem; text-transform: uppercase; }
        .tabela-pedidos td { padding: 15px; border-bottom: 1px solid #222; }
        
        .foto-preview { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--led-green); object-fit: cover; background: #000; }
        
        .btn-autorizar { background: var(--led-green); color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-autorizar:hover { background: #2ecc71; transform: scale(1.05); }
        
        .btn-recusar { background: #ff4d4d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-left: 5px; transition: 0.3s; }
        .btn-recusar:hover { background: #c0392b; }

        code { background: #333; padding: 4px 8px; border-radius: 4px; color: var(--led-green); }
    </style>
</head>
<body>

    <h1>Painel de Controle Virty</h1>
    <p style="color: #888;">Gerencie as solicitações de acesso dos moradores em tempo real.</p>
    
    <table class="tabela-pedidos">
        <thead>
            <tr>
                <th>Selfie</th>
                <th>Nome / CPF</th>
                <th>ID Aparelho</th>
                <th>Localização</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="lista-solicitacoes">
            <tr>
                <td colspan="5" style="text-align:center; padding: 50px; color:#666;">Conectando ao banco de dados...</td>
            </tr>
        </tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURAÇÃO REAL DO SEU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM",
            authDomain: "virty-access-door.firebaseapp.com",
            databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com",
            projectId: "virty-access-door",
            storageBucket: "virty-access-door.firebasestorage.app",
            messagingSenderId: "694822891117",
            appId: "1:694822891117:web:b95a71c1eb273071fa9964"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Referência para a lista de solicitações
        const solicitacoesRef = ref(db, 'solicitacoes_pendentes');

        // Escuta novas solicitações
        onValue(solicitacoesRef, (snapshot) => {
            const data = snapshot.val();
            const tabela = document.getElementById('lista-solicitacoes');
            tabela.innerHTML = ""; 

            if (data) {
                Object.keys(data).forEach(deviceId => {
                    const morador = data[deviceId];
                    tabela.innerHTML += `
                        <tr>
                            <td><img src="${morador.foto}" class="foto-preview"></td>
                            <td><b>${morador.nome}</b><br><small>CPF: ${morador.cpf}</small><br><small>Tel: ${morador.telefone}</small></td>
                            <td><code>${deviceId}</code></td>
                            <td><small>${morador.localizacao || 'Natal, RN'}</small></td>
                            <td>
                                <button class="btn-autorizar" onclick="gerenciarAcesso('${deviceId}', true)">AUTORIZAR</button>
                                <button class="btn-recusar" onclick="gerenciarAcesso('${deviceId}', false)">EXCLUIR</button>
                            </td>
                        </tr>
                    `;
                });
            } else {
                tabela.innerHTML = "<tr><td colspan='5' style='text-align:center; padding: 50px; color:#666;'>Nenhuma solicitação pendente no momento.</td></tr>";
            }
        });

        // Função para Autorizar ou Recusar
        window.gerenciarAcesso = async (deviceId, autorizar) => {
            const statusTxt = autorizar ? "Autorizar este morador?" : "Excluir esta solicitação?";
            if (!confirm(statusTxt)) return;

            const pathPendente = ref(db, `solicitacoes_pendentes/${deviceId}`);
            const pathAutorizado = ref(db, `moradores_autorizados/${deviceId}`);

            if (autorizar) {
                // Busca os dados da solicitação para mover
                const snapshot = await get(pathPendente);
                if (snapshot.exists()) {
                    const dados = snapshot.val();
                    // Salva na pasta de autorizados
                    await set(pathAutorizado, {
                        ...dados,
                        dataAtivacao: new Date().toISOString(),
                        status: "liberado"
                    });
                    // Remove de pendentes
                    await remove(pathPendente);
                    alert("Morador Autorizado com Sucesso!");
                }
            } else {
                // Apenas remove
                await remove(pathPendente);
                alert("Solicitação removida.");
            }
        };
    </script>
</body>
</html>
