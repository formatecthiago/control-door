<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRTY - MASTER CONTROL</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #111; border: 1px solid var(--neon); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-master { background: var(--neon); color: #000; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; text-align: center; }
        #status-shield { font-size: 0.8rem; color: #555; margin-top: 10px; }
        .hw-id { font-family: monospace; color: var(--neon); font-size: 0.7rem; background: #050505; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1 style="color:var(--neon); letter-spacing: 2px;">VIRTY MASTER</h1>
    
    <div id="login-area" class="card">
        <p style="margin-bottom: 5px;">DIGITAL DO DISPOSITIVO:</p>
        <div id="hw-display" class="hw-id">Detectando Hardware...</div>
        
        <input type="password" id="pass-master" placeholder="Senha Master (minúsculo)">
        <button class="btn btn-master" onclick="autenticarMaster()">VINCULAR MEU APARELHO</button>
        
        <div id="status-shield">🔒 Hardware não identificado</div>
    </div>

    <div id="painel-master" class="card" style="display:none;">
        <h3 style="color:var(--neon)">ACESSO MASTER LIBERADO</h3>
        <p style="font-size: 0.9rem;">Este aparelho agora é a chave mestra do sistema.</p>
        <hr style="border: 0; border-top: 1px solid #222; margin: 15px 0;">
        
        <div id="admin-tools">
            <p style="color: #888; font-size: 0.8rem;">Status do Firebase: <b>CONECTADO</b></p>
            <button class="btn" style="background:#222; color:#fff;" onclick="window.location.reload()">ATUALIZAR PAINEL</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>

    <script>
        const config = { 
            apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", 
            databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        let hardwareID = "";
        // SENHA CORRIGIDA PARA MINÚSCULO
        const SENHA_MESTRA_DEFINIDA = "virty@1728#"; 

        async function init() {
            const fp = await FingerprintJS.load();
            const result = await fp.get();
            hardwareID = result.visitorId;
            document.getElementById('hw-display').innerText = hardwareID;
            verificarSeJaEhMaster();
        }

        function verificarSeJaEhMaster() {
            db.ref('credenciais_admin/' + hardwareID).on('value', s => {
                if(s.exists() && s.val().nivel === 'master') {
                    mostrarPainel();
                }
            });
        }

        function autenticarMaster() {
            const campoSenha = document.getElementById('pass-master').value;
            
            if(campoSenha === SENHA_MESTRA_DEFINIDA) {
                db.ref('credenciais_admin/' + hardwareID).set({
                    nivel: 'master',
                    proprietario: 'Thiago Master',
                    data_registro: new Date().toLocaleString(),
                    ts: Date.now()
                }).then(() => {
                    alert("SUCESSO! Este aparelho agora é o MASTER oficial.");
                    mostrarPainel();
                }).catch(error => {
                    alert("Erro ao registrar. Verifique as Rules no Firebase.");
                });
            } else {
                alert("SENHA INCORRETA!");
            }
        }

        function mostrarPainel() {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('painel-master').style.display = 'block';
            document.getElementById('status-shield').innerText = "🛡️ PROTEÇÃO POR HARDWARE ATIVA";
        }

        init();
    </script>
</body>
</html>
