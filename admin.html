<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRTY ADMIN v2.0 - Otimizado</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --yellow: #FFD700; --blue: #007BFF; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .stats-bar { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; }
        .stat-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; text-align: center; font-size: 0.8rem; }
        .btn-cad { background: var(--neon); color: #000; }
        .btn-pend { background: var(--yellow); color: #000; }
        .search-group { margin-bottom: 25px; border: 1px solid #222; padding: 10px; border-radius: 10px; }
        .search-label { font-size: 0.7rem; color: #888; margin-bottom: 5px; display: block; text-transform: uppercase; }
        input.search-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; box-sizing: border-box; margin-bottom: 10px; }
        .list-container { max-height: 350px; overflow-y: auto; }
        .item-row { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        .card-foto-virty { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; border: 2px solid var(--neon); flex-shrink: 0; }
        .card-info-virty { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .card-info-virty h3 { margin: 0; font-size: 1rem; }
        .card-info-virty p { margin: 0; font-size: 0.8rem; color: #aaa; }
        .badge-unidade { font-size: 0.75rem; font-weight: bold; color: var(--neon); text-transform: uppercase; }
        .card-actions-virty { display: flex; flex-direction: column; gap: 6px; min-width: 95px; }
        .btn-action { width: 100%; padding: 7px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 0.65rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div class="stat-btn btn-cad">CADASTRADOS ATIVOS: <span id="count-cad">0</span></div>
        <div class="stat-btn btn-pend">PENDENTES NA FILA: <span id="count-pend">0</span></div>
    </div>

    <div class="search-group">
        <label class="search-label">🔍 Solicitações Pendentes</label>
        <input type="text" class="search-input" placeholder="Filtrar pendentes..." onkeyup="filterList('list-p', this.value)">
        <div id="list-p" class="list-container"></div>
    </div>

    <div class="search-group">
        <label class="search-label">🔍 Moradores Habilitados</label>
        <input type="text" class="search-input" placeholder="Filtrar habilitados..." onkeyup="filterList('list-c', this.value)">
        <div id="list-c" class="list-container"></div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let qtdPendentes = 0;
    let qtdCadastrados = 0;

    // 📡 CORREÇÃO CIRÚRGICA: Escutador de Pendentes baseado em eventos de filhos (Leve e Econômico)
    const refPendentes = db.ref('solicitacoes_cadastro');
    refPendentes.on('child_added', unidadeSnap => {
        const un = unidadeSnap.key;
        unidadeSnap.forEach(moradorSnap => {
            qtdPendentes++;
            document.getElementById('count-pend').innerText = qtdPendentes;
            renderizarPendente(un, moradorSnap.key, moradorSnap.val());
        });
    });
    refPendentes.on('child_removed', unidadeSnap => {
        // Quando limpa o nó da unidade, decrementa o contador global e remove do DOM
        const un = unidadeSnap.key;
        const elementos = document.getElementById('list-p').querySelectorAll(`[data-unidade="${un}"]`);
        elementos.forEach(el => {
            el.remove();
            if(qtdPendentes > 0) qtdPendentes--;
        });
        document.getElementById('count-pend').innerText = qtdPendentes;
    });

    // 📡 CORREÇÃO CIRÚRGICA: Escutador de Validados baseado em eventos de filhos
    const refValidados = db.ref('moradores_validados');
    refValidados.on('child_added', unidadeSnap => {
        const un = unidadeSnap.key;
        const dados = unidadeSnap.val();
        
        // Trata nós diretos ou agrupados por morador
        if (dados.nome) {
            qtdCadastrados++; renderizarCadastrado(un, null, dados);
        } else {
            unidadeSnap.forEach(moradorSnap => {
                qtdCadastrados++; renderizarCadastrado(un, moradorSnap.key, moradorSnap.val());
            });
        }
        document.getElementById('count-cad').innerText = qtdCadastrados;
    });
    refValidados.on('child_removed', unidadeSnap => {
        const un = unidadeSnap.key;
        const elementos = document.getElementById('list-c').querySelectorAll(`[data-unidade="${un}"]`);
        elementos.forEach(el => {
            el.remove();
            if(qtdCadastrados > 0) qtdCadastrados--;
        });
        document.getElementById('count-cad').innerText = qtdCadastrados;
    });

    function renderizarPendente(un, fId, d) {
        const container = document.getElementById('list-p');
        const row = document.createElement('div');
        row.className = 'item-row';
        row.id = `pend-${un}-${fId}`;
        row.setAttribute('data-unidade', un);
        row.setAttribute('data-search', `${d.nome} ${un} ${d.cpf || ''}`.toLowerCase());

        row.innerHTML = `
            <img src="${d.foto}" class="card-foto-virty" style="border-color:var(--yellow)">
            <div class="card-info-virty">
                <span class="badge-unidade" style="color:var(--yellow)">CASA ${un}</span>
                <h3>${d.nome}</h3>
                <p><strong>CPF:</strong> ${d.cpf || '---'}</p>
            </div>
            <div class="card-actions-virty">
                <button class="btn-action" style="background:var(--neon); color:#000;" onclick="aprovar('${un}', '${fId}')">APROVAR</button>
                <button class="btn-action" style="background:var(--red); color:#fff;" onclick="recusar('${un}', '${fId}')">REJEITAR</button>
            </div>
        `;
        container.appendChild(row);
    }

    function renderizarCadastrado(un, fId, d) {
        const container = document.getElementById('list-c');
        const row = document.createElement('div');
        row.className = 'item-row';
        row.id = `cad-${un}-${fId || 'dir'}`;
        row.setAttribute('data-unidade', un);
        row.setAttribute('data-search', `${d.nome} ${un} ${d.cpf || ''}`.toLowerCase());

        row.innerHTML = `
            <img src="${d.foto || ''}" class="card-foto-virty" onerror="this.style.display='none'">
            <div class="card-info-virty">
                <span class="badge-unidade">CASA ${un}</span>
                <h3>${d.nome}</h3>
                <p><strong>CPF:</strong> ${d.cpf || '---'}</p>
            </div>
            <div class="card-actions-virty">
                <button class="btn-action" style="background:var(--blue); color:#fff;" onclick="alert('Rotina de Edição Unidade ${un}')">EDITAR</button>
                <button class="btn-action" style="background:var(--red); color:#fff;" onclick="remover('${un}', '${fId || ''}')">EXCLUIR</button>
            </div>
        `;
        container.appendChild(row);
    }

    function filterList(containerId, term) {
        const t = term.toLowerCase();
        const rows = document.getElementById(containerId).querySelectorAll('.item-row');
        rows.forEach(r => {
            const text = r.getAttribute('data-search');
            r.style.display = text.includes(t) ? 'flex' : 'none';
        });
    }

    function aprovar(un, fId) {
        db.ref(`solicitacoes_cadastro/${un}/${fId}`).once('value', s => {
            if(!s.exists()) return;
            const dados = s.val();
            db.ref(`moradores_validados/${un}/${fId}`).set({
                nome: dados.nome, cpf: dados.cpf, foto: dados.foto, ts: Date.now()
            }).then(() => {
                db.ref(`solicitacoes_cadastro/${un}/${fId}`).remove();
                document.getElementById(`pend-${un}-${fId}`).remove();
            });
        });
    }

    function recusar(un, fId) {
        if(confirm("Rejeitar solicitação?")) {
            db.ref(`solicitacoes_cadastro/${un}/${fId}`).remove().then(() => {
                const el = document.getElementById(`pend-${un}-${fId}`);
                if(el) el.remove();
            });
        }
    }

    function remover(un, fId) {
        if(confirm(`Revogar acesso da Unidade ${un}?`)) {
            const caminho = fId ? `moradores_validados/${un}/${fId}` : `moradores_validados/${un}`;
            db.ref(caminho).remove().then(() => {
                const idProcurado = fId ? `cad-${un}-${fId}` : `cad-${un}-dir`;
                const el = document.getElementById(idProcurado);
                if(el) el.remove();
                alert("Acesso revogado.");
            });
        }
    }
</script>
</body>
</html>
