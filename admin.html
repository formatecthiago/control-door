<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRTY ADMIN v1.4</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --yellow: #FFD700; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        
        /* Cabeçalho de Status */
        .stats-bar { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; }
        .stat-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; text-align: center; font-size: 0.8rem; cursor: default; }
        .btn-cad { background: var(--neon); color: #000; }
        .btn-pend { background: var(--yellow); color: #000; }

        /* Estilo das Buscas */
        .search-group { margin-bottom: 25px; border: 1px solid #222; padding: 10px; border-radius: 10px; }
        .search-label { font-size: 0.7rem; color: #888; margin-bottom: 5px; display: block; text-transform: uppercase; }
        input.search-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; box-sizing: border-box; margin-bottom: 10px; }
        input.search-input:focus { border-color: var(--neon); outline: none; }

        /* Listas e Itens */
        .list-container { max-height: 300px; overflow-y: auto; }
        .item-row { background: #0a0a0a; border-bottom: 1px solid #1a1a1a; padding: 12px; cursor: pointer; transition: 0.2s; }
        .item-row:hover { background: #151515; }
        .item-header { display: flex; justify-content: space-between; align-items: center; }
        .item-header b { color: var(--neon); font-size: 0.9rem; }
        .item-header span { color: #ccc; font-size: 0.85rem; }

        /* Detalhes (Escondidos por padrão) */
        .item-details { display: none; padding-top: 15px; border-top: 1px solid #222; margin-top: 10px; animation: slideDown 0.3s ease; }
        .item-details img { width: 120px; height: 120px; border-radius: 10px; object-fit: cover; border: 2px solid var(--neon); margin-bottom: 10px; }
        .data-grid { font-size: 0.8rem; color: #aaa; margin-bottom: 15px; }
        
        .actions { display: flex; gap: 10px; }
        .btn-action { flex: 1; padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; font-size: 0.7rem; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div class="stat-btn btn-cad">CADASTRADOS: <span id="count-cad">0</span></div>
        <div class="stat-btn btn-pend">PENDENTES: <span id="count-pend">0</span></div>
    </div>

    <div class="search-group">
        <label class="search-label">🔍 Pesquisar Solicitações (Pendentes)</label>
        <input type="text" class="search-input" id="search-p" placeholder="Nome ou Unidade..." onkeyup="filterList('list-p', this.value)">
        <div id="list-p" class="list-container"></div>
    </div>

    <div class="search-group">
        <label class="search-label">🔍 Pesquisar Moradores (Habilitados)</label>
        <input type="text" class="search-input" id="search-c" placeholder="Nome, Unidade ou CPF..." onkeyup="filterList('list-c', this.value)">
        <div id="list-c" class="list-container"></div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    // Sincronização em tempo real das solicitações pendentes
    db.ref('solicitacoes_cadastro').on('value', snap => {
        const container = document.getElementById('list-p');
        container.innerHTML = "";
        let totalPendentes = 0;

        if (snap.exists()) {
            snap.forEach(unidadeSnap => {
                const un = unidadeSnap.key;
                unidadeSnap.forEach(moradorSnap => {
                    totalPendentes++;
                    const d = moradorSnap.val();
                    const fingerprint = moradorSnap.key;
                    
                    const searchStr = `${d.nome} ${un} ${d.cpf || ''}`.toLowerCase();
                    const row = document.createElement('div');
                    row.className = 'item-row';
                    row.setAttribute('data-search', searchStr);
                    row.onclick = (e) => toggleDetails(row, e);

                    row.innerHTML = `
                        <div class="item-header">
                            <b>CASA ${un}</b>
                            <span>${d.nome}</span>
                            <small style="color:var(--yellow)">⏳</small>
                        </div>
                        <div class="item-details">
                            <img src="${d.foto}">
                            <div class="data-grid">
                                <p><strong>NOME:</strong> ${d.nome}</p>
                                <p><strong>CPF:</strong> ${d.cpf || 'Não informado'}</p>
                                <p><strong>DISPOSITIVO:</strong> ${fingerprint}</p>
                            </div>
                            <div class="actions">
                                <button class="btn-action" style="background:var(--neon); color:#000;" onclick="aprovar('${un}', '${fingerprint}')">APROVAR AGORA</button>
                                <button class="btn-action" style="background:var(--red); color:#fff;" onclick="recusar('${un}', '${fingerprint}')">REJEITAR</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(row);
                });
            });
        }
        document.getElementById('count-pend').innerText = totalPendentes;
    });

    // Sincronização em tempo real dos moradores habilitados
    db.ref('moradores_validados').on('value', snap => {
        const container = document.getElementById('list-c');
        container.innerHTML = "";
        let totalHabilitados = 0;

        if (snap.exists()) {
            snap.forEach(unidadeSnap => {
                const un = unidadeSnap.key;
                
                // Tratamento preventivo: suporta tanto a árvore antiga (objeto único) quanto a nova (múltiplos moradores por nó)
                const dadosUnidade = unidadeSnap.val();
                
                if (dadosUnidade.nome) {
                    // Registro legado/antigo do banco
                    totalHabilitados++;
                    renderizarLinhaHabilitado(container, un, dadosUnidade, null);
                } else {
                    // Estrutura moderna multigrupo
                    unidadeSnap.forEach(moradorSnap => {
                        totalHabilitados++;
                        renderizarLinhaHabilitado(container, un, moradorSnap.val(), moradorSnap.key);
                    });
                }
            });
        }
        document.getElementById('count-cad').innerText = totalHabilitados;
    });

    // Auxiliar de renderização para organização visual limpa
    function renderizarLinhaHabilitado(container, un, d, fingerprintChave) {
        const searchStr = `${d.nome} ${un} ${d.cpf || ''}`.toLowerCase();
        const row = document.createElement('div');
        row.className = 'item-row';
        row.setAttribute('data-search', searchStr);
        row.onclick = (e) => toggleDetails(row, e);

        // Chave de identificação para remoção segura
        const parametroRemover = fingerprintChave ? `'${un}', '${fingerprintChave}'` : `'${un}', null`;

        row.innerHTML = `
            <div class="item-header">
                <b>CASA ${un}</b>
                <span>${d.nome}</span>
                <small style="color:var(--neon)">✔</small>
            </div>
            <div class="item-details">
                <img src="${d.foto || ''}" onerror="this.style.display='none'">
                <div class="data-grid">
                    <p><strong>NOME:</strong> ${d.nome}</p>
                    <p><strong>CPF:</strong> ${d.cpf || 'Não informado'}</p>
                    <p><strong>STATUS:</strong> Habilitado Permanente</p>
                </div>
                <div class="actions">
                    <button class="btn-action" style="background:var(--red); color:#fff" onclick="remover(${parametroRemover})">EXCLUIR MORADOR</button>
                </div>
            </div>
        `;
        container.appendChild(row);
    }

    function toggleDetails(row, event) {
        if(event.target.tagName === 'BUTTON') return;
        const details = row.querySelector('.item-details');
        const isVisible = details.style.display === 'block';
        row.parentElement.querySelectorAll('.item-details').forEach(d => d.style.display = 'none');
        details.style.display = isVisible ? 'none' : 'block';
    }

    function filterList(containerId, term) {
        const t = term.toLowerCase();
        const rows = document.getElementById(containerId).querySelectorAll('.item-row');
        rows.forEach(r => {
            const text = r.getAttribute('data-search');
            r.style.display = text.includes(t) ? 'block' : 'none';
        });
    }

    // Ações do Administrador em Perfeita Sincronia com o Novo Banco
    function aprovar(un, fingerprint) {
        db.ref(`solicitacoes_cadastro/${un}/${fingerprint}`).once('value', s => {
            if(!s.exists()) return;
            const dados = s.val();
            
            // Grava na lista definitiva de validados preservando o fingerprint do morador
            db.ref(`moradores_validados/${un}/${fingerprint}`).set({
                nome: dados.nome,
                cpf: dados.cpf,
                foto: dados.foto,
                ts: Date.now()
            }).then(() => {
                // Remove cirurgicamente apenas esta solicitação resolvida da fila
                db.ref(`solicitacoes_cadastro/${un}/${fingerprint}`).remove();
            });
        });
    }

    function recusar(un, fingerprint) {
        if(confirm("Deseja realmente rejeitar esta solicitação de cadastro?")) {
            db.ref(`solicitacoes_cadastro/${un}/${fingerprint}`).remove();
        }
    }

    function remover(un, fingerprint) {
        if(confirm("Deseja realmente revogar o acesso deste morador?")) {
            if(fingerprint) {
                // Remove especificamente o morador selecionado daquela casa
                db.ref(`moradores_validados/${un}/${fingerprint}`).remove();
            } else {
                // Tratamento para registros antigos (limpa o nó inteiro)
                db.ref('moradores_validados/' + un).remove();
            }
        }
    }
</script>
</body>
</html>
