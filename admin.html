<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virty Admin | Gestão</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --blue: #007BFF; --red: #ff3333; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .screen { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
        .active { display: block; }
        
        /* Login */
        #s-login { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .card-login { background: #0a0a0a; border: 1px solid var(--neon); padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; }
        
        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; border-radius: 40px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 5px 0; }
        .btn-green { background: var(--neon); color: black; }
        .btn-blue { background: var(--blue); color: white; }
        
        /* Listas */
        .item-card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; border-radius: 15px; display: flex; align-items: center; margin-bottom: 10px; }
        .img-user { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--neon); margin-right: 15px; object-fit: cover; }
        .info { flex: 1; font-size: 0.85rem; }
        .info b { font-size: 1rem; color: var(--neon); display: block; }
        .btns-acao { display: flex; gap: 8px; }
        .btn-sm { padding: 8px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="s-login" class="screen active">
        <div class="card-login">
            <h2 style="color:var(--neon); text-align: center;">VIRTY ADMIN</h2>
            <input type="text" id="adm-nome" placeholder="Seu Nome">
            <input type="password" id="adm-chave" placeholder="Chave Mestra ou Token">
            <button class="btn btn-green" onclick="logarAdmin()">ENTRAR</button>
        </div>
    </div>

    <div id="s-dash" class="screen">
        <header style="border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 20px;">
            <div id="area-token" style="display:none; background:#111; padding:15px; border-radius:15px; margin-bottom:15px; border:1px dashed var(--blue)">
                <small style="color:var(--blue)">GERAR ACESSO (5 MIN)</small>
                <h2 id="token-display" style="margin:5px 0;">----</h2>
                <button class="btn-sm btn-blue" onclick="gerarToken()">GERAR NOVO TOKEN</button>
            </div>
            <span>Olá, <b id="nome-adm"></b></span>
        </header>

        <h3>PENDENTES DE APROVAÇÃO</h3>
        <div id="lista-p"></div>

        <h3 style="margin-top:30px;">MORADORES ATIVOS</h3>
        <div id="lista-m"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", projectId: "virty-access-door" };
    const app = initializeApp(config);
    const db = getDatabase(app);

    const CHAVE_MASTER = "Virty_123quatro@#";
    let admNome = "";

    window.logarAdmin = async () => {
        const nome = document.getElementById('adm-nome').value;
        const chave = document.getElementById('adm-chave').value;

        if(chave === CHAVE_MASTER) {
            entrar(nome, "super");
        } else {
            const snap = await get(ref(db, `tokens_temporarios/${chave}`));
            if(snap.exists() && (Date.now() - snap.val().ts < 300000)) {
                entrar(nome, "comum");
                remove(ref(db, `tokens_temporarios/${chave}`));
            } else { alert("Chave inválida ou expirada."); }
        }
    };

    function entrar(nome, tipo) {
        admNome = nome;
        document.getElementById('nome-adm').innerText = nome;
        document.getElementById('s-login').classList.remove('active');
        document.getElementById('s-dash').classList.add('active');
        if(tipo === "super") document.getElementById('area-token').style.display = "block";
        carregarDados();
    }

    window.gerarToken = () => {
        const tk = Math.floor(1000 + Math.random() * 9000).toString();
        set(ref(db, `tokens_temporarios/${tk}`), { ts: Date.now() });
        document.getElementById('token-display').innerText = tk;
    };

    function carregarDados() {
        // PENDENTES
        onValue(ref(db, 'moradores_pendentes'), snap => {
            const div = document.getElementById('lista-p'); div.innerHTML = "";
            snap.forEach(item => {
                const m = item.val();
                div.innerHTML += `<div class="item-card">
                    <img src="${m.foto}" class="img-user">
                    <div class="info"><b>CASA ${m.unidade} - ${m.nome}</b>CPF: ${m.cpf}<br>TEL: ${m.tel}</div>
                    <div class="btns-acao">
                        <button class="btn-sm btn-green" onclick="decidir('${m.id}', true)">OK</button>
                        <button class="btn-sm" style="background:#ff3333; color:white;" onclick="decidir('${m.id}', false)">✖</button>
                    </div>
                </div>`;
            });
        });

        // CADASTRADOS
        onValue(ref(db, 'moradores_validados'), snap => {
            const div = document.getElementById('lista-m'); div.innerHTML = "";
            snap.forEach(item => {
                const m = item.val();
                div.innerHTML += `<div class="item-card">
                    <img src="${m.foto}" class="img-user">
                    <div class="info"><b>CASA ${m.unidade} - ${m.nome}</b>ID: ${m.id}</div>
                    <div class="btns-acao">
                        <button class="btn-sm" style="background:#555; color:white;" onclick="editar('${m.id}')">EDITAR</button>
                        <button class="btn-sm" style="background:#ff3333; color:white;" onclick="deletar('${m.id}')">DELETAR</button>
                    </div>
                </div>`;
            });
        });
    }

    window.decidir = (id, aprovado) => {
        const refP = ref(db, `moradores_pendentes/${id}`);
        if(aprovado) {
            get(refP).then(s => {
                set(ref(db, `moradores_validados/${id}`), s.val());
                remove(refP);
            });
        } else { remove(refP); }
    };

    window.deletar = (id) => { if(confirm("Remover morador?")) remove(ref(db, `moradores_validados/${id}`)); };
</script>
</body>
</html>
