<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Virty Access</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; }
        header { border-bottom: 2px solid var(--neon); text-align: center; padding: 10px; margin-bottom: 20px; }
        .card { background: #080808; border: 1px solid #222; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; border-radius: 15px; }
        .thumb { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 2px solid var(--neon); }
        .info { flex: 1; font-size: 0.9rem; }
        .info b { color: var(--neon); font-size: 1rem; }
        .btn { padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        .btn-ok { background: var(--neon); color: #000; }
        .btn-del { background: #ff4d4d; color: #fff; }
        .search { width: 100%; padding: 15px; background: #111; border: 1px solid var(--neon); color: #fff; border-radius: 12px; margin-bottom: 20px; outline: none; }
    </style>
</head>
<body>
    <header><h1>ADMIN PAGE / VIRTY ACCESS</h1></header>

    <input type="text" id="busca" class="search" placeholder="Pesquisar morador..." oninput="filtrar()">

    <h2>SOLICITAÇÕES</h2>
    <div id="lista-pendentes"></div>

    <h2 style="margin-top:40px">MORADORES CADASTRADOS</h2>
    <div id="lista-ativos"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", projectId: "virty-access-door" };
    const app = initializeApp(config);
    const db = getDatabase(app);

    onValue(ref(db, 'moradores_pendentes'), (snap) => {
        const div = document.getElementById('lista-pendentes'); div.innerHTML = '';
        snap.forEach(item => {
            const m = item.val();
            div.innerHTML += `<div class="card">
                <img src="${m.foto || 'https://via.placeholder.com/50'}" class="thumb">
                <div class="info"><b>Apto ${m.unidade}</b> - ${m.nome}<br>CPF: ${m.cpf || '--'} | Tel: ${m.tel || '--'}</div>
                <button class="btn btn-ok" onclick="aprovar('${m.unidade}')">ACEITAR</button>
            </div>`;
        });
    });

    onValue(ref(db, 'moradores'), (snap) => {
        const div = document.getElementById('lista-ativos'); div.innerHTML = '';
        snap.forEach(item => {
            const m = item.val();
            div.innerHTML += `<div class="card m-item" data-n="${m.nome.toLowerCase()}">
                <img src="${m.foto}" class="thumb">
                <div class="info"><b>Apto ${m.unidade}</b> - ${m.nome}<br>CPF: ${m.cpf || '--'} | Tel: ${m.tel || '--'}</div>
                <button class="btn btn-del" onclick="excluir('${m.unidade}')">EXCLUIR</button>
            </div>`;
        });
    });

    window.aprovar = (un) => {
        onValue(ref(db, `moradores_pendentes/${un}`), (s) => {
            if(s.exists()){ set(ref(db, `moradores/${un}`), s.val()).then(() => remove(ref(db, `moradores_pendentes/${un}`))); }
        }, { onlyOnce: true });
    };

    window.excluir = (un) => { if(confirm("Excluir?")) remove(ref(db, `moradores/${un}`)); };
</script>
</body>
</html>
