<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Page | Virty Access Door</title>
    <style>
        :root { --neon-green: #39FF14; --bg-black: #000; --card-bg: #111; --red-del: #ff4d4d; --gray-edit: #555; }
        body { background: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        header { border-bottom: 2px solid var(--neon-green); padding-bottom: 15px; margin-bottom: 30px; text-align: center; }
        header h1 { margin: 0; font-size: 1.6rem; letter-spacing: 3px; font-weight: 800; }
        #data-atual { color: var(--neon-green); font-size: 1rem; margin-top: 8px; text-transform: capitalize; }

        .search-container { position: sticky; top: 10px; z-index: 100; padding-bottom: 20px; background: var(--bg-black); }
        .search-box { 
            width: 100%; max-width: 800px; margin: 0 auto; display: block; padding: 18px; 
            border-radius: 15px; border: 2px solid var(--neon-green); background: #000; 
            color: #fff; font-size: 1.1rem; outline: none;
        }

        section { width: 100%; max-width: 900px; margin: 0 auto 50px; }
        h2 { border-left: 5px solid var(--neon-green); padding-left: 15px; font-size: 1.3rem; margin-bottom: 25px; color: #eee; }

        .unit-group { background: #080808; border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 25px; }
        .unit-title { color: var(--neon-green); font-weight: 800; font-size: 1.1rem; margin-bottom: 15px; display: block; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        .user-card { display: flex; align-items: center; background: var(--card-bg); padding: 18px; border-radius: 15px; margin-bottom: 12px; gap: 20px; border: 1px solid #222; }
        .thumb-admin { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--neon-green); cursor: pointer; background: #222; }
        
        .user-info { flex: 1; }
        .user-info span { display: block; font-size: 0.95rem; margin-bottom: 4px; color: #ccc; }
        .user-info b { color: var(--neon-green); }

        .actions { display: flex; gap: 12px; }
        .btn-adm { padding: 12px 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; }
        .btn-accept { background: var(--neon-green); color: #000; }
        .btn-recuse { background: var(--red-del); color: #fff; }
        .btn-edit { background: var(--gray-edit); color: #fff; }
        .btn-delete { background: var(--red-del); color: #fff; }

        #modal-zoom { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        #modal-zoom img { max-width: 90%; max-height: 85%; border: 4px solid var(--neon-green); border-radius: 15px; }

        @media (max-width: 600px) { .user-card { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>

    <header>
        <h1>ADMIN PAGE | VIRTY ACCESS DOOR</h1>
        <div id="data-atual"></div>
    </header>

    <div class="search-container">
        <input type="text" class="search-box" id="inputBusca" placeholder="Buscar Morador..." oninput="filtrar()">
    </div>

    <section>
        <h2>NOVAS SOLICITAÇÕES (PENDENTES)</h2>
        <div id="container-pendentes"></div>
    </section>

    <section>
        <h2>MORADORES AUTORIZADOS</h2>
        <div id="container-autorizados"></div>
    </section>

    <div id="modal-zoom" onclick="this.style.display='none'">
        <img id="img-zoom" src="">
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", 
        authDomain: "virty-access-door.firebaseapp.com", 
        databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", 
        projectId: "virty-access-door"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    let basePendentes = {};
    let baseAutorizados = {};

    // 1. Escuta Pendentes
    onValue(ref(db, 'moradores_pendentes'), (snap) => {
        const container = document.getElementById('container-pendentes');
        container.innerHTML = '';
        basePendentes = snap.val() || {};
        Object.keys(basePendentes).forEach(id => {
            container.innerHTML += criarCard(basePendentes[id], id, true);
        });
    });

    // 2. Escuta Autorizados e Agrupa
    onValue(ref(db, 'moradores'), (snap) => {
        const container = document.getElementById('container-autorizados');
        container.innerHTML = '';
        baseAutorizados = snap.val() || {};
        const unidades = {};
        Object.keys(baseAutorizados).forEach(id => {
            const m = baseAutorizados[id];
            if (!unidades[m.unidade]) unidades[m.unidade] = [];
            unidades[m.unidade].push({ ...m, id });
        });
        Object.keys(unidades).sort((a,b)=>a-b).forEach(num => {
            let html = `<div class="unit-group"><span class="unit-title">UNIDADE ${num}</span>`;
            unidades[num].forEach(m => html += criarCard(m, m.id, false));
            container.innerHTML += html + `</div>`;
        });
    });

    function criarCard(m, id, pendente) {
        return `
            <div class="user-card" data-busca="${m.nome} ${m.cpf} ${m.unidade}">
                <img src="${m.foto || ''}" class="thumb-admin" onclick="abrirZoom('${m.foto}')">
                <div class="user-info">
                    <span><b>Nome:</b> ${m.nome}</span>
                    <span><b>CPF:</b> ${m.cpf} | <b>Unidade:</b> ${m.unidade}</span>
                </div>
                <div class="actions">
                    ${pendente ? `
                        <button class="btn-adm btn-accept" onclick="acaoPendente('${id}', true)">Aceitar</button>
                        <button class="btn-adm btn-recuse" onclick="acaoPendente('${id}', false)">Recusar</button>
                    ` : `
                        <button class="btn-adm btn-edit" onclick="editar('${id}')">Editar</button>
                        <button class="btn-adm btn-delete" onclick="remover('${id}')">Deletar</button>
                    `}
                </div>
            </div>
        `;
    }

    // Ação crucial: Aceitar Morador
    window.acaoPendente = (id, aprovado) => {
        const dados = basePendentes[id];
        if (aprovado) {
            // PASSO 1: Criar no Autorizados (Isso faz a tela do morador mudar)
            set(ref(db, `moradores/${id}`), { ...dados, autorizado: true })
            .then(() => {
                // PASSO 2: Só depois remove do pendente
                remove(ref(db, `moradores_pendentes/${id}`));
            });
        } else {
            remove(ref(db, `moradores_pendentes/${id}`));
        }
    };

    window.remover = (id) => {
        if(confirm("Remover este morador?")) remove(ref(db, `moradores/${id}`));
    };

    window.editar = (id) => {
        const novo = prompt("Novo Nome:", baseAutorizados[id].nome);
        if(novo) update(ref(db, `moradores/${id}`), { nome: novo });
    };

    window.abrirZoom = (src) => {
        document.getElementById('img-zoom').src = src;
        document.getElementById('modal-zoom').style.display = 'flex';
    };

    window.filtrar = () => {
        const termo = document.getElementById('inputBusca').value.toLowerCase();
        document.querySelectorAll('.user-card').forEach(card => {
            card.style.display = card.dataset.busca.toLowerCase().includes(termo) ? 'flex' : 'none';
        });
    };
</script>
</body>
</html>
