<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Virty Access</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; }
        header { border-bottom: 2px solid var(--neon); text-align: center; padding-bottom: 15px; margin-bottom: 20px; }
        .card { background: #080808; border: 1px solid #222; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; border-radius: 12px; }
        .thumb { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 1px solid var(--neon); }
        .info { flex: 1; }
        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        .btn-ok { background: var(--neon); color: #000; }
        .btn-del { background: #ff4d4d; color: #fff; }
        .btn-edit { background: #555; color: #fff; margin-right: 5px; }
        .search { width: 100%; padding: 12px; background: #111; border: 1px solid var(--neon); color: #fff; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>ADMIN PAGE / VIRTY ACCESS DOOR</h1>
        <div id="clock" style="color:var(--neon)"></div>
    </header>

    <input type="text" id="busca" class="search" placeholder="Pesquisar..." oninput="filtrar()">

    <h2>SOLICITAÇÕES</h2>
    <div id="lista-pendentes"></div>

    <h2 style="margin-top:30px">MORADORES</h2>
    <div id="lista-ativos"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", projectId: "virty-access-door" };
    const app = initializeApp(config);
    const db = getDatabase(app);

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString(); }, 1000);

    onValue(ref(db, 'moradores_pendentes'), (snap) => {
        const div = document.getElementById('lista-pendentes'); div.innerHTML = '';
        snap.forEach(item => {
            const m = item.val();
            div.innerHTML += `<div class="card">
                <div class="info"><b>Apto ${m.unidade}</b> - ${m.nome}</div>
                <button class="btn btn-ok" onclick="aprovar('${m.unidade}')">ACEITAR</button>
            </div>`;
        });
    });

    onValue(ref(db, 'moradores'), (snap) => {
        const div = document.getElementById('lista-ativos'); div.innerHTML = '';
        snap.forEach(item => {
            const m = item.val();
            div.innerHTML += `<div class="card m-item" data-n="${m.nome.toLowerCase()}">
                <div class="info"><b>Apto ${m.unidade}</b> - ${m.nome}</div>
                <button class="btn btn-edit" onclick="editar('${m.unidade}', '${m.nome}')">EDITAR</button>
                <button class="btn btn-del" onclick="excluir('${m.unidade}')">EXCLUIR</button>
            </div>`;
        });
    });

    window.aprovar = (un) => {
        onValue(ref(db, `moradores_pendentes/${un}`), (s) => {
            if(s.exists()){ set(ref(db, `moradores/${un}`), s.val()).then(() => remove(ref(db, `moradores_pendentes/${un}`))); }
        }, { onlyOnce: true });
    };

    window.excluir = (un) => { if(confirm("Remover?")) remove(ref(db, `moradores/${un}`)); };
    window.editar = (un, n) => { const nn = prompt("Novo nome:", n); if(nn) update(ref(db, `moradores/${un}`), {nome: nn}); };
    window.filtrar = () => {
        const b = document.getElementById('busca').value.toLowerCase();
        document.querySelectorAll('.m-item').forEach(i => i.style.display = i.dataset.n.includes(b) ? 'flex' : 'none');
    };
</script>
</body>
</html>
