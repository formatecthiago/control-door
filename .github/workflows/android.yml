name: Reset Full - Build Firebase APK 2026

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Baixar Código Fonte
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js (Ambiente Estável)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Configurar Java 21 (Exigência do Android Moderno)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 4. Configurar Android SDK Oficial
        uses: android-actions/setup-android@v3

      - name: 5. Instalar Dependências e Plugin Nativo do Firebase
        working-directory: ./morador-apk
        run: |
          npm install
          # Injeta o plugin nativo que cria o serviço de segundo plano do Firebase
          npm install @capacitor/push-notifications
          npx cap update

      - name: 5.5. Transferir Código Fonte (Ponte Automatizada)
        run: |
          rm -rf morador-apk/www/*
          cp -r morador/* morador-apk/www/

      - name: 6. Sincronizar e Criar Estrutura Android Nativa
        working-directory: ./morador-apk
        run: |
          npx cap add android || echo "Pasta android já existe"
          npx cap sync android

      - name: 6.8. Posicionar Credencial do Firebase e Configurar Manifesto
        working-directory: ./morador-apk
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          
          # Move o arquivo que você baixou para a pasta nativa correta do Android
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/
            echo "Aviso: google-services.json injetado com sucesso no ecossistema Android!"
          else
            echo "Erro Crítico: google-services.json não encontrado na pasta morador-apk!"
            exit 1
          fi

          echo "Injetando Permissões de Alta Prioridade para Segundo Plano..."
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST_PATH
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.RECORD_AUDIO" />' $MANIFEST_PATH
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.VIBRATE" />' $MANIFEST_PATH
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.WAKE_LOCK" />' $MANIFEST_PATH
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />' $MANIFEST_PATH

          # Garante aceleração de hardware nativa para fluxos de mídia
          sed -i 's/<activity/<activity android:hardwareAccelerated="true"/' $MANIFEST_PATH

          # Aplica a regra de automação do Google Services no Gradle nativo
          sed -i '/dependencies {/a \        classpath "com.google.gms:google-services:4.4.1"' android/build.gradle
          sed -i '/apply plugin: '\''com.android.application'\''/a apply plugin: '\''com.google.gms.google-services'\''' android/app/build.gradle

      - name: 6.9. Restaurar MainActivity Pura (Segurança Total do Cadastro)
        working-directory: ./morador-apk
        run: |
          MAIN_ACTIVITY_PATH="android/app/src/main/java/com/formatecthiago/controldoor/morador/MainActivity.java"
          cat << 'EOF' > $MAIN_ACTIVITY_PATH
          package com.formatecthiago.controldoor.morador;

          import android.os.Bundle;
          import android.view.WindowManager;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  // Mantém a tela acordada enquanto o app estiver visível
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
              }
          }
          EOF

      - name: 7. Compilar o APK com Motor Firebase Nativo
        working-directory: ./morador-apk/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 8. Disponibilizar Download do APK
        uses: actions/upload-artifact@v4
        with:
          name: VirtyMorador-Firebase-APK
          path: morador-apk/android/app/build/outputs/apk/debug/app-debug.apk
