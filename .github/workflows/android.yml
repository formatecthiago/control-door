name: Build Android APK (Cordova Nativo)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Cordova Globalmente
        run: |
          npm install -g cordova

      - name: Criar Estrutura de Pastas Obrigatória
        run: |
          mkdir -p www
          mkdir -p morador/www

      - name: Set up JDK 17 (Obrigatório para Cordova 12+)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Limpar e Adicionar Plataforma Android Atualizada
        working-directory: ./morador
        run: |
          # Remove completamente as pastas antigas para evitar arquivos fantasmas
          rm -rf platforms/
          rm -rf plugins/
          # Adiciona a versão 12 do zero, que aceita o Gradle moderno perfeitamente
          cordova platform add android@12.0.0 --no-telemetry

      - name: Build do APK com Cordova
        working-directory: ./morador
        run: |
          cordova build android --debug --no-telemetry

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: VirtyMorador-APK
          path: morador/platforms/android/app/build/outputs/apk/debug/app-debug.apk
