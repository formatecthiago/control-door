name: Build Android APK (Cordova Nativo Moderno)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js (Versão Moderna)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Cordova Moderno Globalmente
        run: |
          npm install -g cordova@12.0.0

      - name: Criar Estrutura de Pastas Obrigatória
        run: |
          mkdir -p www
          mkdir -p morador/www

      - name: Set up JDK 17 (Aproveitando o máximo de desempenho e segurança)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Usamos a ação oficial do próprio GitHub para garantir o Android SDK com Java 17
      - name: Setup Android SDK Oficial
        uses: android-actions/setup-android@v3

      - name: Reestruturar Projeto para Cordova Moderno
        working-directory: ./morador
        run: |
          # Deleta as pastas de plataformas antigas para não carregar arquivos incompatíveis
          rm -rf platforms/
          rm -rf plugins/
          
          # Atualiza o arquivo de configuração interno (package.json) para exigir a plataforma moderna
          npm install cordova-android@12.0.0 --save-exact
          
          # Adiciona a plataforma nativa atualizada, que já vem programada para o Java 17
          cordova platform add android@12.0.0 --no-telemetry

      - name: Build do APK com Cordova Moderno
        working-directory: ./morador
        run: |
          cordova build android --debug --no-telemetry

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: VirtyMorador-APK
          path: morador/platforms/android/app/build/outputs/apk/debug/app-debug.apk
