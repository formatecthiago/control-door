name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Initialize Dummy Package Node
        run: |
          if [ ! -f package.json ]; then
            echo '{"name": "virty-app", "version": "1.0.0"}' > package.json
          fi

      - name: Install Mobile Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli
          npm install @capacitor/android
          npx cap init "Virty Morador" "com.virty.controldoor" --web-dir="morador" || true

      - name: Set up JDK 17 (Requisito do Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add and Sync Android Platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Build APK com Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: VirtyMorador-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
