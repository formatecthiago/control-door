name: Build Android APK (Cordova Nativo)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar Cordova Globalmente
        run: |
          npm install -g cordova

      - name: Criar Estrutura de Pastas Obrigatória
        run: |
          mkdir -p www
          mkdir -p morador/www

      - name: Set up JDK 11 (Obrigatório para Gradle 7.x)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle Antigo (Compatível com Cordova Android 10)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.1.1'

      - name: Adicionar Plataforma Android no Cordova
        working-directory: ./morador
        run: |
          cordova platform add android@10.1.2 --no-telemetry

      - name: Build do APK com Cordova
        working-directory: ./morador
        env:
          CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-7.1.1-all.zip
        run: |
          cordova build android --debug --no-telemetry

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: VirtyMorador-APK
          path: morador/platforms/android/app/build/outputs/apk/debug/app-debug.apk
