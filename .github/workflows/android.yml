Name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Initialize Dummy Package Node
        run: |
          if [ ! -f package.json ]; then
            echo '{"name": "virty-app", "version": "1.0.0"}' > package.json
          fi

      - name: Install Mobile Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli
          npm install @capacitor/android

      - name: Configurar e Forçar URL do Morador no Capacitor
        run: |
          echo '{
            "appId": "com.virty.controldoor",
            "appName": "Virty Morador",
            "webDir": "morador",
            "server": {
              "url": "https://formatecthiago.github.io/control-door/morador/index.html",
              "cleartext": true
            },
            "android": {
              "allowMixedContent": true,
              "captureInput": true
            }
          }' > capacitor.config.json

      - name: Set up JDK 21 (Alinhado com Capacitor Novo)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add and Sync Android Platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Injetar Permissões Críticas Nativas (Tela, Câmera e Microfone)
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-permission android:name="android.permission.TURN_SCREEN_ON" />\n    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' $MANIFEST_PATH
          fi

      - name: Build APK com Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: VirtyMorador-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
