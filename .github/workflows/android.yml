name: Build Android APK (Mudança Total para Capacitor)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Baixar Código Fonte
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Configurar Java 17 (Obrigatório para Android Moderno)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 4. Configurar Android SDK Oficial
        uses: android-actions/setup-android@v3

      - name: 5. Instalar Ferramentas do Capacitor e Preparar Pastas
        run: |
          # Instala o CLI do Capacitor globalmente
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          
          # Garante que a pasta morador/www exista com pelo menos um arquivo para o build inicial
          mkdir -p morador/www
          if [ ! -f morador/www/index.html ]; then
            echo "<html><body><h1>VirtyMorador</h1></body></html>" > morador/www/index.html
          fi

      - name: 6. Criar Projeto Nativo com Capacitor (Substituindo o Cordova)
        working-directory: ./morador
        run: |
          # Cria a configuração nativa do Capacitor sem dependências do Cordova
          npx cap init VirtyMorador com.formatecthiago.controldoor.morador --web-dir=www
          
          # Adiciona a plataforma Android moderna e pura
          npm install @capacitor/android
          npx cap add android

      - name: 7. Compilar o APK com o Gradle Nativo Estável
        working-directory: ./morador/android
        run: |
          # Executa o build diretamente pelo wrapper estável do Android, sem o intermediário do Cordova
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 8. Disponibilizar Download do APK Pronto
        uses: actions/upload-artifact@v4
        with:
          name: VirtyMorador-Capacitor-APK
          path: morador/android/app/build/outputs/apk/debug/app-debug.apk
