name: Reset Full - Build APK Capacitor 2026

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Baixar Código Fonte
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js (Ambiente Estável)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Configurar Java 21 (Exigência do Android Moderno)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 4. Configurar Android SDK Oficial
        uses: android-actions/setup-android@v3

      - name: 5. Instalar Dependências do Projeto
        working-directory: ./morador-apk
        run: |
          # Instala as dependências travadas do Capacitor que colocamos no package.json
          npm install

      - name: 6. Sincronizar e Criar Estrutura Android Nativa
        working-directory: ./morador-apk
        run: |
          # Cria a pasta nativa /android baseada nas configurações limpas do arquivo json
          npx cap add android
          npx cap sync android

      - name: 7. Compilar o APK Nativo Puro
        working-directory: ./morador-apk/android
        run: |
          # Executa a compilação direto pelo motor do Android, usando o Java 21 do servidor
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 8. Disponibilizar Download do APK
        uses: actions/upload-artifact@v4
        with:
          name: VirtyMorador-ResetFull-APK
          path: morador-apk/android/app/build/outputs/apk/debug/app-debug.apk
