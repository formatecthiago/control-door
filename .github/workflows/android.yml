name: Build Android APK (Reset Definitivo)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Cordova Globalmente
        run: |
          npm install -g cordova@12.0.0

      - name: Criar Estrutura de Pastas Obrigatória
        run: |
          mkdir -p www
          mkdir -p morador/www

      - name: Set up JDK 17 (Padrão Moderno)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK Oficial
        uses: android-actions/setup-android@v3

      - name: Resetar e Atualizar Dependências do Cordova
        working-directory: ./morador
        run: |
          rm -rf platforms/
          rm -rf plugins/
          rm -f package-lock.json
          npm install cordova-android@12.0.0 --save-exact
          cordova platform add android@12.0.0 --no-telemetry

      - name: Build do APK Limpo
        working-directory: ./morador
        run: |
          cordova build android --debug --no-telemetry

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: VirtyMorador-APK
          path: morador/platforms/android/app/build/outputs/apk/debug/app-debug.apk
