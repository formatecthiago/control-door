name: Build Android APK (Cordova Nativo)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16' # Versão clássica e estável para o ecossistema Cordova antigo

      - name: Instalar Cordova Globalmente
        run: |
          npm install -g cordova@11.1.0

      - name: Criar Estrutura de Pastas Obrigatória
        run: |
          mkdir -p www
          mkdir -p morador/www

      - name: Set up JDK 11 (Obrigatório para compilações estáveis do Cordova)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Gradle Compatível Manualmente
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.6' # Última versão estável do Gradle que aceita perfeitamente o XmlParser

      - name: Limpar e Forçar Plataforma Correta
        working-directory: ./morador
        run: |
          # Remove tudo que possa estar corrompido ou preso na memória da pasta
          rm -rf platforms/
          rm -rf plugins/
          # Força o Cordova a aceitar uma versão intermediária totalmente compatível com o JDK 11 e Gradle 7.6
          cordova platform add android@10.1.2 --no-telemetry

      - name: Build do APK com Cordova
        working-directory: ./morador
        env:
          CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-7.6-bin.zip
        run: |
          cordova build android --debug --no-telemetry

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: VirtyMorador-APK
          path: morador/platforms/android/app/build/outputs/apk/debug/app-debug.apk
