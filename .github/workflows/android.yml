name: Reset Full - Build APK Capacitor 2026

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Baixar Código Fonte
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js (Ambiente Estável)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Configurar Java 21 (Exigência do Android Moderno)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 4. Configurar Android SDK Oficial
        uses: android-actions/setup-android@v3

      - name: 5. Instalar Dependências do Projeto
        working-directory: ./morador-apk
        run: |
          npm install

      - name: 5.5. Transferir Design Maravilhoso (Ponte Automatizada)
        run: |
          rm -rf morador-apk/www/*
          cp -r morador/* morador-apk/www/

      - name: 6. Sincronizar e Criar Estrutura Android Nativa
        working-directory: ./morador-apk
        run: |
          npx cap add android || echo "Pasta android já existe"
          npx cap sync android

      - name: 6.5. Injetar Configurações Ultra Agressivas (Bateria, Som, Vibração e Microfone)
        working-directory: ./morador-apk
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          MAIN_ACTIVITY_PATH="android/app/src/main/java/com/formatecthiago/controldoor/morador/MainActivity.java"

          echo "Injetando Permissões Agressivas no Manifesto..."
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST_PATH
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.RECORD_AUDIO" />' $MANIFEST_PATH
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.VIBRATE" />' $MANIFEST_PATH
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.WAKE_LOCK" />' $MANIFEST_PATH
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS" />' $MANIFEST_PATH
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' $MANIFEST_PATH

          # Garante aceleração de hardware nativa para alternar fluxos de áudio e vídeo em tempo real
          sed -i 's/<activity/<activity android:hardwareAccelerated="true"/' $MANIFEST_PATH

          # Libera bypass de navegação interna do WebView
          sed -i '/<\/capabilities>/i \    <allow-navigation href="*" />' android/app/src/main/res/xml/config.xml || echo "Config nativa ajustada"

          echo "Reescrevendo MainActivity.java com Pontes de Hardware Estáveis..."
          cat << 'EOF' > $MAIN_ACTIVITY_PATH
          package com.formatecthiago.controldoor.morador;

          import android.os.Bundle;
          import android.view.WindowManager;
          import android.content.Intent;
          import android.os.PowerManager;
          import android.net.Uri;
          import android.provider.Settings;
          import android.webkit.PermissionRequest;
          import android.webkit.WebChromeClient;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  // Força o processador e o hardware a manterem a tela ligada (Previne congelamento do Timer)
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  
                  // Solicita saída permanente do Modo de Otimização de Bateria do Android
                  if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.M) {
                      PowerManager pm = (PowerManager) getSystemService(POWER_SERVICE);
                      String packageName = getPackageName();
                      if (pm != null && !pm.isIgnoringBatteryOptimizations(packageName)) {
                          Intent intent = new Intent();
                          intent.setAction(Settings.ACTION_REQUEST_IGNORE_BATTERY_OPTIMIZATIONS);
                          intent.setData(Uri.parse("package:" + packageName));
                          startActivity(intent);
                      }
                  }
              }

              @Override
              public void onAttachedToWindow() {
                  super.onAttachedToWindow();
                  if (this.bridge != null && this.bridge.getWebView() != null) {
                      WebView webView = this.bridge.getWebView();
                      
                      // Mantém o Autoplay do som ativo sem necessidade de toque prévio na tela
                      webView.getSettings().setMediaPlaybackRequiresUserGesture(false);
                      
                      // INTERCEPTOR SEGURO: Concede permissão automática de microfone/câmera dentro do WebView
                      webView.setWebChromeClient(new WebChromeClient() {
                          @Override
                          public void onPermissionRequest(final PermissionRequest request) {
                              request.grant(request.getResources());
                          }
                      });
                  }
              }
          }
          EOF

      - name: 7. Compilar o APK Nativo Puro
        working-directory: ./morador-apk/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 8. Disponibilizar Download do APK
        uses: actions/upload-artifact@v4
        with:
          name: VirtyMorador-ResetFull-APK
          path: morador-apk/android/app/build/outputs/apk/debug/app-debug.apk
