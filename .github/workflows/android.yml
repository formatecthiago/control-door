name: Reset Full - Build APK Capacitor 2026

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Baixar Código Fonte
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js (Ambiente Estável)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Configurar Java 21 (Exigência do Android Moderno)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 4. Configurar Android SDK Oficial
        uses: android-actions/setup-android@v3

      - name: 5. Instalar Dependências do Projeto
        working-directory: ./morador-apk
        run: |
          npm install

      - name: 5.5. Transferir Design Maravilhoso (Ponte Automatizada)
        run: |
          rm -rf morador-apk/www/*
          cp -r morador/* morador-apk/www/

      - name: 6. Sincronizar e Criar Estrutura Android Nativa
        working-directory: ./morador-apk
        run: |
          npx cap add android || echo "Pasta android já existe"
          npx cap sync android

      - name: 6.5. Injetar Permissões de Câmera, Áudio, Vibração e Configurações de Som
        working-directory: ./morador-apk
        run: |
          # 1. Injeta permissões estruturais necessárias no AndroidManifest
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.RECORD_AUDIO" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.VIBRATE" />' android/app/src/main/AndroidManifest.xml
          
          # 2. Declara explicitamente o uso do hardware da câmera (Vital para funcionar o <video> no Android Moderno)
          sed -i '/<manifest/a \    <uses-feature android:name="android.hardware.camera" android:required="true" />' android/app/src/main/AndroidManifest.xml
          
          # 3. Libera o Autoplay de Áudio/Som sem restrições no WebView do Android
          sed -i '/<\/capabilities>/i \    <allow-navigation href="*" />' android/app/src/main/res/xml/config.xml || echo "Config nativa ajustada"

      - name: 7. Compilar o APK Nativo Puro
        working-directory: ./morador-apk/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 8. Disponibilizar Download do APK
        uses: actions/upload-artifact@v4
        with:
          name: VirtyMorador-ResetFull-APK
          path: morador-apk/android/app/build/outputs/apk/debug/app-debug.apk
