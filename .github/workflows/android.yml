      - name: 6.5. Inspecionar Estrutura Real do MainActivity e Manifesto
        working-directory: ./morador-apk
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          MAIN_ACTIVITY_PATH=$(find android/app/src/main/java -name "MainActivity.java")
          
          echo "=================================================="
          echo "1. CAMINHO REAL DO ARQUIVO JAVA ENCONTRADO:"
          echo "$MAIN_ACTIVITY_PATH"
          echo "=================================================="
          
          echo "2. CONTEÚDO ORIGINAL DO MAINACTIVITY.JAVA:"
          cat "$MAIN_ACTIVITY_PATH"
          echo "=================================================="
          
          echo "3. CONTEÚDO ORIGINAL DO MANIFESTO:"
          cat "$MANIFEST_PATH"
          echo "=================================================="
