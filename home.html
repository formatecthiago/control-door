<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virty Access Door</title>
    <style>
        :root { 
            --led-green: #39FF14; 
            --pure-white: #FFFFFF; 
            --true-black: #000000;
            --grafite-metal: #2c2f33; 
            --danger-red: #ff4d4d;
            --info-blue: #2980b9;
            --standard-gap: 25px; 
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: var(--true-black); 
            font-family: sans-serif; color: var(--pure-white);
        }

        /* Moldura principal com o espaçamento que você pediu */
        .moldura-global {
            width: 100%; height: 100vh;
            border: 10px solid var(--grafite-metal);
            box-sizing: border-box;
            display: flex; flex-direction: column;
            padding: var(--standard-gap);
            position: relative;
        }

        /* --- ESTILO DA HOME (HISTÓRICO) --- */
        #tela-home { display: flex; flex-direction: column; height: 100%; }
        
        .topo-id { text-align: center; margin-bottom: var(--standard-gap); }
        .topo-id h1 { font-size: 1.5rem; color: var(--led-green); margin: 0; }
        .info-apto { font-size: 0.9rem; color: #888; margin-top: 5px; }

        .lista-chamadas { flex-grow: 1; display: flex; flex-direction: column; gap: 15px; }
        .item-chamada { background: #1a1a1a; padding: 12px; border-radius: 12px; display: flex; align-items: center; border: 1px solid #333; }
        .mini-selfie { width: 50px; height: 60px; border-radius: 10px; border: 1px solid var(--led-green); background: #000; overflow: hidden; }
        .mini-selfie img { width: 100%; height: 100%; object-fit: cover; }
        .dados-chamada { flex-grow: 1; margin-left: 15px; }
        .status-v { color: var(--led-green); font-weight: bold; font-size: 1.2rem; }

        /* --- ESTILO DA CHAMADA ATIVA --- */
        #tela-chamada { display: none; flex-direction: column; align-items: center; text-align: center; height: 100%; }
        
        .foto-visitante { width: 150px; height: 180px; border-radius: 20px; border: 3px solid var(--led-green); margin-bottom: 20px; overflow: hidden; }
        .foto-visitante img { width: 100%; height: 100%; object-fit: cover; }

        .area-botoes { width: 100%; display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .btn-comando { width: 90%; padding: 18px; border-radius: 12px; border: none; color: white; font-weight: bold; font-size: 1.1rem; text-transform: uppercase; }

        /* CAIXA DE TEXTO DO BOTÃO AZUL */
        #container-mensagem { display: none; width: 90%; margin-top: 10px; }
        #input-texto { width: 100%; padding: 15px; border-radius: 8px; border: 2px solid var(--info-blue); font-size: 1rem; margin-bottom: 10px; }

        /* POP-UP BRANCO (O CAPRICHO) */
        #pop-informativo {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; background: white; color: black; border-radius: 15px; padding: 25px; z-index: 1000; text-align: center;
        }
        .x-fechar { position: absolute; top: 5px; right: 12px; font-size: 1.8rem; color: var(--danger-red); cursor: pointer; font-weight: bold; }

        /* NAVEGAÇÃO BASE */
        .base-nav { margin-top: auto; display: flex; justify-content: center; padding-top: 10px; }
        .btn-nav { font-size: 2rem; cursor: pointer; color: var(--led-green); }
    </style>
</head>
<body>

    <div class="moldura-global">
        
        <div id="tela-home">
            <div class="topo-id">
                <h1>Virty Access Door</h1>
                <div class="info-apto">ID: #9921 | UNIDADE 101</div>
            </div>

            <div class="lista-chamadas">
                <p style="color:#666; font-size: 0.8rem; text-transform: uppercase;">Histórico Recente</p>
                <div class="item-chamada">
                    <div class="mini-selfie"><img src="https://via.placeholder.com/50x60"></div>
                    <div class="dados-chamada"><b>Hoje - 12:45</b><br><small>Acesso Liberado</small></div>
                    <div class="status-v">✓</div>
                </div>
            </div>

            <div class="base-nav">
                <span onclick="mostrarChamada()" style="cursor:pointer">🔔 Simular Chamada</span>
            </div>
        </div>

        <div id="tela-chamada">
            <div class="foto-visitante">
                <img src="https://via.placeholder.com/150x180?text=Visitante">
            </div>

            <div class="area-botoes" id="bloco-acoes">
                <button class="btn-comando" style="background: var(--danger-red);" onclick="location.reload()">RECUSAR</button>
                <button class="btn-comando" style="background: var(--info-blue);" onclick="abrirEscrita()">ACEITAR / MENSAGEM</button>
                <button class="btn-comando" style="background: var(--led-green); color: black;" onclick="abrirPortao()">ABRIR PORTÃO</button>
            </div>

            <div id="container-mensagem">
                <input type="text" id="input-texto" maxlength="60" placeholder="Digite aqui...">
                <button class="btn-comando" style="background: var(--info-blue);" onclick="enviarMensagem()">ENVIAR</button>
            </div>

            <div class="base-nav">
                <span class="btn-nav" onclick="location.reload()">🏠</span>
            </div>
        </div>

    </div>

    <div id="pop-informativo">
        <span class="x-fechar" onclick="fecharPop()">×</span>
        <p>Para liberar click no botão verde liberar portão</p>
    </div>

    <script>
        function mostrarChamada() {
            document.getElementById('tela-home').style.display = 'none';
            document.getElementById('tela-chamada').style.display = 'flex';
        }

        function abrirEscrita() {
            document.getElementById('bloco-acoes').style.display = 'none';
            document.getElementById('container-mensagem').style.display = 'block';
            document.getElementById('input-texto').focus();
        }

        function enviarMensagem() {
            // Fecha a escrita e volta os botões
            document.getElementById('container-mensagem').style.display = 'none';
            document.getElementById('bloco-acoes').style.display = 'flex';
            // Abre o pop-up de capricho
            document.getElementById('pop-informativo').style.display = 'block';
        }

        function fecharPop() {
            document.getElementById('pop-informativo').style.display = 'none';
        }

        function abrirPortao() {
            alert("Portão Aberto!");
            location.reload();
        }
    </script>
</body>
</html>
