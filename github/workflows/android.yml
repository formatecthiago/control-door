name: Build Android APK

on:
  workflow_dispatch: # Permite que você clique num botão para gerar o APK quando quiser

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          node-version: 'lts/*'

      - name: Install Mobile Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli
          npm install @capacitor/android
          npx cap android add || true

      - name: Set up JDK 17 (Requisito do Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Project
        run: npx cap sync android

      - name: Build APK com Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: VirtyMorador-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
