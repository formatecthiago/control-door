<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY VISITANTE v2.0.0 - Totem Mode</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --gray: #666; }
        *, *::before, *::after { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; -webkit-user-select: none; user-select: none; }
        .video-box { width: 200px; height: 200px; border-radius: 50%; overflow: hidden; border: 3px solid var(--neon); margin: 20px auto; background: #111; }
        video, canvas { width: 100%; height: 100%; object-fit: cover; }
        input { width: 100%; max-width: 300px; padding: 16px; border-radius: 12px; border: 2px solid #222; background: #111; color: #fff; font-size: 1.2rem; text-align: center; margin-bottom: 15px; }
        .btn { width: 100%; max-width: 300px; padding: 18px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1.1rem; margin: 10px auto; display: block; }
        #status-chamada { font-size: 1.5rem; font-weight: bold; margin-top: 20px; min-height: 40px; }
    </style>
</head>
<body>

    <h1 style="color: var(--neon); letter-spacing: 2px; margin-bottom: 5px;">VIRTY PORTARIA</h1>
    <div style="font-size: 0.8rem; color: var(--gray); font-weight: bold; letter-spacing: 2px; margin-bottom: 20px;">INTERFONE DIGITAL</div>

    <div class="video-box">
        <video id="v-totem" autoplay playsinline muted></video>
        <canvas id="c-totem" style="display:none;"></canvas>
    </div>

    <input type="number" id="v-unidade" placeholder="Número do Ap / Casa">
    <input type="text" id="v-mensagem" placeholder="Recado ou Nome (Opcional)">

    <button id="btn-chamar" class="btn" style="background: var(--neon); color: #000;" onclick="iniciarChamada()">🔔 INTERFONAR</button>
    <button id="btn-desconectar" class="btn" style="background: var(--red); color: #fff; display: none;" onclick="cancelarChamada()">❌ CANCELAR</button>

    <div id="status-chamada"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let streamTotem = null;
    let fotoDataUrl = "";
    let loopMonitoramento = null;
    let tempoRestante = 90;

    // DNA Único do Totem/Visitante para bater com o histórico do Morador
    function gerarDnaVisitante() {
        const meta = [navigator.userAgent, screen.width, screen.height].join('||');
        let hash = 0;
        for (let i = 0; i < meta.length; i++) { hash = (hash << 5) - hash + meta.charCodeAt(i); hash |= 0; }
        return "V-" + Math.abs(hash).toString(16).toUpperCase();
    }
    const my_v_id = gerarDnaVisitante();

    window.onload = () => {
        inicializarCameraTotem();
    };

    function inicializarCameraTotem() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
        .then(s => {
            streamTotem = s;
            document.getElementById('v-totem').srcObject = s;
        }).catch(e => console.error("Erro ao abrir câmera do totem:", e));
    }

    function capturarFotoInstantanea() {
        const video = document.getElementById('v-totem');
        const canvas = document.getElementById('c-totem');
        if (!video.videoWidth) return "";
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        return canvas.toDataURL('image/jpeg', 0.4); // Foto compacta para o Realtime Database
    }

    function iniciarChamada() {
        const un = document.getElementById('v-unidade').value.trim();
        const msg = document.getElementById('v-mensagem').value.trim();
        if (!un) return alert("Digite o número da unidade!");

        // Verifica se o visitante está bloqueado pelo morador antes de chamar
        db.ref(`bloqueados/${un}/${my_v_id}`).once('value', bSnap => {
            if (bSnap.exists()) {
                document.getElementById('status-chamada').style.color = "var(--red)";
                document.getElementById('status-chamada').innerText = "Acesso temporariamente indisponível.";
                return;
            }

            fotoDataUrl = capturarFotoInstantanea();
            if(!fotoDataUrl) return alert("Aguarde a câmera iniciar!");

            const chamadaRef = db.ref('chamadas_ativas/' + un);
            
            chamadaRef.set({
                status: 'chamando',
                v_id: my_v_id,
                dna_dispositivo: my_v_id,
                foto: fotoDataUrl,
                texto: msg || "Visitante aguardando...",
                ts: Date.now()
            }).then(() => {
                 alternarBotoes(true);
                 monitorarRespostaMorador(un);
            });
        });
    }

    function monitorarRespostaMorador(un) {
        tempoRestante = 90;
        const statusTxt = document.getElementById('status-chamada');
        statusTxt.style.color = "var(--neon)";
        
        db.ref('chamadas_ativas/' + un).on('value', snap => {
            const dados = snap.val();
            if (!dados) {
                // Se o nó sumiu, significa que o morador rejeitou ou limpou a chamada
                finalizarCicloTotem("Chamada encerrada.");
                return;
            }

            if (dados.status === 'liberado') {
                statusTxt.style.color = "var(--neon)";
                statusTxt.innerText = "🟢 ENTRADA AUTORIZADA!";
                setTimeout(() => finalizarCicloTotem(""), 3000);
            } else if (dados.status === 'recusado') {
                statusTxt.style.color = "var(--red)";
                statusTxt.innerText = "🔴 CHAMADA RECUSADA";
                setTimeout(() => finalizarCicloTotem(""), 3000);
            } else if (dados.status === 'mensagem') {
                statusTxt.style.color = "lightblue";
                statusTxt.innerText = `💬 RECADO: ${dados.msg_morador}`;
            } else if (dados.status === 'escrevendo') {
                statusTxt.innerText = "✍️ Morador digitando...";
            } else if (dados.status === 'gravando') {
                statusTxt.innerText = "🎙️ Morador gravando áudio...";
            } else if (dados.status === 'chamando') {
                statusTxt.innerText = `🔔 Chamando... (${tempoRestante}s)`;
            }
        });

        clearInterval(loopMonitoramento);
        loopMonitoramento = setInterval(() => {
            tempoRestante--;
            if (tempoRestante <= 0) {
                db.ref('chamadas_ativas/' + un).remove();
                finalizarCicloTotem("Morador ausente (Não atendido).");
            }
        }, 1000);
    }

    function cancelarChamada() {
        const un = document.getElementById('v-unidade').value.trim();
        db.ref('chamadas_ativas/' + un).remove();
        finalizarCicloTotem("Chamada cancelada.");
    }

    function finalizarCicloTotem(mensagemMensagem) {
        const un = document.getElementById('v-unidade').value.trim();
        db.ref('chamadas_ativas/' + un).off();
        clearInterval(loopMonitoramento);
        alternarBotoes(false);
        if(mensagemMensagem) {
            document.getElementById('status-chamada').innerText = mensagemMensagem;
        } else {
            document.getElementById('status-chamada').innerText = "";
        }
    }

    function alternarBotoes(chamando) {
        document.getElementById('btn-chamar').style.display = chamando ? 'none' : 'block';
        document.getElementById('btn-desconectar').style.display = chamando ? 'block' : 'none';
        document.getElementById('v-unidade').disabled = chamando;
        document.getElementById('v-mensagem').disabled = chamando;
    }
</script>
</body>
</html>
