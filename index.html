<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRTY VISITANTE v1.5</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        #timer { font-size: 4rem; color: var(--red); font-weight: bold; }
        .status { color: var(--neon); margin: 20px; font-size: 1.2rem; }
        #tela-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .btn-x { position: absolute; top: 20px; right: 20px; font-size: 2rem; color: var(--red); background: none; border: 2px solid var(--red); border-radius: 50%; width: 60px; height: 60px; cursor: pointer; }
        .box { border: 2px solid var(--neon); padding: 20px; border-radius: 15px; width: 85%; background: #111; }
    </style>
</head>
<body>
    <div id="timer">90</div>
    <div id="status" class="status">AGUARDANDO MORADOR...</div>

    <div id="tela-final">
        <button class="btn-x" onclick="location.href='index.html'">X</button>
        <div class="box">
            <h2 style="color:var(--neon)">RESPOSTA RECEBIDA</h2>
            <p id="txt-res" style="font-size: 1.2rem;"></p>
            <audio id="player" controls style="width:100%; display:none; margin-top:10px;"></audio>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();
    const id_sessao = new URLSearchParams(window.location.search).get('un'); 

    let tempo = 90;
    const t = setInterval(() => {
        tempo--;
        document.getElementById('timer').innerText = tempo;
        if(tempo <= 0) { clearInterval(t); location.href='index.html'; }
    }, 1000);

    db.ref('chamadas_ativas/' + id_sessao).on('value', snap => {
        const d = snap.val();
        if(!d) return;
        if(d.status === 'digitando') document.getElementById('status').innerText = "MORADOR ESCREVENDO...";
        if(d.status === 'gravando') document.getElementById('status').innerText = "MORADOR GRAVANDO ÁUDIO...";
        
        if(d.status === 'finalizada_com_sucesso') {
            clearInterval(t);
            document.getElementById('txt-res').innerText = d.mensagem_texto || "Mensagem de áudio recebida.";
            if(d.link_audio) { 
                const p = document.getElementById('player'); p.src = d.link_audio; p.style.display = 'block'; 
            }
            document.getElementById('tela-final').style.display = 'flex';
            db.ref('chamadas_ativas/' + id_sessao).off();
            firebase.database().goOffline();
        }
        if(d.status === 'liberado' || d.status === 'recusado') location.href='index.html';
    });
</script>
</body>
</html>
