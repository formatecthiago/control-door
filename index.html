<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY ACCESS DOOR - Visitante</title>
    
    <!-- Link para o Manifesto PWA -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- SDKs do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #d32f2f;
            --dark: #121212;
            --light: #f5f5f5;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--dark); color: var(--light); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        .container { width: 90%; max-width: 400px; background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; }
        
        h2 { margin-bottom: 20px; color: var(--primary); }
        
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.3s; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: white; font-size: 16px; }
        
        button { width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 6px; background-color: var(--primary); color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:active { background-color: #b71c1c; }
        
        #camera-container { position: relative; width: 100%; max-width: 300px; margin: 0 auto; border-radius: 8px; overflow: hidden; background: #000; }
        video { width: 100%; display: block; }
        canvas { display: none; }
        
        .loader { border: 4px solid #333; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <!-- ETAPA 1 -->
        <div id="step-1" class="step active">
            <h2>VIRTY ACCESS DOOR</h2>
            <p>Por favor, identifique-se.</p>
            <input type="text" id="nomeVisitante" placeholder="Seu Nome Completo" required>
            <input type="number" id="unidadeDestino" placeholder="Número do Apartamento" required>
            <button onclick="avancarParaCamera()">Continuar</button>
        </div>

        <!-- ETAPA 2 -->
        <div id="step-2" class="step">
            <h2>Reconhecimento</h2>
            <p>Posicione seu rosto na câmera.</p>
            <div id="camera-container">
                <video id="videoElement" autoplay playsinline></video>
                <canvas id="canvasElement"></canvas>
            </div>
            <button onclick="capturarEEnviar()">Capturar e Tocar Campainha</button>
        </div>

        <!-- ETAPA 3 -->
        <div id="step-3" class="step">
            <h2>Aguarde...</h2>
            <div class="loader"></div>
            <p id="statusTexto">Enviando notificação para o morador...</p>
            <p style="margin-top: 15px; font-size: 12px; color: #888;" id="displayDna"></p>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "seu-projeto.firebaseapp.com",
            databaseURL: "https://seu-projeto.firebaseio.com",
            projectId: "seu-projeto",
            storageBucket: "seu-projeto.appspot.com",
            messagingSenderId: "SEU_SENDER_ID",
            appId: "SEU_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // GERAÇÃO DO DNA
        function gerarDnaVisitante() {
            const dados = navigator.userAgent + screen.width + 'x' + screen.height + navigator.language + navigator.hardwareConcurrency;
            let hash = 0;
            for (let i = 0; i < dados.length; i++) {
                const char = dados.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return 'V-' + Math.abs(hash).toString(16);
        }

        const v_id = gerarDnaVisitante();

        // CONTROLE DE CÂMERA
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvasElement');
        let fotoBase64 = "";

        function avancarParaCamera() {
            const nome = document.getElementById('nomeVisitante').value;
            const unidade = document.getElementById('unidadeDestino').value;

            if(!nome || !unidade) {
                alert("Preencha todos os campos!");
                return;
            }

            document.getElementById('step-1').classList.remove('active');
            document.getElementById('step-2').classList.add('active');

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
                .then(stream => { video.srcObject = stream; })
                .catch(err => {
                    console.error("Erro na câmera: ", err);
                    alert("Permissão de câmera negada.");
                });
        }

        function capturarEEnviar() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            fotoBase64 = canvas.toDataURL('image/jpeg', 0.7);
            
            let stream = video.srcObject;
            let tracks = stream.getTracks();
            tracks.forEach(track => track.stop());
            video.srcObject = null;

            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-3').classList.add('active');
            document.getElementById('displayDna').innerText = "Seu ID: " + v_id;

            enviarParaFirebase();
        }

        // COMUNICAÇÃO COM FIREBASE
        function enviarParaFirebase() {
            const nome = document.getElementById('nomeVisitante').value;
            const unidade = document.getElementById('unidadeDestino').value;
            const timestamp = Date.now();

            const pacoteChamada = {
                id_visitante: v_id,
                nome: nome,
                unidade: unidade,
                foto: fotoBase64,
                status: "aguardando",
                timestamp: timestamp
            };

            db.ref('chamadas_ativas/' + v_id).set(pacoteChamada)
                .then(() => { escutarRespostaMorador(); })
                .catch((error) => {
                    console.error("Erro:", error);
                    document.getElementById('statusTexto').innerText = "Erro ao conectar.";
                });
        }

        function escutarRespostaMorador() {
            const chamadaRef = db.ref('chamadas_ativas/' + v_id);
            chamadaRef.on('value', (snapshot) => {
                const dados = snapshot.val();
                if(dados) {
                    if(dados.status === "liberado") {
                        document.getElementById('statusTexto').innerText = "Acesso Liberado!";
                        document.getElementById('statusTexto').style.color = "#4CAF50";
                    } else if (dados.status === "negado") {
                        document.getElementById('statusTexto').innerText = "Acesso Recusado.";
                        document.getElementById('statusTexto').style.color = "#d32f2f";
                    }
                }
            });
        }
    </script>

    <!-- Registro do Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registrado no escopo: ', registration.scope);
                    })
                    .catch(err => {
                        console.error('Falha ao registrar o ServiceWorker: ', err);
                    });
            });
        }
    </script>
</body>
</html>
