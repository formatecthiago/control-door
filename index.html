<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY VISITANTE v1.9.7</title>
    <style>
        :root { 
            --neon: #39FF14; 
            --bg: #000; 
            --red: #FF3131; 
            --blue: #007BFF; 
            --gray: #666; 
            --yellow: #FFD700; 
            --dark-card: #0d0d0d; 
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
            -webkit-user-select: none;
            user-select: none;
        }
        
        /* Regra de Ouro: Telas centralizadas verticalmente e horizontalmente */
        .screen { 
            display: none; 
            min-height: 100vh; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            box-sizing: border-box; 
            padding: 20px 0;
        }
        .active { display: flex; }

        /* Container interno que dita os 5% de recuo de cada lado (90% de largura útil) */
        .conteudo-tela {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        input { 
            width: 100%; 
            padding: 16px; 
            margin: 8px 0; 
            border-radius: 12px; 
            border: 2px solid #222; 
            background: #111; 
            color: #fff; 
            font-size: 1.1rem;
            text-align: center;
        }
        input:focus { border-color: var(--neon); outline: none; }
        
        .btn { 
            width: 100%; 
            padding: 18px; 
            border-radius: 30px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            margin: 8px 0; 
            font-size: 1rem;
        }

        .foto-v { 
            width: 200px; 
            height: 200px; 
            border-radius: 50%; 
            border: 4px solid var(--neon); 
            object-fit: cover; 
            margin-bottom: 20px; 
            box-shadow: 0 0 25px rgba(57,255,20,0.3); 
        }

        .foto-v.recusado { border-color: var(--red); box-shadow: 0 0 25px rgba(255,49,49,0.3); }
        .foto-v.mensagem { border-color: var(--blue); box-shadow: 0 0 25px rgba(0,123,255,0.3); }
        .foto-v.liberado { border-color: var(--neon); box-shadow: 0 0 25px rgba(57,255,20,0.3); }

        .area-camera-virty { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            margin: 15px 0 25px; 
            width: 100%; 
        }
        .video-box { 
            width: 180px; 
            height: 180px; 
            border-radius: 50%; 
            overflow: hidden; 
            border: 3px solid var(--neon); 
            box-shadow: 0 0 15px rgba(57,255,20,0.3); 
            background:#111; 
            position:relative; 
        }
        .video-box video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .video-box canvas { width: 100%; height: 100%; object-fit: cover; display:none; transform: scaleX(-1); }
        .btn-inverter { 
            background: #111; 
            border: 2px solid var(--neon); 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            box-shadow: 0 0 10px rgba(57,255,20,0.2); 
        }
        .btn-inverter svg { width: 24px; height: 24px; fill: var(--neon); }

        .virty-popup { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: #0a0a0a; 
            border: 2px solid var(--neon); 
            color: #fff; 
            padding: 30px; 
            border-radius: 16px; 
            font-size: 1.3rem; 
            font-weight: bold; 
            z-index: 5000; 
            box-shadow: 0 0 35px rgba(57,255,20,0.4); 
            text-align: center; 
            width: 85%; 
            max-width: 340px; 
        }

        #timer-chamada {
            font-size: 3rem;
            color: var(--red);
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 0 10px var(--red);
        }

        /* Animação Pulsante para a Tela de Chamada ativa */
        .pulsar { animation: pulseBlink 2s infinite; }
        @keyframes pulseBlink {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        #audio-player-v { display: none; }
    </style>
</head>
<body>

    <div id="custom-alert" class="virty-popup">
        <div style="color:var(--neon); font-size:0.8rem; letter-spacing:2px; margin-bottom:12px;">VIRTY ACCESS DOOR</div>
        <div id="custom-alert-msg" style="color:#fff; font-size:1.1rem; font-weight:normal; line-height:1.4;"></div>
        <button class="btn" style="background:#fff; color:#000; padding:10px; margin-top:20px; font-size:0.85rem; border-radius:10px;" onclick="fecharAlertCustomizado()">OK</button>
    </div>

    <div id="s-inicio" class="screen active">
        <div class="conteudo-tela">
            <div style="color:var(--neon); font-size:0.8rem; letter-spacing:3px; margin-bottom:10px; font-weight:bold;">VIRTY ACCESS DOOR</div>
            <h2 style="color:#fff; margin:0 0 20px 0; letter-spacing:1px; font-weight:300;">TOQUE O INTERFONE</h2>
            
            <div class="area-camera-virty">
                <div style="width:50px;"></div> 
                <div class="video-box">
                    <video id="v-vis" autoplay playsinline muted></video>
                    <canvas id="c-vis"></canvas>
                </div>
                <button class="btn-inverter" onclick="alternarLenteCamera()">
                    <svg viewBox="0 0 24 24"><path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/></svg>
                </button>
            </div>

            <button class="btn" style="background:#fff; color:#000; margin-bottom:15px;" onclick="fotoVis()">📸 TIRAR FOTO OBRIGATÓRIA</button>
            
            <input type="number" id="v-un" placeholder="Número do Apt / Casa">
            <input type="text" id="v-texto" placeholder="Recado rápido (Opcional)">
            
            <button class="btn" style="background:var(--neon); color:#000; margin-top:10px;" onclick="dispararInterfone()">🔔 INTERFONAR</button>
        </div>
    </div>

    <div id="s-chamando" class="screen">
        <div class="conteudo-tela">
            <div id="timer-chamada">90</div>
            <img id="foto-v-chamando" class="foto-v pulsar" src="">
            <h2 style="color:var(--neon); margin:0 0 10px 0; letter-spacing:2px;">CHAMANDO MORADOR...</h2>
            <p style="color:#666; margin:0; font-size:1rem; line-height:1.4;">Aguarde na porta. O morador está recebendo o alerta em tempo real no smartphone.</p>
        </div>
    </div>

    <div id="s-feedback" class="screen">
        <div class="conteudo-tela">
            <img id="foto-v-resultado" class="foto-v" src="">
            <h1 id="titulo-feedback" style="margin:0 0 15px 0; font-size:2.2rem; letter-spacing:1px;"></h1>
            <p id="msg-feedback" style="color:#aaa; margin:0 0 30px 0; font-size:1.2rem; line-height:1.5; min-height:40px;"></p>
            
            <audio id="audio-player-v" controls></audio>
            
            <button id="btn-voltar-feedback" class="btn" style="background:#222; color:#fff; display:none;" onclick="resetarFluxoVisitante()">VOLTAR AO INÍCIO</button>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let streamCameraAtiva = null;
    let usarLenteFrontal = false; // Visitantes geralmente usam a câmera traseira do totem
    let visitanteFotoBase64 = "";
    let chamadaIdGlobal = "";
    let escutadorFirebaseAtivo = null;
    let timerRegressivoInterval = null;
    let tempoRestante Chamada = 90;

    function gerarFingerprintDispositivo() {
        const meta = [screen.width, screen.height, screen.devicePixelRatio, navigator.hardwareConcurrency || 4, navigator.language].join('||');
        let hash = 0;
        for (let i = 0; i < meta.length; i++) { hash = (hash << 5) - hash + meta.charCodeAt(i); hash |= 0; }
        return "V-" + Math.abs(hash).toString(16).toUpperCase();
    }
    const meu_fingerprint = gerarFingerprintDispositivo();

    function virtyAlert(msg) {
        document.getElementById('custom-alert-msg').innerText = msg;
        document.getElementById('custom-alert').style.display = 'block';
    }
    function fecharAlertCustomizado() { document.getElementById('custom-alert').style.display = 'none'; }

    window.onload = () => {
        inicializarCapturaVideo();
    };

    function inicializarCapturaVideo() {
        if(streamCameraAtiva) { streamCameraAtiva.getTracks().forEach(t => t.stop()); }
        const constraints = { video: { facingMode: usarLenteFrontal ? "user" : "environment" } };
        navigator.mediaDevices.getUserMedia(constraints).then(s => {
            streamCameraAtiva = s;
            const video = document.getElementById('v-vis');
            video.srcObject = s;
            video.style.transform = usarLenteFrontal ? "scaleX(-1)" : "scaleX(1)";
        }).catch(e => console.log("Erro câmera:", e));
    }

    function alternarLenteCamera() {
        usarLenteFrontal = !usarLenteFrontal;
        inicializarCapturaVideo();
    }

    function fotoVis() {
        const v = document.getElementById('v-vis'), c = document.getElementById('c-vis');
        if(!v.videoWidth) return virtyAlert("Aguarde o feed da câmera carregar.");
        c.width = v.videoWidth; c.height = v.videoHeight;
        
        const ctx = c.getContext('2d');
        if(usarLenteFrontal) {
            ctx.translate(c.width, 0);
            ctx.scale(-1, 1);
        }
        ctx.drawImage(v, 0, 0);
        ctx.setTransform(1,0,0,1,0,0);
        
        visitanteFotoBase64 = c.toDataURL('image/jpeg', 0.5);
        c.style.display = "block";
        v.style.display = "none";
        
        if(v.srcObject) { v.srcObject.getTracks().forEach(track => track.stop()); }
        virtyAlert("Sua foto foi registrada com sucesso!");
    }

    function dispararInterfone() {
        const un = document.getElementById('v-un').value.trim();
        const recado = document.getElementById('v-texto').value.trim();

        if(!visitanteFotoBase64) return virtyAlert("Por favor, tire sua foto antes de interfonar!");
        if(!un) return virtyAlert("Digite o número da unidade (Casa/Apt)!");

        // Verifica primeiro se o morador está bloqueando este dispositivo
        db.ref(`bloqueados/${un}/${meu_fingerprint}`).once('value', bSnap => {
            if(bSnap.exists()) {
                exibirFeedbackCustomizado('recusado', "ACESSO BLOQUEADO", "Este totem de acesso está restrito para esta unidade de destino.");
                return;
            }

            // Verifica se a unidade destino existe validada no condomínio
            db.ref(`moradores_validados/${un}`).once('value', mSnap => {
                if(!mSnap.exists()) {
                    virtyAlert("Unidade não encontrada ou sem moradores ativos.");
                    return;
                }

                chamadaIdGlobal = un;
                const dadosChamada = {
                    v_id: meu_fingerprint,
                    dna_dispositivo: meu_fingerprint,
                    foto: visitanteFotoBase64,
                    texto: recado || "Visitante aguardando resposta",
                    status: "chamando",
                    ts: Date.now()
                };

                db.ref(`chamadas_ativas/${un}`).set(dadosChamada).then(() => {
                    mudarTela('s-chamando');
                    document.getElementById('foto-v-chamando').src = visitanteFotoBase64;
                    iniciarTimerRegressivo();
                    escutarRespostaMorador();
                });
            });
        });
    }

    function iniciarTimerRegressivo() {
        tempoRestanteChamada = 90;
        document.getElementById('timer-chamada').innerText = tempoRestanteChamada;
        clearInterval(timerRegressivoInterval);
        timerRegressivoInterval = setInterval(() => {
            tempoRestanteChamada--;
            document.getElementById('timer-chamada').innerText = tempoRestanteChamada;
            if(tempoRestanteChamada <= 0) {
                clearInterval(timerRegressivoInterval);
                db.ref(`chamadas_ativas/${chamadaIdGlobal}`).remove();
                exibirFeedbackCustomizado('cinza', "SEM RESPOSTA", "O morador não pôde atender no momento. Tente novamente mais tarde.");
            }
        }, 1000);
    }

    function escutarRespostaMorador() {
        if(escutadorFirebaseAtivo) escutadorFirebaseAtivo.off();
        escutadorFirebaseAtivo = db.ref(`chamadas_ativas/${chamadaIdGlobal}`);
        
        escutadorFirebaseAtivo.on('value', snap => {
            const d = snap.val();
            if(!d) return;

            if(d.status === 'liberado') {
                clearInterval(timerRegressivoInterval);
                exibirFeedbackCustomizado('liberado', "ENTRADA AUTORIZADA", "Seja bem-vindo! A porta de acesso foi liberada.");
                fecharEscutadorAposTempo(5000);
            }
            else if(d.status === 'recusado') {
                clearInterval(timerRegressivoInterval);
                exibirFeedbackCustomizado('recusado', "ENTRADA RECUSADA", "A sua solicitação de entrada foi recusada pelo morador.");
                fecharEscutadorAposTempo(5000);
            }
            else if(d.status === 'mensagem') {
                clearInterval(timerRegressivoInterval);
                
                let textoResposta = d.msg_morador || "";
                if(d.audio_b64) {
                    exibirFeedbackCustomizado('mensagem', "RECADO RECEBIDO", "O morador deixou um áudio para você.");
                    const player = document.getElementById('audio-player-v');
                    player.src = d.audio_b64;
                    player.style.display = 'block';
                    player.play();
                } else {
                    exibirFeedbackCustomizado('mensagem', "RECADO DO MORADOR", `"${textoResposta}"`);
                }
                fecharEscutadorAposTempo(15000);
            }
        });
    }

    function fecharEscutadorAposTempo(ms) {
        if(escutadorFirebaseAtivo) {
            setTimeout(() => {
                escutadorFirebaseAtivo.off();
                db.ref(`chamadas_ativas/${chamadaIdGlobal}`).remove();
            }, ms);
        }
    }

    function exibirFeedbackCustomizado(tipo, titulo, mensagem) {
        mudarTela('s-feedback');
        
        const fotoResultado = document.getElementById('foto-v-resultado');
        const txtTitulo = document.getElementById('titulo-feedback');
        const txtMsg = document.getElementById('msg-feedback');
        const btnVoltar = document.getElementById('btn-voltar-feedback');
        const player = document.getElementById('audio-player-v');

        player.style.display = 'none';
        player.src = "";
        btnVoltar.style.display = 'block';

        fotoResultado.className = `foto-v ${tipo}`;
        fotoResultado.src = visitanteFotoBase64 || "https://placehold.co/200x200/0a0a0a/39FF14?text=VIRTY";
        
        txtTitulo.innerText = titulo;
        txtMsg.innerText = mensagem;

        if(tipo === 'liberado') txtTitulo.style.color = "var(--neon)";
        if(tipo === 'recusado') txtTitulo.style.color = "var(--red)";
        if(tipo === 'mensagem') txtTitulo.style.color = "var(--blue)";
        if(tipo === 'cinza') txtTitulo.style.color = "var(--gray)";
    }

    function resetarFluxoVisitante() {
        clearInterval(timerRegressivoInterval);
        if(escutadorFirebaseAtivo) escutadorFirebaseAtivo.off();
        
        visitanteFotoBase64 = "";
        document.getElementById('v-un').value = "";
        document.getElementById('v-texto').value = "";
        
        document.getElementById('c-vis').style.display = "none";
        document.getElementById('v-vis').style.display = "block";
        
        mudarTela('s-inicio');
        inicializarCapturaVideo();
    }

    function mudarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        if(id !== 's-inicio' && streamCameraAtiva) {
            streamCameraAtiva.getTracks().forEach(t => t.stop());
            streamCameraAtiva = null;
        }
    }
</script>
</body>
</html>
