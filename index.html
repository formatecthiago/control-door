<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interfone Digital</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 40px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; width: 85%; max-width: 380px; }
        h1 { font-size: 26px; margin-bottom: 5px; color: #00d2ff; }
        p { font-size: 14px; opacity: 0.7; margin-bottom: 30px; }
        button { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; border: none; padding: 20px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,210,255,0.4); transition: 0.3s; }
        button:active { transform: scale(0.96); }
        #status { margin-top: 20px; font-size: 15px; font-weight: 500; height: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="txtCasa">Acessando...</h1>
        <p>Toque abaixo para notificar o morador</p>
        <button onclick="chamar()">🔔 CHAMAR AGORA</button>
        <div id="status"></div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const casa = params.get('casa') || "Portaria";
        document.getElementById('txtCasa').innerText = "Casa " + casa;

        function chamar() {
            const st = document.getElementById('status');
            st.innerText = "Enviando sinal...";
            db.ref('chamadas/casa_' + casa).set({
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                status: "chamando"
            }).then(() => {
                st.innerText = "🔔 O morador foi avisado!";
                st.style.color = "#00ff88";
            }).catch(e => { st.innerText = "Erro de conexão"; });
        }
    </script>
</body>
</html>
