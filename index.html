<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virty Access - Visitante</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
        .screen { display: none; width: 100%; max-width: 450px; flex-direction: column; align-items: center; padding: 20px; text-align: center; box-sizing: border-box; }
        .active { display: flex; }
        
        /* Tela Inicial */
        .seta { font-size: 3rem; color: var(--neon); margin-bottom: 10px; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
        h1 { font-size: 3.5rem; font-weight: 900; color: var(--neon); margin: 10px 0; line-height: 1; }

        /* Video e Selfie */
        .video-box { width: 100%; height: 320px; background: #111; border-radius: 20px; overflow: hidden; border: 2px solid var(--neon); margin-bottom: 15px; position: relative; }
        video, canvas { width: 100%; height: 100%; object-fit: cover; }
        #photo-taken { position: absolute; top: 0; left: 0; display: none; z-index: 5; }

        /* Inputs e Botões */
        input { width: 100%; padding: 18px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: white; font-size: 1.1rem; text-align: center; box-sizing: border-box; }
        .btn { width: 100%; padding: 22px; border-radius: 40px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 8px 0; font-size: 1rem; }
        .btn-green { background: var(--neon); color: black; }
        .btn-white { background: #fff; color: #000; }
        .btn-red { background: #ff3333; color: white; }

        /* Pop-up de Status */
        #popup-status { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #111; border: 3px solid var(--neon); padding: 30px; width: 80%; 
            border-radius: 20px; z-index: 100; box-shadow: 0 0 50px rgba(0,0,0,1);
        }
    </style>
</head>
<body>

    <div id="t1" class="screen active">
        <h2 style="font-size: 2rem; margin-top: 50px;">Olá.</h2>
        <h1>INICIE SUA CHAMADA AGORA</h1>
        <div class="seta">↓</div>
        <button class="btn btn-green" onclick="abrirCam()">CLIQUE AQUI PARA INICIAR</button>
    </div>

    <div id="t2" class="screen">
        <div class="video-box">
            <video id="v" autoplay playsinline muted></video>
            <canvas id="photo-taken"></canvas>
        </div>
        <button class="btn btn-white" onclick="tirarSelfie()">📷 CAPTURAR IMAGEM (OBRIGATÓRIO)</button>
        <input type="number" id="un" placeholder="Número da Casa" inputmode="numeric">
        <input type="text" id="msg" placeholder="Mensagem (Opcional)" maxlength="60">
        <button id="btn-chamar" class="btn btn-green" onclick="chamar()" disabled style="opacity: 0.3;">CHAMAR AGORA</button>
    </div>

    <div id="t3" class="screen">
        <div id="timer" style="font-size: 6rem; color: var(--neon); margin: 30px 0;">60</div>
        <p id="txt-status">Chamando Unidade <b id="view-un"></b>...</p>
        
        <div id="controles-final" style="display:none; width:100%">
            <button class="btn btn-green" onclick="voltarParaSelfie()">CHAMAR NOVAMENTE</button>
            <button class="btn btn-red" onclick="location.reload()">FECHAR</button>
        </div>
        <button id="btn-canc-imediato" class="btn btn-red" onclick="location.reload()">CANCELAR</button>
    </div>

    <div id="popup-status">
        <h2 id="pop-titulo" style="color:var(--neon); font-size: 2rem;"></h2>
        <p id="pop-msg" style="font-size: 1.2rem;"></p>
    </div>

    <audio id="som-ring" loop src="https://assets.mixkit.co/active_storage/sfx/1360/1360-preview.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", projectId: "virty-access-door" };
    const app = initializeApp(config);
    const db = getDatabase(app);
    let b64 = "", timerInterval, unidadeAtual = "";

    window.abrirCam = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('v').srcObject = stream;
            document.getElementById('t1').classList.remove('active');
            document.getElementById('t2').classList.add('active');
        } catch { alert("Por favor, autorize a câmera."); }
    };

    window.tirarSelfie = () => {
        const canv = document.getElementById('photo-taken');
        const video = document.getElementById('v');
        canv.width = video.videoWidth; canv.height = video.videoHeight;
        canv.getContext('2d').drawImage(video, 0, 0);
        b64 = canv.toDataURL('image/jpeg', 0.5);
        canv.style.display = "block";
        document.getElementById('btn-chamar').disabled = false;
        document.getElementById('btn-chamar').style.opacity = "1";
    };

    window.chamar = () => {
        unidadeAtual = document.getElementById('un').value;
        if(!unidadeAtual) return alert("Informe o número da casa.");
        
        document.getElementById('view-un').innerText = unidadeAtual;
        document.getElementById('t2').classList.remove('active');
        document.getElementById('t3').classList.add('active');
        document.getElementById('som-ring').play();

        set(ref(db, `chamadas_ativas/${unidadeAtual}`), { 
            status: "chamando", 
            foto: b64, 
            texto_visitante: document.getElementById('msg').value || "Visitante na porta" 
        });

        let tempo = 60;
        timerInterval = setInterval(() => {
            tempo--;
            document.getElementById('timer').innerText = tempo;
            if(tempo <= 0) pararChamada("Sem resposta.");
        }, 1000);

        // Ouvir resposta do morador
        onValue(ref(db, `chamadas_ativas/${unidadeAtual}`), (snap) => {
            const dados = snap.val();
            if(!dados) return;

            if(dados.status === "liberado") {
                exibirPopup("ENTRADA LIBERADA", "O portão foi aberto.");
                setTimeout(() => location.reload(), 4000);
            } 
            else if(dados.status === "recusado") {
                exibirPopup("CHAMADA RECUSADA", "O morador não pode atender no momento.");
                setTimeout(() => location.reload(), 4000);
            }
            else if(dados.msg_morador) {
                exibirPopup("MENSAGEM DO MORADOR", dados.msg_morador);
                pararChamada("Mensagem recebida.");
            }
        });
    };

    function exibirPopup(titulo, msg) {
        clearInterval(timerInterval);
        document.getElementById('som-ring').pause();
        document.getElementById('pop-titulo').innerText = titulo;
        document.getElementById('pop-msg').innerText = msg;
        document.getElementById('popup-status').style.display = 'block';
    }

    function pararChamada(motivo) {
        clearInterval(timerInterval);
        document.getElementById('som-ring').pause();
        document.getElementById('txt-status').innerText = motivo;
        document.getElementById('timer').style.display = 'none';
        document.getElementById('btn-canc-imediato').style.display = 'none';
        document.getElementById('controles-final').style.display = 'block';
    }

    window.voltarParaSelfie = () => {
        document.getElementById('popup-status').style.display = 'none';
        document.getElementById('controles-final').style.display = 'none';
        document.getElementById('timer').style.display = 'block';
        document.getElementById('timer').innerText = '60';
        document.getElementById('btn-canc-imediato').style.display = 'block';
        document.getElementById('t3').classList.remove('active');
        document.getElementById('t2').classList.add('active');
    };
</script>
</body>
</html>
