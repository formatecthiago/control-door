<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY VISITANTE v15.2</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .screen { display: none; width: 100%; max-width: 450px; flex-direction: column; align-items: center; padding: 25px; text-align: center; box-sizing: border-box; }
        .active { display: flex; }
        
        /* CÂMERA CIRCULAR */
        .video-box { width: 220px; height: 220px; border-radius: 50%; overflow: hidden; border: 3px solid var(--neon); margin: 20px 0; background: #111; position: relative; box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); }
        video, canvas { width: 100%; height: 100%; object-fit: cover; }
        
        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #111; color: white; text-align: center; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 18px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 10px 0; font-size: 1rem; transition: 0.2s; }
        .btn-green { background: var(--neon); color: black; }
        .btn:disabled { background: #222; color: #555; cursor: not-allowed; }
        
        /* TIMER REGRESSIVO */
        #timer-display { font-size: 5.5rem; font-weight: bold; color: var(--neon); margin: 20px 0; font-variant-numeric: tabular-nums; text-shadow: 0 0 15px rgba(57, 255, 20, 0.4); }
        
        /* POPUP DE RESPOSTA */
        #popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#0a0a0a; border:2px solid var(--neon); padding:25px; border-radius:20px; width:85%; z-index:1000; text-align:center; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <div id="t0" class="screen active">
        <h1 style="color:var(--neon); margin-top:60px; letter-spacing:2px; font-style: italic;">VIRTY ACCESS</h1>
        <p style="color:#555; margin-bottom:30px;">Identificação de Visitante</p>
        <button class="btn btn-green" onclick="solicitarPermissoes()">INICIAR ACESSO</button>
    </div>

    <div id="t1" class="screen">
        <div class="video-box">
            <video id="v" autoplay playsinline muted></video>
            <canvas id="c-snap" style="display:none;"></canvas>
        </div>
        <button id="btn-snap" class="btn" style="background:#fff; color:#000;" onclick="tirarFoto()">📸 TIRAR FOTO</button>
        <input type="number" id="un" placeholder="Número da Unidade (Ex: 8)">
        <input type="text" id="msg" placeholder="Recado (opcional)">
        <button id="btn-go" class="btn btn-green" onclick="chamar()" disabled>TOCAR CAMPAINHA</button>
    </div>

    <div id="t2" class="screen">
        <div id="timer-display">60</div>
        <p style="font-size: 1.1rem; color: #888;">CHAMANDO UNIDADE <b id="view-un" style="color:var(--neon)"></b></p>
    </div>

    <div id="popup">
        <h2 id="pop-t" style="color:var(--neon)"></h2>
        <p id="pop-m" style="margin: 15px 0; font-size: 1.1rem; color: #fff;"></p>
        <button class="btn btn-green" onclick="location.reload()">FECHAR</button>
    </div>

    <audio id="som-call" loop src="https://assets.mixkit.co/active_storage/sfx/1360/1360-preview.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    function gerarFingerprint() {
        const specs = [navigator.userAgent, screen.width, screen.height, navigator.language].join('|');
        let hash = 0;
        for (let i = 0; i < specs.length; i++) { hash = ((hash << 5) - hash) + specs.charCodeAt(i); hash |= 0; }
        return 'V-' + Math.abs(hash).toString(16).toUpperCase();
    }
    const v_id = localStorage.getItem('virty_vid') || gerarFingerprint();
    localStorage.setItem('virty_vid', v_id);

    let b64 = "";
    let timerInt = null;
    const video = document.getElementById('v'), canvas = document.getElementById('c-snap');

    async function solicitarPermissoes() {
        try { 
            video.srcObject = await navigator.mediaDevices.getUserMedia({video: {facingMode:"user"}}); 
            mudarTela('t1'); 
        } catch (e) { alert("Câmera necessária."); }
    }

    function tirarFoto() {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        b64 = canvas.toDataURL('image/jpeg', 0.5);
        canvas.style.display="block"; video.style.display="none";
        document.getElementById('btn-go').disabled = false;
    }

    function chamar() {
        const unVal = String(document.getElementById('un').value).trim();
        if(!unVal) return alert("Digite a unidade.");

        db.ref('bloqueios/' + unVal + '/' + v_id).once('value', snapshot => {
            if (snapshot.exists()) return alert("BLOQUEADO.");

            db.ref('moradores_validados/' + unVal).once('value', snapUn => {
                if (!snapUn.exists()) return alert("Unidade inválida.");

                mudarTela('t2');
                document.getElementById('view-un').innerText = unVal;
                document.getElementById('som-call').play().catch(e=>{});
                
                const refCall = db.ref('chamadas_ativas/' + unVal);
                refCall.set({ status: "chamando", foto: b64, texto: document.getElementById('msg').value, v_id: v_id, ts: Date.now() });

                let t = 60;
                timerInt = setInterval(() => {
                    t--;
                    document.getElementById('timer-display').innerText = t;
                    if(t <= 0) { clearInterval(timerInt); refCall.remove(); showPop("SEM RESPOSTA", "Tente mais tarde."); }
                }, 1000);

                refCall.on('value', s => {
                    const d = s.val();
                    if(!d) return;
                    if(d.status !== "chamando") {
                        clearInterval(timerInt);
                        document.getElementById('som-call').pause();
                        if(d.status === "liberado") showPop("LIBERADO", "Pode entrar!");
                        if(d.status === "recusado") showPop("RECUSADO", "Morador ocupado.");
                        if(d.status === "mensagem") showPop("MENSAGEM", d.msg_morador);
                    }
                });
                refCall.onDisconnect().remove();
            });
        });
    }

    function mudarTela(id) { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
    }

    function showPop(t, m) { 
        document.getElementById('pop-t').innerText = t; 
        document.getElementById('pop-m').innerText = m; 
        document.getElementById('popup').style.display = "block"; 
    }
</script>
</body>
</html>
