<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interfone Black Edition v6.3</title>
    <style>
        :root { --led-green: #39FF14; --pure-white: #FFFFFF; --true-black: #000000; }
        
        /* UNIFICAÇÃO DO PRETO EM TODA A INTERFACE */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--true-black); font-family: sans-serif; }

        .moldura-global {
            position: fixed; width: 100vw; height: 100vh;
            background-color: var(--true-black); /* Preto absoluto */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 8px solid #222; box-sizing: border-box; z-index: 5;
        }

        /* CONTAINER REDUZIDO EM 30% E POSICIONADO MAIS ACIMA */
        .container-central {
            position: relative; 
            width: 200px; /* Reduzido de 290px */
            height: 270px; /* Reduzido de 390px */
            margin-top: -50px; /* Sobe o painel na tela */
            border-radius: 50% 50% 45% 45%;
            overflow: hidden; 
            background: var(--true-black); 
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; text-align: center;
        }
        .com-guia { border: 4px solid var(--led-green); box-shadow: 0 0 20px var(--led-green); }

        .conteudo { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* BOTÕES AGORA FORA DO PAINEL CENTRAL */
        .area-botoes {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px; /* Espaço entre o oval e os botões */
        }

        .btn-inox { 
            background: #27ae60; color: white; padding: 18px; width: 80%; 
            border-radius: 10px; border: none; font-weight: bold; 
            font-size: 1.2rem; cursor: pointer; margin-bottom: 15px; 
        }
        .vermelho { background: #c0392b; }

        input { 
            width: 75%; padding: 12px; margin: 10px; 
            background: var(--pure-white); color: var(--true-black); 
            border: 2px solid var(--led-green); text-align: center; 
            font-size: 1.8rem; font-weight: bold; border-radius: 8px;
        }

        .lcd-text { color: var(--pure-white); font-family: 'Courier New', monospace; font-size: 1.2rem; margin: 10px; font-weight: bold; }
        .msg-privacidade { color: var(--pure-white); font-size: 0.8rem; margin-top: 20px; text-align: center; padding: 0 25px; opacity: 0.9; }
    </style>
</head>
<body>

    <div class="moldura-global">
        <div class="container-central" id="main-container">
            <div id="step-1" class="conteudo" style="display: flex;">
                <div class="lcd-text">PRONTO</div>
            </div>

            <div id="step-2" class="conteudo">
                <video id="video" autoplay playsinline muted></video>
            </div>

            <div id="step-3" class="conteudo">
                <div class="lcd-text">UNIDADE</div>
            </div>

            <div id="step-4" class="conteudo">
                <div id="timer" style="font-size: 3.5rem; color: var(--pure-white);">60</div>
            </div>

            <div id="step-5" class="conteudo">
                <div class="lcd-text" style="color: var(--led-green);">AUTORIZADO</div>
            </div>
        </div>

        <div class="area-botoes">
            <div id="btn-step-1" style="display: block; width: 100%; text-align: center;">
                <button class="btn-inox" onclick="passo2()">INICIAR ACESSO</button>
            </div>
            
            <div id="btn-step-2" style="display: none; width: 100%; text-align: center;">
                <button class="btn-inox" onclick="passo3()">ENVIAR SELFIE</button>
            </div>

            <div id="btn-step-3" style="display: none; width: 100%; text-align: center;">
                <input type="number" id="unidade" placeholder="CASA">
                <button class="btn-inox" onclick="passo4()">CHAMAR AGORA</button>
            </div>

            <div id="btn-step-4" style="display: none; width: 100%; text-align: center;">
                <div class="lcd-text">CHAMANDO...</div>
                <button class="btn-inox vermelho" onclick="location.reload()">CANCELAR</button>
            </div>
        </div>

        <div class="msg-privacidade">
            <strong>BIOMETRIA MONITORADA</strong><br>
            Acesso restrito e identificado.
        </div>
    </div>

<script>
    let stream, timerInterval, audioCtx;

    function showStep(n) {
        // Esconde todos os conteúdos e botões
        document.querySelectorAll('.conteudo').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.area-botoes > div').forEach(d => d.style.display = 'none');
        
        // Mostra o específico
        document.getElementById('step-'+n).style.display = 'flex';
        if(document.getElementById('btn-step-'+n)) {
            document.getElementById('btn-step-'+n).style.display = 'block';
        }
        
        // Controle da Guia Verde
        if(n === 2) document.getElementById('main-container').classList.add('com-guia');
        else document.getElementById('main-container').classList.remove('com-guia');
    }

    async function passo2() {
        showStep(2);
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        document.getElementById('video').srcObject = stream;
    }

    function passo3() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        showStep(3);
        setTimeout(() => document.getElementById('unidade').focus(), 500);
    }

    function passo4() {
        if(!document.getElementById('unidade').value) return;
        showStep(4);
        iniciarContagem();
    }

    function iniciarContagem() {
        let t = 60;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            t--;
            document.getElementById('timer').innerText = t;
            if(t <= 0) {
                clearInterval(timerInterval);
                alert("Sem resposta.");
                location.reload();
            }
        }, 1000);
    }
</script>
</body>
</html>
