<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interfone Digital - Visitante</title>
    
    <!-- Bibliotecas do Firebase -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    
    <!-- Seus scripts na raiz -->
    <script src="config.js"></script>
    <script src="auth.js"></script>

    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; max-width: 90%; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; }
        #status { margin-top: 15px; font-weight: bold; color: #555; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="casaNome">Chamando...</h1>
        <button onclick="enviarChamada()">🔔 CHAMAR MORADOR</button>
        <div id="status">Aguardando...</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const casa = params.get('casa') || "Principal";
        document.getElementById('casaNome').innerText = "Casa " + casa;

        function enviarChamada() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Enviando alerta...";
            
            db.ref('chamadas/casa_' + casa).set({
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                status: "chamando"
            }).then(() => {
                statusDiv.innerText = "🔔 Morador avisado!";
                statusDiv.style.color = "green";
            }).catch(e => alert("Erro: " + e.message));
        }
    </script>
</body>
</html>
