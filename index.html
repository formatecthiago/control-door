<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRTY VISITANTE</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; }
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .screen { display: none; padding: 20px; }
        .active { display: block; }
        .video-box { width: 200px; height: 200px; border-radius: 50%; overflow: hidden; border: 3px solid var(--neon); margin: 20px auto; }
        .btn { width: 100%; max-width: 300px; padding: 15px; border-radius: 25px; border: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="t-id" class="screen active">
        <h2 style="color:var(--neon)">IDENTIFICAÇÃO</h2>
        <div class="video-box"><video id="v" style="width:100%; height:100%; object-fit:cover;" autoplay playsinline muted></video></div>
        <button class="btn" onclick="tirarFoto()">📸 TIRAR FOTO</button>
        <input type="number" id="un" placeholder="Unidade" style="width:80%; padding:10px; margin:10px 0; border-radius:10px;">
        <button id="btn-chamar" class="btn" style="background:var(--neon)" onclick="chamar()">TOCAR CAMPAINHA</button>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    function getVirtyID() {
        let id = localStorage.getItem('virty_uuid');
        if(!id) {
            id = 'ID-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            localStorage.setItem('virty_uuid', id);
        }
        return id;
    }
    const v_id = getVirtyID();
    let b64 = "";

    window.onload = () => {
        navigator.mediaDevices.getUserMedia({video:true}).then(s => document.getElementById('v').srcObject = s);
    }

    function tirarFoto() {
        const v = document.getElementById('v');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        b64 = c.toDataURL('image/jpeg', 0.5);
        alert("Foto capturada!");
    }

    async function chamar() {
        const un = document.getElementById('un').value;
        if(!b64 || !un) return alert("Foto e Unidade obrigatórios!");

        // VERIFICAÇÃO DE BLOQUEIO (Item 6)
        const blockRef = db.ref(`bloqueados/${un}/${v_id}`);
        const blockCheck = await blockRef.once('value');
        
        if(blockCheck.exists()) {
            alert("Desculpe, a chamada não pôde ser completada.");
            return;
        }

        db.ref(`chamadas_ativas/${un}`).set({
            status: "chamando", foto: b64, v_id: v_id, ts: Date.now()
        });
        alert("Chamando morador...");
    }
</script>
</body>
</html>
