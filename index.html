<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interfone Black Edition v6.11</title>
    <style>
        /* DEFINIÇÃO DE CORES: SAINDO DO METAL BRANCO PARA O GRAFITE */
        :root { 
            --led-green: #39FF14; 
            --pure-white: #FFFFFF; 
            --true-black: #000000;
            --grafite-metal: #2c2f33; /* Cinza Grafite */
            --grafite-dark: #1a1c1e;
        }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--true-black); font-family: sans-serif; }

        .moldura-global {
            position: fixed; width: 100vw; height: 100vh;
            background-color: var(--true-black);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            /* Borda agora em Grafite */
            border: 10px solid var(--grafite-metal); 
            box-sizing: border-box; z-index: 5;
        }

        .container-central {
            position: relative; width: 90%; height: auto; 
            margin-top: 10px; overflow: hidden; 
            background: var(--true-black); 
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; text-align: center; padding: 20px;
        }

        .conteudo { display: none; width: 100%; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        
        /* Moldura da Câmera em Grafite */
        #video { 
            width: 100%; height: auto; max-height: 45vh; object-fit: cover; 
            transform: scaleX(-1); border: 4px solid var(--led-green); 
            border-radius: 12px; margin: 15px 0; 
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
        }

        /* ESTILO DO CHECK DE SUCESSO */
        .check-sucesso { font-size: 8rem; color: var(--led-green); margin-bottom: 20px; text-shadow: 0 0 20px var(--led-green); }

        .area-botoes { width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: 10px; }

        .btn-inox { 
            background: #27ae60; color: white; padding: 20px; width: 85%; 
            border-radius: 12px; border: none; font-weight: bold; 
            font-size: 1.4rem; cursor: pointer; margin-bottom: 12px; 
            text-transform: uppercase; box-shadow: 0 4px 0 #1e8449;
        }

        .welcome-msg { color: var(--pure-white); text-align: center; margin-bottom: 25px; width: 100%; }
        .welcome-msg h1 { font-size: 3rem; margin: 0; }
        .welcome-msg p { font-size: 2rem; margin: 10px 0 0; font-weight: bold; }

        .lcd-text { color: var(--pure-white); font-family: 'Courier New', monospace; font-size: 1.5rem; margin: 10px; font-weight: bold; text-transform: uppercase; }
        
        .msg-privacidade-inicial { 
            color: #888; font-size: 0.8rem; line-height: 1.4; 
            margin-top: 20px; max-width: 300px; text-align: center; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="moldura-global">
        <div class="container-central" id="main-container">
            <div id="step-1" class="conteudo" style="display: flex;">
                <div class="welcome-msg">
                    <h1>Olá!</h1>
                    <p>Toque em INICIAR para solicitar o seu acesso.</p>
                </div>
            </div>

            <div id="step-2" class="conteudo"><video id="video" autoplay playsinline muted></video></div>

            <div id="step-3" class="conteudo"><div class="lcd-text">IDENTIFIQUE A UNIDADE</div></div>

            <div id="step-4" class="conteudo"><div id="timer" style="font-size: 4.5rem; color: var(--pure-white);">60</div></div>

            <div id="step-5" class="conteudo">
                <div class="check-sucesso">✓</div>
                <div class="lcd-text" style="font-size: 2rem;">ACESSO LIBERADO!</div>
            </div>
        </div>

        <div class="area-botoes">
            <div id="btn-step-1" style="display: block; width: 100%; text-align: center;">
                <button class="btn-inox" onclick="passo2()">INICIAR</button>
                <div class="msg-privacidade-inicial">BIOMETRIA E LOCALIZAÇÃO MONITORADAS.</div>
            </div>
            
            <div id="btn-step-2" style="display: none; width: 100%; text-align: center;">
                <button class="btn-inox" onclick="passo3()">ENVIAR SELFIE</button>
            </div>

            <div id="btn-step-3" style="display: none; width: 100%; text-align: center;">
                <input type="number" id="unidade" style="width:70%; padding:15px; font-size:2rem; margin-bottom:15px; border-radius:8px; text-align:center;" placeholder="000">
                <button class="btn-inox" onclick="passo4()">CHAMAR</button>
            </div>

            <div id="btn-step-4" style="display: none; width: 100%; text-align: center;">
                <div class="lcd-text" id="status-label">CHAMANDO...</div>
                <button class="btn-inox" style="background:#2980b9; font-size: 0.8rem;" onclick="passo5()">[ SIMULAR ACEITE ]</button>
                <button class="btn-inox" style="background:#c0392b" onclick="location.reload()">CANCELAR</button>
            </div>

            <div id="btn-step-5" style="display: none; width: 100%; text-align: center;">
                <button class="btn-inox" style="background:#2c3e50" onclick="location.reload()">FINALIZAR</button>
            </div>
        </div>
    </div>

<script>
    let stream, timerInterval, audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    
    function tocarSom(tipo) {
        if (!audioCtx) return;
        const gain = audioCtx.createGain(); gain.connect(audioCtx.destination);
        const osc = audioCtx.createOscillator(); osc.type = 'square'; osc.connect(gain);
        if(tipo === 'chamada') { osc.frequency.setValueAtTime(880, audioCtx.currentTime); osc.start(); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2); osc.stop(audioCtx.currentTime + 1.2); }
        else if (tipo === 'sucesso') { /* Som de liberação: Tom ascendente */
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }
    }

    function showStep(n) {
        document.querySelectorAll('.conteudo').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.area-botoes > div').forEach(d => d.style.display = 'none');
        document.getElementById('step-'+n).style.display = 'flex';
        if(document.getElementById('btn-step-'+n)) document.getElementById('btn-step-'+n).style.display = 'block';
    }

    async function passo2() { initAudio(); showStep(2); try { stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }); document.getElementById('video').srcObject = stream; } catch(e) { alert("Câmera OFF."); } }
    
    function passo3() { if(stream) stream.getTracks().forEach(t => t.stop()); showStep(3); }

    function passo4() { if(!document.getElementById('unidade').value) return; showStep(4); iniciarContagem(); }

    function passo5() { 
        clearInterval(timerInterval); 
        tocarSom('sucesso');
        showStep(5); 
    }

    function iniciarContagem() {
        let t = 60; clearInterval(timerInterval); tocarSom('chamada');
        timerInterval = setInterval(() => {
            t--; document.getElementById('timer').innerText = t;
            if(t % 4 === 0 && t > 0) tocarSom('chamada');
            if(t <= 0) location.reload();
        }, 1000);
    }
</script>
</body>
</html>
