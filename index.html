<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRTY VISITANTE v2.0</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: #fff; font-size: 1.2rem; border-radius: 8px; box-sizing: border-box; text-align: center; margin-bottom: 15px; }
        input:focus { border-color: var(--neon); outline: none; }
        button { width: 100%; padding: 15px; background: var(--neon); color: #000; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        button:disabled { background: #333; color: #888; cursor: not-allowed; }
        .status { margin-top: 20px; font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <h2>Interfone Digital - Virty</h2>
    <p style="color: #666; font-size: 0.85rem;">Insira a unidade desejada</p>
    
    <input type="text" id="num-casa" placeholder="Ex: 10, 102, 100" autocomplete="off">
    <input type="text" id="nome-visitante" placeholder="Seu Nome (Opcional)">
    
    <button id="btn-chamar" onclick="tentarChamar()">Interfonar</button>
    <div id="status-msg" class="status">Inicializando identificação...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let hardwareFingerprint = "";

    function gerarFingerprint() {
        try {
            const componentes = [
                navigator.hardwareConcurrency || 2,
                screen.width + "x" + screen.height,
                navigator.language,
                new Date().getTimezoneOffset()
            ];
            const str = componentes.join('|');
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            // Para evitar colisão total de aparelhos idênticos, combinamos com um ID persistente local
            let idLocal = localStorage.getItem('virty_uuid');
            if(!idLocal) {
                idLocal = Math.floor(Math.random() * 1000000);
                localStorage.setItem('virty_uuid', idLocal);
            }
            return "HW-" + Math.abs(hash) + "-" + idLocal;
        } catch (e) {
            return "HW-GENERICO-" + Math.floor(Math.random() * 100000);
        }
    }

    window.onload = function() {
        hardwareFingerprint = gerarFingerprint();
        document.getElementById('status-msg').innerText = "Aparelho pronto para uso.";
    };

    function tentarChamar() {
        const casa = document.getElementById('num-casa').value.trim();
        const nome = document.getElementById('nome-visitante').value.trim() || "Visitante Anônimo";
        const btn = document.getElementById('btn-chamar');
        const status = document.getElementById('status-msg');

        if (!casa) { alert("Digite a unidade."); return; }

        btn.disabled = true;
        status.innerText = "Verificando travas de segurança...";

        // 🔒 CORREÇÃO CIRÚRGICA: Checa bloqueio na unidade alvo especificada
        db.ref(`bloqueios_por_unidade/${casa}/${hardwareFingerprint}`).once('value', bloqueioSnap => {
            if (bloqueioSnap.exists()) {
                status.style.color = "var(--red)";
                status.innerText = "Erro de conexão com a unidade. Tente mais tarde.";
                alert("Acesso restrito para esta unidade.");
                return;
            }

            // 🏠 Valida se a casa existe na base do Admin
            db.ref(`moradores_validados/${casa}`).once('value', casaSnap => {
                if (!casaSnap.exists()) {
                    status.style.color = "var(--red)";
                    status.innerText = `Erro: Unidade ${casa} inválida ou vazia.`;
                    btn.disabled = false;
                    return;
                }

                status.style.color = "var(--neon)";
                status.innerText = "Interfonando... Aguarde o morador.";

                const refChamada = db.ref(`chamadas_ativas/${casa}/${hardwareFingerprint}`);

                // 📡 CORREÇÃO CIRÚRGICA: Destruição automática se o visitante sumir da rede
                refChamada.onDisconnect().remove();

                refChamada.set({
                    nome: nome,
                    fingerprint: hardwareFingerprint,
                    timestamp: Date.now(),
                    status: "chamando"
                }).then(() => {
                    refChamada.on('value', chamadaAtual => {
                        if(!chamadaAtual.exists()) {
                            status.style.color = "#aaa";
                            status.innerText = "Chamada encerrada.";
                            btn.disabled = false;
                            refChamada.off();
                        }
                    });
                });
            });
        });
    }
</script>
</body>
</html>
