<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interfone Digital v4.5</title>
    <style>
        :root { --led-green: #39FF14; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }

        .tela { position: fixed; width: 100vw; height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #tela-entrada { display: flex; }

        /* --- AJUSTE DA ABERTURA DA CÂMERA --- */
        #camera-section { background: #000; }

        .container-selfie {
            position: relative;
            /* Definimos o tamanho exato da abertura aqui */
            width: 280px; 
            height: 380px;
            border: 5px solid var(--led-green);
            border-radius: 50% 50% 45% 45%;
            overflow: hidden; /* O vídeo que sobrar para fora do oval será cortado */
            box-shadow: 0 0 30px var(--led-green);
            background: #111;
            margin-bottom: 80px;
        }

        #video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            object-fit: cover; /* Faz a câmera preencher o oval sem distorcer */
        }

        /* TELA SUCESSO E INOX (Simplificados para teste) */
        #tela-sucesso { background: #000; color: var(--led-green); text-align: center; font-size: 2rem; font-weight: bold; }
        #painel-inox { background: linear-gradient(135deg, #bdbdbd, #ffffff, #7a7a7a); border: 10px solid #555; }
        .display-lcd { width: 90%; background: #050505; border: 5px inset #444; padding: 20px; text-align: center; color: var(--led-green); }
        .btn-comando { width: 85%; padding: 25px; font-size: 1.8rem; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
        .verde { background: #27ae60; color: white; }
    </style>
</head>
<body>

    <div id="tela-entrada" class="tela">
        <button class="btn-comando verde" style="width: 200px; border-radius: 50px;" onclick="iniciar()">INICIAR</button>
    </div>

    <div id="camera-section" class="tela">
        <div class="container-selfie">
            <video id="video" autoplay playsinline muted></video>
        </div>
        <button class="btn-comando verde" style="position:absolute; bottom:30px;" onclick="concluirSelfie()">CONCLUIR SELFIE</button>
    </div>

    <div id="tela-sucesso" class="tela">SELFIE CONCLUÍDA!</div>

    <div id="painel-inox" class="tela">
        <div class="display-lcd" id="status">DIGITE A UNIDADE</div>
        <input type="number" id="unidade" style="width:80%; font-size:3rem; text-align:center; margin-top:20px; background:#000; color:var(--led-green);">
        <button class="btn-comando verde" onclick="alert('Chamando...')">CHAMAR</button>
    </div>

<script>
    let stream;

    function show(id) {
        ['tela-entrada', 'camera-section', 'tela-sucesso', 'painel-inox'].forEach(t => document.getElementById(t).style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    async function iniciar() {
        try {
            // Solicitamos a maior resolução possível para que o corte (object-fit) tenha qualidade
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "user",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                } 
            });
            document.getElementById('video').srcObject = stream;
            show('camera-section');
        } catch(e) { alert("Erro ao acessar câmera."); }
    }

    function concluirSelfie() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        show('tela-sucesso');
        setTimeout(() => show('painel-inox'), 2000);
    }
</script>
</body>
</html>
