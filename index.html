<div id="t1" class="screen active">
    <h1 style="font-size: 3.5rem; line-height: 1;">INICIE SUA CHAMADA AGORA</h1>
    <p style="font-size: 1.5rem; margin-top: 20px;">Toque no botão abaixo</p>
    <button class="btn btn-green" onclick="abrirCam()" style="margin-top: 40px; height: 100px; font-size: 1.5rem;">INICIAR</button>
</div>

<div id="t3" class="screen">
    <div id="timer">60</div>
    <p>Chamando Unidade <b id="view-un"></b>...</p>
    
    <div id="pos-chamada" style="display:none; width:100%">
        <button class="btn btn-green" onclick="voltarParaCam()">CHAMAR NOVAMENTE</button>
        <button class="btn btn-red" onclick="location.reload()">FECHAR E SAIR</button>
    </div>
    
    <button id="btn-canc-imediato" class="btn btn-red" onclick="location.reload()">CANCELAR</button>
</div>

<script>
    // Na função onde o tempo acaba ou é recusado:
    function encerrarChamada() {
        document.getElementById('timer').style.display = 'none';
        document.getElementById('btn-canc-imediato').style.display = 'none';
        document.getElementById('pos-chamada').style.display = 'block';
    }
    window.voltarParaCam = () => {
        document.getElementById('t3').classList.remove('active');
        document.getElementById('t2').classList.add('active');
        // Mantém a selfie já feita
    };
</script>
