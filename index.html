<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY VISITANTE v2.6.1 - Tela Preta Corrigida</title>
    <style>
        :root { 
            --neon: #39FF14; 
            --bg: #000; 
            --red: #FF3131; 
            --blue: #007BFF; 
            --gray: #666; 
            --dark-card: #0d0d0d; 
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            -webkit-user-select: none;
            user-select: none;
        }
        
        .screen { 
            display: none; 
            width: 100vw;
            height: 100vh; 
            flex-direction: column; 
            justify-content: space-between; 
            align-items: center; 
            box-sizing: border-box; 
            padding: 5vh 5% 15vh 5%; 
        }
        /* Adicionado !important para blindar a exibição da tela ativa contra qualquer erro de leitura */
        .active { display: flex !important; }

        .virty-header {
            text-align: center; 
            width: 100%;
        }
        .virty-header h1 {
            color: var(--neon);
            font-size: 2.2rem;
            letter-spacing: 2px;
            margin: 0 0 5px 0;
            text-shadow: 0 0 10px rgba(57,255,20,0.3);
        }
        .virty-header div {
            color: #fff;
            font-size: 1.1rem;
            letter-spacing: 1px;
            font-weight: normal;
        }

        .conteudo-central {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            text-align: center;
            gap: 15px;
            margin: auto 0;
        }

        .btn-ativar-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            width: 100%;
            margin: auto 0;
        }

        .btn-pulsante {
            width: 100%;
            max-width: 300px;
            height: 100px;
            background: none;
            border: 2px solid var(--neon);
            color: var(--neon);
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 20px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(57,255,20,0.1);
            animation: pulsarVirty 2s infinite;
        }
        @keyframes pulsarVirty {
            0% { box-shadow: 0 0 5px rgba(57,255,20,0.2); transform: scale(1); }
            50% { box-shadow: 0 0 25px rgba(57,255,20,0.6); transform: scale(1.02); border-color: #fff; color: #fff; }
            100% { box-shadow: 0 0 5px rgba(57,255,20,0.2); transform: scale(1); border-color: var(--neon); color: var(--neon); }
        }

        .rodape-tela {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            margin-top: auto;
        }
        
        input { 
            width: 100%; 
            padding: 16px; 
            margin: 2px 0; 
            border-radius: 12px; 
            border: 2px solid #222; 
            background: #111; 
            color: #fff; 
            font-size: 1.1rem;
            text-align: center;
        }
        input:focus { border-color: var(--neon); outline: none; }
        
        .btn { 
            width: 100%; 
            padding: 18px; 
            border-radius: 30px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .btn-perigo {
            background: var(--red);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 49, 49, 0.2);
        }

        .area-camera-virty { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            width: 100%; 
        }
        .video-box { 
            width: 220px; 
            height: 220px; 
            border-radius: 50%; 
            overflow: hidden; 
            border: 3px solid var(--neon); 
            box-shadow: 0 0 15px rgba(57,255,20,0.3); 
            background:#111; 
            position:relative; 
        }
        .video-box video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .video-box canvas { width: 100%; height: 100%; object-fit: cover; display:none; transform: scaleX(-1); }
        
        .btn-inverter { 
            background: #111; 
            border: 2px solid var(--neon); 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
        }
        .btn-inverter svg { width: 24px; height: 24px; fill: var(--neon); }

        .virty-popup { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: #0a0a0a; 
            border: 2px solid var(--neon); 
            color: #fff; 
            padding: 25px; 
            border-radius: 16px; 
            z-index: 5000; 
            box-shadow: 0 0 35px rgba(57,255,20,0.4); 
            text-align: center; 
            width: 90%; 
            max-width: 340px; 
        }

        .texto-neon-verde { color: var(--neon); text-shadow: 0 0 15px rgba(57, 255, 20, 0.6); font-weight: bold; letter-spacing: 1px; margin: 5px 0; transition: color 0.3s ease; }
        .texto-neon-azul { color: var(--blue); text-shadow: 0 0 15px rgba(0, 123, 255, 0.6); font-weight: bold; letter-spacing: 1px; margin: 5px 0; }
        .texto-neon-vermelho { color: var(--red); text-shadow: 0 0 15px rgba(255, 49, 49, 0.6); font-weight: bold; letter-spacing: 1px; margin: 5px 0; }

        #timer-chamada { font-size: 1.3rem; color: var(--red); font-weight: bold; margin-top: 10px; }
        .pulsar { animation: pulseBlink 2s infinite; }
        @keyframes pulseBlink { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        
        .audio-container-seguro {
            width: 100%;
            margin: 15px 0;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .btn-ouvir {
            background: var(--neon);
            color: #000;
            font-weight: bold;
            padding: 14px;
            border-radius: 20px;
            width: 85%;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(57,255,20,0.4);
        }
    </style>
</head>
<body>

    <div id="custom-alert" class="virty-popup">
        <div style="color:var(--neon); font-size:0.9rem; letter-spacing:2px; margin-bottom:15px; font-weight:bold;">VIRTY ACCESS DOOR</div>
        <div id="custom-alert-msg" style="color:#fff; font-size:1.1rem; font-weight:normal; line-height:1.4; margin-bottom:20px;"></div>
        <button class="btn" style="background:#fff; color:#000; padding:12px; font-size:1rem; border-radius:10px;" onclick="fecharAlertCustomizado()">OK</button>
    </div>

    <div id="s-boasvindas" class="screen active" style="justify-content: center; gap: 50px; padding-bottom: 5vh;">
        <div class="virty-header">
            <h1>VIRTY ACCESS DOOR</h1>
            <div style="color: var(--gray); font-size: 1.2rem; letter-spacing: 2px;">Acesso digital</div>
        </div>
        <div class="btn-ativar-container" style="margin: 0;">
            <div style="color: #fff; font-size: 1.2rem; margin-bottom: 25px;">Seja bem-vindo</div>
            <button class="btn-pulsante" onclick="avancarParaCamera()">Aceitar e iniciar</button>
        </div>
    </div>

    <div id="s-camera" class="screen">
        <div class="virty-header">
            <h2 class="texto-neon-verde" style="font-size: 1.6rem; margin: 0;">RECONHECIMENTO VISUAL</h2>
            <div style="color: var(--gray); font-size: 0.85rem; letter-spacing: 1px; margin-top: 4px;">TIRE UMA FOTO PARA SE IDENTIFICAR</div>
        </div>
        <div class="conteudo-central">
            <div class="area-camera-virty">
                <div style="width:50px;"></div> 
                <div class="video-box">
                    <video id="v-vis" autoplay playsinline muted></video>
                    <canvas id="c-vis"></canvas>
                </div>
                <button class="btn-inverter" onclick="alternarLenteCamera()">
                    <svg viewBox="0 0 24 24"><path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/></svg>
                </button>
            </div>
            <div id="status-foto" style="color:var(--neon); font-size:1.1rem; font-weight:bold; height:20px;"></div>
        </div>
        <div class="rodape-tela">
            <button id="btn-bater-selfie" class="btn" style="background:#fff; color:#000; margin-bottom: 12px;" onclick="capturarSelfieAutomatica()">📸 BATER A SELFIE</button>
        </div>
    </div>

    <div id="s-inicio" class="screen">
        <div class="virty-header">
            <h2 class="texto-neon-verde" style="font-size: 1.6rem; margin: 0;">INFORMAÇÕES DE ACESSO</h2>
            <div style="color: var(--gray); font-size: 0.85rem; letter-spacing: 1px; margin-top: 4px;">DIGITE O LOCAL E ENVIE SEU RECADO</div>
        </div>
        <div class="conteudo-central" style="gap: 12px; margin: auto 0; width: 100%;">
            <input type="number" id="v-un" placeholder="Número do Apt / Casa">
            <input type="text" id="v-texto" placeholder="Mensagem / Identificação (Opcional)">
            
            <button class="btn" style="background:var(--neon); color:#000; margin-top: 15px; font-size:1.2rem;" onclick="dispararInterfone()">🔔 CHAMAR</button>
            <button class="btn" style="background:transparent; border:2px solid var(--red); color:var(--red);" onclick="resetarFluxoVisitante()">CANCELAR</button>
        </div>
        <div style="height: 1px;"></div> 
    </div>

    <div id="s-chamando" class="screen">
        <div></div> 
        <div class="conteudo-central">
            <h1 id="texto-unidade-chamando" class="texto-neon-verde pulsar" style="font-size: 2.6rem; margin: 0; line-height: 1.2;">CHAMANDO<br>UNIDADE</h1>
            <div id="timer-chamada">AGUARDE: 90s</div>
        </div>
        <div class="rodape-tela">
            <button class="btn btn-perigo" onclick="cancelarInterfone()">CANCELAR CHAMADA</button>
        </div>
    </div>

    <div id="s-feedback" class="screen">
        <div></div>
        <div class="conteudo-central">
            <h1 id="titulo-feedback" class="texto-neon-azul" style="font-size: 2.5rem; margin: 0 0 20px 0;">RECADO RECEBIDO</h1>
            <p id="msg-feedback" style="color:#aaa; font-style: italic; font-size: 1.3rem; margin-bottom: 25px;">"Processando resposta..."</p>
            
            <div id="area-audio-ouvir" class="audio-container-seguro">
                <button class="btn-ouvir" onclick="reproduzirAudioProtegido()">▶️ OUVIR ÁUDIO DO MORADOR</button>
                <audio id="audio-player-v" style="display:none;"></audio>
            </div>
        </div>
        <div class="rodape-tela">
            <button id="btn-voltar-feedback" class="btn" style="background: #222; color: #fff;" onclick="resetarFluxoVisitante()">VOLTAR PARA O INÍCIO</button>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let streamCameraAtiva = null;
    let usarLenteFrontal = true;
    let visitanteFotoBase64 = "";
    let chamadaIdGlobal = "";
    let escutadorFirebaseAtivo = null;
    let timerRegressivoInterval = null;
    let tempoRestanteChamada = 90;
    let cacheAudioUrl = ""; 

    function gerarFingerprintDispositivo() {
        const componentesHardware = [
            screen.width, screen.height, screen.devicePixelRatio, 
            navigator.hardwareConcurrency || 4, navigator.language,
            navigator.maxTouchPoints || 0, new Date().getTimezoneOffset()
        ];
        const meta = componentesHardware.join('||');
        let hash = 0;
        for (let i = 0; i < meta.length; i++) { hash = (hash << 5) - hash + meta.charCodeAt(i); hash |= 0; }
        return "V-" + Math.abs(hash).toString(16).toUpperCase();
    }
    const meu_fingerprint = gerarFingerprintDispositivo();

    function virtyAlert(msg) {
        document.getElementById('custom-alert-msg').innerText = msg;
        document.getElementById('custom-alert').style.display = 'block';
    }
    function fecharAlertCustomizado() { document.getElementById('custom-alert').style.display = 'none'; }

    function avancarParaCamera() {
        mudarTela('s-camera');
        inicializarCapturaVideo();
    }

    function inicializarCapturaVideo() {
        if(streamCameraAtiva) { streamCameraAtiva.getTracks().forEach(t => t.stop()); }
        const constraints = { video: { facingMode: { ideal: usarLenteFrontal ? "user" : "environment" } } };
        
        navigator.mediaDevices.getUserMedia(constraints).then(s => {
            streamCameraAtiva = s;
            const video = document.getElementById('v-vis');
            video.srcObject = s;
            video.style.transform = usarLenteFrontal ? "scaleX(-1)" : "scaleX(1)";
        }).catch(e => {
            console.log("Erro câmera:", e);
            virtyAlert("Câmera indisponível ou permissão negada.");
        });
    }

    function alternarLenteCamera() {
        usarLenteFrontal = !usarLenteFrontal;
        inicializarCapturaVideo();
    }

    function capturarSelfieAutomatica() {
        const v = document.getElementById('v-vis'), c = document.getElementById('c-vis');
        if(!v.videoWidth) return virtyAlert("Aguarde o feed da câmera carregar.");
        
        c.width = v.videoWidth; c.height = v.videoHeight;
        const ctx = c.getContext('2d');
        if(usarLenteFrontal) { ctx.translate(c.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(v, 0, 0);
        ctx.setTransform(1,0,0,1,0,0);
        
        visitanteFotoBase64 = c.toDataURL('image/jpeg', 0.5);
        c.style.display = "block"; 
        v.style.display = "none";
        
        if(v.srcObject) { v.srcObject.getTracks().forEach(track => track.stop()); streamCameraAtiva = null; }

        document.getElementById('status-foto').innerText = "FOTO CAPTURADA!";
        document.getElementById('btn-bater-selfie').style.display = "none";

        setTimeout(() => {
            mudarTela('s-inicio');
        }, 1500);
    }

    function dispararInterfone() {
        const un = document.getElementById('v-un').value.trim();
        const recado = document.getElementById('v-texto').value.trim();

        if(!visitanteFotoBase64) {
            virtyAlert("Erro no fluxo: Foto ausente. Voltando para a câmera.");
            document.getElementById('btn-bater-selfie').style.display = "block";
            document.getElementById('c-vis').style.display = "none";
            document.getElementById('v-vis').style.display = "block";
            document.getElementById('status-foto').innerText = "";
            avancarParaCamera();
            return;
        }
        if(!un) return virtyAlert("Digite o número da unidade (Casa/Apt)!");

        db.ref(`bloqueados/${un}/${meu_fingerprint}`).once('value', bSnap => {
            if(bSnap.exists()) {
                exibirFeedbackFinal('recusado', "ACESSO BLOQUEADO", "Totem de acesso restrito.");
                return;
            }

            db.ref(`moradores_validados/${un}`).once('value', mSnap => {
                if(!mSnap.exists()) {
                    virtyAlert("Unidade não cadastrada ou sem moradores ativos.");
                    resetarFluxoVisitante();
                    return;
                }

                chamadaIdGlobal = un;
                
                const txtStatusChamada = document.getElementById('texto-unidade-chamando');
                txtStatusChamada.innerHTML = `CHAMANDO<br>UNIDADE ${un}`;
                txtStatusChamada.className = "texto-neon-verde pulsar";
                
                const dadosChamada = {
                    v_id: meu_fingerprint,
                    dna_dispositivo: meu_fingerprint,
                    foto: visitanteFotoBase64,
                    texto: recado || "Visitante aguardando resposta",
                    status: "chamando",
                    ts: Date.now()
                };

                db.ref(`chamadas_ativas/${un}`).set(dadosChamada).then(() => {
                    mudarTela('s-chamando');
                    iniciarTimerRegressivo();
                    escutarRespostaMorador();
                }).catch(err => {
                    virtyAlert("Erro de conexão ao iniciar chamada:\n" + err.message);
                });
            });
        });
    }

    document.getElementById('v-un').addEventListener('keyup', (e) => {
        if(e.key === 'Enter') dispararInterfone();
    });

    function iniciarTimerRegressivo() {
        tempoRestanteChamada = 90;
        document.getElementById('timer-chamada').innerText = `AGUARDE: ${tempoRestanteChamada}s`;
        clearInterval(timerRegressivoInterval);
        timerRegressivoInterval = setInterval(() => {
            tempoRestanteChamada--;
            document.getElementById('timer-chamada').innerText = `AGUARDE: ${tempoRestanteChamada}s`;
            if(tempoRestanteChamada <= 0) {
                cancelarInterfone();
                exibirFeedbackFinal('cinza', "SEM RESPOSTA", "O morador não pôde atender no momento.");
            }
        }, 1000);
    }

    function escutarRespostaMorador() {
        if(escutadorFirebaseAtivo) escutadorFirebaseAtivo.off();
        escutadorFirebaseAtivo = db.ref(`chamadas_ativas/${chamadaIdGlobal}`);
        
        escutadorFirebaseAtivo.on('value', snap => {
            const d = snap.val();
            if(!d) return;

            if (d.status === 'chamando') {
                const txtStatus = document.getElementById('texto-unidade-chamando');
                if (d.status_morador === 'gravando') {
                    txtStatus.innerHTML = "MORADOR<br>GRAVANDO...";
                    txtStatus.className = "texto-neon-azul pulsar";
                } else if (d.status_morador === 'digitando') {
                    txtStatus.innerHTML = "MORADOR<br>DIGITANDO...";
                    txtStatus.className = "texto-neon-azul pulsar";
                } else {
                    txtStatus.innerHTML = `CHAMANDO<br>UNIDADE ${chamadaIdGlobal}`;
                    txtStatus.className = "texto-neon-verde pulsar";
                }
            }

            if(d.status === 'liberado') {
                clearInterval(timerRegressivoInterval);
                exibirFeedbackFinal('liberado', "ENTRADA AUTORIZADA", "Porta liberada. Seja bem-vindo!");
                limparNoFirebaseRemotamente(4000);
            }
            else if(d.status === 'recusado') {
                clearInterval(timerRegressivoInterval);
                exibirFeedbackFinal('recusado', "ENTRADA RECUSADA", "A solicitação foi recusada.");
                limparNoFirebaseRemotamente(4000);
            }
            else if(d.status === 'mensagem') {
                clearInterval(timerRegressivoInterval);
                if(d.audio_b64 && d.audio_b64.trim() !== "") {
                    exibirFeedbackFinal('mensagem', "RECADO RECEBIDO", "ÁUDIO ENVIADO PELO MORADOR", d.audio_b64);
                } else {
                    exibirFeedbackFinal('mensagem', "RECADO MORADOR", `"${d.msg_morador || 'Sem texto enviado'}"`);
                }
                limparNoFirebaseRemotamente(25000);
            }
        });
    }

    function reproduzirAudioProtegido() {
        if(!cacheAudioUrl || cacheAudioUrl === "") return virtyAlert("Nenhum áudio em cache para reproduzir.");
        const player = document.getElementById('audio-player-v');
        player.src = cacheAudioUrl;
        player.setAttribute('controls', 'controls');
        player.style.display = "block";
        
        player.play().catch(err => {
            console.log("Falha no play automático:", err);
            virtyAlert("Pressione o botão PLAY no reprodutor abaixo para escutar.");
        });
    }

    function cancelarInterfone() {
        clearInterval(timerRegressivoInterval);
        if(escutadorFirebaseAtivo) escutadorFirebaseAtivo.off();
        if(chamadaIdGlobal) db.ref(`chamadas_ativas/${chamadaIdGlobal}`).remove();
        resetarFluxoVisitante();
    }

    function limparNoFirebaseRemotamente(ms) {
        setTimeout(() => {
            if(escutadorFirebaseAtivo) escutadorFirebaseAtivo.off();
            if(chamadaIdGlobal) db.ref(`chamadas_ativas/${chamadaIdGlobal}`).remove();
        }, ms);
    }

    function exibirFeedbackFinal(tipo, titulo, mensagem, audioUrl = "") {
        mudarTela('s-feedback');
        const txtTitulo = document.getElementById('titulo-feedback');
        const txtMsg = document.getElementById('msg-feedback');
        const btnVoltar = document.getElementById('btn-voltar-feedback');
        const areaAudio = document.getElementById('area-audio-ouvir');
        const player = document.getElementById('audio-player-v');

        areaAudio.style.display = "none";
        player.style.display = "none";
        player.src = "";
        
        cacheAudioUrl = audioUrl;

        txtTitulo.innerText = titulo;
        txtMsg.innerText = mensagem;

        if(tipo === 'liberado') { 
            txtTitulo.className = "texto-neon-verde"; 
            btnVoltar.style.background = "var(--neon)"; 
            btnVoltar.style.color = "#000"; 
        }
        if(tipo === 'recusado') { 
            txtTitulo.className = "texto-neon-vermelho"; 
            btnVoltar.style.background = "var(--red)"; 
            btnVoltar.style.color = "#fff"; 
        }
        if(tipo === 'mensagem') { 
            txtTitulo.className = "texto-neon-azul"; 
            btnVoltar.style.background = "var(--blue)"; 
            btnVoltar.style.color = "#fff"; 
            if (audioUrl && audioUrl !== "") {
                areaAudio.style.display = "flex";
            }
        }
        if(tipo === 'cinza') {
            txtTitulo.className = "texto-neon-azul";
            btnVoltar.style.background = "#333";
            btnVoltar.style.color = "#fff";
        }
    }

    function resetarFluxoVisitante() {
        clearInterval(timerRegressivoInterval);
        if(escutadorFirebaseAtivo) escutadorFirebaseAtivo.off();
        
        if(streamCameraAtiva) {
            streamCameraAtiva.getTracks().forEach(t => t.stop());
            streamCameraAtiva = null;
        }

        usarLenteFrontal = true;
        visitanteFotoBase64 = "";
        cacheAudioUrl = "";
        document.getElementById('v-un').value = "";
        document.getElementById('v-texto').value = "";
        
        document.getElementById('c-vis').style.display = "none";
        document.getElementById('v-vis').style.display = "block";
        document.getElementById('btn-bater-selfie').style.display = "block";
        document.getElementById('status-foto').innerText = "";
        
        mudarTela('s-boasvindas');
    }

    function mudarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
