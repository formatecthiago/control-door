<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY VISITANTE v15.2</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .screen { display: none; width: 100%; max-width: 450px; flex-direction: column; align-items: center; padding: 25px; text-align: center; box-sizing: border-box; }
        .active { display: flex; }
        
        /* CÂMERA CIRCULAR */
        .video-box { width: 220px; height: 220px; border-radius: 50%; overflow: hidden; border: 3px solid var(--neon); margin: 20px 0; background: #111; position: relative; box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); }
        video, canvas { width: 100%; height: 100%; object-fit: cover; }
        
        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #111; color: white; text-align: center; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 18px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 10px 0; font-size: 1rem; transition: 0.2s; }
        .btn-green { background: var(--neon); color: black; }
        .btn:disabled { background: #222; color: #555; cursor: not-allowed; }
        
        /* TIMER REGRESSIVO */
        #timer-display { font-size: 5.5rem; font-weight: bold; color: var(--neon); margin: 20px 0; font-variant-numeric: tabular-nums; text-shadow: 0 0 15px rgba(57, 255, 20, 0.4); }
        
        /* POPUP DE RESPOSTA */
        #popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#0a0a0a; border:2px solid var(--neon); padding:25px; border-radius:20px; width:85%; z-index:1000; text-align:center; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
    </style>
</head>

        <h1 style="color:var(--neon); margin-top:60px; letter-spacing:2px; font-style: italic;">VIRTY ACCESS</h1>

        <button class="btn btn-green" onclick="solicitarPermissoes()">INICIAR SISTEMA</button>
    </div>

    <div id="t1" class="screen">

            <video id="v" autoplay playsinline muted></video>
            <canvas id="c-snap" style="display:none;"></canvas>
        </div>
        <button id="btn-snap" class="btn" style="background:#fff; color:#000;" onclick="tirarFoto()">📸 TIRAR FOTO</button>
        <input type="number" id="un" placeholder="Número da Unidade (Ex: 8)">
        <input type="text" id="msg" placeholder="Recado para o morador (opcional)">
        <button id="btn-go" class="btn btn-green" onclick="chamar()" disabled>TOCAR CAMPAINHA</button>
    </div>

    <div id="t2" class="screen">
        <div id="timer-display">60</div>

    </div>
