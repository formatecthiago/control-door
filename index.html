<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virty Access - Visitante</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .screen { display: none; width: 100%; max-width: 450px; flex-direction: column; align-items: center; padding: 20px; text-align: center; box-sizing: border-box; }
        .active { display: flex; }
        .video-box { width: 280px; height: 280px; border-radius: 50%; overflow: hidden; border: 3px solid var(--neon); margin-bottom: 15px; position: relative; }
        video, canvas { width: 100%; height: 100%; object-fit: cover; }
        input { width: 100%; padding: 20px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: white; font-size: 1.2rem; text-align: center; box-sizing: border-box; }
        .btn { width: 100%; padding: 22px; border-radius: 40px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 8px 0; font-size: 1rem; }
        .btn-green { background: var(--neon); color: black; }
        #popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#111; border:2px solid var(--neon); padding:30px; border-radius:20px; width:80%; z-index:100; }
    </style>
</head>
<body>

    <div id="t1" class="screen active">
        <h1 style="color:var(--neon); margin-top:50px;">VIRTY ACCESS</h1>
        <div class="video-box">
            <video id="v" autoplay playsinline muted></video>
            <canvas id="c-snap" style="display:none;"></canvas>
        </div>
        <button id="btn-snap" class="btn btn-green" onclick="tirarFoto()">📷 TIRAR FOTO</button>
        <input type="number" id="un" placeholder="Nº da Unidade" inputmode="numeric">
        <input type="text" id="msg" placeholder="Mensagem Opcional">
        <button id="btn-go" class="btn btn-green" onclick="chamar()" disabled style="opacity:0.3">CHAMAR AGORA</button>
    </div>

    <div id="t2" class="screen">
        <h2 id="timer" style="font-size: 5rem; color: var(--neon); margin-top: 50px;">60</h2>
        <p>Chamando Unidade <b id="view-un"></b>...</p>
        <button class="btn" style="background:#ff3333; color:white;" onclick="location.reload()">CANCELAR</button>
    </div>

    <div id="popup">
        <h2 id="pop-t" style="color:var(--neon)"></h2>
        <p id="pop-m"></p>
        <button class="btn btn-green" onclick="location.reload()">FECHAR</button>
    </div>

    <audio id="som" loop src="https://assets.mixkit.co/active_storage/sfx/1360/1360-preview.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", projectId: "virty-access-door" };
    const app = initializeApp(config);
    const db = getDatabase(app);

    let b64 = "";
    const v = document.getElementById('v'), c = document.getElementById('c-snap');

    navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}}).then(s => v.srcObject = s);

    window.tirarFoto = () => {
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v,0,0);
        b64 = c.toDataURL('image/jpeg', 0.5);
        c.style.display="block"; v.pause();
        document.getElementById('btn-go').disabled = false;
        document.getElementById('btn-go').style.opacity = "1";
    };

    window.chamar = () => {
        const un = document.getElementById('un').value;
        if(!un) return;
        document.getElementById('view-un').innerText = un;
        document.getElementById('t1').classList.remove('active');
        document.getElementById('t2').classList.add('active');
        document.getElementById('som').play();

        const chamRef = ref(db, `chamadas_ativas/${un}`);
        set(chamRef, { status: "chamando", foto: b64, texto: document.getElementById('msg').value });

        onValue(chamRef, snap => {
            const d = snap.val();
            if(!d) return;
            if(d.status === "liberado") showPop("LIBERADO", "Pode entrar!");
            if(d.status === "recusado") showPop("RECUSADO", "O morador não pode atender.");
            if(d.status === "mensagem") showPop("MENSAGEM", d.msg_morador);
        });

        let tempo = 60;
        setInterval(() => {
            tempo--; document.getElementById('timer').innerText = tempo;
            if(tempo <= 0) location.reload();
        }, 1000);
    };

    function showPop(t, m) {
        document.getElementById('som').pause();
        document.getElementById('pop-t').innerText = t;
        document.getElementById('pop-m').innerText = m;
        document.getElementById('popup').style.display = "block";
    }
</script>
</body>
</html>
