<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY VISITANTE v2.6.0 - Layout e Feedback</title>
    <style>
        :root { 
            --neon: #39FF14; 
            --bg: #000; 
            --red: #FF3131; 
            --blue: #007BFF; 
            --gray: #666; 
            --dark-card: #0d0d0d; 
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            -webkit-user-select: none;
            user-select: none;
        }
        
        /* Aumentado o padding inferior para 15vh para resolver o problema dos botões cortados */
        .screen { 
            display: none; 
            width: 100vw;
            height: 100vh; 
            flex-direction: column; 
            justify-content: space-between; 
            align-items: center; 
            box-sizing: border-box; 
            padding: 5vh 5% 15vh 5%; 
        }
        .active { display: flex; }

        .virty-header {
            text-align: center; 
            width: 100%;
        }
        .virty-header h1 {
            color: var(--neon);
            font-size: 2.2rem;
            letter-spacing: 2px;
            margin: 0 0 5px 0;
            text-shadow: 0 0 10px rgba(57,255,20,0.3);
        }
        .virty-header div {
            color: #fff;
            font-size: 1.1rem;
            letter-spacing: 1px;
            font-weight: normal;
        }

        .conteudo-central {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            text-align: center;
            gap: 15px;
            margin: auto 0;
        }

        .btn-ativar-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            width: 100%;
            margin: auto 0;
        }

        .btn-pulsante {
            width: 100%;
            max-width: 300px;
            height: 100px;
            background: none;
            border: 2px solid var(--neon);
            color: var(--neon);
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 20px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(57,255,20,0.1);
            animation: pulsarVirty 2s infinite;
        }
        @keyframes pulsarVirty {
            0% { box-shadow: 0 0 5px rgba(57,255,20,0.2); transform: scale(1); }
            50% { box-shadow: 0 0 25px rgba(57,255,20,0.6); transform: scale(1.02); border-color: #fff; color: #fff; }
            100% { box-shadow: 0 0 5px rgba(57,255,20,0.2); transform: scale(1); border-color: var(--neon); color: var(--neon); }
        }

        .rodape-tela {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            margin-top: auto;
        }
        
        input { 
            width: 100%; 
            padding: 16px; 
            margin: 2px 0; 
            border-radius: 12px; 
            border: 2px solid #222; 
            background: #111; 
            color: #fff; 
            font-size: 1.1rem;
            text-align: center;
        }
        input:focus { border-color: var(--neon); outline: none; }
