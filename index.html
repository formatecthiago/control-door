<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY VISITANTE</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .screen { display: none; width: 100%; max-width: 400px; flex-direction: column; align-items: center; padding: 20px; text-align: center; box-sizing: border-box; }
        .active { display: flex; }
        .video-box { width: 220px; height: 220px; border-radius: 50%; overflow: hidden; border: 3px solid var(--neon); margin: 20px 0; background: #111; }
        video, canvas { width: 100%; height: 100%; object-fit: cover; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #111; color: white; text-align: center; font-size: 1.1rem; }
        .btn { width: 100%; padding: 18px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 10px 0; }
        .btn-green { background: var(--neon); color: black; }
        #popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#111; border:2px solid var(--neon); padding:20px; border-radius:15px; width:85%; z-index:1000; }
    </style>
</head>
<body>

    <!-- TELA 1: BOAS-VINDAS -->
    <div id="t-welcome" class="screen active">
        <h1 style="color:var(--neon); margin-top:50px;">BEM-VINDO</h1>
        <p style="color:#888;">Sistema de Acesso Inteligente</p>
        <button class="btn btn-green" style="margin-top:40px;" onclick="mudarTela('t-id')">INICIAR IDENTIFICAÇÃO</button>
    </div>

    <!-- TELA 2: IDENTIFICAÇÃO (SELFIE) -->
    <div id="t-id" class="screen">
        <h2 style="color:var(--neon)">SELFIE</h2>
        <div class="video-box">
            <video id="v" autoplay playsinline muted></video>
            <canvas id="c" style="display:none;"></canvas>
        </div>
        <button id="btn-foto" class="btn" style="background:#fff;" onclick="tirarFoto()">📸 TIRAR FOTO</button>
        <input type="number" id="un" placeholder="Número da Unidade">
        <input type="text" id="msg" placeholder="Recado (opcional)">
        <button id="btn-chamar" class="btn btn-green" onclick="chamar()" disabled>TOCAR CAMPAINHA</button>
    </div>

    <!-- TELA 3: CHAMANDO -->
    <div id="t-calling" class="screen">
        <h2 style="color:var(--neon); margin-top:100px;">CHAMANDO...</h2>
        <p>Aguarde a resposta do morador.</p>
        <div style="font-size:3rem; margin-top:30px;">⌛</div>
    </div>

    <div id="popup">
        <h2 id="pop-t" style="color:var(--neon)"></h2>
        <p id="pop-m" style="margin:20px 0;"></p>
        <button class="btn btn-green" onclick="location.reload()">FECHAR</button>
    </div>

    <audio id="som" loop src="https://assets.mixkit.co/active_storage/sfx/1360/1360-preview.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    const v_id = localStorage.getItem('v_id') || 'V-' + Math.random().toString(36).substr(2, 9).toUpperCase();
    localStorage.setItem('v_id', v_id);

    let b64 = "";
    const video = document.getElementById('v'), canvas = document.getElementById('c');

    function tirarFoto() {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        b64 = canvas.toDataURL('image/jpeg', 0.5);
        video.style.display = "none"; canvas.style.display = "block";
        document.getElementById('btn-chamar').disabled = false;
    }

    async function chamar() {
        const un = String(document.getElementById('un').value).trim();
        if(!un) return alert("Informe a unidade.");

        // Verifica Bloqueio
        const block = await db.ref(`bloqueios/${un}/${v_id}`).once('value');
        if(block.exists()) return alert("Acesso negado por esta unidade.");

        // Verifica se existe morador habilitado
        const morador = await db.ref(`moradores_validados/${un}`).once('value');
        if(!morador.exists()) return alert("Unidade não habilitada no sistema.");

        mudarTela('t-calling');
        document.getElementById('som').play();
        
        const ref = db.ref(`chamadas_ativas/${un}`);
        ref.set({ status: "chamando", foto: b64, texto: document.getElementById('msg').value, v_id: v_id, ts: Date.now() });

        ref.on('value', s => {
            const d = s.val();
            if(d && d.status !== "chamando") {
                document.getElementById('som').pause();
                if(d.status === "liberado") showPop("LIBERADO", "Pode entrar!");
                if(d.status === "recusado") showPop("RECUSADO", "Tente mais tarde.");
                if(d.status === "mensagem") showPop("MENSAGEM", d.msg_morador);
                setTimeout(() => location.reload(), 5000);
            }
        });
        ref.onDisconnect().remove();
    }

    function mudarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 't-id') navigator.mediaDevices.getUserMedia({video:true}).then(s => video.srcObject = s);
    }

    function showPop(t, m) {
        document.getElementById('pop-t').innerText = t;
        document.getElementById('pop-m').innerText = m;
        document.getElementById('popup').style.display = "block";
    }
</script>
</body>
</html>
