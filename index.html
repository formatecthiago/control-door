    <script>
        const firebaseConfig = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let b64 = "", contagem;
        const video = document.getElementById('v'), canvas = document.getElementById('c-snap');
        let v_id = localStorage.getItem('virty_visitor_id') || 'ID-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        localStorage.setItem('virty_visitor_id', v_id);

        async function solicitarPermissoes() {
            console.log("Tentando acessar a câmera...");
            
            // Verifica se o navegador suporta câmera
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("Seu navegador não suporta acesso à câmera. Use o Chrome ou Safari atualizado.");
                mudarTela('t1'); // Força a ida para a tela mesmo sem câmera para não travar o app
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, // Tenta abrir a câmera frontal
                    audio: false 
                });
                video.srcObject = stream;
                console.log("Câmera liberada!");
                mudarTela('t1'); // SÓ MUDA DE TELA SE TUDO DER CERTO
            } catch (err) { 
                console.error("Erro na câmera: ", err);
                alert("Erro ao abrir câmera: " + err.message + "\n\nO sistema irá para a tela de dados, mas a foto pode não funcionar.");
                mudarTela('t1'); // FORÇA A MUDANÇA para você não ficar preso na tela inicial
            }
        }

        function tirarFoto() {
            try {
                canvas.width = video.videoWidth; 
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                b64 = canvas.toDataURL('image/jpeg', 0.5);
                canvas.style.display = "block"; 
                video.style.display = "none";
                document.getElementById('btn-snap').innerText = "🔄 TIRAR OUTRA";
                document.getElementById('btn-go').disabled = false;
            } catch (e) {
                alert("Erro ao capturar foto. Tente novamente.");
            }
        }

        function chamar() {
            const unVal = document.getElementById('un').value;
            if (!unVal) return alert("Digite a unidade!");

            // Trava de segurança: consulta se o morador existe
            db.ref('moradores_validados/' + unVal).once('value', snap => {
                if (!snap.exists()) {
                    alert("Unidade não habilitada ou inexistente.");
                    return;
                }

                document.getElementById('view-un').innerText = unVal;
                mudarTela('t2');
                document.getElementById('som').play();
                
                const refChamada = db.ref('chamadas_ativas/' + unVal);
                refChamada.set({ 
                    status: "chamando", 
                    foto: b64, 
                    texto: document.getElementById('msg').value || "", 
                    ts: Date.now(), 
                    v_id: v_id 
                });
                
                refChamada.onDisconnect().remove();

                refChamada.on('value', snapCall => {
                    const d = snapCall.val();
                    if (!d) return;
                    if (d.status === "liberado") showPop("LIBERADO", "Seja bem-vindo!");
                    if (d.status === "recusado") showPop("INDISPONÍVEL", "O morador não pode atender.");
                    if (d.status === "mensagem") showPop("RECADO", d.msg_morador);
                });

                let tempo = 60;
                contagem = setInterval(() => {
                    tempo--;
                    document.getElementById('timer').innerText = tempo;
                    if (tempo <= 0) { 
                        clearInterval(contagem); 
                        refChamada.remove(); 
                        showPop("FIM", "Tempo esgotado."); 
                    }
                }, 1000);
            });
        }

        function mudarTela(id) {
            console.log("Mudando para tela: " + id);
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showPop(t, m) {
            clearInterval(contagem);
            document.getElementById('som').pause();
            document.getElementById('pop-t').innerText = t;
            document.getElementById('pop-m').innerText = m;
            document.getElementById('popup').style.display = "block";
        }
    </script>
