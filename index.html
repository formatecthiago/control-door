<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitante - Control Door</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .btn { padding: 15px; border-radius: 10px; border: none; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #preview { width: 100%; border-radius: 10px; margin-bottom: 10px; display: none; border: 3px solid #007bff; }
        #timer { font-size: 24px; font-weight: bold; color: #ff4757; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="txtCasa">Carregando...</h2>
        <img id="preview">
        <input type="file" id="fotoInput" accept="image/*" capture="user" style="display:none">
        
        <button id="btnFoto" class="btn" style="background:#6c757d; color:white" onclick="document.getElementById('fotoInput').click()">📸 TIRAR SELFIE OBRIGATÓRIA</button>
        <button id="btnChamar" class="btn" style="background:#007bff; color:white; display:none" onclick="iniciarChamada()">🔔 CHAMAR MORADOR</button>
        
        <div id="statusArea" style="display:none">
            <div id="timer">02:00</div>
            <p id="msgStatus">Chamada em andamento...</p>
            <button class="btn" style="background:#dc3545; color:white" onclick="location.href='painel.html'">CANCELAR</button>
        </div>
    </div>

    <!-- Scripts do Firebase v10 Compat -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="config.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const casa = params.get('casa') || "1";
        document.getElementById('txtCasa').innerText = "Casa " + casa;
        let fotoBase64 = "";

        document.getElementById('fotoInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = () => {
                fotoBase64 = reader.result;
                document.getElementById('preview').src = fotoBase64;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('btnChamar').style.display = 'block';
            };
            reader.readAsDataURL(e.target.files);
        };

        function iniciarChamada() {
            if(typeof db === 'undefined') { alert("Conectando..."); return; }
            const ref = db.ref('chamadas/casa_' + casa);
            ref.set({ status: "chamando", foto: fotoBase64, timestamp: Date.now() });

            document.getElementById('btnChamar').style.display = 'none';
            document.getElementById('btnFoto').style.display = 'none';
            document.getElementById('statusArea').style.display = 'block';
            
            ref.on('value', snap => {
                const d = snap.val();
                if(d?.status === "aberto") { alert("✅ ACESSO LIBERADO!"); ref.remove(); location.reload(); }
                if(d?.status === "estou_indo") document.getElementById('msgStatus').innerText = "⏳ MORADOR A CAMINHO!";
            });
        }
    </script>
</body>
</html>
