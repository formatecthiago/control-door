<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY ACCESS DOOR</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; --yellow: #FFD700; }
        *, *::before, *::after { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .screen { display: none; width: 100%; max-width: 420px; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        
        .btn { width: 100%; padding: 18px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1.1rem; margin: 12px 0; letter-spacing: 1px; }
        .area-camera-virty { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; width: 100%; }
        .video-box { width: 210px; height: 210px; border-radius: 50%; overflow: hidden; border: 3px solid var(--neon); box-shadow: 0 0 15px var(--neon); background:#111; position:relative; }
        .video-box video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .video-box canvas { width: 100%; height: 100%; object-fit: cover; display:none; transform: scaleX(-1); }
        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid #222; background: #111; color: white; text-align: center; font-size: 1.1rem; }
        
        .container-centralizado { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; flex: 1; }
        #timer-v { font-size: 4rem; color: var(--neon); font-weight: bold; text-shadow: 0 0 15px var(--neon); margin-bottom: 20px; }
        #status-msg { color: var(--yellow); font-style: italic; font-size: 1.2rem; margin: 15px 0; font-weight: bold; min-height: 30px; text-align: center; }
        .txt-resposta { font-size: 1.6rem; font-weight: bold; text-transform: uppercase; margin: 10px 0; text-align: center; }
        .virty-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; border: 2px solid var(--neon); color: #fff; padding: 30px; border-radius: 16px; font-size: 1.3rem; font-weight: bold; z-index: 5000; box-shadow: 0 0 35px rgba(57,255,20,0.4); text-align: center; width: 85%; max-width: 340px; }
    </style>
</head>
<body>

    <div id="custom-alert" class="virty-popup">
        <div style="color:var(--neon); font-size:0.8rem; letter-spacing:2px; margin-bottom:12px;">VIRTY ACCESS DOOR</div>
        <div id="custom-alert-msg" style="color:#fff; font-size:1.1rem; font-weight:normal; line-height:1.4;"></div>
        <button class="btn" style="background:#fff; color:#000; padding:10px; margin-top:20px; font-size:0.85rem; border-radius:10px;" onclick="fecharAlertCustomizado()">OK</button>
    </div>

    <div id="t-instalar" class="screen active">
        <h1 style="color:var(--neon); margin-top:140px; text-align:center; letter-spacing: 2px;">VIRTY ACCESS DOOR</h1>
        <div style="height: 40px;"></div>
        <button id="btn-instalar-pwa" class="btn" style="background:var(--neon); color:#000;">[ INICIAR ACESSO ]</button>
        
        <p id="dica-ios" style="color:var(--yellow); font-size:0.9rem; text-align:center; display:none; margin-top:20px; padding: 0 20px; line-height:1.4;">
            No iPhone: Toque no ícone de compartilhar (seta para cima) e selecione "Adicionar à Tela de Início".
        </p>
    </div>

    <div id="t-id" class="screen">
        <div class="area-camera-virty">
            <div style="width:55px;"></div> 
            <div class="video-box">
                <video id="v" autoplay playsinline muted></video>
                <canvas id="c-visitante"></canvas>
            </div>
            <button style="background:#111; border:2px solid var(--neon); width:55px; height:55px; border-radius:50%; display:flex; align-items:center; justify-content:center;" onclick="alternarLenteCamera()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--neon)" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
            </button>
        </div>
        <button class="btn" style="background:#fff; color:#000" onclick="tirarFoto()">📸 CAPTURAR FACE</button>
        <input type="number" id="un" placeholder="Nº da Unidade (Casa/Apt)">
        <input type="text" id="msg" placeholder="Assunto escrito (Opcional)">
        <button id="btn-chamar" class="btn" style="background:var(--neon); color:#000" onclick="chamar()" disabled>TOCAR CAMPAINHA</button>
    </div>

    <div id="t-calling" class="screen">
        <div class="container-centralizado">
            <div id="timer-v">90</div>
            <div id="area-dinamica" style="width: 100%; display:flex; flex-direction:column; align-items:center;">
                <h2 id="txt-principal" style="text-align:center; letter-spacing:1px; margin: 5px 0;">CHAMANDO MORADOR...</h2>
                <div id="status-msg">Aguardando atendimento</div>
            </div>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    function virtyAlert(msg) {
        document.getElementById('custom-alert-msg').innerText = msg;
        document.getElementById('custom-alert').style.display = 'block';
    }
    function fecharAlertCustomizado() { document.getElementById('custom-alert').style.display = 'none'; }

    let idDispositivoEstavel = localStorage.getItem('virty_device_token');
    if(!idDispositivoEstavel) {
        const metadados = [screen.width, screen.height, screen.devicePixelRatio, navigator.hardwareConcurrency || 4, navigator.language, navigator.platform].join('||');
        let hash = 0;
        for (let i = 0; i < metadados.length; i++) { hash = (hash << 5) - hash + metadados.charCodeAt(i); hash |= 0; }
        idDispositivoEstavel = "VF-" + Math.abs(hash).toString(16).toUpperCase().substring(0, 8);
        localStorage.setItem('virty_device_token', idDispositivoEstavel);
    }
    const v_id = idDispositivoEstavel + "-" + Math.random().toString(36).substr(2, 4).toUpperCase();

    let gatilhoInstalacao = null;
    const emModoApp = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

    window.addEventListener('DOMContentLoaded', () => {
        // 🌟 CORREÇÃO: Se já abriu de dentro do App, liga os motores de mídia direto e pula pra tela da câmera
        if (emModoApp) {
            ativarMotoresMidiaEDiretoParaCamera();
        } else {
            if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                document.getElementById('dica-ios').style.display = 'block';
                document.getElementById('btn-instalar-pwa').style.display = 'none';
            }
        }
    });

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        gatilhoInstalacao = e;
    });

    // Ação do botão principal [ INICIAR ACESSO ]
    document.getElementById('btn-instalar-pwa').addEventListener('click', async () => {
        if (gatilhoInstalacao) {
            try {
                gatilhoInstalacao.prompt();
                await gatilhoInstalacao.userChoice;
            } catch (err) {}
            gatilhoInstalacao = null;
            ativarMotoresMidiaEDiretoParaCamera();
        } else {
            ativarMotoresMidiaEDiretoParaCamera();
        }
    });

    window.addEventListener('appinstalled', () => {
        ativarMotoresMidiaEDiretoParaCamera();
    });

    // 🌟 NOVA FUNÇÃO AUTOMÁTICA: Limpa o áudio, inicia a câmera e muda de tela sem cliques extras
    function activarMotoresMidiaEDiretoParaCamera() {
        try {
            const contextoAudio = new (window.AudioContext || window.webkitAudioContext)();
            const osciladorSilencioso = contextoAudio.createOscillator();
            osciladorSilencioso.connect(contextoAudio.destination);
            osciladorSilencioso.start(0); osciladorSilencioso.stop(0.05);
        } catch(e) {}
        inicializarCameraAgressiva();
        mudarTela('t-id');
    }

    function mudarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 't-id' && (!streamAtual || !streamAtual.active)) { inicializarCameraAgressiva(); }
    }

    // --- REGRAS DE MÍDIA E SESSÃO ---
    let streamAtual = null;
    let usarLenteFrontal = true;
    let audioRespostaMorador = null;
    let unidadeEmAtendimentoAtual = null;
    let timerRegressivoVisitante;
    let b64 = "";

    function inicializarCameraAgressiva() {
        if(streamAtual) { streamAtual.getTracks().forEach(track => track.stop()); }
        const constraints = { video: { facingMode: usarLenteFrontal ? "user" : "environment" } };
        navigator.mediaDevices.getUserMedia(constraints).then(s => {
            streamAtual = s; 
            const video = document.getElementById('v');
            video.srcObject = s;
            video.style.transform = usarLenteFrontal ? "scaleX(-1)" : "scaleX(1)";
        }).catch(e => console.log(e));
    }

    function alternarLenteCamera() {
        usarLenteFrontal = !usarLenteFrontal;
        inicializarCameraAgressiva();
    }

    function tirarFoto() {
        const v = document.getElementById('v'), c = document.getElementById('c-visitante');
        if(!v.videoWidth) return virtyAlert("Aguarde o visor da câmera carregar.");
        c.width = v.videoWidth; c.height = v.videoHeight;
        const ctx = c.getContext('2d');
        if(usarLenteFrontal) { ctx.translate(c.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(v, 0, 0); ctx.setTransform(1,0,0,1,0,0);
        b64 = c.toDataURL('image/jpeg', 0.5);
        c.style.display = "block"; v.style.display = "none";
        document.getElementById('btn-chamar').disabled = false;
        if(streamAtual) streamAtual.getTracks().forEach(track => track.stop());
        virtyAlert("Foto capturada com sucesso!");
    }

    async function chamar() {
        const un = document.getElementById('un').value;
        if(!un || !b64) return virtyAlert("Insira a unidade e tire sua foto!");
        
        const checkUnidade = await db.ref(`moradores_validados/${un}`).once('value');
        if(!checkUnidade.exists()){
            return virtyAlert(`Unidade ${un} sem moradores ativos.`);
        }

        const blockCheck = await db.ref(`bloqueados/${un}/${v_id.substring(0,11)}`).once('value');
        if(blockCheck.exists()) {
            virtyAlert("Não foi possível estabelecer contato.");
            location.reload(); return;
        }

        unidadeEmAtendimentoAtual = un;
        mudarTela('t-calling');
        const ref = db.ref(`chamadas_ativas/${un}`);
        await ref.remove();
        
        ref.set({ 
            status: "chamando", foto: b64, texto: document.getElementById('msg').value, 
            v_id: v_id, dna_dispositivo: v_id.substring(0, 11), ts: Date.now() 
        });

        let t = 90;
        clearInterval(timerRegressivoVisitante);
        timerRegressivoVisitante = setInterval(() => {
            t--; document.getElementById('timer-v').innerText = t;
            if(t <= 0) { clearInterval(timerRegressivoVisitante); finalizarTelaMorta(); }
        }, 1000);

        ref.on('value', s => {
            const d = s.val(); if(!d) return;
            const sm = document.getElementById('status-msg');
            if(d.status === "gravando") sm.innerText = "Morador gravando resposta...";
            else if(d.status === "escrevendo") sm.innerText = "Morador digitando...";
            
            if(["liberado", "recusado", "mensagem", "cinza"].includes(d.status)) {
                clearInterval(timerRegressivoVisitante);
                document.getElementById('timer-v').style.display = 'none';
                const area = document.getElementById('area-dinamica');
                let cor = "var(--neon)", stringFinal = "ACESSO AUTORIZADO", incluirPlayerHtml = "";
                
                if(d.status === "recusado") { cor = "var(--red)"; stringFinal = "ACESSO RECUSADO"; }
                if(d.status === "cinza") { cor = "#666"; stringFinal = "CHAMADA NÃO ATENDIDA"; }
                if(d.status === "mensagem") { 
                    cor = "var(--blue)"; stringFinal = d.msg_morador || "MENSAGEM RECEBIDA"; 
                    if(d.audio_b64) {
                        audioRespostaMorador = new Audio(d.audio_b64);
                        incluirPlayerHtml = `<button class="btn-play-interfone" onclick="audioRespostaMorador.play()">▶ Ouvir Voz</button>`;
                    }
                }
                area.innerHTML = `<div class="txt-resposta" style="color:${cor}">${stringFinal}</div>${incluirPlayerHtml}<button class="btn btn-fechar-virty" onclick="finalizarTelaMorta()">FECHAR</button>`;
            }
        });
    }

    async function finalizarTelaMorta() {
        if(unidadeEmAtendimentoAtual) db.ref(`chamadas_ativas/${unidadeEmAtendimentoAtual}`).off();
        if(unidadeEmAtendimentoAtual) await db.ref(`chamadas_ativas/${unidadeEmAtendimentoAtual}`).remove();
        if(streamAtual) streamAtual.getTracks().forEach(track => track.stop());
        location.reload();
    }
</script>
</body>
</html>
