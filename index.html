<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRTY PORTARIA v2.0.0 - QR Único</title>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root { --neon: #39FF14; --bg: #000; --red: #FF3131; --blue: #007BFF; --gray: #666; --yellow: #FFD700; }
        *, *::before, *::after { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; overflow: hidden; -webkit-user-select: none; user-select: none; }
        .screen { display: none; padding: 20px; height: 100vh; flex-direction: column; justify-content: space-between; box-sizing: border-box; }
        .active { display: flex; }
        .btn { width: 100%; padding: 22px; border-radius: 40px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 10px 0; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .area-camera-virty { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 20px 0; width: 100%; }
        .video-box { width: 260px; height: 260px; border-radius: 50%; overflow: hidden; border: 4px solid var(--neon); box-shadow: 0 0 25px rgba(57,255,20,0.4); background:#111; position:relative; }
        .video-box video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .video-box canvas { width: 100%; height: 100%; object-fit: cover; display:none; transform: scaleX(-1); }
        .btn-inverter { background: #111; border: 2px solid var(--neon); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 15px rgba(57,255,20,0.3); }
        .btn-inverter svg { width: 26px; height: 24px; fill: var(--neon); }
        .virty-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; border: 2px solid var(--neon); color: #fff; padding: 30px; border-radius: 16px; font-size: 1.3rem; font-weight: bold; z-index: 5000; box-shadow: 0 0 35px rgba(57,255,20,0.4); text-align: center; width: 85%; max-width: 340px; }
        #txt-status { font-size: 2.2rem; color: var(--neon); text-shadow: 0 0 15px var(--neon); font-weight: bold; margin-bottom: 5px; }
        .foto-m { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--blue); object-fit: cover; margin-top: 15px; box-shadow: 0 0 20px rgba(0,123,255,0.4); }
        .virty-input { width: 100%; padding: 20px; background: #111; border: 2px solid var(--neon); color: #fff; text-align: center; font-size: 2rem; font-weight: bold; border-radius: 15px; margin-bottom: 20px; outline: none; box-shadow: 0 0 15px rgba(57,255,20,0.2); }
    </style>
</head>
<body>

    <div id="custom-alert" class="virty-popup">
        <div style="color:var(--neon); font-size:0.8rem; letter-spacing:2px; margin-bottom:12px;">VIRTY ACCESS DOOR</div>
        <div id="custom-alert-msg" style="color:#fff; font-size:1.1rem; font-weight:normal; line-height:1.4;"></div>
        <button class="btn" style="background:#fff; color:#000; padding:10px; margin-top:20px; font-size:0.85rem; border-radius:10px;" onclick="fecharAlertCustomizado()">OK</button>
    </div>

    <div id="s-inicio" class="screen active" style="justify-content:center; align-items:center;">
        <div style="text-align:center; margin-bottom:40px;">
            <h1 style="color:var(--neon); font-size:2.8rem; letter-spacing:4px; margin:0 0 5px 0; text-shadow: 0 0 10px rgba(57,255,20,0.3);">VIRTY</h1>
            <div style="color:var(--gray); font-size:0.85rem; font-weight:bold; letter-spacing:2px;">PORTARIA INTELIGENTE</div>
        </div>
        <button class="btn" style="background:var(--neon); color:#000; height:120px; font-size:1.4rem; border-radius:25px;" onclick="iniciarFluxo()">🔔 TOCAR CAMPAINHA</button>
        <div style="color:#333; font-size:0.75rem; font-weight:bold;">VERSION 2.0.0</div>
    </div>

    <div id="s-camera" class="screen">
        <div>
            <h2 style="color:var(--neon); text-align:center; margin:10px 0 5px; letter-spacing:1px; font-size:1.5rem;">IDENTIFICAÇÃO VIRTUAL</h2>
            <p style="color:var(--gray); text-align:center; margin:0; font-size:0.85rem; font-weight:bold;">RECONHECIMENTO OBRIGATÓRIO PARA ENTRADA</p>
        </div>
        
        <div class="area-camera-virty">
            <div style="width:55px;"></div>
            <div class="video-box">
                <video id="video" autoplay playsinline muted></video>
                <canvas id="canvas"></canvas>
            </div>
            <button class="btn-inverter" onclick="alternarLenteCamera()">
                <svg viewBox="0 0 24 24"><path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/></svg>
            </button>
        </div>

        <div>
            <button class="btn" style="background:#fff; color:#000;" onclick="capturarFoto()">📸 CAPTURAR MINHA FOTO</button>
            <button class="btn" style="background:#111; color:var(--red); border:1px solid var(--red); padding:14px; font-size:0.9rem;" onclick="voltarInicio()">CANCELAR</button>
        </div>
    </div>

    <div id="s-unidade" class="screen" style="justify-content:center; align-items:center;">
        <div style="text-align:center; width:100%;">
            <h2 style="color:var(--neon); margin-bottom:10px;">DIGITE A UNIDADE</h2>
            <p style="color:var(--gray); font-size:0.9rem; margin-bottom:30px;">Informe o número do apartamento ou casa que deseja chamar</p>
            
            <input type="number" id="input-unidade" class="virty-input" placeholder="000" inputmode="numeric">
            
            <button class="btn" style="background:var(--neon); color:#000;" onclick="confirmarUnidadeESequencia()">🔔 INTERFONAR</button>
            <button class="btn" style="background:#111; color:var(--gray); border:1px solid #333; padding:14px; font-size:0.9rem;" onclick="voltarInicio()">VOLTAR</button>
        </div>
    </div>

    <div id="s-chamando" class="screen" style="justify-content:center; align-items:center; text-align:center;">
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; width:100%;">
            <div id="txt-status">CHAMANDO...</div>
            <div id="timer-box" style="font-size:1.1rem; color:var(--red); font-weight:bold; margin-bottom:20px;">AGUARDE: <span id="virty-timer">90</span>s</div>
            
            <div id="resposta-container" style="width:100%; max-width:300px; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:150px;">
                <p id="txt-feedback" style="color:#aaa; font-size:1.1rem; font-style:italic; line-height:1.4; margin:0; padding:0 10px;"></p>
                <div id="box-audio-player"></div>
                <img id="foto-morador" class="foto-m" src="" style="display:none;">
            </div>
        </div>
        <button id="btn-cancelar-chamado" class="btn" style="background:var(--red); color:#fff;" onclick="cancelarChamadaManual()">DESCONECTAR INTERFONE</button>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let streamVideoGlobal = null;
    let usarLenteFrontal = true;
    let fotoB64 = "";
    let countdownInterval;
    let tempoRestante = 90;
    let un = ""; // Será preenchido dinamicamente pelo visitante

    // 🔒 GERADOR DE DNA ULTRA-ESTÁVEL DE HARDWARE
    let idDispositivoEstavel = localStorage.getItem('virty_device_token');
    if(!idDispositivoEstavel) {
        const metadados = [screen.width, screen.height, screen.colorDepth, navigator.hardwareConcurrency || 4].join('||');
        let hash = 0;
        for (let i = 0; i < metadados.length; i++) { hash = (hash << 5) - hash + metadados.charCodeAt(i); hash |= 0; }
        idDispositivoEstavel = "VF-" + Math.abs(hash).toString(16).toUpperCase();
        localStorage.setItem('virty_device_token', idDispositivoEstavel);
    }
    
    const v_id = idDispositivoEstavel + "-" + Math.random().toString(36).substr(2, 4).toUpperCase();

    function virtyAlert(msg) {
        document.getElementById('custom-alert-msg').innerText = msg;
        document.getElementById('custom-alert').style.display = 'block';
    }
    function fecharAlertCustomizado() { document.getElementById('custom-alert').style.display = 'none'; }

    function mudarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function iniciarFluxo() {
        mudarTela('s-camera');
        inicializarCamera();
    }

    function inicializarCamera() {
        if(streamVideoGlobal) { streamVideoGlobal.getTracks().forEach(t => t.stop()); }
        const constraints = { video: { facingMode: usarLenteFrontal ? "user" : "environment", width: { ideal: 640 }, height: { ideal: 480 } } };
        navigator.mediaDevices.getUserMedia(constraints).then(s => {
            streamVideoGlobal = s;
            const videoElement = document.getElementById('video');
            videoElement.srcObject = s;
            videoElement.style.transform = usarLenteFrontal ? "scaleX(-1)" : "scaleX(1)";
        }).catch(err => virtyAlert("Por favor, permita o acesso à câmera para continuar."));
    }

    function alternarLenteCamera() {
        usarLenteFrontal = !usarLenteFrontal;
        inicializarCamera();
    }

    function capturarFoto() {
        const v = document.getElementById('video'), c = document.getElementById('canvas');
        if(!v.videoWidth) return virtyAlert("Aguarde o carregamento completo da câmera.");
        
        c.width = v.videoWidth; c.height = v.videoHeight;
        const ctx = c.getContext('2d');
        if(usarLenteFrontal) { ctx.translate(c.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(v, 0, 0);
        ctx.setTransform(1,0,0,1,0,0);
        
        fotoB64 = c.toDataURL('image/jpeg', 0.4);
        if(streamVideoGlobal) { streamVideoGlobal.getTracks().forEach(t => t.stop()); streamVideoGlobal = null; }
        
        // Próximo passo: perguntar a unidade
        mudarTela('s-unidade');
        document.getElementById('input-unidade').focus();
    }

    function confirmarUnidadeESequencia() {
        un = document.getElementById('input-unidade').value.trim();
        if(!un) return virtyAlert("Por favor, digite o número da unidade!");
        chamar();
    }

    // 🚀 FUNÇÃO DE CHAMADA REAL: Agora rodando com a checagem dinâmica da unidade digitada
    async function chamar() {
        mudarTela('s-chamando');
        document.getElementById('txt-status').innerText = "CONECTANDO...";
        document.getElementById('txt-feedback').innerText = "";

        try {
            // 🛑 CHECAGEM DE BLOQUEIO DINÂMICA: Verifica se o Hardware do celular está banido NAQUELA unidade digitada
            const blockCheck = await db.ref(`bloqueados/${un}/${idDispositivoEstavel}`).once('value');
            
            if(blockCheck.exists()) {
                document.getElementById('txt-status').innerText = "CONEXÃO RECUSADA";
                document.getElementById('txt-status').style.color = "var(--red)";
                document.getElementById('txt-status').style.textShadow = "0 0 15px var(--red)";
                document.getElementById('timer-box').style.display = "none";
                document.getElementById('txt-feedback').innerText = "Não foi possível estabelecer contato.";
                document.getElementById('btn-cancelar-chamado').innerText = "VOLTAR AO INÍCIO";
                return; 
            }

            // Cria a chamada ativa na unidade digitada
            await db.ref('chamadas_ativas/' + un).set({
                v_id: v_id,
                dna_dispositivo: idDispositivoEstavel,
                foto: fotoB64,
                status: 'chamando',
                texto: '',
                ts: Date.now()
            });

            document.getElementById('txt-status').innerText = "CHAMANDO UNIDADE " + un;
            iniciarContagemRegressiva();
            escutarRespostaMorador();

        } catch (error) {
            virtyAlert("Erro de conexão ao iniciar chamada: " + error.message);
            voltarInicio();
        }
    }

    function iniciarContagemRegressiva() {
        tempoRestante = 90;
        document.getElementById('timer-box').style.display = "block";
        document.getElementById('virty-timer').innerText = tempoRestante;
        clearInterval(countdownInterval);
        
        countdownInterval = setInterval(() => {
            tempoRestante--;
            document.getElementById('virty-timer').innerText = tempoRestante;
            if(tempoRestante <= 0) {
                clearInterval(countdownInterval);
                finalizarPorTimeout();
            }
        }, 1000);
    }

    function escutarRespostaMorador() {
        db.ref('chamadas_ativas/' + un).on('value', snap => {
            const d = snap.val();
            if(!d) return;

            if(d.status === 'escrevendo') {
                document.getElementById('txt-status').innerText = "MORADOR DIGITANDO...";
                document.getElementById('txt-status').style.color = "var(--blue)";
                document.getElementById('txt-status').style.textShadow = "0 0 15px var(--blue)";
                document.getElementById('txt-feedback').innerText = "Aguarde a mensagem digitada...";
            }
            else if(d.status === 'gravando') {
                document.getElementById('txt-status').innerText = "MORADOR GRAVANDO...";
                document.getElementById('txt-status').style.color = "var(--yellow)";
                document.getElementById('txt-status').style.textShadow = "0 0 15px var(--yellow)";
                document.getElementById('txt-feedback').innerText = "Ouvindo áudio em tempo real...";
            }
            else if(d.status === 'chamando') {
                document.getElementById('txt-status').innerText = "CHAMANDO UNIDADE " + un;
                document.getElementById('txt-status').style.color = "var(--neon)";
                document.getElementById('txt-status').style.textShadow = "0 0 15px var(--neon)";
                document.getElementById('txt-feedback').innerText = "";
            }
            else if(d.status === 'liberado') {
                clearInterval(countdownInterval);
                db.ref('chamadas_ativas/' + un).off();
                document.getElementById('txt-status').innerText = "ACESSO AUTORIZADO!";
                document.getElementById('txt-status').style.color = "var(--neon)";
                document.getElementById('txt-status').style.textShadow = "0 0 15px var(--neon)";
                document.getElementById('timer-box').style.display = "none";
                document.getElementById('txt-feedback').innerText = "A entrada foi liberada pelo morador. Pode entrar!";
                document.getElementById('btn-cancelar-chamado').innerText = "FINALIZAR";
            }
            else if(d.status === 'recusado') {
                clearInterval(countdownInterval);
                db.ref('chamadas_ativas/' + un).off();
                document.getElementById('txt-status').innerText = "ACESSO RECUSADO";
                document.getElementById('txt-status').style.color = "var(--red)";
                document.getElementById('txt-status').style.textShadow = "0 0 15px var(--red)";
                document.getElementById('timer-box').style.display = "none";
                document.getElementById('txt-feedback').innerText = "O morador não pôde atender ou recusou a entrada.";
                document.getElementById('btn-cancelar-chamado').innerText = "VOLTAR AO INÍCIO";
            }
            else if(d.status === 'mensagem') {
                clearInterval(countdownInterval);
                document.getElementById('timer-box').style.display = "none";
                document.getElementById('txt-status').innerText = "RECADO RECEBIDO";
                document.getElementById('txt-status').style.color = "var(--blue)";
                document.getElementById('txt-status').style.textShadow = "0 0 15px var(--blue)";
                document.getElementById('btn-cancelar-chamado').innerText = "VOLTAR AO INÍCIO";

                if(d.msg_morador) {
                    document.getElementById('txt-feedback').innerText = `"${d.msg_morador}"`;
                }
                if(d.audio_b64) {
                    document.getElementById('box-audio-player').innerHTML = `<audio src="${d.audio_b64}" controls autoplay style="margin-top:15px; width:100%; max-width:260px;"></audio>`;
                }
                
                db.ref('moradores_validados/' + un).once('value', mSnap => {
                    if(mSnap.exists() && mSnap.val().foto) {
                        const imgM = document.getElementById('foto-morador');
                        imgM.src = mSnap.val().foto;
                        imgM.style.display = "block";
                    }
                });
            }
        });
    }

    function finalizarPorTimeout() {
        db.ref('chamadas_ativas/' + un).off();
        document.getElementById('txt-status').innerText = "NÃO ATENDIDO";
        document.getElementById('txt-status').style.color = "var(--gray)";
        document.getElementById('txt-status').style.textShadow = "none";
        document.getElementById('timer-box').style.display = "none";
        document.getElementById('txt-feedback').innerText = "O tempo limite expirou e o morador não atendeu.";
        document.getElementById('btn-cancelar-chamado').innerText = "VOLTAR AO INÍCIO";
    }

    function cancelarChamadaManual() {
        clearInterval(countdownInterval);
        if(un) {
            db.ref('chamadas_ativas/' + un).off();
            db.ref('chamadas_ativas/' + un).remove();
        }
        voltarInicio();
    }

    function voltarInicio() {
        if(streamVideoGlobal) { streamVideoGlobal.getTracks().forEach(t => t.stop()); streamVideoGlobal = null; }
        clearInterval(countdownInterval);
        fotoB64 = "";
        un = "";
        document.getElementById('input-unidade').value = "";
        document.getElementById('box-audio-player').innerHTML = "";
        document.getElementById('foto-morador').style.display = "none";
        document.getElementById('btn-cancelar-chamado').innerText = "DESCONECTAR INTERFONE";
        document.getElementById('txt-status').style.color = "var(--neon)";
        document.getElementById('txt-status').style.textShadow = "0 0 15px var(--neon)";
        mudarTela('s-inicio');
    }
</script>
</body>
</html>
