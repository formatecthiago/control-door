<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interfone Black Edition v6.12</title>
    <style>
        :root { 
            --led-green: #39FF14; 
            --pure-white: #FFFFFF; 
            --true-black: #000000;
            --grafite-metal: #2c2f33; 
        }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--true-black); font-family: sans-serif; }

        .moldura-global {
            position: fixed; width: 100vw; height: 100vh;
            background-color: var(--true-black);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 10px solid var(--grafite-metal); 
            box-sizing: border-box; z-index: 5;
        }

        /* OVAL RESTAURADO */
        .container-central {
            position: relative; width: 220px; height: 280px; 
            margin-top: -40px; border-radius: 50% 50% 45% 45%;
            overflow: hidden; background: var(--true-black); 
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; text-align: center;
            border: 5px solid transparent; 
        }

        .com-guia { 
            border: 5px solid var(--led-green) !important; 
            box-shadow: 0 0 25px var(--led-green); 
        }

        .conteudo { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .check-sucesso { font-size: 8rem; color: var(--led-green); text-shadow: 0 0 20px var(--led-green); }

        .area-botoes { width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: 15px; }

        .btn-inox { 
            background: #27ae60; color: white; padding: 22px; width: 85%; 
            border-radius: 12px; border: none; font-weight: bold; 
            font-size: 1.5rem; cursor: pointer; margin-bottom: 12px; 
            text-transform: uppercase; box-shadow: 0 4px 0 #1e8449;
        }

        .welcome-msg { color: var(--pure-white); text-align: center; margin-bottom: 30px; }
        .welcome-msg h1 { font-size: 3.2rem; margin: 0; }
        .welcome-msg p { font-size: 1.8rem; margin: 5px 0 0; font-weight: bold; }

        .lcd-text { color: var(--pure-white); font-family: 'Courier New', monospace; font-size: 1.5rem; margin: 10px; font-weight: bold; text-transform: uppercase; }
        .msg-privacidade-inicial { color: #888; font-size: 0.8rem; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="moldura-global">
        <div class="container-central" id="main-container">
            <div id="step-1" class="conteudo" style="display: flex;"></div>
            <div id="step-2" class="conteudo"><video id="video" autoplay playsinline muted></video></div>
            <div id="step-3" class="conteudo"><div class="lcd-text">DIGITE A UNIDADE</div></div>
            <div id="step-4" class="conteudo"><div id="timer" style="font-size: 4.5rem; color: var(--pure-white);">60</div></div>
            <div id="step-5" class="conteudo"><div class="check-sucesso">✓</div><div class="lcd-text" style="font-size: 1.2rem;">ACESSO LIBERADO</div></div>
        </div>

        <div class="area-botoes">
            <div id="btn-step-1" style="display: block; width: 100%; text-align: center;">
                <div class="welcome-msg"><h1>Olá!</h1><p>Toque em INICIAR para solicitar o seu acesso.</p></div>
                <button class="btn-inox" onclick="passo2()">INICIAR</button>
                <div class="msg-privacidade-inicial">BIOMETRIA E LOCALIZAÇÃO MONITORADAS.</div>
            </div>
            
            <div id="btn-step-2" style="display: none; width: 100%; text-align: center;">
                <button class="btn-inox" onclick="passo3()">ENVIAR SELFIE</button>
            </div>

            <div id="btn-step-3" style="display: none; width: 100%; text-align: center;">
                <input type="number" id="unidade" style="width:70%; padding:15px; font-size:2rem; margin-bottom:15px; border-radius:8px; text-align:center;" placeholder="000">
                <button class="btn-inox" onclick="passo4()">CHAMAR</button>
            </div>

            <div id="btn-step-4" style="display: none; width: 100%; text-align: center;">
                <div class="lcd-text" id="status-label">CHAMANDO...</div>
                <button class="btn-inox" style="background:#c0392b" onclick="location.reload()">CANCELAR</button>
            </div>

            <div id="btn-step-5" style="display: none; width: 100%; text-align: center;">
                <button class="btn-inox" style="background:#2c3e50" onclick="location.reload()">ENCERRAR</button>
            </div>
        </div>
    </div>

<script>
    let stream, timerInterval, audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function tocarSom(tipo) {
        if (!audioCtx) return;
        const gain = audioCtx.createGain(); gain.connect(audioCtx.destination);
        // VOLUME 30% MAIS BAIXO QUE O ANTERIOR
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime); 

        const osc = audioCtx.createOscillator(); osc.type = 'square'; osc.connect(gain);

        if(tipo === 'chamada') {
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
            osc.stop(audioCtx.currentTime + 1.2);
        } else if (tipo === 'aceite') {
            // O "PLIM" DE ACESSO
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (tipo === 'falha') {
            for(let i=0; i<3; i++) {
                const o = audioCtx.createOscillator(); o.type = 'square'; o.connect(gain);
                o.frequency.setValueAtTime(1200, audioCtx.currentTime + (i * 0.2));
                o.start(audioCtx.currentTime + (i * 0.2));
                o.stop(audioCtx.currentTime + (i * 0.2) + 0.1);
            }
        }
    }

    function showStep(n) {
        document.querySelectorAll('.conteudo').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.area-botoes > div').forEach(d => d.style.display = 'none');
        document.getElementById('step-'+n).style.display = 'flex';
        if(document.getElementById('btn-step-'+n)) document.getElementById('btn-step-'+n).style.display = 'block';
        
        const container = document.getElementById('main-container');
        if(n === 2) container.classList.add('com-guia');
        else container.classList.remove('com-guia');
    }

    async function passo2() { initAudio(); showStep(2); try { stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }); document.getElementById('video').srcObject = stream; } catch(e) { alert("Câmera indisponível."); } }
    function passo3() { if(stream) stream.getTracks().forEach(t => t.stop()); showStep(3); setTimeout(() => document.getElementById('unidade').focus(), 400); }
    function passo4() { if(!document.getElementById('unidade').value) return; showStep(4); iniciarContagem(); }
    
    // ESTA FUNÇÃO SERÁ DISPARADA PELO MORADOR NO FUTURO
    function passo5() { clearInterval(timerInterval); tocarSom('aceite'); showStep(5); }

    function iniciarContagem() {
        let t = 60; clearInterval(timerInterval); tocarSom('chamada');
        timerInterval = setInterval(() => {
            t--; document.getElementById('timer').innerText = t;
            if(t % 4 === 0 && t > 0) tocarSom('chamada');
            if(t <= 0) { clearInterval(timerInterval); tocarSom('falha'); document.getElementById('status-label').innerText = "SEM RESPOSTA"; }
        }, 1000);
    }
</script>
</body>
</html>
