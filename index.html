<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interfone Industrial v6.0</title>
    <style>
        :root { 
            --led-green: #39FF14; 
            --metal-dark: #1a1a1a;
            --pure-white: #FFFFFF;
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; font-family: 'Segoe UI', Roboto, sans-serif; 
        }

        /* MOLDURA ROBUSTA INSPIRADA NA CAPINHA */
        .moldura-tactical {
            position: fixed; width: 100vw; height: 100vh;
            background: radial-gradient(circle, #2c2c2c 0%, #000000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 12px solid #333; 
            box-shadow: inset 0 0 50px #000;
            box-sizing: border-box;
        }

        /* CONTAINER OVAL COM EFEITO DE ENCAIXE */
        .case-central {
            position: relative; width: 295px; height: 395px;
            border: 6px solid var(--led-green); border-radius: 50% 50% 45% 45%;
            overflow: hidden; box-shadow: 0 0 25px var(--led-green), inset 0 0 20px #000;
            background: #050505; display: flex; align-items: center; justify-content: center;
        }

        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* TEXTOS EM BRANCO PURO E MAIORES */
        .instrucao-branca {
            color: var(--pure-white); font-size: 1.1rem; font-weight: bold;
            margin-top: 25px; text-transform: uppercase; letter-spacing: 1px;
            text-shadow: 2px 2px 4px #000;
        }

        /* BOTÃO ENVIAR SELFIE (MAIS ALTO) */
        .btn-enviar-selfie {
            position: absolute; bottom: 45px; /* Subi a posição como pedido */
            background: #27ae60; color: white; padding: 18px 40px;
            border: none; border-radius: 8px; font-weight: bold; font-size: 1.3rem;
            box-shadow: 0 6px 0 #156135, 0 10px 20px rgba(0,0,0,0.5);
            cursor: pointer; width: 85%;
        }

        /* INPUT: FUNDO BRANCO, LETRA PRETA */
        .campo-unidade {
            width: 80%; padding: 15px; font-size: 2.5rem; text-align: center;
            background: var(--pure-white); color: #000; /* Inversão de contraste */
            border: 4px solid var(--led-green); border-radius: 12px;
            margin-top: 15px; font-weight: bold;
        }

        .lcd-container {
            background: #000; border: 2px solid #444; padding: 15px;
            width: 85%; margin-top: 20px; border-radius: 5px; text-align: center;
        }

        .conteudo { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="moldura-tactical">
        
        <div class="case-central">
            <div id="step-1" class="conteudo" style="display: flex;">
                <div class="instrucao-branca">IDENTIFICAÇÃO BIOMÉTRICA</div>
                <button class="btn-enviar-selfie" style="position:static; margin-top:40px;" onclick="iniciarCamera()">INICIAR ACESSO</button>
            </div>

            <div id="step-2" class="conteudo">
                <video id="video" autoplay playsinline muted></video>
                <button class="btn-enviar-selfie" onclick="concluirSelfie()">ENVIAR SELFIE</button>
            </div>

            <div id="step-3" class="conteudo">
                <div class="instrucao-branca">NÚMERO DA UNIDADE:</div>
                <input type="number" id="unidade" class="campo-unidade" placeholder="000">
                <button class="btn-enviar-selfie" style="position:static; margin-top:30px;" onclick="chamarMorador()">CHAMAR AGORA</button>
            </div>

            <div id="step-4" class="conteudo">
                <div class="instrucao-branca" id="status-display">CHAMANDO...</div>
                <div style="font-size: 4rem; color: var(--pure-white); margin: 20px 0;">60</div>
                <button class="btn-enviar-selfie" style="background:#c0392b; position:static;" onclick="location.reload()">CANCELAR</button>
            </div>
        </div>

        <div class="instrucao-branca" style="font-size: 0.75rem; margin-top: 20px; opacity: 0.8;">
            ACESSO MONITORADO - NATAL/RN
        </div>
    </div>

<script>
    let stream;

    async function iniciarCamera() {
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'flex';
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        document.getElementById('video').srcObject = stream;
    }

    function concluirSelfie() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById('step-2').style.display = 'none';
        document.getElementById('step-3').style.display = 'flex';
        
        // FOCO AUTOMÁTICO NO INPUT
        const input = document.getElementById('unidade');
        setTimeout(() => {
            input.focus();
            input.click();
        }, 300);
    }

    function chamarMorador() {
        if(!document.getElementById('unidade').value) return;
        document.getElementById('step-3').style.display = 'none';
        document.getElementById('step-4').style.display = 'flex';
    }
</script>
</body>
</html>
