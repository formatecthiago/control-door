<script>
    // REGISTRO OBRIGATÓRIO DO SERVICE WORKER (VÍNCULO COM O SW.JS DO SEU SERVIDOR)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker registrado com sucesso para o PWA!', reg.scope))
                .catch(err => console.log('Falha ao registrar o Service Worker:', err));
        });
    }

    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let streamCameraAtiva = null;
    let usarLenteFrontal = true; 
    let visitanteFotoBase64 = "";
    let llamadaIdGlobal = "";
    let escutadorFirebaseAtivo = null;
    let timerRegressivoInterval = null;
    let tempoRestanteChamada = 90;
    
    let passoAtualWizard = 1; 
    let deferredPrompt = null;

    function gerarFingerprintDispositivo() {
        const meta = [screen.width, screen.height, screen.devicePixelRatio, navigator.hardwareConcurrency || 4, navigator.language].join('||');
        let hash = 0;
        for (let i = 0; i < meta.length; i++) { hash = (hash << 5) - hash + meta.charCodeAt(i); hash |= 0; }
        return "V-" + Math.abs(hash).toString(16).toUpperCase();
    }
    const meu_fingerprint = gerarFingerprintDispositivo();

    function virtyAlert(msg) {
        document.getElementById('custom-alert-msg').innerText = msg;
        document.getElementById('custom-alert').style.display = 'block';
    }
    function fecharAlertCustomizado() { document.getElementById('custom-alert').style.display = 'none'; }

    // Captura o evento de instalação do navegador
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
    });

    // Dispara a instalação ou abre o pop-up com a Home de fundo limpa
    function dispararInstalacaoPWA() {
        resetarFluxoVisitante();

        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                document.getElementById('pop-ajuda-instalacao').style.display = 'flex';
                deferredPrompt = null;
            });
        } else {
            document.getElementById('pop-ajuda-instalacao').style.display = 'flex';
        }
    }

    // Fecha a animação do smartphone e mantém o controle na Home limpa
    function fecharInstrucaoInstalacao() {
        document.getElementById('pop-ajuda-instalacao').style.display = 'none';
    }

    // Controle do Motor de Etapas (Wizard de Telas)
    function iniciarFluxoSequencial() {
        passoAtualWizard = 1;
        mudarTela('s-inicio');
        atualizarVisualWizard();
    }

    function atualizarVisualWizard() {
        const tit = document.getElementById('titulo-wizard');
        const subtit = document.getElementById('subtitulo-wizard');
        const btnProx = document.getElementById('btn-wizard-proximo');
        
        document.getElementById('sub-passo-foto').style.display = "none";
        document.getElementById('sub-passo-unidade').style.display = "none";
        document.getElementById('sub-passo-texto').style.display = "none";

        if(passoAtualWizard === 1) {
            tit.innerText = "PASSO 1 DE 3";
            subtit.innerText = "RECONHECIMENTO FACIAL OBRIGATÓRIO";
            document.getElementById('sub-passo-foto').style.display = "flex";
            btnProx.innerText = "Próximo";
            inicializarCapturaVideo();
        }
        else if(passoAtualWizard === 2) {
            tit.innerText = "PASSO 2 DE 3";
            subtit.innerText = "DIGITE O NÚMERO DA SUA UNIDADE";
            document.getElementById('sub-passo-unidade').style.display = "block";
            btnProx.innerText = "Próximo";
            pararTracksCamera();
            setTimeout(() => document.getElementById('v-un').focus(), 200);
        }
        else if(passoAtualWizard === 3) {
            tit.innerText = "PASSO 3 DE 3";
            subtit.innerText = "REVISÃO E RECADO COMPLEMENTAR";
            document.getElementById('sub-passo-texto').style.display = "block";
            btnProx.innerText = "Chamar";
            setTimeout(() => document.getElementById('v-texto').focus(), 200);
        }
    }

    function avancarPassoWizard() {
        if(passoAtualWizard === 1) {
            if(!visitanteFotoBase64) return virtyAlert("Capture sua foto antes de avançar!");
            passoAtualWizard = 2;
            atualizarVisualWizard();
        }
        else if(passoAtualWizard === 2) {
            const un = document.getElementById('v-un').value.trim();
            if(!un) return virtyAlert("O número da casa ou apt é obrigatório!");
            passoAtualWizard = 3;
            atualizarVisualWizard();
        }
        else if(passoAtualWizard === 3) {
            dispararInterfone(); 
        }
    }

    function voltarPassoWizard() {
        if(passoAtualWizard === 1) {
            cancelarInterfone();
        } else {
            passoAtualWizard--;
            atualizarVisualWizard();
        }
    }

    function inicializarCapturaVideo() {
        if(streamCameraAtiva) { streamCameraAtiva.getTracks().forEach(t => t.stop()); }
        const constraints = { video: { facingMode: usarLenteFrontal ? "user" : "environment" } };
        navigator.mediaDevices.getUserMedia(constraints).then(s => {
            streamCameraAtiva = s;
            const video = document.getElementById('v-vis');
            video.srcObject = s;
            video.style.transform = usarLenteFrontal ? "scaleX(-1)" : "scaleX(1)";
        }).catch(e => {
            console.log("Erro câmera:", e);
            virtyAlert("Câmera indisponível ou permissão negada.");
        });
    }

    function forcarLenteSelfie() {
        usarLenteFrontal = true;
        document.getElementById('c-vis').style.display = "none";
        document.getElementById('v-vis').style.display = "block";
        inicializarCapturaVideo();
    }

    function fotoVis() {
        const v = document.getElementById('v-vis'), c = document.getElementById('c-vis');
        if(!v.videoWidth) return virtyAlert("Aguarde o carregamento do vídeo.");
        c.width = v.videoWidth; c.height = v.videoHeight;
        const ctx = c.getContext('2d');
        if(usarLenteFrontal) { ctx.translate(c.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(v, 0, 0);
        ctx.setTransform(1,0,0,1,0,0);
        visitanteFotoBase64 = c.toDataURL('image/jpeg', 0.5);
        c.style.display = "block"; v.style.display = "none";
        pararTracksCamera();
    }

    function pararTracksCamera() {
        const v = document.getElementById('v-vis');
        if(v && v.srcObject) { v.srcObject.getTracks().forEach(track => track.stop()); }
        if(streamCameraAtiva) { streamCameraAtiva.getTracks().forEach(t => t.stop()); streamCameraAtiva = null; }
    }

    function dispararInterfone() {
        const un = document.getElementById('v-un').value.trim();
        const recado = document.getElementById('v-texto').value.trim();

        db.ref(`bloqueados/${un}/${meu_fingerprint}`).once('value', bSnap => {
            if(bSnap.exists()) {
                exibirFeedbackCustomizado('recusado', "ACESSO BLOQUEADO", "Totem de acesso restrito.");
                return;
            }

            db.ref(`moradores_validados/${un}`).once('value', mSnap => {
                if(!mSnap.exists()) {
                    virtyAlert("Unidade não cadastrada ou sem moradores ativos.");
                    resetarFluxoVisitante();
                    return;
                }

                chamadaIdGlobal = un;
                document.getElementById('texto-unidade-chamando').innerHTML = `CHAMANDO<br>UNIDADE ${un}`;
                
                const dadosChamada = {
                    v_id: meu_fingerprint,
                    dna_dispositivo: meu_fingerprint,
                    foto: visitanteFotoBase64,
                    texto: recado || "Visitante aguardando resposta",
                    status: "chamando",
                    ts: Date.now()
                };

                db.ref(`chamadas_ativas/${un}`).set(dadosChamada).then(() => {
                    mudarTela('s-chamando');
                    iniciarTimerRegressivo();
                    escutarRespostaMorador();
                }).catch(err => {
                    virtyAlert("Erro de conexão com o servidor:\n" + err.message);
                });
            });
        });
    }

    function iniciarTimerRegressivo() {
        tempoRestanteChamada = 90;
        document.getElementById('timer-chamada').innerText = `AGUARDE: ${tempoRestanteChamada}s`;
        clearInterval(timerRegressivoInterval);
        timerRegressivoInterval = setInterval(() => {
            tempoRestanteChamada--;
            document.getElementById('timer-chamada').innerText = `AGUARDE: ${tempoRestanteChamada}s`;
            if(tempoRestanteChamada <= 0) {
                cancelarInterfone();
                exibirFeedbackCustomizado('cinza', "SEM RESPOSTA", "O morador não pôde atender no momento.");
            }
        }, 1000);
    }

    function escutarRespostaMorador() {
        if(escutadorFirebaseAtivo) escutadorFirebaseAtivo.off();
        escutadorFirebaseAtivo = db.ref(`chamadas_ativas/${chamadaIdGlobal}`);
        
        escutadorFirebaseAtivo.on('value', snap => {
            const d = snap.val();
            if(!d) return;

            if(d.status === 'liberado') {
                clearInterval(timerRegressivoInterval);
                exibirFeedbackCustomizado('liberado', "ENTRADA AUTORIZADA", "Porta liberada. Seja bem-vindo!");
                fecharEscutadorAposTempo(4000);
            }
            else if(d.status === 'recusado') {
                clearInterval(timerRegressivoInterval);
                exibirFeedbackCustomizado('recusado', "ENTRADA RECUSADA", "A solicitação foi recusada.");
                fecharEscutadorAposTempo(4000);
            }
            else if(d.status === 'mensagem') {
                clearInterval(timerRegressivoInterval);
                if(d.audio_b64) {
                    exibirFeedbackCustomizado('mensagem', "RECADO RECEBIDO", '"Áudio enviado"');
                    const player = document.getElementById('audio-player-v');
                    player.src = d.audio_b64;
                    player.setAttribute('controls', 'controls');
                    player.play();
                } else {
                    exibirFeedbackCustomizado('mensagem', "RECADO MORADOR", `"${d.msg_morador}"`);
                }
                fecharEscutadorAposTempo(20000);
            }
        });
    }

    function cancelarInterfone() {
        clearInterval(timerRegressivoInterval);
        if(escutadorFirebaseAtivo) escutadorFirebaseAtivo.off();
        if(chamadaIdGlobal) db.ref(`chamadas_ativas/${chamadaIdGlobal}`).remove();
        resetarFluxoVisitante();
    }

    function fecharEscutadorAposTempo(ms) {
        setTimeout(() => {
            if(escutadorFirebaseAtivo) escutadorFirebaseAtivo.off();
            if(chamadaIdGlobal) db.ref(`chamadas_ativas/${chamadaIdGlobal}`).remove();
        }, ms);
    }

    function exibirFeedbackCustomizado(tipo, titulo, mensagem) {
        mudarTela('s-feedback');
        const txtTitulo = document.getElementById('titulo-feedback');
        const txtMsg = document.getElementById('msg-feedback');
        const btnVoltar = document.getElementById('btn-voltar-feedback');
        const player = document.getElementById('audio-player-v');

        player.removeAttribute('controls');
        player.src = "";

        txtTitulo.innerText = titulo;
        txtMsg.innerText = mensagem;

        if(tipo === 'liberado') { txtTitulo.className = "texto-neon-verde"; btnVoltar.style.background = "var(--neon)"; btnVoltar.style.color = "#000"; }
        if(tipo === 'recusado') { txtTitulo.className = "texto-neon-vermelho"; btnVoltar.style.background = "var(--red)"; btnVoltar.style.color = "#fff"; }
        if(tipo === 'mensagem') { txtTitulo.className = "texto-neon-azul"; btnVoltar.style.background = "var(--blue)"; btnVoltar.style.color = "#fff"; }
    }

    function resetarFluxoVisitante() {
        clearInterval(timerRegressivoInterval);
        if(escutadorFirebaseAtivo) escutadorFirebaseAtivo.off();
        pararTracksCamera();
        
        visitanteFotoBase64 = "";
        passoAtualWizard = 1;
        document.getElementById('v-un').value = "";
        document.getElementById('v-texto').value = "";
        document.getElementById('c-vis').style.display = "none";
        document.getElementById('v-vis').style.display = "block";
        
        mudarTela('s-boasvindas');
    }

    function mudarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id !== 's-inicio') { pararTracksCamera(); }
    }
</script>
</body>
</html>
