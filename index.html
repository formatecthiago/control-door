<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interfone Black Edition v6.16</title>
    <style>
        :root { --led-green: #39FF14; --pure-white: #FFFFFF; --true-black: #000000; --grafite-metal: #2c2f33; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--true-black); font-family: sans-serif; }
        .moldura-global { position: fixed; width: 100vw; height: 100vh; background-color: var(--true-black); display: flex; flex-direction: column; align-items: center; justify-content: center; border: 10px solid var(--grafite-metal); box-sizing: border-box; z-index: 5; }
        .container-central { position: relative; width: 220px; height: 260px; border-radius: 50% 50% 45% 45%; overflow: hidden; background: var(--true-black); display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; border: 4px solid transparent; margin-bottom: 25px; transition: 0.3s; }
        .com-guia { border: 4px solid var(--led-green) !important; box-shadow: 0 0 20px var(--led-green); }
        .conteudo { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .area-botoes { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .btn-inox { background: #27ae60; color: white; padding: 18px; width: 85%; border-radius: 12px; border: none; font-weight: bold; font-size: 1.4rem; cursor: pointer; margin-bottom: 12px; text-transform: uppercase; box-shadow: 0 4px 0 #1e8449; }
        .welcome-msg { color: var(--pure-white); text-align: center; margin-bottom: 30px; }
        .lcd-text { color: var(--pure-white); font-family: 'Courier New', monospace; font-size: 1.1rem; font-weight: bold; text-transform: uppercase; }
        input, textarea { width: 80%; background: #fff; color: #000; border: 2px solid var(--led-green); border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 12px; }
        #resposta-area { color: var(--led-green); background: rgba(57, 255, 20, 0.1); padding: 10px; border-radius: 8px; margin-top: 5px; font-weight: bold; display: none; border: 1px dashed var(--led-green); max-width: 90%; }
    </style>
</head>
<body>
    <div class="moldura-global">
        <div id="header-msg"><div class="welcome-msg"><h1>Olá!</h1><p>Toque em INICIAR.</p></div></div>
        <div class="container-central" id="main-container">
            <div id="step-1" class="conteudo" style="display: flex;"></div>
            <div id="step-2" class="conteudo"><video id="video" autoplay playsinline muted></video></div>
            <div id="step-3" class="conteudo"><div class="lcd-text">DADOS DE ACESSO</div></div>
            <div id="step-4" class="conteudo">
                <div id="timer" style="font-size: 3.5rem; color: #fff;">60</div>
                <div id="calling-info" class="lcd-text" style="color: var(--led-green);">CHAMANDO...</div>
                <div id="resposta-area"></div>
            </div>
            <div id="step-5" class="conteudo"><div style="font-size: 6rem; color: var(--led-green);">✓</div><div class="lcd-text">LIBERADO</div></div>
        </div>
        <div class="area-botoes">
            <div id="btn-step-1" style="display: block; width: 100%; text-align: center;"><button class="btn-inox" onclick="passo2()">INICIAR</button></div>
            <div id="btn-step-2" style="display: none; width: 100%; text-align: center;"><button class="btn-inox" onclick="passo3()">CAPTURAR</button></div>
            <div id="btn-step-3" style="display: none; width: 100%; text-align: center;">
                <input type="number" id="unidade" placeholder="CASA">
                <textarea id="recado" placeholder="Mensagem (Opcional)"></textarea>
                <button class="btn-inox" onclick="passo4()">CHAMAR</button>
            </div>
            <div id="btn-step-4" style="display: none; width: 100%; text-align: center;"><button class="btn-inox" style="background:#c0392b" onclick="cancelarTudo()">CANCELAR</button></div>
            <div id="btn-step-5" style="display: none; width: 100%; text-align: center;"><button class="btn-inox" onclick="location.reload()">FECHAR</button></div>
        </div>
    </div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    const firebaseConfig = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", authDomain: "virty-access-door.firebaseapp.com", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", projectId: "virty-access-door", storageBucket: "virty-access-door.firebasestorage.app", messagingSenderId: "694822891117", appId: "1:694822891117:web:b95a71c1eb273071fa9964" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);
    let timerInterval, casaAtual = "";
    window.passo2 = async function() { showStep(2); const stream = await navigator.mediaDevices.getUserMedia({ video: true }); document.getElementById('video').srcObject = stream; }
    window.passo3 = function() { showStep(3); }
    window.passo4 = async function() {
        casaAtual = document.getElementById('unidade').value; if(!casaAtual) return;
        showStep(4);
        set(ref(db, `chamadas_ativas/${casaAtual}`), { ativa: true, msg: document.getElementById('recado').value, status_abertura: false });
        onValue(ref(db, `chamadas_ativas/${casaAtual}`), (snap) => { 
            if(snap.exists() && snap.val().status_abertura) { showStep(5); clearInterval(timerInterval); removerDados(); }
            if(!snap.exists() && casaAtual !== "") { location.reload(); }
        });
        onValue(ref(db, `respostas_interfone/${casaAtual}`), (snap) => { if(snap.exists()){ const a = document.getElementById('resposta-area'); a.innerText = snap.val().mensagem; a.style.display="block"; } });
        let t = 60; timerInterval = setInterval(() => { t--; document.getElementById('timer').innerText = t; if(t<=0){ cancelarTudo(); } }, 1000);
    }
    window.cancelarTudo = () => { removerDados(); location.reload(); }
    function removerDados() { if(casaAtual){ remove(ref(db, `chamadas_ativas/${casaAtual}`)); remove(ref(db, `respostas_interfone/${casaAtual}`)); } }
    function showStep(n) { document.querySelectorAll('.conteudo').forEach(c => c.style.display='none'); document.querySelectorAll('.area-botoes > div').forEach(d => d.style.display='none'); document.getElementById('step-'+n).style.display='flex'; document.getElementById('btn-step-'+n).style.display='block'; if(n===2) document.getElementById('main-container').classList.add('com-guia'); else document.getElementById('main-container').classList.remove('com-guia'); }
</script>
</body>
</html>
