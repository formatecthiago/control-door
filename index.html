<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virty - Visitante</title>
    <style>
        :root { --neon-green: #39FF14; --bg-black: #000000; --card-bg: #111; }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg-black); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        
        /* Telas */
        .screen { display: none; width: 100%; max-width: 450px; flex-direction: column; align-items: center; text-align: center; }
        .active { display: flex; }

        h1 { color: var(--neon-green); font-size: 2rem; margin-bottom: 20px; }
        p { font-size: 1.2rem; margin: 10px 0; }

        /* Inputs e Textos */
        input, textarea { 
            width: 90%; background: #222; border: 2px solid #444; border-radius: 12px;
            color: #fff; padding: 15px; font-size: 1.3rem; text-align: center; margin-bottom: 15px;
        }
        input:focus { border-color: var(--neon-green); outline: none; }

        /* Câmera */
        .video-container { 
            width: 220px; height: 220px; border-radius: 50%; border: 4px solid var(--neon-green);
            overflow: hidden; margin-bottom: 20px; box-shadow: 0 0 20px rgba(57, 255, 20, 0.3); background: #222;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Botões */
        .btn { 
            width: 90%; padding: 18px; border-radius: 15px; border: none; font-size: 1.2rem;
            font-weight: bold; cursor: pointer; margin: 8px 0; transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-green { background: var(--neon-green); color: #000; }
        .btn-red { background: #ff4d4d; color: #fff; }
        .btn-outline { background: transparent; border: 2px solid #fff; color: #fff; }

        /* Balão de Mensagem */
        #chat-box { 
            background: var(--card-bg); border-left: 5px solid var(--neon-green);
            width: 90%; padding: 15px; margin-top: 15px; border-radius: 8px; text-align: left;
        }
        .msg-label { color: var(--neon-green); font-size: 0.9rem; font-weight: bold; display: block; margin-bottom: 5px; }
        #msg-texto { font-size: 1.2rem; }

        #status-atendimento { font-size: 1.5rem; font-weight: bold; margin: 20px 0; min-height: 1.6em; }
    </style>
</head>
<body>

    <div id="screen-start" class="screen active">
        <h1>VIRTY</h1>
        <p>Informe o número da unidade:</p>
        <input type="number" id="input-casa" placeholder="Ex: 101" inputmode="numeric">
        <button class="btn btn-green" onclick="iniciarChamada()">INICIAR</button>
    </div>

    <div id="screen-calling" class="screen">
        <div class="video-container">
            <video id="webcam" autoplay playsinline muted></video>
        </div>
        
        <div id="status-atendimento">CHAMANDO...</div>

        <textarea id="texto-visitante" placeholder="Enviar mensagem rápida..." rows="2"></textarea>
        
        <div id="chat-box" style="display: none;">
            <span class="msg-label">RESPOSTA DO MORADOR:</span>
            <span id="msg-texto"></span>
        </div>

        <button class="btn btn-red" id="btn-cancelar" onclick="finalizar(true)">CANCELAR CHAMADA</button>
    </div>

    <div id="screen-end" class="screen">
        <h1 id="end-title">FIM</h1>
        <p id="end-msg">Agradecemos o contato.</p>
        
        <button class="btn btn-green" onclick="chamarNovamente()">CHAMAR NOVAMENTE</button>
        <button class="btn btn-outline" onclick="irParaHome()">ENCERRAR</button>
    </div>

    <audio id="audio-calling" loop src="https://assets.mixkit.co/active_storage/sfx/1360/1360-preview.mp3"></audio>
    <audio id="audio-end" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", 
        authDomain: "virty-access-door.firebaseapp.com", 
        databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", 
        projectId: "virty-access-door", 
        storageBucket: "virty-access-door.firebasestorage.app", 
        messagingSenderId: "694822891117", 
        appId: "1:694822891117:web:b95a71c1eb273071fa9964" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let casaAtual = "";
    const audioChamada = document.getElementById('audio-calling');
    const audioFim = document.getElementById('audio-end');

    // Mudar de tela
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    window.iniciarChamada = async () => {
        casaAtual = document.getElementById('input-casa').value;
        if (!casaAtual) return alert("Digite o número da casa!");

        showScreen('screen-calling');

        // 1. Abrir Câmera de imediato
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            document.getElementById('webcam').srcObject = stream;
        } catch (err) {
            console.error("Erro câmera:", err);
        }

        // 2. Iniciar Sons e Firebase
        audioChamada.play();
        set(ref(db, `chamadas_ativas/${casaAtual}`), { 
            ativa: true, 
            status: "chamando",
            texto_visitante: "" 
        });

        // Ouvir respostas
        onValue(ref(db, `chamadas_ativas/${casaAtual}`), (snap) => {
            if (!snap.exists()) return;
            const data = snap.val();

            // Mensagem do morador
            if (data.texto_morador) {
                document.getElementById('chat-box').style.display = "block";
                document.getElementById('msg-texto').innerText = data.texto_morador;
            }

            // Status da chamada
            if (data.status === "liberado") {
                document.getElementById('status-atendimento').innerText = "PORTÃO LIBERADO";
                document.getElementById('status-atendimento').style.color = "#39FF14";
                setTimeout(() => finalizar(false, "PORTÃO LIBERADO"), 3000);
            } else if (data.status === "recusado") {
                finalizar(false, "CHAMADA RECUSADA");
            }
        });

        // Sincronizar campo de texto do visitante
        document.getElementById('texto-visitante').oninput = (e) => {
            update(ref(db, `chamadas_ativas/${casaAtual}`), { texto_visitante: e.target.value });
        };
    };

    window.finalizar = (peloVisitante, msgFinal) => {
        audioChamada.pause();
        audioChamada.currentTime = 0;
        audioFim.play();

        if (peloVisitante) {
            remove(ref(db, `chamadas_ativas/${casaAtual}`));
        }

        document.getElementById('end-title').innerText = msgFinal ? "AVISO" : "FIM";
        document.getElementById('end-msg').innerText = msgFinal || "Chamada encerrada.";
        showScreen('screen-end');
        
        // Desligar câmera
        const video = document.getElementById('webcam');
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
        }
    };

    window.chamarNovamente = () => {
        showScreen('screen-start');
        iniciarChamada();
    };

    window.irParaHome = () => {
        document.getElementById('input-casa').value = "";
        showScreen('screen-start');
    };
</script>
</body>
</html>
