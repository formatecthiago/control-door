<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interfone Inteligente v5.5</title>
    <style>
        :root { --led-green: #39FF14; --led-red: #FF3131; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }

        /* MOLDURA GLOBAL (A BASE DE TUDO) */
        .moldura-global {
            position: fixed; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #222, #000); /* Fundo base */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 10px solid #444; box-sizing: border-box; z-index: 5;
        }

        .container-central {
            position: relative; width: 290px; height: 390px;
            border: 5px solid var(--led-green); border-radius: 50% 50% 45% 45%;
            overflow: hidden; box-shadow: 0 0 30px var(--led-green);
            background: #000; display: flex; align-items: center; justify-content: center;
            flex-direction: column; text-align: center; color: white;
        }

        /* CONTEÚDOS DAS TELAS */
        .conteudo { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        
        /* VIDEO E ESPELHO */
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* BOTOES E INPUTS */
        .btn-inox { background: #27ae60; color: white; padding: 20px; width: 80%; border-radius: 10px; border: none; font-weight: bold; font-size: 1.2rem; margin-top: 20px; cursor: pointer; }
        input { width: 80%; padding: 10px; margin: 5px; background: #000; color: var(--led-green); border: 1px solid var(--led-green); text-align: center; }

        .lcd-text { color: var(--led-green); font-family: 'Courier New', monospace; font-size: 1.2rem; margin: 10px; }
    </style>
</head>
<body>

    <div class="moldura-global">
        
        <div class="container-central" id="main-container">
            <div id="step-1" class="conteudo" style="display: flex;">
                <div class="lcd-text">SISTEMA DE SEGURANÇA</div>
                <button class="btn-inox" onclick="passo2()">INICIAR</button>
            </div>

            <div id="step-2" class="conteudo">
                <video id="video" autoplay playsinline muted></video>
                <button class="btn-inox" style="position: absolute; bottom: 20px;" onclick="passo3()">CONCLUIR</button>
            </div>

            <div id="step-3" class="conteudo">
                <div class="lcd-text">UNIDADE:</div>
                <input type="number" id="unidade" placeholder="000">
                <input type="text" id="obs" placeholder="Sua mensagem">
                <button class="btn-inox" onclick="passo4()">CHAMAR</button>
            </div>

            <div id="step-4" class="conteudo">
                <div class="lcd-text" id="status-lcd">CHAMANDO...</div>
                <div id="timer" style="font-size: 3rem;">60</div>
                <button class="btn-inox" style="background:#c0392b" onclick="location.reload()">CANCELAR</button>
            </div>

            <div id="step-5" class="conteudo">
                <div class="lcd-text" style="font-size: 1.5rem; color: #39FF14;">PORTÃO LIBERADO!</div>
                <div class="lcd-text">BEM-VINDO</div>
            </div>
        </div>

        <div id="footer-msg" style="color: #555; font-size: 0.7rem; margin-top: 20px; text-align: center; padding: 0 20px;">
            Identificação biométrica obrigatória para acesso monitorado.
        </div>
    </div>

<script>
    let stream;
    function hideAll() { document.querySelectorAll('.conteudo').forEach(c => c.style.display = 'none'); }

    async function passo2() {
        hideAll();
        document.getElementById('step-2').style.display = 'flex';
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        document.getElementById('video').srcObject = stream;
    }

    function passo3() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        hideAll();
        document.getElementById('step-3').style.display = 'flex';
    }

    function passo4() {
        hideAll();
        document.getElementById('step-4').style.display = 'flex';
        iniciarContagem();
    }

    function iniciarContagem() {
        let t = 60;
        let timerInterval = setInterval(() => {
            t--;
            document.getElementById('timer').innerText = t;
            if(t <= 55) { // Simulação: Morador atende rápido
                clearInterval(timerInterval);
                exibirResposta();
            }
        }, 1000);
    }

    function exibirResposta() {
        hideAll();
        document.getElementById('step-5').style.display = 'flex';
        // Aqui o ESP32 receberia o comando via Firebase
    }
</script>
</body>
</html>
