<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virty Access - Visitante</title>
    <style>
        :root { --neon: #39FF14; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .screen { display: none; width: 100%; max-width: 450px; flex-direction: column; align-items: center; padding: 30px; text-align: center; }
        .active { display: flex; }
        h1 { color: var(--neon); font-size: 2.2rem; margin-top: 20px; }
        .video-box { width: 100%; height: 300px; background: #111; border-radius: 20px; overflow: hidden; border: 2px solid var(--neon); margin: 20px 0; position: relative; }
        video, canvas { width: 100%; height: 100%; object-fit: cover; }
        #photo-taken { position: absolute; top: 0; left: 0; display: none; z-index: 5; }
        input { width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: white; font-size: 1.1rem; text-align: center; }
        .btn { width: 100%; padding: 20px; border-radius: 35px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 10px 0; font-size: 1rem; }
        .btn-green { background: var(--neon); color: black; }
        .btn-white { background: #fff; color: #000; }
        .btn-stop { background: #ff3333; color: white; margin-top: 30px; }
        #timer { font-size: 5rem; color: var(--neon); margin: 20px 0; }
    </style>
</head>
<body>

    <div id="t1" class="screen active">
        <h1>OLÁ</h1>
        <p>Inicie sua chamada abaixo</p>
        <div style="font-size: 6rem; margin: 40px;">👋🏾</div>
        <button class="btn btn-green" onclick="abrirCam()">INICIAR</button>
    </div>

    <div id="t2" class="screen">
        <div class="video-box">
            <video id="v" autoplay playsinline muted></video>
            <canvas id="photo-taken"></canvas>
        </div>
        <button id="btn-selfie" class="btn btn-white" onclick="tirarSelfie()">📷 TIRAR SELFIE</button>
        <input type="number" id="un" placeholder="Número da Unidade" inputmode="numeric">
        <input type="text" id="msg" placeholder="Mensagem (Opcional)">
        <button id="btn-chamar" class="btn btn-green" onclick="chamar()" disabled style="opacity: 0.3;">CHAMAR AGORA</button>
    </div>

    <div id="t3" class="screen">
        <div id="timer">60</div>
        <p>Chamando Unidade <b id="view-un"></b>...</p>
        <button class="btn btn-stop" onclick="cancelar()">CANCELAR</button>
    </div>

    <audio id="som-ring" loop preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/1360/1360-preview.mp3" type="audio/mpeg">
    </audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = { apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", projectId: "virty-access-door" };
    const app = initializeApp(config);
    const db = getDatabase(app);
    let stream, b64 = "", timerInterval;

    window.abrirCam = async () => {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('v').srcObject = stream;
            document.getElementById('t1').classList.remove('active');
            document.getElementById('t2').classList.add('active');
        } catch { alert("Permita a câmera para continuar."); }
    };

    window.tirarSelfie = () => {
        const canv = document.getElementById('photo-taken');
        const video = document.getElementById('v');
        canv.width = video.videoWidth; canv.height = video.videoHeight;
        canv.getContext('2d').drawImage(video, 0, 0);
        b64 = canv.toDataURL('image/jpeg', 0.5);
        canv.style.display = "block";
        document.getElementById('btn-chamar').disabled = false;
        document.getElementById('btn-chamar').style.opacity = "1";
    };

    window.chamar = () => {
        const u = document.getElementById('un').value;
        if(!u) return alert("Qual unidade?");
        
        document.getElementById('view-un').innerText = u;
        document.getElementById('t2').classList.remove('active');
        document.getElementById('t3').classList.add('active');
        
        const som = document.getElementById('som-ring');
        som.play().catch(e => console.log("Erro som:", e));

        set(ref(db, `chamadas_ativas/${u}`), { 
            status: "chamando", 
            foto: b64, 
            texto_visitante: document.getElementById('msg').value || "Visitante na porta" 
        });

        let s = 60; 
        timerInterval = setInterval(() => { 
            s--; 
            document.getElementById('timer').innerText = s;
            if(s <= 0) { 
                cancelar(); 
                alert("Ninguém atendeu na unidade " + u); 
            }
        }, 1000);

        onValue(ref(db, `chamadas_ativas/${u}`), (snap) => {
            const res = snap.val()?.status;
            if(res === "liberado") {
                clearInterval(timerInterval);
                som.pause();
                alert("ENTRADA LIBERADA!"); 
                location.reload(); 
            }
            if(res === "recusado") {
                clearInterval(timerInterval);
                som.pause();
                alert("CHAMADA RECUSADA."); 
                location.reload(); 
            }
        });
    };

    window.cancelar = () => { 
        const u = document.getElementById('un').value;
        remove(ref(db, `chamadas_ativas/${u}`));
        location.reload(); 
    };
</script>
</body>
</html>
