<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virty Access - Visitante</title>
    <style>
        :root { --neon-green: #39FF14; --bg-black: #000; }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg-black); color: white; font-family: sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* Telas */
        .screen { display: none; width: 100%; max-width: 500px; flex-direction: column; align-items: center; padding: 20px; text-align: center; }
        .active { display: flex; }

        /* Estética e Textos */
        h1 { color: var(--neon-green); font-size: 2.5rem; margin-top: 40px; }
        p { font-size: 1.5rem; margin: 20px 0; }
        
        input { 
            width: 90%; padding: 18px; font-size: 1.4rem; border-radius: 10px; border: 2px solid #444;
            background: #111; color: white; margin-bottom: 15px; text-align: center;
        }

        /* Câmera fixa no topo na Tela 2 */
        .video-box { 
            width: 100%; height: 250px; background: #222; border-radius: 15px; 
            overflow: hidden; border: 3px solid var(--neon-green); margin-bottom: 20px;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Botões */
        .btn { 
            width: 90%; padding: 20px; font-size: 1.4rem; font-weight: bold; border-radius: 12px; 
            border: none; cursor: pointer; margin-top: 10px;
        }
        .btn-start { background: var(--neon-green); color: black; }
        .btn-call { background: var(--neon-green); color: black; }
        .btn-stop { background: #ff3333; color: white; }
        .btn-outline { background: transparent; border: 2px solid white; color: white; margin-top: 15px; }

        #timer { font-size: 4rem; color: var(--neon-green); margin: 20px 0; }
        #status-msg { font-size: 1.8rem; font-weight: bold; margin: 20px; color: var(--neon-green); }
    </style>
</head>
<body>

    <div id="tela1" class="screen active">
        <h1>Olá</h1>
        <p>Vamos iniciar sua chamada?</p>
        <button class="btn btn-start" onclick="pedirPermissao()">INICIAR</button>
    </div>

    <div id="tela2" class="screen">
        <div class="video-box">
            <video id="preview" autoplay playsinline muted></video>
        </div>
        <input type="number" id="num-casa" placeholder="Número da Unidade" inputmode="numeric">
        <input type="text" id="msg-opcional" placeholder="Mensagem (Opcional)">
        <button class="btn btn-call" onclick="fazerChamada()">CHAMAR</button>
    </div>

    <div id="tela3" class="screen">
        <div id="timer">00</div>
        <p>Chamando Unidade <span id="display-casa"></span>...</p>
        <div id="status-msg"></div>
        <button class="btn btn-stop" onclick="cancelar()">ENCERRAR</button>
    </div>

    <div id="tela4" class="screen">
        <h1 id="final-status">FIM</h1>
        <p id="final-txt">Chamada encerrada.</p>
        <button class="btn btn-start" onclick="chamarNovamente()">CHAMAR NOVAMENTE</button>
        <button class="btn btn-outline" onclick="fechar()">FECHAR</button>
    </div>

    <audio id="som-chamada" loop src="https://assets.mixkit.co/active_storage/sfx/1360/1360-preview.mp3"></audio>
    <audio id="som-fim" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCyOvvGYTCe6EBb8BC20-oHW6ClWYJZFiM", 
        authDomain: "virty-access-door.firebaseapp.com", 
        databaseURL: "https://virty-access-door-default-rtdb.firebaseio.com", 
        projectId: "virty-access-door", 
        storageBucket: "virty-access-door.firebasestorage.app", 
        messagingSenderId: "694822891117", 
        appId: "1:694822891117:web:b95a71c1eb273071fa9964" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let tempo = 0;
    let intervalo;
    let casaSalva = "";

    function navegar(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // TELA 1 -> TELA 2
    window.pedirPermissao = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('preview').srcObject = stream;
            navegar('tela2');
        } catch (err) {
            alert("Você precisa permitir a câmera para continuar.");
        }
    };

    // TELA 2 -> TELA 3
    window.fazerChamada = () => {
        casaSalva = document.getElementById('num-casa').value;
        const msg = document.getElementById('msg-opcional').value;
        if (!casaSalva) return alert("Digite o número da casa!");

        document.getElementById('display-casa').innerText = casaSalva;
        navegar('tela3');

        // Som e Firebase
        document.getElementById('som-chamada').play();
        set(ref(db, `chamadas_ativas/${casaSalva}`), {
            ativa: true,
            texto_visitante: msg,
            status: "chamando"
        });

        // Contagem
        tempo = 0;
        intervalo = setInterval(() => {
            tempo++;
            document.getElementById('timer').innerText = tempo < 10 ? '0' + tempo : tempo;
        }, 1000);

        // Ouvinte do Morador
        onValue(ref(db, `chamadas_ativas/${casaSalva}`), (snap) => {
            if (!snap.exists()) return;
            const dados = snap.val();

            if (dados.status === "liberado") {
                encerrarFluxo("PORTÃO LIBERADO", "O acesso foi autorizado.");
            } else if (dados.status === "recusado") {
                encerrarFluxo("CHAMADA RECUSADA", "O morador não pode atender no momento.");
            } else if (dados.texto_morador) {
                document.getElementById('status-msg').innerText = dados.texto_morador;
            }
        });
    };

    function encerrarFluxo(titulo, mensagem) {
        clearInterval(intervalo);
        document.getElementById('som-chamada').pause();
        document.getElementById('som-fim').play();
        
        document.getElementById('final-status').innerText = titulo;
        document.getElementById('final-txt').innerText = mensagem;
        navegar('tela4');
    }

    window.cancelar = () => {
        remove(ref(db, `chamadas_ativas/${casaSalva}`));
        encerrarFluxo("FIM", "Chamada encerrada pelo visitante.");
    };

    window.fechar = () => {
        location.reload(); // Volta para a Tela 1 limpo
    };

    window.chamarNovamente = () => {
        navegar('tela2');
        document.getElementById('timer').innerText = "00";
        document.getElementById('status-msg').innerText = "";
    };
</script>
</body>
</html>
