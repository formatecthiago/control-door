<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Morador - Controle de Acesso</title>
    <style>
        :root { --led-green: #39FF14; --led-red: #FF3131; --led-blue: #2196F3; }
        body { background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        /* MOLDURA PARA VER O VISITANTE */
        .visor-visitante {
            width: 260px; height: 340px;
            border: 4px solid var(--led-blue); border-radius: 50% 50% 45% 45%;
            overflow: hidden; background: #111; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center;
        }
        #foto-visitante { width: 100%; height: 100%; object-fit: cover; }

        .info-chamada { text-align: center; margin-bottom: 30px; }
        .unidade-destaque { font-size: 2rem; color: var(--led-green); }

        /* BOTÕES DE CONTROLE */
        .btn-controle {
            width: 90%; padding: 20px; margin: 10px 0; border: none;
            border-radius: 12px; font-weight: bold; font-size: 1.2rem;
            text-transform: uppercase; cursor: pointer;
        }
        .recusar { background: var(--led-red); color: white; }
        .aceitar { background: var(--led-blue); color: white; }
        .abrir { background: var(--led-green); color: #000; }
        
        .legenda { font-size: 0.8rem; margin-top: -8px; margin-bottom: 10px; color: #aaa; }

        /* ÁREA DE EDIÇÃO DE MENSAGEM */
        #painel-mensagem {
            display: none; width: 100%; flex-direction: column; align-items: center;
            background: #222; padding: 20px; border-radius: 15px; position: fixed; bottom: 0;
        }
        textarea { width: 90%; padding: 10px; background: #000; color: white; border: 1px solid var(--led-blue); border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="info-chamada">
        <div class="lcd-text">VISITANTE NA UNIDADE:</div>
        <div class="unidade-destaque" id="num-unidade">102</div>
    </div>

    <div class="visor-visitante">
        <img id="foto-visitante" src="https://via.placeholder.com/260x340?text=Carregando+Foto..." alt="Visitante">
    </div>

    <button class="btn-controle recusar" onclick="recusar()">Recusar</button>

    <button class="btn-controle aceitar" onclick="abrirEdicao()">Aceitar</button>
    <div class="legenda">EDITAR MENSAGEM</div>

    <button class="btn-controle abrir" onclick="abrirPortao()">Abrir Portão</button>

    <div id="painel-mensagem">
        <div style="color: var(--led-blue); margin-bottom: 10px;">DIGITE OU FALE A MENSAGEM</div>
        <textarea id="msg-texto" rows="3" placeholder="Ex: Já estou descendo..."></textarea>
        <div style="display: flex; gap: 10px; width: 100%;">
            <button class="btn-controle aceitar" style="flex: 1;" onclick="enviarMensagem()">Enviar</button>
            <button class="btn-controle recusar" style="flex: 1;" onclick="fecharEdicao()">Voltar</button>
        </div>
    </div>

<script>
    function abrirEdicao() {
        document.getElementById('painel-mensagem').style.display = 'flex';
    }

    function fecharEdicao() {
        document.getElementById('painel-mensagem').style.display = 'none';
    }

    function enviarMensagem() {
        const texto = document.getElementById('msg-texto').value;
        alert("Mensagem enviada ao visitante: " + texto);
        // Lógica Firebase: salvar texto no campo 'resposta_morador'
        fecharEdicao();
    }

    function abrirPortao() {
        alert("Comando enviado: PORTÃO ABERTO");
        // Lógica Firebase: mudar status para 'autorizado'
    }

    function recusar() {
        if(confirm("Deseja recusar a entrada?")) {
            // Lógica Firebase: mudar status para 'recusado'
            location.reload();
        }
    }
</script>

</body>
</html>
